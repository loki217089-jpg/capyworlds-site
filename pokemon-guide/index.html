<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寶可夢喜好攻略 | CapyWorlds</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#13100c;--bg2:#1e1812;--bg3:#2a2218;--accent:#c8a456;--accent2:#e8c86a;--text:#e8ddd0;--text2:#a89880;--border:#3a3028;--red:#ff6b6b;--blue:#6bb5ff;--green:#6bffaa;--purple:#b06bff;--orange:#ffaa6b}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:18px;color:var(--accent2)}
.top-bar a{font-size:14px;color:var(--text2)}
.top-bar a:hover{color:var(--accent)}
.container{max-width:1200px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:14px;transition:.2s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:15px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text2)}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 12px;border-radius:16px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;transition:.2s}
.filter-btn:hover{border-color:var(--accent)}
.filter-btn.active{background:rgba(200,164,86,.2);border-color:var(--accent);color:var(--accent)}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.stats{color:var(--text2);font-size:13px;margin-bottom:12px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.pk-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;transition:.2s;cursor:pointer}
.pk-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.pk-card .header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pk-card .pk-sprite{width:48px;height:48px;image-rendering:pixelated;flex-shrink:0;background:var(--bg3);border-radius:8px}
.pk-card .pk-info{flex:1;min-width:0}
.pk-card .num{color:var(--text2);font-size:12px}
.pk-card .name{font-size:16px;font-weight:600;color:var(--accent2)}
.pk-card .skills{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.pk-card .skill{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(107,181,255,.15);color:var(--blue)}
.pk-card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:11px;padding:2px 6px;border-radius:6px}
.tag-env{background:rgba(107,255,170,.12);color:var(--green)}
.tag-taste{background:rgba(255,106,106,.12);color:var(--red)}
.tag-like{background:rgba(176,107,255,.1);color:var(--purple)}
.tag-drop{background:rgba(255,170,107,.12);color:var(--orange)}
.pk-card .habitats{margin-top:8px;font-size:13px;color:var(--text2);border-top:1px solid var(--border);padding-top:8px}
.hab-item{margin-top:4px;padding:6px 8px;background:var(--bg3);border-radius:6px;font-size:12px;line-height:1.5}
.hab-item .hab-name{color:var(--accent);font-weight:600}
.hab-item .hab-req{color:var(--orange);margin-left:4px}
.hab-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.2s}
.hab-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.hab-card .hab-img{width:100%;height:180px;object-fit:cover;background:var(--bg3);display:block}
.hab-card .hab-body{padding:12px}
.hab-card .hab-id{color:var(--text2);font-size:12px}
.hab-card .hab-title{font-size:16px;font-weight:600;color:var(--accent2);margin:4px 0}
.hab-card .hab-items{color:var(--orange);font-size:13px;margin-bottom:6px}
.hab-card .hab-pokemon{font-size:13px;color:var(--text);line-height:1.6}
.pk-tag{display:inline-block;margin:2px 4px 2px 0;padding:2px 8px;background:var(--bg3);border-radius:6px;font-size:12px}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center;padding:20px}
.detail-overlay.show{display:flex}
.detail-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:min(560px,calc(100vw - 32px));max-height:88vh;overflow-y:auto;width:100%}
.detail-box .close{float:right;cursor:pointer;color:var(--text2);font-size:20px;padding:4px 8px;border-radius:8px}
.detail-box .close:hover{background:var(--bg3);color:var(--text)}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.detail-sprite{width:80px;height:80px;image-rendering:pixelated;background:var(--bg3);border-radius:12px}
.detail-box h2{color:var(--accent2);font-size:22px}
.detail-box .meta{color:var(--text2);font-size:13px}
.section{margin-top:14px}
.section h3{font-size:14px;color:var(--accent);margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.info-row{display:flex;gap:8px;margin-bottom:4px;font-size:13px}
.info-label{color:var(--text2);min-width:80px;flex-shrink:0}
.info-val{color:var(--text)}
.detail-hab{margin-top:8px;padding:10px;background:var(--bg3);border-radius:8px}
.detail-hab-img{width:100%;max-height:200px;object-fit:cover;border-radius:6px;margin-bottom:8px}
/* Recipe section */
.recipe-group{margin-bottom:24px}
.recipe-group-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.recipe-group-header .rg-icon{font-size:28px}
.recipe-group-header .rg-title{font-size:18px;font-weight:700;color:var(--accent2)}
.recipe-group-header .rg-sub{font-size:13px;color:var(--text2)}
.recipe-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;transition:.2s}
.recipe-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.recipe-card .rc-name{font-size:15px;font-weight:600;color:var(--accent2);margin-bottom:4px}
.recipe-card .rc-row{font-size:13px;color:var(--text);margin-bottom:3px;display:flex;gap:6px}
.recipe-card .rc-label{color:var(--text2);min-width:60px;flex-shrink:0}
.recipe-card .rc-taste{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.taste-sweet{background:rgba(255,182,193,.2);color:#ffb6c1}
.taste-spicy{background:rgba(255,106,106,.2);color:#ff6b6b}
.taste-bitter{background:rgba(107,181,255,.2);color:#6bb5ff}
.taste-sour{background:rgba(255,255,107,.2);color:#e8e860}
.taste-astringent{background:rgba(176,107,255,.2);color:#b06bff}
.taste-none{background:rgba(200,164,86,.15);color:var(--accent)}
.recipe-card .rc-price{color:var(--orange);font-weight:600}
.offering-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px}
.offering-section h3{font-size:16px;color:var(--accent2);margin-bottom:10px}
.offering-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.offering-row:last-child{border:none}
.offering-taste{min-width:48px;font-weight:600}
.offering-effect{color:var(--text)}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
@media(max-width:600px){
  .card-grid{grid-template-columns:1fr}
  .container{padding:10px}
  .top-bar{padding:10px 14px}
  .top-bar h1{font-size:16px}
  .pk-card .pk-sprite{width:40px;height:40px}
}
</style>
</head>

const SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/';
function spriteUrl(name) {
  const clean = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').replace(/（★.*）/,'').replace(/\(★.*\)/,'').trim();
  const dex = DEX_MAP[clean];
  return dex ? SPRITE_BASE + dex + '.png' : '';
}

// Find habitat image by name
function habImg(habStr) {
  if (!habStr) return '';
  const hName = habStr.split(' / ')[0];
  for (const h of HAB_DATA) {
    if (h[1] === hName) return h[4] || '';
  }
  return '';
}

    html+=`<div class="offering-section" style="grid-column:1/-1"><h3>🧺 料理素材取得方式</h3>`;
    INGREDIENT_SOURCES.forEach(([name,icon,source])=>{
      html+=`<div class="offering-row"><span style="min-width:120px;font-weight:600;color:var(--accent)">${icon} ${name}</span><span class="offering-effect">${source}</span></div>`;
    });
    html+=`<div style="font-size:12px;color:var(--text2);margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">💡 多建收銀台（寶可夢中心、商店、大自然的集市）可讓寶可夢上架更多商品。閃光點有機會獲得種子，種下後可持續收穫。</div></div>`;
  }
  // Group by category
  const cats=['salad','bread','soup','hamburger'];
  cats.forEach(cat=>{
    const info=RECIPE_CATEGORIES[cat];
    const recipes=RECIPE_DATA.filter(r=>r[1]===cat&&(!q||(r[0]+' '+r[2]+' '+r[3]+' '+r[4]).toLowerCase().includes(q)));
    if(!recipes.length&&q)return;
    html+=`<div class="recipe-group" style="grid-column:1/-1">
      <div class="recipe-group-header">
        <span class="rg-icon">${info.icon}</span>
        <div><div class="rg-title">${info.name} ${info.nameEn}</div>
        <div class="rg-sub">廚具：${info.tool}｜基礎素材：${info.base}</div>
        <div class="rg-sub" style="color:var(--green)">⚡ 強化技能：${info.skill}（${info.skillEn}）— ${info.skillDesc}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">`;
    recipes.forEach(r=>{
      html+=`<div class="recipe-card">
        <div class="rc-name">${r[0]}</div>
        <div class="rc-row"><span class="rc-label">口味</span><span class="rc-taste taste-${r[6]}">${r[2]}</span></div>
        <div class="rc-row"><span class="rc-label">特殊素材</span><span>${r[3]}</span></div>
        ${r[4]!=='—'?`<div class="rc-row"><span class="rc-label">寶可夢特長</span><span style="color:var(--blue)">${r[4]}</span></div>`:''}
        <div class="rc-row"><span class="rc-label">售價</span><span class="rc-price">💰 ${r[5]}</span></div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

function renderPokemon(q){
  let filtered=PK_DATA.filter(p=>{
    if(!p[1])return false;
    if(filterEnv&&p[4]!==filterEnv)return false;
    if(filterTaste&&!p[6].includes(filterTaste))return false;
    if(curTab==='skill'&&filterSkill&&(!p[2]||!p[2].includes(filterSkill)))return false;
    if(q){const s=(p[1]+' '+p[2]+' '+p[4]+' '+p[5]+' '+p[6]+' '+p[7]+' '+p[9]+' '+p[11]).toLowerCase();return s.includes(q);}
    return true;
  });
  document.getElementById('stats').textContent=`${t('found')} ${filtered.length} ${t('items')}`;
  const el=document.getElementById('results');
  if(!filtered.length){el.innerHTML=`<div class="empty">${t('noResult')}</div>`;return;}
  el.innerHTML=filtered.map((p,i)=>{
    const spr=spriteUrl(p[1]);
    let habHtml='';
    if(p[7]){const parts=p[7].split(' / ');habHtml+=`<div class="hab-item"><span class="hab-name">${parts[0]}</span><span class="hab-req">${parts[1]||''}</span></div>`;}
    if(p[9]){const parts=p[9].split(' / ');habHtml+=`<div class="hab-item"><span class="hab-name">${parts[0]}</span><span class="hab-req">${parts[1]||''}</span></div>`;}
    if(p[11]){const parts=p[11].split(' / ');habHtml+=`<div class="hab-item"><span class="hab-name">${parts[0]}</span><span class="hab-req">${parts[1]||''}</span></div>`;}
    const skillsHtml=p[2]?p[2].split('、').map(s=>`<span class="skill">${s.trim()}</span>`).join(''):'';
    const likesHtml=p[5]?p[5].split('、').slice(0,5).map(l=>`<span class="tag tag-like">${l.trim()}</span>`).join(''):'';
    return `<div class="pk-card" onclick="showDetail(${PK_DATA.indexOf(p)})">
      <div class="header">
        ${spr?`<img class="pk-sprite" src="${spr}" alt="${p[1]}" loading="lazy" onerror="this.style.display='none'">`:''}
        <div class="pk-info"><div class="num">#${p[0]}</div><div class="name">${p[1]}</div>
        <div class="skills">${skillsHtml}</div></div>
      </div>
      <div class="tags">
        ${p[4]&&p[4]!=='-'?`<span class="tag tag-env">🌿 ${p[4]}</span>`:''}
        ${p[6]&&p[6]!=='-'?`<span class="tag tag-taste">👅 ${p[6]}</span>`:''}
        ${p[3]?`<span class="tag tag-drop">📦 ${p[3]}</span>`:''}
      </div>
      ${likesHtml?`<div class="tags" style="margin-top:4px">${likesHtml}</div>`:''}
      ${habHtml?`<div class="habitats">${habHtml}</div>`:''}
    </div>`;
  }).join('');
}

function renderHabitats(q){
  let filtered=HAB_DATA.filter(h=>{
    if(q){const s=(h[1]+' '+h[2]+' '+h[3]).toLowerCase();return s.includes(q);}
    return true;
  });
  document.getElementById('stats').textContent=`${t('found')} ${filtered.length} ${t('items')}`;
  const el=document.getElementById('results');
  if(!filtered.length){el.innerHTML=`<div class="empty">${t('noResult')}</div>`;return;}
  el.innerHTML=filtered.map(h=>`<div class="hab-card">
    ${h[4]?`<img class="hab-img" src="${h[4]}" alt="${h[1]}" loading="lazy" onerror="this.style.display='none'">`:`<div class="hab-img" style="display:flex;align-items:center;justify-content:center;font-size:48px">🏠</div>`}
    <div class="hab-body">
      <div class="hab-id">${h[0]}</div>
      <div class="hab-title">${h[1]}</div>
      <div class="hab-items">🔧 ${h[2]||t('none')}</div>
      <div class="hab-pokemon">${(h[3]||'').split('、').map(pk=>`<span class="pk-tag">${pk}</span>`).join('')}</div>
    </div>
  </div>`).join('');
}

function showDetail(idx){
  const p=PK_DATA[idx];if(!p)return;
  const spr=spriteUrl(p[1]);
  const el=document.getElementById('detail');
  let habSection='';
  [[p[7],p[8]],[p[9],p[10]],[p[11],p[12]]].forEach(([hab,pks],i)=>{
    if(!hab)return;
    const parts=hab.split(' / ');
    const img=habImg(hab);
    habSection+=`<div class="detail-hab">
      ${img?`<img class="detail-hab-img" src="${img}" alt="${parts[0]}" loading="lazy" onerror="this.style.display='none'">`:''}
      <div style="color:var(--accent);font-weight:600">${t('hab')}${i+1}: ${parts[0]}</div>
      <div style="color:var(--orange);font-size:12px;margin-top:2px">${t('reqItems')}: ${parts[1]||'—'}</div>
      ${pks?`<div style="color:var(--text2);font-size:12px;margin-top:2px">${t('appearPk')}: ${pks}</div>`:''}
    </div>`;
  });
  el.innerHTML=`<span class="close" onclick="closeDetail()">${t('close')}</span>
    <div class="detail-header">
      ${spr?`<img class="detail-sprite" src="${spr}" alt="${p[1]}">`:''}
      <div><h2>#${p[0]} ${p[1]}</h2><div class="meta">${p[2]?t('skillLabel')+': '+p[2]:''}</div></div>
    </div>
    <div class="section"><h3>📋 ${t('detail')}</h3>
      <div class="info-row"><span class="info-label">${t('envLabel')}</span><span class="info-val">${p[4]||'—'}</span></div>
      <div class="info-row"><span class="info-label">${t('tasteLabel')}</span><span class="info-val">${p[6]||'—'}</span></div>
      <div class="info-row"><span class="info-label">${t('dropLabel')}</span><span class="info-val">${p[3]||'—'}</span></div>
      <div class="info-row"><span class="info-label">${t('likesLabel')}</span><span class="info-val">${p[5]||'—'}</span></div>
    </div>
    <div class="section"><h3>🏠 ${t('habLabel')}</h3>${habSection||`<div style="color:var(--text2)">${t('none')}</div>`}</div>`;
  document.getElementById('overlay').classList.add('show');
}
function closeDetail(){document.getElementById('overlay').classList.remove('show');}
function doSearch(){renderAll();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
renderAll();

</script>
