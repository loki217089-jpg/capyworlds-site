  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #13100c;
      color: #e8ddd0;
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 52px 24px 44px;
      background: radial-gradient(ellipse at 50% -10%, #2d1e0e 0%, #13100c 68%);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8a456 40%, #c8a456 60%, transparent);
    }

    .capy-mascot {
      width: 190px;
      height: 170px;
      margin: 0 auto 28px;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(200, 164, 86, 0.18));
    }

    .hero h1 {
      font-size: clamp(36px, 7vw, 58px);
      font-weight: 900;
      color: #fff;
      letter-spacing: 4px;
      text-shadow: 0 0 50px rgba(200, 164, 86, 0.35);
    }
    .hero h1 .accent { color: #c8a456; }

    .hero .tagline {
      margin-top: 12px;
      color: #907a60;
      font-size: 15px;
      letter-spacing: 1px;
    }

    /* ── Nav Grid ── */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      max-width: 840px;
      margin: 52px auto 0;
      padding: 0 24px;
    }

    .nav-card {
      background: #1e1812;
      border: 1px solid #3d3020;
      border-radius: 18px;
      padding: 32px 20px;
      text-decoration: none;
      color: inherit;
      text-align: center;
      transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .nav-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #c8a456, transparent);
      opacity: 0;
      transition: opacity 0.22s;
    }
    .nav-card:hover {
      transform: translateY(-6px);
      border-color: #c8a456;
      box-shadow: 0 10px 32px rgba(200, 164, 86, 0.18);
    }
    .nav-card:hover::before { opacity: 1; }

    .nav-card .card-icon {
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }
    .nav-card .card-label {
      font-size: 19px;
      font-weight: 700;
      color: #e8ddd0;
      letter-spacing: 1px;
    }
    .nav-card .card-desc {
      font-size: 12px;
      color: #7a6a58;
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 36px 24px;
      margin-top: 60px;
      color: #4a3828;
      font-size: 13px;
      border-top: 1px solid #2a1e14;
    }
    footer span { color: #c8a456; }

    /* ── Comments ── */
    .comments-section {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }
    .comments-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c8a456;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .comments-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #3d3020, transparent);
    }
  </style>
</head>
