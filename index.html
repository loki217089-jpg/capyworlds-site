<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapyWorlds</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6193561251326215"
     crossorigin="anonymous"></script>
  <style>
    /* ── Theme Variables ── */
    :root {
      --bg: #13100c;
      --bg-hero: #2d1e0e;
      --bg2: #1e1812;
      --bg3: #13100c;
      --bg4: #191410;
      --border: #3d3020;
      --border2: #2a1e14;
      --border3: #2a2016;
      --accent: #c8a456;
      --accent-rgb: 200, 164, 86;
      --text: #e8ddd0;
      --text2: #907a60;
      --text3: #7a6a58;
      --text4: #4a3828;
      --text5: #c8b89a;
      --h1: #ffffff;
      --cancel-bg: #2a1e14;
    }
    [data-theme="light"] {
      --bg: #f5f0e8;
      --bg-hero: #e0d0a8;
      --bg2: #ffffff;
      --bg3: #f0ebe0;
      --bg4: #faf6f0;
      --border: #d4c4a0;
      --border2: #e0d4b8;
      --border3: #ddd0bc;
      --accent: #9a6e1e;
      --accent-rgb: 154, 110, 30;
      --text: #2a1e0e;
      --text2: #7a6a50;
      --text3: #6a5a48;
      --text4: #9a8a70;
      --text5: #4a3828;
      --h1: #1a0e06;
      --cancel-bg: #e0d8c8;
    }
    [data-theme="pink"] {
      --bg: #1a0810;
      --bg-hero: #3d0a22;
      --bg2: #260a18;
      --bg3: #1a0810;
      --bg4: #200c14;
      --border: #6a2050;
      --border2: #4a1038;
      --border3: #481840;
      --accent: #e060a8;
      --accent-rgb: 224, 96, 168;
      --text: #f8d8ec;
      --text2: #c06898;
      --text3: #a05880;
      --text4: #704060;
      --text5: #e8b8d4;
      --h1: #fff0f8;
      --cancel-bg: #3a1028;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Theme Switcher ── */
    .theme-switcher {
      position: fixed;
      top: 14px; right: 14px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 6px 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.35);
      transition: background 0.3s, border-color 0.3s;
    }
    .theme-switcher-label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.5px;
      margin-right: 2px;
      user-select: none;
    }
    .theme-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      outline: none;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active {
      border-color: var(--text);
      box-shadow: 0 0 0 1px var(--bg2);
      transform: scale(1.1);
    }
    .theme-dot[data-t="dark"]  { background: radial-gradient(circle at 35% 35%, #c8a456, #5a3c10); }
    .theme-dot[data-t="light"] { background: radial-gradient(circle at 35% 35%, #f5f0d8, #c8b480); }
    .theme-dot[data-t="pink"]  { background: radial-gradient(circle at 35% 35%, #f880c0, #8a1858); }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 52px 24px 44px;
      background: radial-gradient(ellipse at 50% -10%, var(--bg-hero) 0%, var(--bg) 68%);
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 40%, var(--accent) 60%, transparent);
    }

    .capy-mascot {
      width: 190px;
      height: 170px;
      margin: 0 auto 28px;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(var(--accent-rgb), 0.22));
    }

    .hero h1 {
      font-size: clamp(36px, 7vw, 58px);
      font-weight: 900;
      color: var(--h1);
      letter-spacing: 4px;
      text-shadow: 0 0 50px rgba(var(--accent-rgb), 0.35);
    }
    .hero h1 .accent { color: var(--accent); }

    .hero .tagline {
      margin-top: 12px;
      color: var(--text2);
      font-size: 15px;
      letter-spacing: 1px;
    }

    /* ── Nav Grid ── */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      max-width: 840px;
      margin: 52px auto 0;
      padding: 0 24px;
    }

    .nav-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 20px;
      text-decoration: none;
      color: inherit;
      text-align: center;
      transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s, background 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .nav-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.22s;
    }
    .nav-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 10px 32px rgba(var(--accent-rgb), 0.18);
    }
    .nav-card:hover::before { opacity: 1; }

    .nav-card .card-icon {
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }
    .nav-card .card-label {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }
    .nav-card .card-desc {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 36px 24px;
      margin-top: 60px;
      color: var(--text4);
      font-size: 13px;
      border-top: 1px solid var(--border2);
      transition: color 0.3s, border-color 0.3s;
    }
    footer span { color: var(--accent); }

    /* ── Comments ── */
    .comments-section {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }
    .comments-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .comments-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .comment-form {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: background 0.3s;
    }
    .comment-form input,
    .comment-form textarea {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.3s;
    }
    .comment-form input:focus,
    .comment-form textarea:focus { border-color: var(--accent); }
    .comment-form textarea { resize: vertical; min-height: 80px; }
    .comment-form button {
      align-self: flex-end;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 9px 24px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .comment-form button:hover { opacity: 0.85; }
    .comment-form button:disabled { opacity: 0.5; cursor: not-allowed; }
    .comment-list { display: flex; flex-direction: column; gap: 14px; }
    .comment-item {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 14px 18px;
      transition: background 0.3s;
    }
    .comment-item.reply {
      background: var(--bg4);
      border-color: var(--border3);
      margin-left: 28px;
      margin-top: 8px;
      border-left: 2px solid rgba(var(--accent-rgb), 0.25);
    }
    .comment-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .comment-name { font-weight: 700; color: var(--accent); font-size: 14px; }
    .comment-date { color: var(--text4); font-size: 12px; }
    .comment-content { color: var(--text5); font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .comment-actions { margin-top: 8px; display: flex; gap: 8px; }
    .btn-reply {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--text3); font-size: 12px; padding: 3px 10px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-reply:hover { border-color: var(--accent); color: var(--accent); }
    .btn-delete {
      background: none; border: 1px solid #5a2020; border-radius: 6px;
      color: #7a4040; font-size: 12px; padding: 3px 10px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-delete:hover { border-color: #c45050; color: #c45050; }
    .inline-reply-form {
      margin-top: 10px; display: flex; flex-direction: column; gap: 8px;
    }
    .inline-reply-form input,
    .inline-reply-form textarea {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none;
      transition: background 0.3s;
    }
    .inline-reply-form textarea { min-height: 60px; resize: vertical; }
    .inline-reply-form input:focus,
    .inline-reply-form textarea:focus { border-color: var(--accent); }
    .inline-reply-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .inline-reply-btns button {
      border: none; border-radius: 6px; padding: 6px 16px;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-cancel { background: var(--cancel-bg); color: var(--text3); }
    .btn-send { background: var(--accent); color: var(--bg); }
    .admin-bar {
      display: none; background: var(--bg4); border: 1px solid #5a2020;
      border-radius: 10px; padding: 10px 16px; margin-bottom: 16px;
      font-size: 13px; color: #c45050; align-items: center; gap: 10px;
    }
    .admin-bar.show { display: flex; }
    .admin-bar input {
      background: var(--bg3); border: 1px solid #5a2020; border-radius: 6px;
      padding: 5px 10px; color: var(--text); font-size: 13px; outline: none; flex: 1;
    }
    .admin-bar button {
      background: #5a2020; border: none; border-radius: 6px;
      color: var(--text); font-size: 13px; padding: 5px 14px; cursor: pointer;
    }
    .comment-msg { color: var(--text3); font-size: 13px; text-align: center; padding: 20px 0; }

    /* ── Danmaku & Points ── */
    #danmaku-layer {
      position:fixed; top:0; left:0; right:0; bottom:0;
      pointer-events:none; overflow:hidden; z-index:200;
    }
    .dm {
      position:absolute; white-space:nowrap;
      font-size:17px; font-weight:700;
      text-shadow: 0 1px 5px rgba(0,0,0,.98), 0 0 12px rgba(0,0,0,.7);
      animation: dm-fly linear forwards;
    }
    @keyframes dm-fly {
      from { transform: translateX(105vw); }
      to   { transform: translateX(calc(-100% - 40px)); }
    }
    .pts-badge {
      position:fixed; top:100px; right:14px; z-index:200;
      background: var(--bg2);
      border:1px solid rgba(var(--accent-rgb),.45); border-radius:20px;
      padding:6px 14px; font-size:12px; color:var(--accent);
      display:flex; align-items:center; gap:5px; user-select:none;
      box-shadow: 0 2px 16px rgba(0,0,0,0.35);
      font-weight:600;
      transition: background 0.3s, border-color 0.3s;
    }
    #dm-toggle {
      position:fixed; top:58px; right:14px; z-index:200;
      background: var(--bg2);
      border:1px solid var(--border); border-radius:20px;
      padding:6px 14px; font-size:12px; color:var(--text2);
      cursor:pointer; transition:all .2s;
      box-shadow: 0 2px 16px rgba(0,0,0,0.35);
      display:flex; align-items:center; gap:5px; font-weight:600;
      letter-spacing:0.3px;
    }
    #dm-toggle:hover  { border-color:var(--accent); color:var(--accent); }
    #dm-toggle.on     { border-color:var(--accent); color:var(--accent); background:rgba(var(--accent-rgb),.12); }
    #danmaku-bar {
      position:fixed; bottom:0; left:0; right:0; z-index:301;
      background:rgba(8,5,18,.85); backdrop-filter:blur(14px);
      border-top:1px solid rgba(255,255,255,.07);
      padding:8px 16px; display:none; align-items:center; gap:10px;
    }
    #danmaku-bar.open { display:flex; }
    .dm-pts  { font-size:12px; color:var(--accent); white-space:nowrap; flex-shrink:0; }
    .dm-input {
      flex:1; min-width:0; background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.13); border-radius:20px;
      padding:7px 16px; font-size:14px; color:#fff; outline:none; transition:border-color .2s;
    }
    .dm-input:focus { border-color:rgba(var(--accent-rgb),.5); }
    .dm-input::placeholder { color:rgba(255,255,255,.25); }
    .dm-colors { display:flex; gap:7px; align-items:center; flex-shrink:0; }
    .dm-dot {
      width:18px; height:18px; border-radius:50%; cursor:pointer;
      border:2px solid transparent; transition:transform .15s, border-color .15s;
    }
    .dm-dot.sel { border-color:#fff; transform:scale(1.25); }
    .dm-send {
      background:rgba(var(--accent-rgb),.12); border:1px solid rgba(var(--accent-rgb),.4);
      color:var(--accent); border-radius:20px; padding:7px 20px;
      font-size:13px; cursor:pointer; white-space:nowrap; flex-shrink:0;
      transition:background .15s;
    }
    .dm-send:hover   { background:rgba(var(--accent-rgb),.28); }
    .dm-send:disabled { opacity:.4; cursor:not-allowed; }
    .pts-popup {
      position:fixed; right:16px; bottom:110px; z-index:500;
      background:rgba(10,6,22,.85); border:1px solid rgba(var(--accent-rgb),.5);
      border-radius:8px; padding:6px 16px; font-size:13px; color:var(--accent);
      pointer-events:none; white-space:nowrap;
      animation: pts-up 2.2s ease forwards;
    }
    @keyframes pts-up {
      0%   { opacity:0; transform:translateY(10px); }
      12%  { opacity:1; transform:translateY(0); }
      75%  { opacity:1; }
      100% { opacity:0; transform:translateY(-20px); }
    }
  </style>
</head>

  </div>

  <!-- Comments -->
  <section class="comments-section">
    <div class="comments-title" id="commentsTitle">💬 留言區 &nbsp; Comments</div>

    <!-- 管理員登入列 -->
    <div class="admin-bar" id="adminBar">
      🔑 管理員密碼：
      <input type="password" id="adminKeyInput" placeholder="輸入密碼" />
      <button onclick="adminLogin()">登入</button>
      <button onclick="adminLogout()" id="adminLogoutBtn" style="display:none;background:#2a1e14;color:#c45050">登出</button>
    </div>

    <form class="comment-form" id="commentForm">
      <input type="text" id="commentName" placeholder="你的名稱" maxlength="50" required />
      <textarea id="commentContent" placeholder="留下你的想法..." maxlength="500" required></textarea>
      <button type="submit" id="submitBtn">送出留言</button>
    </form>

    <div class="comment-list" id="commentList">
      <div class="comment-msg">載入中...</div>
    </div>
  </section>

  <script>
    const API = 'https://capyworlds-comments.loki217089.workers.dev';
    let adminKey = sessionStorage.getItem('adminKey') || '';
    let titleClickCount = 0, titleClickTimer = null;

    // 點標題 5 下開啟管理員列
    document.getElementById('commentsTitle').addEventListener('click', () => {
      titleClickCount++;
      clearTimeout(titleClickTimer);
      titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 1500);
      if (titleClickCount >= 5) {
        titleClickCount = 0;
        document.getElementById('adminBar').classList.toggle('show');
        updateAdminUI();
      }
    });

    function adminLogin() {
      const key = document.getElementById('adminKeyInput').value.trim();
      if (!key) return;
      adminKey = key;
      sessionStorage.setItem('adminKey', key);
      updateAdminUI();
      loadComments();
    }
    function adminLogout() {
      adminKey = '';
      sessionStorage.removeItem('adminKey');
      document.getElementById('adminBar').classList.remove('show');
      updateAdminUI();
      loadComments();
    }
    function updateAdminUI() {
      const logoutBtn = document.getElementById('adminLogoutBtn');
      const input = document.getElementById('adminKeyInput');
      if (adminKey) {
        logoutBtn.style.display = '';
        input.style.display = 'none';
        input.previousSibling && (input.previousSibling.textContent = '✅ 管理員模式');
      } else {
        logoutBtn.style.display = 'none';
        input.style.display = '';
      }
    }

    async function loadComments() {
      const list = document.getElementById('commentList');
      try {
        const res = await fetch(API + '/comments');
        const data = await res.json();
        if (!data.length) {
          list.innerHTML = '<div class="comment-msg">還沒有留言，來說第一句話吧！</div>';
          return;
        }
        // 分離頂層和回覆
        const top = data.filter(c => !c.parent_id);
        const replies = data.filter(c => c.parent_id);
        list.innerHTML = top.map(c => renderComment(c, replies)).join('');
      } catch {
        list.innerHTML = '<div class="comment-msg">留言載入失敗，請稍後再試。</div>';
      }
    }

    function renderComment(c, replies, isReply) {
      const myReplies = replies ? replies.filter(r => r.parent_id === c.id) : [];
      return `
        <div class="comment-item${isReply ? ' reply' : ''}" id="comment-${c.id}">
          <div class="comment-meta">
            <span class="comment-name">${esc(c.name)}</span>
            <span class="comment-date">${formatDate(c.created_at)}</span>
          </div>
          <div class="comment-content">${esc(c.content)}</div>
          <div class="comment-actions">
            ${!isReply ? `<button class="btn-reply" onclick="toggleReply(${c.id})">↩ 回覆</button>` : ''}
            ${adminKey ? `<button class="btn-delete" onclick="deleteComment(${c.id})">🗑 刪除</button>` : ''}
          </div>
          <div id="reply-form-${c.id}" style="display:none"></div>
          ${myReplies.map(r => renderComment(r, [], true)).join('')}
        </div>
      `;
    }

    function toggleReply(parentId) {
      const el = document.getElementById(`reply-form-${parentId}`);
      if (el.innerHTML) { el.innerHTML = ''; el.style.display = 'none'; return; }
      el.style.display = '';
      el.innerHTML = `
        <div class="inline-reply-form">
          <input type="text" placeholder="你的名稱" maxlength="50" id="rname-${parentId}" />
          <textarea placeholder="回覆內容..." maxlength="500" id="rcontent-${parentId}"></textarea>
          <div class="inline-reply-btns">
            <button class="btn-cancel" onclick="toggleReply(${parentId})">取消</button>
            <button class="btn-send" onclick="submitReply(${parentId})">送出回覆</button>
          </div>
        </div>
      `;
      document.getElementById(`rname-${parentId}`).focus();
    }

    async function submitReply(parentId) {
      const name = document.getElementById(`rname-${parentId}`).value.trim();
      const content = document.getElementById(`rcontent-${parentId}`).value.trim();
      if (!name || !content) { alert('請填寫名稱和回覆內容'); return; }
      const res = await fetch(API + '/comments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content, parent_id: parentId }),
      });
      const data = await res.json();
      if (data.ok) { await loadComments(); }
      else { alert(data.error || '送出失敗'); }
    }

    async function deleteComment(id) {
      if (!confirm('確定要刪除這則留言嗎？')) return;
      const res = await fetch(`${API}/comments/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${adminKey}` },
      });
      const data = await res.json();
      if (data.ok) { await loadComments(); }
      else { alert(data.error || '刪除失敗，請確認密碼正確'); }
    }

    document.getElementById('commentForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('commentName').value.trim();
      const content = document.getElementById('commentContent').value.trim();
      btn.disabled = true; btn.textContent = '送出中...';
      try {
        const res = await fetch(API + '/comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, content }),
        });
        const data = await res.json();
        if (data.ok) {
          document.getElementById('commentContent').value = '';
          await loadComments();
          if (typeof awardPoints === 'function') awardPoints(10, '留言獎勵 💬');
        } else { alert(data.error || '送出失敗'); }
      } catch { alert('網路錯誤，請稍後再試'); }
      btn.disabled = false; btn.textContent = '送出留言';
    });

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function formatDate(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    }

    if (adminKey) updateAdminUI();
    loadComments();

    // ── Theme Switcher ──
    (function() {
      const saved = localStorage.getItem('capyTheme') || 'dark';
      function setTheme(t) {
        if (t === 'dark') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('capyTheme', t);
        document.querySelectorAll('.theme-dot').forEach(d => {
          d.classList.toggle('active', d.dataset.t === t);
        });
      }
      window.setTheme = setTheme;
      setTheme(saved);
    })();
  </script>

  <footer>
    © 2025 <span>CapyWorlds</span> &nbsp;·&nbsp; Made with 🦫 &amp; ❤️
    &nbsp;·&nbsp; <a href="/privacy.html" style="color:var(--accent);opacity:0.6;text-decoration:none;font-size:13px;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.6">隱私權政策</a>
  </footer>

  <!-- ── Danmaku Layer ── -->
  <div id="danmaku-layer"></div>

  <!-- ── Points Badge ── -->
  <div class="pts-badge" title="積分：玩遊戲 +5 / 留言 +10 / 發彈幕 -8">
    ✦ <span class="pts-val">0</span> 積分
  </div>

  <!-- ── Danmaku Toggle ── -->
  <button id="dm-toggle" title="開啟彈幕">💬 彈幕</button>

  <!-- ── Danmaku Input Bar ── -->
  <div id="danmaku-bar">
    <span class="dm-pts">✦ <span class="pts-val">0</span> 積分</span>
    <input class="dm-input" id="dm-input" placeholder="輸入彈幕（-8 積分）" maxlength="30" autocomplete="off">
    <div class="dm-colors">
      <div class="dm-dot sel" data-c="#ffffff" style="background:#fff"></div>
      <div class="dm-dot"    data-c="#ffd700" style="background:#ffd700"></div>
      <div class="dm-dot"    data-c="#00ffff" style="background:#0ff"></div>
      <div class="dm-dot"    data-c="#ff69b4" style="background:#ff69b4"></div>
      <div class="dm-dot"    data-c="#7fff00" style="background:#7fff00"></div>
      <div class="dm-dot"    data-c="#ff6347" style="background:#ff6347"></div>
    </div>
    <button class="dm-send" id="dm-send">發送</button>
  </div>

  <script>
  // ── Points System ──────────────────────────────────────────
  const PTS_KEY = 'capyPoints';
  const DM_COST = 8;

  function getPoints() { return parseInt(localStorage.getItem(PTS_KEY) || '0'); }
  function setPoints(n) {
    const v = Math.max(0, n);
    localStorage.setItem(PTS_KEY, v);
    document.querySelectorAll('.pts-val').forEach(el => el.textContent = v);
    return v;
  }
  function awardPoints(n, label) {
    setPoints(getPoints() + n);
    showPtsPopup('+' + n + ' ' + label);
  }
  function spendPoints(n) {
    if (getPoints() < n) return false;
    setPoints(getPoints() - n);
    return true;
  }
  function showPtsPopup(msg) {
    const el = document.createElement('div');
    el.className = 'pts-popup';
    el.textContent = msg;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // 回主頁時領取遊戲獎勵
  (function checkGameReward() {
    if (localStorage.getItem('capyPendingReward') === 'game') {
      localStorage.removeItem('capyPendingReward');
      setTimeout(() => awardPoints(5, '玩遊戲 🎮'), 1200);
    }
  })();

  // 初始化顯示
  setPoints(getPoints());

  // ── Danmaku System ─────────────────────────────────────────
  let dmOn = false, dmLastId = 0, dmPollTimer = null, dmColor = '#ffffff';

  const dmLayer  = document.getElementById('danmaku-layer');
  const dmToggle = document.getElementById('dm-toggle');
  const dmBar    = document.getElementById('danmaku-bar');
  const dmInput  = document.getElementById('dm-input');
  const dmSend   = document.getElementById('dm-send');

  dmToggle.addEventListener('click', () => {
    dmOn = !dmOn;
    dmToggle.classList.toggle('on', dmOn);
    dmToggle.textContent = dmOn ? '💬 彈幕 ON' : '💬 彈幕';
    dmBar.classList.toggle('open', dmOn);
    if (dmOn) {
      fetchDanmaku(true);
      dmPollTimer = setInterval(() => fetchDanmaku(false), 15000);
    } else {
      clearInterval(dmPollTimer);
      dmLayer.innerHTML = '';
    }
  });

  // 顏色選擇
  document.querySelectorAll('.dm-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.dm-dot').forEach(d => d.classList.remove('sel'));
      dot.classList.add('sel');
      dmColor = dot.dataset.c;
    });
  });

  async function fetchDanmaku(initial) {
    try {
      const res  = await fetch(API + '/danmaku?since=' + (initial ? 0 : dmLastId));
      const list = await res.json();
      if (!list.length) return;
      dmLastId = Math.max(dmLastId, ...list.map(d => d.id));
      const show = initial ? list.slice(-12) : list;
      show.forEach((d, i) => setTimeout(() => dmShow(d.text, d.color), i * 700));
    } catch {}
  }

  function dmShow(text, color) {
    if (!dmOn) return;
    const el    = document.createElement('div');
    el.className = 'dm';
    el.textContent = text;
    el.style.color = color || '#fff';
    el.style.top   = (5 + Math.random() * 83) + 'vh';
    const dur = (9 + Math.random() * 5).toFixed(1);
    el.style.animationDuration = dur + 's';
    dmLayer.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // 管理員模式：點 "✦ X 積分" 徽章 5 下可輸入管理員密碼，解鎖免費彈幕
  let dmAdminMode = false;
  let dmBadgeClicks = 0, dmBadgeTimer = null;
  document.querySelector('.pts-badge').addEventListener('click', () => {
    dmBadgeClicks++;
    clearTimeout(dmBadgeTimer);
    dmBadgeTimer = setTimeout(() => { dmBadgeClicks = 0; }, 1800);
    if (dmBadgeClicks >= 5) {
      dmBadgeClicks = 0;
      if (dmAdminMode) {
        dmAdminMode = false;
        showPtsPopup('已退出管理員模式');
      } else {
        const pw = prompt('輸入管理員密碼：');
        if (pw && pw === adminKey) {
          dmAdminMode = true;
          showPtsPopup('管理員模式：彈幕免費 ✓');
        } else if (pw !== null) {
          showPtsPopup('密碼錯誤');
        }
      }
    }
  });

  async function doSendDanmaku() {
    const text = dmInput.value.trim();
    if (!text) return;
    if (!dmAdminMode && getPoints() < DM_COST) { showPtsPopup('積分不足（需 ' + DM_COST + ' 積分）'); return; }
    dmSend.disabled = true;
    try {
      const res  = await fetch(API + '/danmaku', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, color: dmColor }),
      });
      const data = await res.json();
      if (data.ok) {
        if (!dmAdminMode) spendPoints(DM_COST);
        dmInput.value = '';
        dmShow(text, dmColor);
      } else {
        showPtsPopup(data.error || '發送失敗');
      }
    } catch { showPtsPopup('網路錯誤'); }
    dmSend.disabled = false;
  }

  dmSend.addEventListener('click', doSendDanmaku);
  dmInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSendDanmaku(); });
  </script>

</body>
