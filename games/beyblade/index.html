<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6193561251326215"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>戰鬥陀螺 ⚡ BURST ARENA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080015; color:#fff; font-family:'Arial',sans-serif; overflow:hidden; height:100vh; display:flex; align-items:center; justify-content:center; }
#app { width:800px; height:600px; position:relative; }
canvas { position:absolute; top:0; left:0; display:block; }

/* ===== SELECT OVERLAY ===== */
#selectOverlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:linear-gradient(135deg,#08001a 0%,#0d0030 50%,#080018 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:10; padding:20px;
}
#selectOverlay h1 {
  font-size:34px; letter-spacing:4px; color:#cc88ff;
  text-shadow:0 0 20px #8833ff, 0 0 40px #6611aa;
  margin-bottom:18px;
}
.sel-row { display:flex; gap:16px; width:100%; justify-content:center; }
.part-box {
  background:#0d0028; border:1px solid #4422aa; border-radius:10px;
  padding:12px; flex:1; max-width:200px;
}
.part-box h3 { font-size:14px; color:#8866cc; letter-spacing:2px; margin-bottom:8px; text-align:center; }
.carousel { display:flex; align-items:center; gap:6px; }
.carousel button {
  background:#1a0040; border:1px solid #5533bb; color:#aa88ff;
  width:32px; height:32px; border-radius:6px; cursor:pointer; font-size:16px;
  flex-shrink:0;
}
.carousel button:hover { background:#2a0060; border-color:#8866ff; }
.part-name { flex:1; text-align:center; font-size:15px; font-weight:bold; }
.part-desc { font-size:12px; color:#7766aa; margin-top:6px; text-align:center; min-height:32px; }
.part-type-badge {
  display:inline-block; font-size:11px; padding:2px 8px; border-radius:4px;
  margin-top:4px; letter-spacing:1px;
}

/* Stats panel */
#statsPanel {
  display:flex; gap:16px; margin-top:14px; align-items:flex-start;
}
.stat-bars { background:#0d0028; border:1px solid #4422aa; border-radius:10px; padding:12px; flex:1; }
.stat-bars h3 { font-size:14px; color:#8866cc; letter-spacing:2px; margin-bottom:8px; }
.stat-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.stat-label { font-size:13px; color:#aaaacc; width:32px; }
.stat-bar-bg { flex:1; height:10px; background:#1a0040; border-radius:5px; overflow:hidden; }
.stat-bar-fill { height:100%; border-radius:5px; transition:width 0.3s; }
.stat-val { font-size:13px; color:#cc88ff; width:28px; text-align:right; }

.preview-box {
  background:#0d0028; border:1px solid #4422aa; border-radius:10px;
  padding:12px; width:120px; display:flex; flex-direction:column; align-items:center;
}
.preview-box h3 { font-size:14px; color:#8866cc; letter-spacing:2px; margin-bottom:8px; }
#previewCanvas { border-radius:50%; }

/* CPU info */
.cpu-box {
  background:#0d0020; border:1px solid #aa2244; border-radius:10px;
  padding:12px; flex:1;
}
.cpu-box h3 { font-size:14px; color:#cc5577; letter-spacing:2px; margin-bottom:8px; }
.cpu-build-name { font-size:16px; font-weight:bold; color:#ff6688; margin-bottom:4px; }
.cpu-style { font-size:12px; color:#aa4466; }

/* Start button */
#startBtn {
  margin-top:16px; padding:14px 52px; font-size:22px; font-weight:bold; letter-spacing:3px;
  background:linear-gradient(135deg,#4400cc,#8800ff);
  border:2px solid #8844ff; border-radius:12px; color:#fff; cursor:pointer;
  text-shadow:0 0 10px #fff; box-shadow:0 0 20px #6622aa;
  transition:all 0.2s;
}
#startBtn:hover { background:linear-gradient(135deg,#6611ee,#aa22ff); box-shadow:0 0 30px #8844cc; transform:scale(1.03); }

.hint { font-size:13px; color:#554477; margin-top:8px; letter-spacing:1px; }

/* ===== 玩家行動按鈕 ===== */
#battleBtns {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  display:none; gap:10px; z-index:5;
}
.bbt {
  padding:8px 18px; font-size:14px; font-weight:bold; letter-spacing:1px;
  border-radius:8px; cursor:pointer; border:2px solid; transition:all 0.15s;
  font-family:inherit;
}
.bbt:active { transform:scale(0.94); }
.bbt.cd { opacity:0.4; cursor:default; }
#btn-dash { background:#1a0030; border-color:#ff4488; color:#ff88bb; }
#btn-dash:not(.cd):hover { background:#2a0040; box-shadow:0 0 12px #ff4488; }
#btn-spin { background:#001030; border-color:#44aaff; color:#88ccff; }
#btn-spin:not(.cd):hover { background:#001840; box-shadow:0 0 12px #44aaff; }
#btn-guard { background:#102010; border-color:#44ff88; color:#88ffaa; }
#btn-guard:not(.cd):hover { background:#182818; box-shadow:0 0 12px #44ff88; }
#envMsg {
  position:absolute; top:36px; left:50%; transform:translateX(-50%);
  font-size:15px; font-weight:bold; color:#fbbf24;
  text-shadow:0 0 10px #f59e0b; pointer-events:none; z-index:6;
  transition:opacity 0.5s; letter-spacing:1px;
}
</style>
</head>
<body>
<div id="app">
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <!-- SELECT SCREEN -->
  <div id="selectOverlay">
    <h1>⚡ 戰鬥陀螺 BURST ARENA ⚡</h1>

    <div class="sel-row">
      <!-- Player Blade -->
      <div class="part-box">
        <h3>你的刀刃 BLADE</h3>
        <div class="carousel">
          <button onclick="changePart('blade',-1)">◀</button>
          <div class="part-name" id="bladeName" style="color:#ff8844">烈焰龍</div>
          <button onclick="changePart('blade',1)">▶</button>
        </div>
        <div class="part-desc" id="bladeDesc"></div>
        <div style="text-align:center"><span class="part-type-badge" id="bladeBadge"></span></div>
      </div>
      <!-- Core -->
      <div class="part-box">
        <h3>核心 CORE</h3>
        <div class="carousel">
          <button onclick="changePart('core',-1)">◀</button>
          <div class="part-name" id="coreName" style="color:#ff6600">爆裂核</div>
          <button onclick="changePart('core',1)">▶</button>
        </div>
        <div class="part-desc" id="coreDesc"></div>
      </div>
      <!-- Driver -->
      <div class="part-box">
        <h3>驅動 DRIVER</h3>
        <div class="carousel">
          <button onclick="changePart('driver',-1)">◀</button>
          <div class="part-name" id="driverName" style="color:#ffcc00">衝鋒·平底</div>
          <button onclick="changePart('driver',1)">▶</button>
        </div>
        <div class="part-desc" id="driverDesc"></div>
      </div>
    </div>

    <div id="statsPanel">
      <div class="preview-box">
        <h3>預覽</h3>
        <canvas id="previewCanvas" width="80" height="80"></canvas>
        <div style="font-size:11px;color:#6655aa;margin-top:6px">YOUR TOP</div>
      </div>
      <div class="stat-bars">
        <h3>屬性</h3>
        <div class="stat-row"><span class="stat-label">ATK</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="atkBar" style="background:#ff4444"></div></div><span class="stat-val" id="atkVal">0</span></div>
        <div class="stat-row"><span class="stat-label">DEF</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="defBar" style="background:#4488ff"></div></div><span class="stat-val" id="defVal">0</span></div>
        <div class="stat-row"><span class="stat-label">STA</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="staBar" style="background:#44ff88"></div></div><span class="stat-val" id="staVal">0</span></div>
        <div class="stat-row"><span class="stat-label">HP</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="hpBar" style="background:#cc44ff"></div></div><span class="stat-val" id="hpVal">0</span></div>
      </div>
      <div class="cpu-box">
        <h3>對手 CPU</h3>
        <div class="cpu-build-name" id="cpuName">?????</div>
        <div class="cpu-style" id="cpuStyle">隨機對手</div>
        <div id="cpuParts" style="font-size:11px;color:#884466;margin-top:6px;line-height:1.6"></div>
      </div>
    </div>

    <button id="startBtn" onclick="startBattle()">⚡ 開始戰鬥！</button>
    <div class="hint">選好配件按開始 — WASD/方向鍵移動陀螺 · Z衝刺 X加速 C防禦</div>
  </div>

  <!-- 玩家行動按鈕 -->
  <div id="battleBtns" style="display:flex">
    <button class="bbt" id="btn-dash" onclick="playerDash()">⚡ 衝刺攻擊</button>
    <button class="bbt" id="btn-spin" onclick="playerBoostSpin()">🌀 加速旋轉</button>
    <button class="bbt" id="btn-guard" onclick="playerGuard()">🛡️ 防禦姿態</button>
  </div>
  <div id="envMsg"></div>
</div>

<script>
// ===================================================
//  戰鬥陀螺 BURST ARENA — by CapyWorlds
//  Interactive battle — player action buttons + env effects
// ===================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
const AX = W/2, AY = H/2, AR = 215;

// ==================== 玩家操作 ====================
let playerCooldowns = { dash: 0, spin: 0, guard: 0 };
let playerGuardTimer = 0;

// 環境事件
let envTimer = 18;
let envActive = null; // { type, timer, label }
let envMsgTimer = 0;
let envMsgText = '';

// 每秒指向對方的計時器
let dirTimer = 1.0;

// ==================== PARTS DATA ====================
const BLADES = [
  { name:'烈焰龍',  type:'attack',  atk:9, def:3, sta:3, color:'#ff5500', glow:'#ff7700', pts:3, desc:'強力攻擊型，碰撞傷害+50%' },
  { name:'鋼鐵盾',  type:'defense', atk:4, def:9, sta:4, color:'#4488ff', glow:'#66aaff', pts:6, desc:'超強防禦型，受傷時反彈加強' },
  { name:'永恆輪',  type:'stamina', atk:3, def:5, sta:9, color:'#44ff88', glow:'#66ffaa', pts:8, desc:'耐久型，旋轉衰減最慢' },
  { name:'混沌星',  type:'balance', atk:6, def:6, sta:6, color:'#cc44ff', glow:'#ee66ff', pts:5, desc:'均衡型，全能作戰' },
];
const CORES = [
  { name:'爆裂核', bonus:'atk', val:2, color:'#ff6600', desc:'攻擊+2，爆裂充能+30%' },
  { name:'護甲核', bonus:'def', val:2, color:'#4466ff', desc:'防禦+2，碰撞旋轉損耗-20%' },
  { name:'鐵人核', bonus:'sta', val:2, color:'#44ff66', desc:'耐力+2，旋轉持久度+20%' },
];
const DRIVERS = [
  { name:'衝鋒·平底', type:'flat',   mob:0.93, decay:0.9987, color:'#ff8800', desc:'高機動，旋轉稍快消耗' },
  { name:'精準·尖針', type:'sharp',  mob:0.87, decay:0.9996, color:'#00ccff', desc:'超長耐久，機動性較低' },
  { name:'彈跳·球底', type:'ball',   mob:0.90, decay:0.9991, color:'#ffcc00', desc:'彈性碰撞加成，均衡型' },
  { name:'橡皮·橡底', type:'rubber', mob:0.91, decay:0.9984, color:'#44ff44', desc:'命中率提升，旋轉較快消耗' },
];
const CPU_BUILDS = [
  { name:'炎帝龍',   blade:0, core:0, driver:0, style:'全力攻擊型，不顧一切衝向你！' },
  { name:'鋼壁守護', blade:1, core:1, driver:2, style:'堅守中心，靜待反擊機會' },
  { name:'永恆神話', blade:2, core:2, driver:1, style:'超強耐久，等你旋轉耗盡為止' },
];

// ==================== GAME STATE ====================
let gameState = 'select';
let selBlade=0, selCore=0, selDriver=0;
let previewCpuIdx = Math.floor(Math.random()*3); // 預先揭示 CPU 配件
let playerTop=null, cpuTop=null;
let playerScore=0, cpuScore=0, currentRound=1;
let particles=[];
let shakeX=0, shakeY=0;
let countdownTimer=0, roundEndTimer=0, roundEndMsg='', roundEndReason='';
let lastBeepN = -1;
let cpuAggression = 1.0;   // escalates each round CPU loses
let playerBurstChain = 0;  // consecutive burst activations in a match
let screenFlash = 0;       // 0-1 white flash intensity
const keys={};
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='KeyZ') playerDash();
  if(e.code==='KeyX') playerBoostSpin();
  if(e.code==='KeyC') playerGuard();
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });

// ==================== 玩家技能 ====================
function playerDash(){
  if(gameState!=='battle'||!playerTop||!cpuTop) return;
  if(playerCooldowns.dash>0) return;
  const dx=cpuTop.x-playerTop.x, dy=cpuTop.y-playerTop.y, d=Math.hypot(dx,dy)||1;
  playerTop.vx+=(dx/d)*9; playerTop.vy+=(dy/d)*9;
  playerCooldowns.dash=4;
  spawnBurst(playerTop.x,playerTop.y,playerTop.color);
  updateBtnCooldown('dash',4);
}
function playerBoostSpin(){
  if(gameState!=='battle'||!playerTop) return;
  if(playerCooldowns.spin>0) return;
  playerTop.spin=Math.min(3200, playerTop.spin*1.18+120);
  playerCooldowns.spin=7;
  spawnSparks(playerTop.x,playerTop.y,playerTop.color,'#ffffff',10);
  updateBtnCooldown('spin',7);
}
function playerGuard(){
  if(gameState!=='battle'||!playerTop) return;
  if(playerCooldowns.guard>0) return;
  playerGuardTimer=1.5; // 真正 1.5 秒保護期
  playerTop.flashTimer=0;
  playerCooldowns.guard=6; // 冷卻縮短至 6 秒
  spawnSparks(playerTop.x,playerTop.y,playerTop.glow,'#44ff88',14);
  // 護盾粒子環
  for(let i=0;i<3;i++){
    particles.push({x:playerTop.x,y:playerTop.y,vx:0,vy:0,
      color:'#44ff88',life:1,size:0,ring:true,
      ringR:playerTop.r,ringMax:playerTop.r+28+i*10,type:'ring'});
  }
  updateBtnCooldown('guard',6);
}
function updateBtnCooldown(type, secs){
  const btn=document.getElementById('btn-'+type);
  if(!btn) return;
  btn.classList.add('cd');
  setTimeout(()=>{ btn.classList.remove('cd'); },secs*1000);
}
function updateCooldowns(dt){
  for(const k in playerCooldowns){ if(playerCooldowns[k]>0) playerCooldowns[k]-=dt; }
  if(playerGuardTimer>0){ playerGuardTimer-=dt; if(playerGuardTimer<0) playerGuardTimer=0; }
}

// ==================== 環境事件 ====================
const ENV_EVENTS = [
  { type:'magnetic', label:'⚡ 磁場異常！陀螺被吸向中心！', col:'#44aaff' },
  { type:'vibration', label:'🌋 地面震動！旋轉不穩定！',   col:'#fbbf24' },
  { type:'storm',    label:'⛈️ 能量風暴！競技場縮小！',   col:'#cc44ff' },
  { type:'ice',      label:'❄️ 冰場效應！加速滑行！',      col:'#88ccff' },
];
function triggerEnvEvent(){
  const ev=ENV_EVENTS[Math.floor(Math.random()*ENV_EVENTS.length)];
  envActive={ type:ev.type, timer:5 };
  showEnvMsg(ev.label, ev.col);
}
function showEnvMsg(txt, col){
  const el=document.getElementById('envMsg');
  if(el){ el.textContent=txt; el.style.color=col||'#fbbf24'; el.style.opacity='1'; }
  setTimeout(()=>{ const e=document.getElementById('envMsg'); if(e) e.style.opacity='0'; },2800);
}
function updateEnv(dt){
  if(gameState!=='battle') return;
  envTimer-=dt;
  if(envTimer<=0){ envTimer=12+Math.random()*10; triggerEnvEvent(); }
  if(!envActive) return;
  envActive.timer-=dt;
  if(envActive.timer<=0){ envActive=null; return; }
  if(!playerTop||!cpuTop) return;
  const t=envActive.type;
  if(t==='magnetic'){
    // 吸向中心
    [playerTop,cpuTop].forEach(top=>{
      const dx=AX-top.x, dy=AY-top.y, d=Math.hypot(dx,dy)||1;
      top.vx+=(dx/d)*0.35; top.vy+=(dy/d)*0.35;
    });
  } else if(t==='vibration'){
    // 旋轉損耗加快
    playerTop.spin*=0.9985; cpuTop.spin*=0.9985;
    if(Math.random()<0.04){ shakeX=(Math.random()-0.5)*6; shakeY=(Math.random()-0.5)*6; }
  } else if(t==='storm'){
    // 場地縮小效果：壁彈提前觸發
    [playerTop,cpuTop].forEach(top=>{
      const dx=top.x-AX, dy=top.y-AY, d=Math.hypot(dx,dy);
      if(d+top.r>AR*0.82){
        const nx=dx/d, ny=dy/d;
        top.x=AX+nx*(AR*0.82-top.r); top.y=AY+ny*(AR*0.82-top.r);
        const dot=top.vx*nx+top.vy*ny;
        top.vx-=2*dot*nx*0.75; top.vy-=2*dot*ny*0.75;
      }
    });
  } else if(t==='ice'){
    // 摩擦力降低 (velocity保留更多)
    playerTop.vx*=1.003; playerTop.vy*=1.003;
    cpuTop.vx*=1.003;    cpuTop.vy*=1.003;
  }
}

// ==================== TOP CLASS ====================
class BeyTop {
  constructor(x,y,bi,ci,di,team){
    this.x=x; this.y=y; this.vx=0; this.vy=0; this.angle=0;
    this.spin=3000; this.team=team;
    this.blade=BLADES[bi]; this.core=CORES[ci]; this.driver=DRIVERS[di];
    let atk=this.blade.atk+(this.core.bonus==='atk'?this.core.val:0);
    let def=this.blade.def+(this.core.bonus==='def'?this.core.val:0);
    let sta=this.blade.sta+(this.core.bonus==='sta'?this.core.val:0);
    this.atk=atk; this.def=def; this.sta=sta;
    this.maxHp=55+def*4; this.hp=this.maxHp;
    this.burst=0; this.burstActive=false; this.burstTimer=0;
    this.r=17; this.trail=[];
    this.iframes=0; this.flashTimer=0;
    this.spinPTimer=0; this.hitCount=0;
  }
  get spinRatio(){ return Math.max(0,Math.min(1,this.spin/3000)); }
  get alive(){ return this.hp>0 && this.spin>280; }
  get color(){ return this.blade.color; }
  get glow(){ return this.blade.glow; }

  update(){
    let dr=this.driver.decay;
    if(this.core.bonus==='sta') dr=Math.min(0.9998,dr+0.0003);
    if(this.burstActive){ this.spin=Math.min(3200,this.spin+8); this.burstTimer--; if(this.burstTimer<=0) this.burstActive=false; }
    else this.spin*=dr;

    const wobble=this.spin<500 ? (1-this.spinRatio)*9 : (1-this.spinRatio)*2.5;
    this.x+=this.vx+(Math.random()-0.5)*wobble;
    this.y+=this.vy+(Math.random()-0.5)*wobble;

    let fr=0.977-(this.spinRatio*0.022);
    this.vx*=fr; this.vy*=fr;
    this.angle+=this.spin*0.0018;

    const dx=this.x-AX, dy=this.y-AY, d=Math.sqrt(dx*dx+dy*dy);
    if(d+this.r>AR){
      const nx=dx/d, ny=dy/d;
      this.x=AX+nx*(AR-this.r); this.y=AY+ny*(AR-this.r);
      const dot=this.vx*nx+this.vy*ny;
      this.vx-=2*dot*nx*0.82; this.vy-=2*dot*ny*0.82;
      this.spin*=0.994;
      spawnSparks(this.x,this.y,this.color,'#ffffff',4);
    }

    this.trail.push({x:this.x,y:this.y,t:1});
    if(this.trail.length>22) this.trail.shift();
    this.trail.forEach(p=>p.t-=0.045);
    this.trail=this.trail.filter(p=>p.t>0);

    if(this.iframes>0) this.iframes--;
    if(this.flashTimer>0) this.flashTimer--;
    if(this.burst>0&&!this.burstActive) this.burst=Math.max(0,this.burst-0.06);
    this.spinPTimer++;
  }

  activateBurst(){
    if(this.burst>=100&&!this.burstActive){
      this.burstActive=true; this.burst=0; sfx('burst');
      if(this.team==='player'){
        playerBurstChain++;
        const chainBoost = playerBurstChain > 1 ? Math.min(1.6, 1 + playerBurstChain * 0.18) : 1;
        this.burstTimer = Math.round(380 * chainBoost);
        if(playerBurstChain > 1) spawnBurst(this.x, this.y, this.glow);
      } else {
        this.burstTimer = 380;
      }
      const mag=(3.5+this.atk*0.25)*(this.team==='player'&&playerBurstChain>1?1.2:1);
      const a=Math.random()*Math.PI*2;
      this.vx+=Math.cos(a)*mag; this.vy+=Math.sin(a)*mag;
      return true;
    }
    return false;
  }

  draw(ctx){
    this.trail.forEach(p=>{
      const alpha=p.t*0.22;
      ctx.beginPath();
      ctx.arc(p.x,p.y,this.r*p.t*0.55,0,Math.PI*2);
      ctx.fillStyle=this.color+Math.floor(alpha*255).toString(16).padStart(2,'0');
      ctx.fill();
    });

    ctx.save();
    ctx.translate(this.x,this.y);

    if(this.burstActive){
      const gs=32+Math.sin(Date.now()*0.016)*8;
      const g=ctx.createRadialGradient(0,0,this.r,0,0,gs);
      g.addColorStop(0,this.glow+'aa'); g.addColorStop(1,this.glow+'00');
      ctx.beginPath(); ctx.arc(0,0,gs,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    }

    ctx.rotate(this.angle);

    const vis=this.flashTimer<=0||Math.floor(this.flashTimer/3)%2===0;
    if(vis){
      const og=ctx.createRadialGradient(0,0,this.r*0.6,0,0,this.r*1.4);
      og.addColorStop(0,this.glow+'55'); og.addColorStop(1,this.glow+'00');
      ctx.beginPath(); ctx.arc(0,0,this.r*1.4,0,Math.PI*2);
      ctx.fillStyle=og; ctx.fill();

      ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2);
      ctx.fillStyle=this.color+'44'; ctx.fill();
      ctx.strokeStyle=this.color; ctx.lineWidth=2; ctx.stroke();

      const pts=this.blade.pts;
      ctx.beginPath();
      for(let i=0;i<pts;i++){
        const a1=(i/pts)*Math.PI*2, a2=((i+0.38)/pts)*Math.PI*2, a3=((i+0.5)/pts)*Math.PI*2;
        const r1=this.r*1.28, r2=this.r*0.62, r3=this.r*1.05;
        if(i===0) ctx.moveTo(Math.cos(a1)*r1,Math.sin(a1)*r1);
        else ctx.lineTo(Math.cos(a1)*r1,Math.sin(a1)*r1);
        ctx.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2);
        ctx.lineTo(Math.cos(a3)*r3,Math.sin(a3)*r3);
      }
      ctx.closePath();
      ctx.fillStyle=this.color; ctx.fill();
      ctx.strokeStyle=this.glow; ctx.lineWidth=1; ctx.stroke();

      ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2);
      ctx.fillStyle=this.core.color; ctx.fill();
      ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2);
      ctx.fillStyle='#ffffff'; ctx.fill();

      ctx.beginPath(); ctx.arc(0,0,1.5,0,Math.PI*2);
      ctx.fillStyle=this.driver.color; ctx.fill();
    }
    ctx.restore();

    // === HUD bars ===
    const bw=52,bh=7,bx=this.x-bw/2,by=this.y-36;
    ctx.fillStyle='#110022'; ctx.fillRect(bx,by,bw,bh);
    const hr=Math.max(0,this.hp/this.maxHp);
    ctx.fillStyle=hr>0.5?'#44ff88':hr>0.25?'#ffaa00':'#ff3344';
    ctx.fillRect(bx,by,bw*hr,bh);
    ctx.strokeStyle='#443366'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);

    if(this.burst>0||this.burstActive){
      ctx.fillStyle='#110022'; ctx.fillRect(bx,by+9,bw,4);
      ctx.fillStyle=this.burstActive?'#ffffaa':(this.burst>=100?'#ffffff':'#7755ff');
      ctx.fillRect(bx,by+9,this.burstActive?bw:bw*(this.burst/100),4);
    }

    ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillStyle=this.color+'cc';
    ctx.fillText(this.blade.name, this.x, by-3);

    ctx.font='10px monospace'; ctx.textAlign='center';
    ctx.fillStyle=`rgba(180,180,255,${this.spinRatio*0.7})`;
    ctx.fillText(Math.floor(this.spin)+'rpm', this.x, this.y+34);
  }
}

// ==================== PARTICLES ====================
function spawnSparks(x,y,cA,cB,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*5+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      color:Math.random()<0.5?cA:cB, life:1, size:Math.random()*2.5+0.5, type:'spark'});
  }
}
function spawnBurst(x,y,color){
  for(let i=0;i<24;i++){
    const a=(i/24)*Math.PI*2, s=Math.random()*7+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      color, life:1, size:Math.random()*4+1.5, type:'burst'});
  }
  for(let i=0;i<3;i++){
    particles.push({x,y,vx:0,vy:0,color,life:1,size:0,ring:true,ringR:0,ringMax:60+i*20,type:'ring'});
  }
}

function updateParticles(){
  particles.forEach(p=>{
    if(p.type==='ring'){ p.ringR+=4; p.life-=0.04; return; }
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.92; p.vy*=0.92; p.vy+=0.04;
    p.life-=p.type==='burst'?0.022:0.03;
  });
  particles=particles.filter(p=>p.life>0);
}
function drawParticles(ctx){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='ring'){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.ringR,0,Math.PI*2);
      ctx.strokeStyle=p.color; ctx.lineWidth=3*p.life; ctx.shadowBlur=8; ctx.shadowColor=p.color;
      ctx.stroke();
    } else {
      ctx.fillStyle=p.color;
      if(p.type==='burst'){ ctx.shadowBlur=8; ctx.shadowColor=p.color; }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*Math.max(0.1,p.life),0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

  ctx.beginPath(); ctx.arc(AX,AY,AR,0,Math.PI*2);

  ctx.save();

  for(let i=1;i<=4;i++){ ctx.beginPath(); ctx.arc(AX,AY,AR*i/4,0,Math.PI*2); ctx.stroke(); }
  for(let a=0;a<Math.PI;a+=Math.PI/8){

// ==================== COLLISION ====================
function checkCollision(a,b){
  if(!a||!b||a.iframes>0||b.iframes>0) return;
  const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy);
  const md=a.r+b.r;
  if(d<md&&d>0.5){
    const nx=dx/d, ny=dy/d;
    const ov=(md-d)*0.5+0.5;
    a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;

    const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
    if(rv<0) return;

    const mA=1+a.def*0.09, mB=1+b.def*0.09, tot=mA+mB;
    const imp=2*rv/tot;
    a.vx+=imp*mB*nx*(a.burstActive?1.35:1);
    a.vy+=imp*mB*ny*(a.burstActive?1.35:1);
    b.vx-=imp*mA*nx*(b.burstActive?1.35:1);
    b.vy-=imp*mA*ny*(b.burstActive?1.35:1);

    const force=Math.abs(rv)+1;
    const aRubber=a.driver.type==='rubber'?1.25:1;
    const bRubber=b.driver.type==='rubber'?1.25:1;
    let aDmg=force*(b.atk/Math.max(1,a.def))*b.spinRatio*(b.burstActive?2:1)*bRubber;
    let bDmg=force*(a.atk/Math.max(1,b.def))*a.spinRatio*(a.burstActive?2:1)*aRubber;
    if(a.blade.type==='defense') aDmg*=0.7;
    if(b.blade.type==='defense') bDmg*=0.7;
    // 防禦技能：受傷減少75%，對方被反彈
    if(a.team==='player' && playerGuardTimer>0){
      aDmg*=0.25;
      b.vx-=nx*3; b.vy-=ny*3; // 反彈CPU
      spawnSparks(a.x,a.y,'#44ff88','#ffffff',10);
    }
    if(b.team==='player' && playerGuardTimer>0){
      bDmg*=0.25;
      a.vx+=nx*3; a.vy+=ny*3;
      spawnSparks(b.x,b.y,'#44ff88','#ffffff',10);
    }

    a.hp-=aDmg; b.hp-=bDmg;
    a.spin*=0.974; b.spin*=0.974;
    a.burst=Math.min(100,a.burst+aDmg*3.2);
    b.burst=Math.min(100,b.burst+bDmg*3.2);
    a.flashTimer=10; b.flashTimer=10;
    a.iframes=8; b.iframes=8;
    a.hitCount++; b.hitCount++;

    spawnSparks((a.x+b.x)/2,(a.y+b.y)/2,a.color,b.color,14);
    const si=Math.min(15,force*4);
    shakeX=(Math.random()-0.5)*si; shakeY=(Math.random()-0.5)*si;
    if(force>4) screenFlash=Math.min(0.55, force*0.1);
    sfx('collision');
    if(a.driver.type==='ball'){a.vx*=1.12;a.vy*=1.12;}
    if(b.driver.type==='ball'){b.vx*=1.12;b.vy*=1.12;}

  }
}

// ==================== AI (used for BOTH tops) ====================
function updateAI(top, opponent){
  const dx=opponent.x-top.x, dy=opponent.y-top.y, d=Math.sqrt(dx*dx+dy*dy);
  const tdx=AX-top.x, tdy=AY-top.y, td=Math.sqrt(tdx*tdx+tdy*tdy);
  const aggMult = top.team==='cpu' ? cpuAggression : 1.0;
  const f=(0.16+top.spinRatio*0.08)*aggMult;
  const t=top.blade.type;

  if(t==='attack'){
    if(d>0){ top.vx+=(dx/d)*f; top.vy+=(dy/d)*f; }
    if(Math.random()<0.005 && d>0){ top.vx+=(dx/d)*3; top.vy+=(dy/d)*3; }
  } else if(t==='defense'){
    if(td>35&&td>0){ top.vx+=(tdx/td)*f*0.65; top.vy+=(tdy/td)*f*0.65; }
    if(d<130&&d>0){ top.vx-=(dx/d)*f*0.4; top.vy-=(dy/d)*f*0.4; }
  } else if(t==='stamina'){
    if(td>0){
      const px=-tdy/td, py=tdx/td;
      top.vx+=px*f*0.75; top.vy+=py*f*0.75;
      const targetR=85;
      if(td<targetR-12){top.vx-=(tdx/td)*f*0.3;top.vy-=(tdy/td)*f*0.3;}
      if(td>targetR+12){top.vx+=(tdx/td)*f*0.3;top.vy+=(tdy/td)*f*0.3;}
    }
  } else {
    if(top.hp>=opponent.hp){
      if(d>0){top.vx+=(dx/d)*f*0.8;top.vy+=(dy/d)*f*0.8;}
    } else {
      if(td>0){top.vx+=(tdx/td)*f*0.6;top.vy+=(tdy/td)*f*0.6;}
    }
  }
  if(top.burst>=100){ const ok=top.activateBurst(); if(ok){ spawnBurst(top.x,top.y,top.color); } }
  const spd=Math.sqrt(top.vx*top.vx+top.vy*top.vy);
  if(spd>5.5){ top.vx=(top.vx/spd)*5.5; top.vy=(top.vy/spd)*5.5; }
}

// ==================== MAIN LOOP ====================
let loopStarted = false;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  shakeX*=0.82; shakeY*=0.82;
  ctx.save(); ctx.translate(Math.round(shakeX),Math.round(shakeY));

  if(gameState==='select'){
    drawSelectBG();
  } else if(gameState==='countdown'){
    drawArena();
    if(playerTop){playerTop.update();playerTop.draw(ctx);}
    if(cpuTop){cpuTop.update();cpuTop.draw(ctx);}
    updateParticles(); drawParticles(ctx);
    countdownTimer--;
    const n=Math.ceil(countdownTimer/60);

    // Countdown beeps
    if(n !== lastBeepN && n>=1 && n<=3 && countdownTimer>0){
    }

    if(countdownTimer>0){
      ctx.textAlign='center'; ctx.font='bold 110px Arial';
      ctx.fillStyle='#ffffff';
      ctx.shadowBlur=35;
      ctx.shadowColor=n===3?'#ff6600':n===2?'#ffee00':'#44ff88';
      ctx.fillText(n, AX, AY+40);
      ctx.shadowBlur=0;
    } else {
      ctx.textAlign='center'; ctx.font='bold 86px Arial';
      ctx.fillStyle='#ffffff'; ctx.shadowBlur=28; ctx.shadowColor='#ff4400';
      ctx.fillText('GO!', AX, AY+32);
      ctx.shadowBlur=0;
    }
    if(keys['Space'] && countdownTimer>0){ keys['Space']=false; countdownTimer=0; }
    if(countdownTimer<=-20) gameState='battle';

  } else if(gameState==='battle'){
    const dtSec = 1/60;
    drawArena();

    // 環境效果
    updateEnv(dtSec);
    updateCooldowns(dtSec);

    // CPU AI控制
    updateAI(cpuTop, playerTop);
    // CPU strategic rush: occasional high-speed charge scaled by aggression
    if(cpuTop.spin>1200 && Math.random()<0.006*cpuAggression){
      const dx=playerTop.x-cpuTop.x, dy=playerTop.y-cpuTop.y, d=Math.hypot(dx,dy)||1;
      cpuTop.vx+=(dx/d)*(4+cpuAggression*2.5); cpuTop.vy+=(dy/d)*(4+cpuAggression*2.5);
      spawnSparks(cpuTop.x,cpuTop.y,cpuTop.color,'#ffffff',5);
    }

    // 玩家 WASD / 方向鍵直接操控陀螺移動
    if(playerTop){
      const moveF = 0.32 * (1+playerTop.spinRatio*0.4);
      if(keys['KeyW']||keys['ArrowUp'])    playerTop.vy -= moveF;
      if(keys['KeyS']||keys['ArrowDown'])  playerTop.vy += moveF;
      if(keys['KeyA']||keys['ArrowLeft'])  playerTop.vx -= moveF;
      if(keys['KeyD']||keys['ArrowRight']) playerTop.vx += moveF;
      const pspd=Math.hypot(playerTop.vx,playerTop.vy);
      if(pspd>5.5){ playerTop.vx=(playerTop.vx/pspd)*5.5; playerTop.vy=(playerTop.vy/pspd)*5.5; }
    }

    // 每1秒：CPU 施加少量向玩家的引力（保持對抗感，但不再控制玩家）
    dirTimer -= dtSec;
    if(dirTimer <= 0){
      dirTimer = 1.0;
      if(playerTop && cpuTop){
        const dx=cpuTop.x-playerTop.x, dy=cpuTop.y-playerTop.y, d=Math.hypot(dx,dy)||1;
        cpuTop.vx-=(dx/d)*1.2; cpuTop.vy-=(dy/d)*1.2;
      }
    }

    // 防禦加成：被命中時減少傷害
    if(playerGuardTimer>0 && playerTop) playerTop.iframes=Math.max(playerTop.iframes,3);

    playerTop.update(); cpuTop.update();
    checkCollision(playerTop,cpuTop);
    updateParticles();

    // Ambient spin particles
    if(playerTop.spinPTimer%3===0&&playerTop.spinRatio>0.35){
      const a=Math.random()*Math.PI*2;
      particles.push({x:playerTop.x+Math.cos(a)*playerTop.r*0.85,y:playerTop.y+Math.sin(a)*playerTop.r*0.85,vx:Math.cos(a)*0.6,vy:Math.sin(a)*0.6,color:playerTop.color,life:0.45,size:1.2,type:'spin'});
    }
    if(cpuTop.spinPTimer%3===0&&cpuTop.spinRatio>0.35){
      const a=Math.random()*Math.PI*2;
      particles.push({x:cpuTop.x+Math.cos(a)*cpuTop.r*0.85,y:cpuTop.y+Math.sin(a)*cpuTop.r*0.85,vx:Math.cos(a)*0.6,vy:Math.sin(a)*0.6,color:cpuTop.color,life:0.45,size:1.2,type:'spin'});
    }

    // 環境效果視覺（風暴縮圈）
    if(envActive && envActive.type==='storm'){
      ctx.strokeStyle='rgba(180,80,255,0.25)'; ctx.lineWidth=8;
      ctx.beginPath(); ctx.arc(AX,AY,AR*0.82,0,Math.PI*2); ctx.stroke();
    }

    playerTop.draw(ctx); cpuTop.draw(ctx);
    drawParticles(ctx);
    drawBattleHUD();
    drawPlayerActions();

    if(!playerTop.alive||!cpuTop.alive){
      let winner;
      const pReason=playerTop.hp<=0?'HP 歸零':'旋轉耗盡';
      const cReason=cpuTop.hp<=0?'HP 歸零':'旋轉耗盡';
      if(!playerTop.alive&&!cpuTop.alive){ roundEndMsg='平局！'; roundEndReason='雙方同時'+pReason; winner='draw'; }
      else if(!playerTop.alive){ roundEndMsg='CPU 獲勝！'; roundEndReason='你的陀螺因'+pReason+'落敗'; winner='cpu'; cpuScore++; }
      else { roundEndMsg='你獲勝了！'; roundEndReason='CPU 陀螺因'+cReason+'落敗'; winner='player'; playerScore++; }
      sfx(winner==='player'?'win':winner==='cpu'?'lose':'draw');
      if(winner==='player') cpuAggression=Math.min(2.2, cpuAggression+0.38);
      roundEndTimer=150; // 縮短為 2.5 秒（原 3.6 秒）
      gameState='roundEnd';
      document.getElementById('battleBtns').style.display='none';
      if(winner==='player') spawnBurst(playerTop.x,playerTop.y,playerTop.color);
      if(winner==='cpu') spawnBurst(cpuTop.x,cpuTop.y,cpuTop.color);
    }

  } else if(gameState==='roundEnd'){
    drawArena();
    if(playerTop){playerTop.update();playerTop.draw(ctx);}
    if(cpuTop){cpuTop.update();cpuTop.draw(ctx);}
    updateParticles(); drawParticles(ctx);
    drawBattleHUD();

    const isWin=roundEndMsg.includes('你');
    const isDraw=roundEndMsg.includes('平');
    ctx.textAlign='center';
    ctx.font='bold 60px Arial';
    ctx.fillStyle=isWin?'#44ff88':isDraw?'#ffee44':'#ff4466';
    ctx.shadowBlur=24; ctx.shadowColor=ctx.fillStyle;
    ctx.fillText(roundEndMsg, AX, AY-10);
    ctx.shadowBlur=0;
    ctx.font='15px Arial'; ctx.fillStyle='#aa99cc';
    ctx.fillText(roundEndReason, AX, AY+28);
    ctx.font='16px Arial'; ctx.fillStyle='#9988bb';
    const cd=Math.ceil(roundEndTimer/60);
    ctx.fillText(cd>0?`${cd} 秒後繼續（按空白鍵跳過）`:'準備！', AX, AY+52);

    roundEndTimer--;
    // 空白鍵跳過等待
    if(keys['Space']){ keys['Space']=false; roundEndTimer=0; }
    if(roundEndTimer<=0){
      currentRound++;
      if(playerScore>=2||cpuScore>=2||currentRound>3){ gameState='gameEnd'; }
      else { startRound(); }
    }

  } else if(gameState==='gameEnd'){
    drawArena();
    updateParticles(); drawParticles(ctx);
    drawGameEnd();
  }

  ctx.restore();
  // Screen flash overlay (outside shake transform)
  if(screenFlash>0){
    ctx.fillStyle=`rgba(255,255,255,${screenFlash.toFixed(2)})`;
    ctx.fillRect(0,0,W,H);
    screenFlash*=0.70;
    if(screenFlash<0.01) screenFlash=0;
  }
}

// ==================== START BATTLE ====================
function startBattle(){
  document.getElementById('selectOverlay').style.display='none';
  document.getElementById('battleBtns').style.display='flex';
  const cpuIdx=previewCpuIdx; // 使用選角畫面已揭示的 CPU
  window._cpuIdx=cpuIdx;
  playerScore=0; cpuScore=0; currentRound=1;
  envTimer=18; envActive=null;
  dirTimer=1; cpuAggression=1.0; playerBurstChain=0; screenFlash=0;
  startRound();
  if(!loopStarted){ loopStarted=true; requestAnimationFrame(gameLoop); }
}

function startRound(){
  const cpuIdx=window._cpuIdx!==undefined?window._cpuIdx:Math.floor(Math.random()*CPU_BUILDS.length);
  if(currentRound===1) window._cpuIdx=cpuIdx;
  const cpub=CPU_BUILDS[window._cpuIdx];

  playerTop=new BeyTop(AX-105,AY,selBlade,selCore,selDriver,'player');
  cpuTop=new BeyTop(AX+105,AY,cpub.blade,cpub.core,cpub.driver,'cpu');
  playerTop.vx=2.8; playerTop.vy=(Math.random()-0.5)*1.5;
  cpuTop.vx=-2.8; cpuTop.vy=(Math.random()-0.5)*1.5;
  particles=[];
  shakeX=shakeY=0; screenFlash=0;
  playerBurstChain=0;
  countdownTimer=120; // 縮短為 2 秒（原 3.25 秒）
  lastBeepN=-1;
  playerCooldowns={dash:0,spin:0,guard:0};
  playerGuardTimer=0;
  gameState='countdown';
  document.getElementById('battleBtns').style.display='flex';
}

// ==================== SELECT SCREEN BG ====================
function drawSelectBG(){
  ctx.fillStyle='#080015'; ctx.fillRect(0,0,W,H);
  drawArena();
  const t=Date.now()*0.001;
  const demos=[{bi:0,ci:0,di:0},{bi:1,ci:1,di:2},{bi:2,ci:2,di:1},{bi:3,ci:0,di:3}];
  for(let i=0;i<demos.length;i++){
    const a=t*0.35+i*Math.PI/2;
    const x=AX+Math.cos(a)*140, y=AY+Math.sin(a)*100;
    const blade=BLADES[demos[i].bi];
    ctx.save(); ctx.translate(x,y); ctx.rotate(t*(1.5+i*0.3));
    ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2);
    ctx.fillStyle=blade.color+'30'; ctx.fill();
    const pts=blade.pts;
    ctx.beginPath();
    for(let j=0;j<pts;j++){
      const a1=(j/pts)*Math.PI*2, a2=((j+0.4)/pts)*Math.PI*2;
      if(j===0) ctx.moveTo(Math.cos(a1)*14,Math.sin(a1)*14);
      else ctx.lineTo(Math.cos(a1)*14,Math.sin(a1)*14);
      ctx.lineTo(Math.cos(a2)*7,Math.sin(a2)*7);
    }
    ctx.closePath(); ctx.fillStyle=blade.color+'55'; ctx.fill();
    ctx.restore();
  }
}

// ==================== SELECT UI ====================
const TYPE_COLORS={attack:'#ff5544',defense:'#4488ff',stamina:'#44ff88',balance:'#cc44ff'};
const TYPE_LABELS={attack:'攻擊型',defense:'防禦型',stamina:'耐久型',balance:'均衡型'};

function updateSelectUI(){
  const b=BLADES[selBlade], c=CORES[selCore], d=DRIVERS[selDriver];
  document.getElementById('bladeName').textContent=b.name;
  document.getElementById('bladeName').style.color=b.color;
  document.getElementById('bladeDesc').textContent=b.desc;
  const badge=document.getElementById('bladeBadge');
  badge.textContent=TYPE_LABELS[b.type];
  badge.style.background=TYPE_COLORS[b.type]+'33';
  badge.style.color=TYPE_COLORS[b.type];
  badge.style.border=`1px solid ${TYPE_COLORS[b.type]}55`;
  document.getElementById('coreName').textContent=c.name;
  document.getElementById('coreName').style.color=c.color;
  document.getElementById('coreDesc').textContent=c.desc;
  document.getElementById('driverName').textContent=d.name;
  document.getElementById('driverName').style.color=d.color;
  document.getElementById('driverDesc').textContent=d.desc;

  const atk=b.atk+(c.bonus==='atk'?c.val:0);
  const def=b.def+(c.bonus==='def'?c.val:0);
  const sta=b.sta+(c.bonus==='sta'?c.val:0);
  const hp=55+def*4;
  const pct=v=>`${Math.min(100,v/11*100).toFixed(0)}%`;
  document.getElementById('atkBar').style.width=pct(atk);
  document.getElementById('defBar').style.width=pct(def);
  document.getElementById('staBar').style.width=pct(sta);
  document.getElementById('hpBar').style.width=`${Math.min(100,(hp-55)/40*100).toFixed(0)}%`;
  document.getElementById('atkVal').textContent=atk;
  document.getElementById('defVal').textContent=def;
  document.getElementById('staVal').textContent=sta;
  document.getElementById('hpVal').textContent=hp;

  // CPU 配件預覽
  const cpub=CPU_BUILDS[previewCpuIdx];
  document.getElementById('cpuName').textContent=cpub.name;
  document.getElementById('cpuStyle').textContent=cpub.style;
  const cb=BLADES[cpub.blade], cc=CORES[cpub.core], cd2=DRIVERS[cpub.driver];
  document.getElementById('cpuParts').innerHTML=
    `刀刃：<span style="color:${cb.color}">${cb.name}</span>（${TYPE_LABELS[cb.type]}）<br>`+
    `核心：<span style="color:${cc.color}">${cc.name}</span> &nbsp; `+
    `驅動：<span style="color:${cd2.color}">${cd2.name}</span>`;

  drawPreview();
}

function drawPreview(){
  const pc=document.getElementById('previewCanvas');
  const px=pc.getContext('2d');
  const b=BLADES[selBlade], c=CORES[selCore];
  px.clearRect(0,0,80,80);
  px.fillStyle='#0d0028'; px.fillRect(0,0,80,80);
  px.save(); px.translate(40,40); px.rotate(Date.now()*0.002);
  const g=px.createRadialGradient(0,0,10,0,0,28);
  g.addColorStop(0,b.glow+'66'); g.addColorStop(1,b.glow+'00');
  px.beginPath(); px.arc(0,0,28,0,Math.PI*2); px.fillStyle=g; px.fill();
  px.beginPath(); px.arc(0,0,16,0,Math.PI*2);
  px.fillStyle=b.color+'44'; px.fill();
  px.strokeStyle=b.color; px.lineWidth=2; px.stroke();
  const pts=b.pts;
  px.beginPath();
  for(let i=0;i<pts;i++){
    const a1=(i/pts)*Math.PI*2, a2=((i+0.38)/pts)*Math.PI*2;
    if(i===0) px.moveTo(Math.cos(a1)*20,Math.sin(a1)*20);
    else px.lineTo(Math.cos(a1)*20,Math.sin(a1)*20);
    px.lineTo(Math.cos(a2)*10,Math.sin(a2)*10);
    px.lineTo(Math.cos(((i+0.5)/pts)*Math.PI*2)*17,Math.sin(((i+0.5)/pts)*Math.PI*2)*17);
  }
  px.closePath(); px.fillStyle=b.color; px.fill();
  px.beginPath(); px.arc(0,0,6,0,Math.PI*2); px.fillStyle=c.color; px.fill();
  px.beginPath(); px.arc(0,0,2.5,0,Math.PI*2); px.fillStyle='#fff'; px.fill();
  px.restore();
  requestAnimationFrame(()=>{if(gameState==='select') drawPreview();});
}

function changePart(type,dir){
  if(type==='blade') selBlade=(selBlade+dir+BLADES.length)%BLADES.length;
  if(type==='core')  selCore=(selCore+dir+CORES.length)%CORES.length;
  if(type==='driver') selDriver=(selDriver+dir+DRIVERS.length)%DRIVERS.length;
  updateSelectUI();
}

// ==================== INIT ====================
updateSelectUI();
(function bgLoop(){ requestAnimationFrame(bgLoop); if(gameState==='select') drawSelectBG(); })();

// ==================== SFX ====================
const _SFX = {};
function _preload(name, path, vol, maxMs) {
  const a = new Audio(path); a.volume = vol; a.preload = 'auto';
  _SFX[name] = { audio: a, maxMs: maxMs || null };
}
function sfx(name) {
  const s = _SFX[name]; if (!s) return;
  try {
    const a = s.audio.cloneNode(); a.volume = s.audio.volume;
    if (s.maxMs) setTimeout(() => { a.pause(); a.currentTime = 0; }, s.maxMs);
    a.play().catch(() => {});
  } catch(e) {}
}
const _BASE = '../../assets/sfx/';
_preload('collision', _BASE+'GameSFX2/Impact/Retro Impact Metal 05.wav',  0.45, 200);
_preload('burst',     _BASE+'GameSFX1/Explosion/Retro Explosion Short 01.wav', 0.55, 280);
_preload('win',       _BASE+'GameSFX2/Music/Success/Retro Success Melody 01 - sawtooth lead 1.wav', 0.5);
_preload('lose',      _BASE+'GameSFX1/Events/Negative/Retro Negative Short 07.wav', 0.5, 300);
_preload('draw',      _BASE+'GameSFX1/Events/Retro Event 19.wav', 0.4, 280);
