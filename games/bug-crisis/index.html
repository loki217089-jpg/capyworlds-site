<script>
'use strict';
// ── BLOCK 2: Constants & Config ────────────────────────────
const BASE = '../../assets/packs/Robot%20Warfare%20Asset%20Pack%2024-11-21/Robot%20Warfare%20Asset%20Pack%2022-11-24/';

// Sprite sheet config  fw/fh = frame size in pixels, cols/rows = grid
const SCFG = {
  assault:    {src:BASE+'Soldiers/Assault-Class.png',       fw:16,fh:16,cols:5,rows:7,sc:2.8},
  machinegun: {src:BASE+'Soldiers/MachineGunner-Class.png', fw:16,fh:16,cols:5,rows:7,sc:2.8},
  sniper:     {src:BASE+'Soldiers/Sniper-Class.png',        fw:16,fh:16,cols:5,rows:7,sc:2.8},
  antitank:   {src:BASE+'Soldiers/AntiTank-Class.png',      fw:16,fh:16,cols:5,rows:7,sc:2.8},
  grenadier:  {src:BASE+'Soldiers/Grenadier-Class.png',     fw:16,fh:16,cols:5,rows:7,sc:2.8},
  wasp:       {src:BASE+'Robots/Wasp.png',                  fw:16,fh:16,cols:8,rows:1,sc:2.4},
  spider:     {src:BASE+'Robots/Spider.png',                fw:16,fh:16,cols:5,rows:5,sc:2.8},
  scarab:     {src:BASE+'Robots/Scarab.png',                fw:16,fh:16,cols:5,rows:5,sc:2.8},
  hornet:     {src:BASE+'Robots/Hornet.png',                fw:16,fh:16,cols:12,rows:3,sc:2.4},
  centipede:  {src:BASE+'Robots/Centipede.png',             fw:16,fh:16,cols:8,rows:18,sc:3.5},
  bigExpl:    {src:BASE+'Effects/big-explosion.png',        fw:32,fh:32,cols:11,rows:1,sc:2.0},
  smlExpl:    {src:BASE+'Effects/small-explosion.png',      fw:24,fh:24,cols:9, rows:1,sc:1.5},
};

// Unit configs
const UCFG = {
  assault:   {name:'突擊兵',cost:50, hp:120,dmg:20,spd:1.2,rng:44, aps:1.2,spr:'assault',   col:'#4af'},
  machinegun:{name:'機槍手',cost:80, hp:90, dmg:10,spd:1.0,rng:90, aps:3.0,spr:'machinegun',col:'#fa4'},
  sniper:    {name:'狙擊手',cost:100,hp:70, dmg:65,spd:1.0,rng:180,aps:0.5,spr:'sniper',    col:'#4f8'},
  antitank:  {name:'反坦克',cost:120,hp:110,dmg:105,spd:0.8,rng:110,aps:0.45,spr:'antitank',col:'#f84',aoe:50},
  grenadier: {name:'擲彈兵',cost:90, hp:85, dmg:65, spd:1.0,rng:135,aps:0.55,spr:'grenadier',col:'#a4f',aoe:44},
};

// Enemy configs
const ECFG = {
  wasp:     {name:'黃蜂機甲',  hp:55,  dmg:15,spd:2.8,rng:22, aps:1.5,rew:12,spr:'wasp',     col:'#ff4'},
  scarab:   {name:'甲蟲機甲',  hp:140, dmg:22,spd:1.6,rng:28, aps:1.0,rew:22,spr:'scarab',   col:'#f84'},
  spider:   {name:'蜘蛛機甲',  hp:220, dmg:32,spd:1.2,rng:32, aps:0.8,rew:32,spr:'spider',   col:'#f44'},
  hornet:   {name:'大黃蜂機甲',hp:95,  dmg:28,spd:2.0,rng:110,aps:0.8,rew:28,spr:'hornet',   col:'#f80'},
  centipede:{name:'蜈蚣BOSS',  hp:1800,dmg:70,spd:0.6,rng:55, aps:0.5,rew:200,spr:'centipede',col:'#f22'},
};

// Wave definitions: each wave = array of {type, count, gap(ms between spawns)}
const WAVES = [
  [{type:'wasp',    count:6,  gap:1400}],
  [{type:'wasp',    count:5,  gap:1200},{type:'scarab', count:3, gap:2400}],
  [{type:'scarab',  count:5,  gap:1500},{type:'wasp',   count:4, gap:900}],
  [{type:'spider',  count:3,  gap:3000},{type:'wasp',   count:6, gap:800}],
  [{type:'hornet',  count:5,  gap:1800},{type:'scarab', count:4, gap:1400}],
  [{type:'spider',  count:4,  gap:2200},{type:'hornet', count:4, gap:1600}],
  [{type:'scarab',  count:6,  gap:1100},{type:'spider', count:3, gap:2200},{type:'wasp',count:8,gap:700}],
  [{type:'hornet',  count:7,  gap:1400},{type:'spider', count:5, gap:1800}],
  [{type:'wasp',    count:12, gap:500}, {type:'hornet', count:6, gap:1100},{type:'spider',count:4,gap:1800}],
  [{type:'centipede',count:1, gap:6000},{type:'hornet', count:8, gap:900},{type:'spider',count:6,gap:1500}],
];

const CW=900, CH=420;
const LANE_N=3;
const LANE_Y=[70, 210, 350];
const LANE_H=112;
const PBX=60;   // player base x
const EBX=840;  // enemy base x
const GOLD_TICK=5;        // gold/sec
const BASE_HP=200;
const WAVE_DELAY=18000;   // ms between waves
// ── BLOCK 3: Image Loader + Sprite Renderer ───────────────
const imgs = {};
let loadedCount = 0;
const totalImages = Object.keys(SCFG).length;

function loadImages(cb) {
  for (const [k, c] of Object.entries(SCFG)) {
    const img = new Image();
    img.onload = img.onerror = () => { if (++loadedCount >= totalImages) cb(); };
    img.src = c.src;
    imgs[k] = img;
  }
}

// Draw one frame from a sprite sheet
// x,y = center position; fi = frame index; row = sheet row; flip = mirror X
function drawSpr(ctx, key, x, y, fi=0, row=0, flip=false, alpha=1) {
  const img = imgs[key];
  if (!img || !img.complete || !img.naturalWidth) return;
  const c = SCFG[key];
  const fw=c.fw, fh=c.fh, sc=c.sc||2;
  const dw=fw*sc, dh=fh*sc;
  const sx=(fi%c.cols)*fw, sy=row*fh;
  ctx.save();
  ctx.globalAlpha = alpha;
  if (flip) {
    ctx.translate(x, y);
    ctx.scale(-1,1);
    ctx.drawImage(img, sx,sy, fw,fh, -dw/2,-dh/2, dw,dh);
  } else {
    ctx.drawImage(img, sx,sy, fw,fh, x-dw/2, y-dh/2, dw,dh);
  }
  ctx.restore();
}

// Health bar
function drawBar(ctx, x, y, hp, max, w=36) {
  const p=Math.max(0,hp/max);
  ctx.fillStyle='#111';  ctx.fillRect(x-w/2, y, w, 4);
  ctx.fillStyle = p>.5?'#4f8':p>.25?'#fa4':'#f44';
  ctx.fillRect(x-w/2, y, w*p, 4);
}

// ── BLOCK 4: Particle System ──────────────────────────────
const parts = [];

function spawnExpl(x, y, big=false) {
  parts.push({x, y, t:0, dur: big?900:500, big});
}

function updateParts(dt) {
  for (let i=parts.length-1; i>=0; i--) {
    parts[i].t += dt;
    if (parts[i].t >= parts[i].dur) parts.splice(i,1);
  }
}

function drawParts(ctx) {
  for (const p of parts) {
    if (p.label) {
      // Sell/info floating text
      const pct=p.t/p.dur;
      ctx.globalAlpha=Math.max(0,1-pct*1.2);
      ctx.fillStyle='#fc8'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText(p.label, p.x, p.y - pct*24);
      ctx.globalAlpha=1; ctx.textAlign='left';
      continue;
    }
    const key = p.big ? 'bigExpl' : 'smlExpl';
    const c = SCFG[key];
    const pct = p.t/p.dur;
    const fi = Math.min(Math.floor(pct*(c.cols-1)), c.cols-1);
    drawSpr(ctx, key, p.x, p.y, fi, 0, false, 1-pct*.3);
  }
}
// ── BLOCK 5: Unit Base Class ──────────────────────────────
let uid=0;
const projs=[];

class Unit {
  constructor(cfg, x, lane, isEnemy) {
    this.id = uid++;
    this.cfg = cfg;
    this.x = x;
    this.lane = lane;
    this.y = LANE_Y[lane];
    this.hp = cfg.hp; this.maxHp = cfg.hp;
    this.isEnemy = isEnemy;
    this.dead = false;
    this.dieT = 0;
    this.frame = 0;
    this.frameT = 0;
    this.atkT = 0;
    this.state = 'walk';  // walk | fight
    this.upgLevel = 0;    // upgrade level (0-2)
  }

  update(dt, allies, foes) {
    if (this.dead) { this.dieT += dt; return; }

    // Animate
    this.frameT += dt;
    if (this.frameT > 180) { this.frame = (this.frame+1)%5; this.frameT=0; }

    // Find closest foe in same lane
    let best=null, bestD=Infinity;
    for (const u of foes) {
      if (u.dead || u.lane!==this.lane) continue;
      const d=Math.abs(u.x-this.x);
      if (d<bestD) { bestD=d; best=u; }
    }

    if (best && bestD <= this.cfg.rng) {
      this.state = 'fight';
      this.atkT += dt/1000;
      if (this.atkT >= 1/this.cfg.aps) {
        this.atkT = 0;
        this._attack(best, foes);
      }
    } else {
      this.state = 'walk';
      const dir = this.isEnemy ? -1 : 1;
      this.x += dir * this.cfg.spd * (dt/16);
    }
  }

  _attack(target, foes) {
    if (this.cfg.rng <= 36) {
      // Melee
      target.hp -= this.cfg.dmg;
      if (target.hp <= 0) { target.hp=0; target.dead=true; target._onDie && target._onDie(); spawnExpl(target.x,target.y,false); }
    } else {
      projs.push(new Proj(this.x, this.y, target, this.cfg.dmg, this.cfg.aoe||0, this.isEnemy, foes));
    }
  }

  draw(ctx) {
    if (this.dead && this.dieT>700) return;
    const alpha = this.dead ? Math.max(0, 1-this.dieT/700) : 1;
    const flip = this.isEnemy;
    // row 2 = typically a side-facing row for most 7-row sheets
    const row = this.state==='fight' ? 3 : 2;
    // Upgrade aura glow
    if (!this.dead && !this.isEnemy && this.upgLevel > 0) {
      ctx.shadowColor = this.upgLevel>=2 ? '#ffd700' : '#44ccff';
      ctx.shadowBlur = 10 + this.upgLevel*4;
    }
    drawSpr(ctx, this.cfg.spr, this.x, this.y, this.frame, row, flip, alpha);
    ctx.shadowBlur = 0;
    if (!this.dead) {
      drawBar(ctx, this.x, this.y-32, this.hp, this.maxHp);
      // Upgrade stars
      if (!this.isEnemy && this.upgLevel > 0) {
        ctx.fillStyle = this.upgLevel>=2 ? '#ffd700' : '#44ccff';
        ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
        ctx.fillText('★'.repeat(this.upgLevel), this.x, this.y-38);
        ctx.textAlign = 'left';
      }
    }
  }
}

// ── BLOCK 6: Projectile ──────────────────────────────────
class Proj {
  constructor(x, y, target, dmg, aoe, fromEnemy, foesRef) {
    this.x=x; this.y=y;
    this.target=target; this.dmg=dmg; this.aoe=aoe;
    this.fromEnemy=fromEnemy; this.foesRef=foesRef;
    this.spd = fromEnemy ? 4 : 6;
    this.dead=false;
    this.col = fromEnemy ? '#f84' : '#4af';
  }
  update(dt) {
    if (this.dead) return;
    if (this.target.dead && !this.aoe) { this.dead=true; return; }
    const tx = this.target.dead ? this.target.x : this.target.x;
    const ty = this.target.dead ? this.target.y : this.target.y;
    const dx=tx-this.x, dy=ty-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if (dist < 7) {
      this._hit();
    } else {
      const s=this.spd*dt/16;
      this.x+=dx/dist*s; this.y+=dy/dist*s;
    }
  }
  _hit() {
    if (this.aoe > 0) {
      for (const u of this.foesRef) {
        if (u.dead || u.lane!==this.target.lane) continue;
        if (Math.abs(u.x-this.x)<=this.aoe) {
          u.hp-=this.dmg;
          if (u.hp<=0) { u.hp=0; u.dead=true; u._onDie&&u._onDie(); }
        }
      }
      spawnExpl(this.x, this.y, true);
    } else {
      this.target.hp -= this.dmg;
      if (this.target.hp<=0) { this.target.hp=0; this.target.dead=true; this.target._onDie&&this.target._onDie(); }
      spawnExpl(this.x, this.y, false);
    }
    this.dead=true;
  }
  draw(ctx) {
    if (this.dead) return;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(this.x,this.y,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=this.col+'44';
    ctx.beginPath(); ctx.arc(this.x,this.y,6,0,Math.PI*2); ctx.fill();
  }
}
// ── BLOCK 7: Enemy Class ──────────────────────────────────
class Enemy extends Unit {
  constructor(type, lane) {
    super(ECFG[type], EBX+10, lane, true);
    this.type=type;
    this.reward=ECFG[type].rew;
  }
  _onDie() {
    gs.gold += this.reward;
    hud('gold');
    spawnExpl(this.x, this.y, this.type==='centipede');
  }
  update(dt, soldiers, enemies) {
    super.update(dt, enemies, soldiers); // enemy foes = soldiers
    // Reached player base
    if (!this.dead && this.x <= PBX+18) {
      gs.baseHp -= this.cfg.dmg * 0.12;
      hud('hp');
      this.dead = true;
      if (gs.baseHp <= 0) endGame(false);
    }
    // HP depleted via direct hit
    if (!this.dead && this.hp <= 0) {
      this.dead=true;
      this._onDie();
    }
  }
}

// ── BLOCK 8: Game State + Wave System ────────────────────
const gs = {
  phase: 'menu',
  gold: 200, baseHp: BASE_HP,
  wave: 0, waveActive: false,
  nextWaveIn: 0, selUnit: 'assault', hoverLane: -1,
};
const soldiers=[], enemies=[];
let spawnQ=[], spawnT=0;

function hud(what) {
  if (what==='hp'  || what==='all') document.getElementById('h-hp').textContent   = Math.max(0,Math.floor(gs.baseHp));
  if (what==='gold'|| what==='all') document.getElementById('h-gold').textContent = Math.floor(gs.gold);
  if (what==='wave'|| what==='all') document.getElementById('h-wave').textContent = `${gs.wave} / ${WAVES.length}`;
}

function startWave(idx) {
  if (idx >= WAVES.length) { setTimeout(()=>endGame(true), 2000); return; }
  gs.wave = idx+1; gs.waveActive=true;
  hud('wave');
  spawnQ=[]; spawnT=0;
  let t=0;
  for (const grp of WAVES[idx]) {
    for (let i=0; i<grp.count; i++) {
      const lane = Math.floor(Math.random()*LANE_N);
      spawnQ.push({type:grp.type, lane, time:t});
      t += grp.gap;
    }
  }
  spawnQ.sort((a,b)=>a.time-b.time);
}

function updateWave(dt) {
  if (!gs.waveActive) {
    gs.nextWaveIn -= dt;
    if (gs.nextWaveIn <= 0) startWave(gs.wave);
    return;
  }
  spawnT += dt;
  while (spawnQ.length && spawnT >= spawnQ[0].time) {
    const s=spawnQ.shift();
    enemies.push(new Enemy(s.type, s.lane));
  }
  // Wave ends when queue empty and all enemies dead
  if (!spawnQ.length && enemies.every(e=>e.dead)) {
    gs.waveActive=false;
    gs.nextWaveIn = WAVE_DELAY;
    // Wave clear bonus gold — scales with wave number
    const wBonus = 30 + gs.wave * 15;
    gs.gold += wBonus; hud('gold');
    parts.push({x:CW/2, y:CH/2-30, t:0, dur:2000, big:false, label:`波次完清！+${wBonus}💰`});
    if (gs.wave >= WAVES.length) setTimeout(()=>endGame(true), 2000);
  }
}

function deploySoldier(type, lane) {
  const c=UCFG[type];
  if (!c || gs.gold < c.cost) return;
  gs.gold -= c.cost; hud('gold');
  soldiers.push(new Unit(c, PBX+22, lane, false));
}

function upgradeCost(s) {
  return Math.floor(s.cfg.cost * (s.upgLevel===0 ? 0.5 : 0.7));
}

function upgradeUnit(s) {
  if (s.isEnemy || s.dead || s.upgLevel >= 2) return;
  const cost = upgradeCost(s);
  if (gs.gold < cost) return;
  gs.gold -= cost; hud('gold');
  s.upgLevel++;
  // Apply +30% dmg and HP (reconstruct effective cfg)
  s.cfg = Object.assign({}, s.cfg, {
    dmg:  Math.round(s.cfg.dmg  * 1.3),
    hp:   Math.round(s.cfg.hp   * 1.3),
    aps:  parseFloat((s.cfg.aps * 1.1).toFixed(3)),
  });
  s.maxHp = s.cfg.hp;
  s.hp = Math.min(s.hp * 1.3, s.maxHp);
  parts.push({x:s.x, y:s.y-38, t:0, dur:1400, big:false, label:`升級★${s.upgLevel} +${cost}💰`});
}

function endGame(win) {
  gs.phase = win ? 'victory' : 'gameover';
  const ol=document.getElementById('overlay');
  ol.innerHTML = win
    ? `<h1>🎉 作戰勝利！</h1><p>所有蟲族波次清除完畢</p><button class="obtn" id="r-btn">再戰一次</button>`
    : `<h1>💀 基地淪陷</h1><p>蟲族機甲突破防線，任務失敗</p><button class="obtn" id="r-btn">重新作戰</button>`;
  ol.style.display='flex';
  document.getElementById('r-btn').onclick=resetGame;
}

function resetGame() {
  document.getElementById('overlay').style.display='none';
  soldiers.length=0; enemies.length=0; projs.length=0; parts.length=0; spawnQ=[];
  Object.assign(gs,{phase:'playing',gold:200,baseHp:BASE_HP,wave:0,waveActive:false,nextWaveIn:4000,selUnit:'assault'});
  hud('all');
  // Reset button selection
  document.querySelectorAll('.ubtn').forEach(b=>b.classList.toggle('sel', b.dataset.type==='assault'));
}
// ── BLOCK 9: Rendering ───────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function drawBg() {
  ctx.fillStyle='#080e1c'; ctx.fillRect(0,0,CW,CH);

  // Ruined city silhouettes (background layer)
  const RUINS=[
    {x:130,w:28,h:82},{x:185,w:18,h:55},{x:240,w:32,h:96},{x:310,w:22,h:68},
    {x:375,w:36,h:78},{x:450,w:20,h:52},{x:510,w:28,h:88},{x:580,w:24,h:60},
    {x:640,w:34,h:74},{x:710,w:18,h:50},{x:760,w:28,h:82},{x:810,w:22,h:62},
  ];
  for (const r of RUINS) {
    // building body
    ctx.fillStyle='#0c1526';
    ctx.fillRect(r.x-r.w/2, 0, r.w, r.h);
    // cracked top
    ctx.fillStyle='#0a1020';
    ctx.fillRect(r.x-r.w/2, 0, r.w, 4);
    // dim window lights
    ctx.fillStyle='#111e36';
    for (let wy=8; wy<r.h-10; wy+=14) {
      ctx.fillRect(r.x-r.w/2+4, wy, 5, 5);
      if (r.w>22) ctx.fillRect(r.x+2, wy, 5, 5);
    }
  }
  // Ground crack lines
  ctx.strokeStyle='#0d1528'; ctx.lineWidth=1;
  for (const cy of [126,266]) {
    ctx.beginPath(); ctx.moveTo(PBX,cy); ctx.lineTo(EBX,cy); ctx.stroke();
  }

  // Lane strips
  for (let i=0; i<LANE_N; i++) {
    const cy=LANE_Y[i];
    ctx.fillStyle = i%2===0 ? '#0b1424' : '#090f1e';
    ctx.fillRect(0, cy-LANE_H/2, CW, LANE_H);
    // Dashed divider
    ctx.strokeStyle='#162840'; ctx.lineWidth=1;
    ctx.setLineDash([5,10]);
    ctx.beginPath(); ctx.moveTo(0,cy+LANE_H/2); ctx.lineTo(CW,cy+LANE_H/2); ctx.stroke();
    ctx.setLineDash([]);
    // Hover highlight
    if (gs.hoverLane===i && gs.phase==='playing') {
      ctx.fillStyle='rgba(60,140,255,.06)';
      ctx.fillRect(PBX, cy-LANE_H/2, EBX-PBX, LANE_H);
    }
    // Lane number
    ctx.fillStyle='#1a3256'; ctx.font='10px monospace';
    ctx.fillText(`排${i+1}`, 10, cy+4);
  }

  // Player base zone
  ctx.fillStyle='#0c1e3a';
  ctx.fillRect(0, 0, PBX, CH);
  ctx.strokeStyle='#2a7aef'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(PBX,0); ctx.lineTo(PBX,CH); ctx.stroke();
  ctx.save(); ctx.translate(PBX/2, CH/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle='#3a8aff'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText('基地', 0, 4); ctx.restore();

  // Enemy base zone
  ctx.fillStyle='#1c0a0a';
  ctx.fillRect(EBX, 0, CW-EBX, CH);
  ctx.strokeStyle='#ef3a2a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(EBX,0); ctx.lineTo(EBX,CH); ctx.stroke();
  ctx.save(); ctx.translate(EBX+(CW-EBX)/2, CH/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle='#ff4a3a'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText('蟲巢', 0, 4); ctx.restore();
}

function drawCountdown() {
  if (gs.waveActive || gs.phase!=='playing') return;
  const sec = Math.ceil(gs.nextWaveIn/1000);
  if (sec<=0) return;
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(CW/2-90, 8, 180, 26);
  ctx.fillStyle='#fc8'; ctx.font='bold 13px monospace';
  ctx.textAlign='center';
  if (gs.wave===0)
    ctx.fillText(`作戰開始：${sec}秒`, CW/2, 26);
  else
    ctx.fillText(`下一波：${sec}秒`, CW/2, 26);
  ctx.textAlign='left';
}

function drawKeyHints() {
  if (gs.phase!=='playing') return;
  const hints=[
    {key:'左鍵', desc:'部署'},
    {key:'右鍵', desc:'退售60%'},
    {key:'空襲鈕', desc:'選後點排清場'},
    {key:'每秒', desc:`+${GOLD_TICK}💰`},
  ];
  ctx.fillStyle='rgba(0,0,0,0.52)';
  ctx.fillRect(0, CH-20, CW, 20);
  ctx.font='11px monospace'; ctx.textAlign='left';
  let x=10;
  for (const h of hints) {
    ctx.fillStyle='#4a8ef0';
    ctx.fillText(`[${h.key}]`, x, CH-5);
    x += ctx.measureText(`[${h.key}]`).width+3;
    ctx.fillStyle='#4a6a9a';
    ctx.fillText(h.desc, x, CH-5);
    x += ctx.measureText(h.desc).width+16;
  }
}

function render() {
  ctx.clearRect(0,0,CW,CH);
  drawBg();
  for (const s of soldiers) s.draw(ctx);
  for (const e of enemies)  e.draw(ctx);
  for (const p of projs)    p.draw(ctx);
  drawParts(ctx);
  drawCountdown();
  drawKeyHints();
}
// ── BLOCK 10: Main Loop + Input + Init ───────────────────
let lastT=0, goldT=0;

function loop(now) {
  const dt = Math.min(now-lastT, 50);
  lastT=now;

  if (gs.phase==='playing') {
    // Gold income
    goldT += dt;
    if (goldT >= 1000) { goldT-=1000; gs.gold+=GOLD_TICK; hud('gold'); }

    // Update
    const aS=soldiers.filter(u=>!u.dead||u.dieT<700);
    const aE=enemies.filter(u=>!u.dead||u.dieT<700);
    for (const s of aS) s.update(dt, aS, aE);
    for (const e of aE) e.update(dt, aS, aE);
    for (let i=projs.length-1; i>=0; i--) {
      projs[i].update(dt);
      if (projs[i].dead) projs.splice(i,1);
    }
    updateParts(dt);
    updateWave(dt);

    // Cleanup
    for (let i=soldiers.length-1;i>=0;i--) if(soldiers[i].dead&&soldiers[i].dieT>750) soldiers.splice(i,1);
    for (let i=enemies.length-1; i>=0;i--) if(enemies[i].dead &&enemies[i].dieT>750)  enemies.splice(i,1);
  }

  render();
  requestAnimationFrame(loop);
}

// Click on canvas → deploy unit or airstrike
canvas.addEventListener('click', e => {
  if (gs.phase!=='playing') return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(CW/r.width);
  const my=(e.clientY-r.top)*(CH/r.height);
  for (let i=0; i<LANE_N; i++) {
    if (my >= LANE_Y[i]-LANE_H/2 && my < LANE_Y[i]+LANE_H/2) {
      if (mx < PBX) break;
      if (gs.selUnit==='__airstrike__') {
        if (gs.gold < 150) break;
        gs.gold -= 150; hud('gold');
        for (const en of [...enemies]) {
          if (en.dead || en.lane!==i) continue;
          en.hp -= 300;
          spawnExpl(en.x, en.y, true);
          if (en.hp<=0) { en.hp=0; en.dead=true; en._onDie&&en._onDie(); }
        }
        // Return to assault selection after use
        gs.selUnit='assault';
        document.querySelectorAll('.ubtn').forEach(b=>b.classList.toggle('sel', b.dataset.type==='assault'));
      } else {
        deploySoldier(gs.selUnit, i);
      }
      break;
    }
  }
});

// Right-click on soldier → upgrade (1st try) or sell (if maxed)
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (gs.phase!=='playing') return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(CW/r.width);
  const my=(e.clientY-r.top)*(CH/r.height);
  let best=null, bestD=Infinity;
  for (const s of soldiers) {
    if (s.dead) continue;
    const d=Math.hypot(mx-s.x, my-s.y);
    if (d<36 && d<bestD) { bestD=d; best=s; }
  }
  if (best) {
    if (best.upgLevel < 2) {
      // Try upgrade; if can't afford, show cost
      const cost = upgradeCost(best);
      if (gs.gold >= cost) {
        upgradeUnit(best);
      } else {
        parts.push({x:best.x, y:best.y-28, t:0, dur:1000, big:false, label:`升級需${cost}💰`});
      }
    } else {
      // Maxed: sell for 50% cost
      const refund=Math.floor(best.cfg.cost*0.5);
      best.dead=true; best.dieT=0;
      gs.gold+=refund; hud('gold');
      spawnExpl(best.x, best.y, false);
      parts.push({x:best.x, y:best.y-28, t:0, dur:1200, big:false, label:`退售 +${refund}💰`});
    }
  }
});

// Hover highlight lane
canvas.addEventListener('mousemove', e => {
  if (gs.phase!=='playing') return;
  const r=canvas.getBoundingClientRect();
  const my=(e.clientY-r.top)*(CH/r.height);
  // Highlight handled in render via gs.hoverLane
  for (let i=0; i<LANE_N; i++) {
    if (my >= LANE_Y[i]-LANE_H/2 && my < LANE_Y[i]+LANE_H/2) {
      gs.hoverLane=i; return;
    }
  }
  gs.hoverLane=-1;
});
canvas.addEventListener('mouseleave', ()=>{ gs.hoverLane=-1; });

// Unit button selection
document.querySelectorAll('.ubtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ubtn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    gs.selUnit=btn.dataset.type;
  });
});

// Start button
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display='none';
  loadImages(() => {
    resetGame();
    gs.nextWaveIn=4000;
  });
});

// ── SFX ──────────────────────────────────────────────────────
const _SFX={};
function _preload(name,path,vol,maxMs){
  const a=new Audio(path);a.volume=vol;a.preload='auto';
  _SFX[name]={audio:a,maxMs:maxMs||null};
}
function sfx(name){
  const s=_SFX[name];if(!s)return;
  try{const a=s.audio.cloneNode();a.volume=s.audio.volume;
  if(s.maxMs)setTimeout(()=>{a.pause();a.currentTime=0;},s.maxMs);
  a.play().catch(()=>{});}catch(e){}
}
const _B='../../assets/sfx/';
_preload('deploy',  _B+'GameSFX1/Events/Retro Event UI 01.wav',               0.4, 300);
_preload('wave',    _B+'GameSFX1/Events/Retro Event StereoUP 02.wav',         0.5, 400);
_preload('shoot',   _B+'GameSFX1/Explosion/Retro Explosion Short 01.wav',     0.25,150);
_preload('explode', _B+'GameSFX1/Explosion/Retro Explosion Short 15.wav',     0.4, 280);
_preload('hit',     _B+'GameSFX2/Impact/Retro Impact Metal 36.wav',           0.3, 180);
_preload('win',     _B+'GameSFX2/Music/Success/Retro Success Melody 01 - sawtooth lead 1.wav', 0.5);
_preload('lose',    _B+'GameSFX1/Events/Negative/Retro Negative Long 01.wav', 0.5);

// BGM
const bgm=new Audio('../../assets/music/JDSherbert - Minigame Music Pack [FREE]/JDSherbert - Minigame Music Pack - A Minor Distraction.ogg');
bgm.loop=true;bgm.volume=0.16;
document.getElementById('start-btn').addEventListener('click',()=>bgm.play().catch(()=>{}),{once:true});

// 插入音效觸發點
const _origDeploy=deploySoldier;
function deploySoldier(type,lane){_origDeploy(type,lane);sfx('deploy');}
const _origStartWave=startWave;
function startWave(idx){_origStartWave(idx);sfx('wave');}
const _origEndGame=endGame;
function endGame(win){_origEndGame(win);sfx(win?'win':'lose');bgm.pause();}

// Single game loop
requestAnimationFrame(loop);
</script>
