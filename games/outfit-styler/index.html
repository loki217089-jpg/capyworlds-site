<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>穿搭工坊 — CapyWorlds</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#13100c;color:#e8ddd0;font-family:'Segoe UI',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
header{background:#1a1410;border-bottom:1px solid #c8a45628;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px}
header h1{font-size:15px;color:#c8a456;letter-spacing:1px;white-space:nowrap}
.ctrl-row{display:flex;gap:4px;align-items:center}
.ctrl-group{display:flex;gap:2px}
.cb{padding:3px 9px;border-radius:20px;border:1.5px solid #c8a45650;background:transparent;color:#b0a090;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cb.active{background:#c8a456;color:#13100c;border-color:#c8a456;font-weight:700}
.hair-bar{display:flex;gap:3px;align-items:center;padding:4px 10px;background:#1a1410;border-bottom:1px solid #c8a45618;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.hair-bar::-webkit-scrollbar{display:none}
.hair-bar label{font-size:10px;color:#80706a;white-space:nowrap;margin-right:2px}
.hdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border-color .15s}
.hdot.on{border-color:#c8a456}
.main{flex:1;display:flex;overflow:hidden;min-height:0}
.avatar-wrap{flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#1c1810;padding:6px}
canvas#av{border-radius:10px;display:block}
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid #c8a45618;min-width:0}
.cat-tabs{display:flex;overflow-x:auto;background:#1a1410;border-bottom:1px solid #c8a45620;scrollbar-width:none;flex-shrink:0}
.cat-tabs::-webkit-scrollbar{display:none}
.ctab{flex:0 0 auto;padding:7px 11px;font-size:12px;color:#7a6a5a;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.ctab.on{color:#c8a456;border-bottom-color:#c8a456}
.grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:6px;scrollbar-width:thin;scrollbar-color:#c8a45638 transparent;align-content:start}
.icard{border-radius:8px;border:1.5px solid #c8a45625;background:#1c1810;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;padding:6px 4px 5px;gap:2px}
.icard:active{transform:scale(.95)}
.icard.sel{border-color:#c8a456;background:#26200e;box-shadow:0 0 10px #c8a45638}
.icard canvas{width:72px;height:72px;border-radius:4px;background:#f8f4ee}
.icard .nm{font-size:11px;color:#c8a456;text-align:center}
.icard .tg{font-size:10px;color:#6a5a50}
.icard.none-card .nm{color:#60504a}
.bot{background:#1a1410;border-top:1px solid #c8a45620;padding:6px 10px;display:flex;gap:6px;flex-shrink:0}
.abtn{flex:1;padding:7px;border-radius:7px;border:1.5px solid #c8a45660;background:transparent;color:#c8a456;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s}
.abtn.pri{background:#c8a456;color:#13100c;border-color:#c8a456}
.abtn:active{transform:scale(.97)}
.toast{position:fixed;top:65px;left:50%;transform:translateX(-50%) translateY(-8px);background:#c8a456;color:#13100c;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:all .25s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <h1>👗 穿搭工坊</h1>
  <div class="ctrl-row">
    <div class="ctrl-group" id="gCtrl">
      <button class="cb active" data-v="female">♀ 女</button>
      <button class="cb" data-v="male">♂ 男</button>
    </div>
    <div class="ctrl-group" id="sCtrl">
      <button class="cb active" data-v="light">淺</button>
      <button class="cb" data-v="medium">中</button>
      <button class="cb" data-v="dark">深</button>
    </div>
  </div>
</header>
<div class="hair-bar" id="hBar"><label>髮色</label></div>
<div class="main">
  <div class="avatar-wrap" id="aw"><canvas id="av" width="220" height="430"></canvas></div>
  <div class="panel">
    <div class="cat-tabs" id="ctabs"></div>
    <div class="grid" id="grid"></div>
  </div>
</div>
<div class="bot">
  <button class="abtn" id="rndBtn">🎲 隨機</button>
  <button class="abtn" id="clrBtn">✕ 清除</button>
  <button class="abtn pri" id="savBtn">💾 存圖</button>
</div>
<div class="toast" id="toast"></div>
<script>
// ══ STATE ══════════════════════════════════════════════════════════════════
const ST = { gender:'female', skin:'light', hairCI:0,
  sel:{ hair:'none', top:'none', bottom:'none', shoes:'none', acc:'none', bag:'none' },
  cat:'hair' };

const SKIN = {
  light:  { s:'#f5cba7', d:'#e0a882', lip:'#d4877a', eye:'#2c1810' },
  medium: { s:'#c68642', d:'#a0652a', lip:'#a04030', eye:'#1a0e06' },
  dark:   { s:'#7a4828', d:'#5a3018', lip:'#7a3530', eye:'#0e0806' }
};
const HC = ['#2c1810','#5c3a1e','#e8c840','#c83838','#4060c8','#40b880','#e080c0','#aaaaaa'];

const CW=220, CH=430;
const cv = document.getElementById('av');
const cx = cv.getContext('2d');
// ══ FASHION ILLUSTRATION BODY ══════════════════════════════════════════════
// Coordinates for 220×430 canvas, fashion proportions (≈8 heads tall)
// Female landmarks
const FL = {
  hx:110, hy:46, hrx:27, hry:33,          // head
  nt:[[100,78],[120,78]],                  // neck top
  sh:[[48,98],[172,98]],                   // shoulders
  bust:[[66,142],[154,142]],
  waist:[[82,192],[138,192]],
  hip:[[60,228],[160,228]],
  crotch:[[88,256],[132,256]],
  knee:[[84,338],[136,338]],
  ankle:[[88,400],[132,400]],
  toe:[[74,420],[146,420]]
};
// Male landmarks (wider shoulders/waist, narrower hips)
const ML = {
  hx:110, hy:46, hrx:28, hry:32,
  nt:[[100,78],[120,78]],
  sh:[[40,98],[180,98]],
  bust:[[56,140],[164,140]],
  waist:[[74,190],[146,190]],
  hip:[[66,226],[154,226]],
  crotch:[[88,254],[132,254]],
  knee:[[84,336],[136,336]],
  ankle:[[88,398],[132,398]],
  toe:[[74,418],[146,418]]
};

function getLM() { return ST.gender==='female' ? FL : ML; }

function bezBody(pts, color) {
  // pts = array of [x,y] control points forming smooth bezier outline
  if(pts.length < 2) return;
  cx.beginPath();
  cx.moveTo(pts[0][0], pts[0][1]);
  for(let i=1; i<pts.length-1; i++) {
    const mx = (pts[i][0]+pts[i+1][0])/2;
    const my = (pts[i][1]+pts[i+1][1])/2;
    cx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my);
  }
  cx.lineTo(pts[pts.length-1][0], pts[pts.length-1][1]);
  cx.fillStyle = color; cx.fill();
}

function drawBody() {
  const L = getLM();
  const pal = SKIN[ST.skin];
  const s = pal.s, d = pal.d;

  // ── ARMS (behind torso) ──────────────────────────────────────────
  // Left arm
  cx.beginPath();
  cx.moveTo(L.sh[0][0]+4, L.sh[0][1]);
  cx.bezierCurveTo(L.sh[0][0]-4, 140, L.sh[0][0]+2, 270, L.sh[0][0]+6, 300);
  cx.bezierCurveTo(L.sh[0][0]+16, 300, L.sh[0][0]+24, 300, L.sh[0][0]+26, 295);
  cx.bezierCurveTo(L.sh[0][0]+20, 260, L.sh[0][0]+16, 140, L.sh[0][0]+20, L.sh[0][1]);
  cx.closePath(); cx.fillStyle=d; cx.fill();
  // Left hand
  cx.beginPath(); cx.ellipse(L.sh[0][0]+16, 302, 12, 9, 0.2, 0, Math.PI*2);
  cx.fillStyle=s; cx.fill();
  // Right arm
  cx.beginPath();
  cx.moveTo(L.sh[1][0]-4, L.sh[1][1]);
  cx.bezierCurveTo(L.sh[1][0]+4, 140, L.sh[1][0]-2, 270, L.sh[1][0]-6, 300);
  cx.bezierCurveTo(L.sh[1][0]-16, 300, L.sh[1][0]-24, 300, L.sh[1][0]-26, 295);
  cx.bezierCurveTo(L.sh[1][0]-20, 260, L.sh[1][0]-16, 140, L.sh[1][0]-20, L.sh[1][1]);
  cx.closePath(); cx.fillStyle=d; cx.fill();
  cx.beginPath(); cx.ellipse(L.sh[1][0]-16, 302, 12, 9, -0.2, 0, Math.PI*2);
  cx.fillStyle=s; cx.fill();

  // ── TORSO PATH ───────────────────────────────────────────────────
  cx.beginPath();
  cx.moveTo(L.nt[0][0], L.nt[0][1]);
  cx.lineTo(L.nt[1][0], L.nt[1][1]);
  cx.quadraticCurveTo(L.sh[1][0]+6, L.sh[1][1], L.sh[1][0], L.sh[1][1]+2);
  cx.bezierCurveTo(L.sh[1][0]-6,110, L.bust[1][0]+6,130, L.bust[1][0],L.bust[1][1]);
  cx.bezierCurveTo(L.bust[1][0]-4,162, L.waist[1][0]+4,180, L.waist[1][0],L.waist[1][1]);
  cx.bezierCurveTo(L.waist[1][0]+2,208, L.hip[1][0]+4,218, L.hip[1][0],L.hip[1][1]);
  cx.lineTo(L.hip[0][0], L.hip[0][1]);
  cx.bezierCurveTo(L.hip[0][0]-4,218, L.waist[0][0]-2,208, L.waist[0][0],L.waist[0][1]);
  cx.bezierCurveTo(L.waist[0][0]-4,180, L.bust[0][0]+4,162, L.bust[0][0],L.bust[0][1]);
  cx.bezierCurveTo(L.bust[0][0]+6,130, L.sh[0][0]+6,110, L.sh[0][0],L.sh[0][1]+2);
  cx.quadraticCurveTo(L.sh[0][0]-6, L.sh[0][1], L.nt[0][0], L.nt[0][1]);
  cx.closePath();
  // Torso gradient
  const tg = cx.createLinearGradient(60,90,160,230);
  tg.addColorStop(0, s); tg.addColorStop(1, d);
  cx.fillStyle=tg; cx.fill();

  // Female bust shading
  if(ST.gender==='female') {
    cx.beginPath(); cx.ellipse(92, 142, 18, 14, -0.1, 0, Math.PI*2);
    cx.fillStyle='rgba(0,0,0,0.07)'; cx.fill();
    cx.beginPath(); cx.ellipse(128, 142, 18, 14, 0.1, 0, Math.PI*2);
    cx.fillStyle='rgba(0,0,0,0.07)'; cx.fill();
  }

  // ── LEGS ─────────────────────────────────────────────────────────
  // Left leg
  cx.beginPath();
  cx.moveTo(L.hip[0][0]+4, L.hip[0][1]);
  cx.lineTo(L.crotch[0][0], L.crotch[0][1]);
  cx.bezierCurveTo(L.crotch[0][0]-2,280, L.knee[0][0]+2,320, L.knee[0][0],L.knee[0][1]);
  cx.bezierCurveTo(L.knee[0][0]-2,360, L.ankle[0][0],390, L.ankle[0][0],L.ankle[0][1]);
  cx.lineTo(L.toe[0][0], L.toe[0][1]);
  cx.lineTo(L.toe[0][0]+16, L.toe[0][1]);
  cx.lineTo(L.ankle[0][0]+20, L.ankle[0][1]);
  cx.bezierCurveTo(L.ankle[0][0]+22,390, L.knee[0][0]+22,360, L.knee[0][0]+22,L.knee[0][1]);
  cx.bezierCurveTo(L.knee[0][0]+24,320, L.crotch[0][0]+24,280, L.crotch[0][0]+24,L.crotch[0][1]);
  cx.lineTo(L.hip[0][0]+30, L.hip[0][1]);
  cx.closePath();
  const lg = cx.createLinearGradient(70,250,100,420);
  lg.addColorStop(0,s); lg.addColorStop(1,d);
  cx.fillStyle=lg; cx.fill();
  // Right leg
  cx.beginPath();
  cx.moveTo(L.hip[1][0]-4, L.hip[1][1]);
  cx.lineTo(L.crotch[1][0]+2, L.crotch[1][1]);
  cx.bezierCurveTo(L.crotch[1][0]+4,280, L.knee[1][0]-2,320, L.knee[1][0],L.knee[1][1]);
  cx.bezierCurveTo(L.knee[1][0]+2,360, L.ankle[1][0]+2,390, L.ankle[1][0],L.ankle[1][1]);
  cx.lineTo(L.toe[1][0]+2, L.toe[1][1]);
  cx.lineTo(L.toe[1][0]-16, L.toe[1][1]);
  cx.lineTo(L.ankle[1][0]-20, L.ankle[1][1]);
  cx.bezierCurveTo(L.ankle[1][0]-22,390, L.knee[1][0]-22,360, L.knee[1][0]-22,L.knee[1][1]);
  cx.bezierCurveTo(L.knee[1][0]-24,320, L.crotch[1][0]-22,280, L.crotch[1][0]-22,L.crotch[1][1]);
  cx.lineTo(L.hip[1][0]-30, L.hip[1][1]);
  cx.closePath();
  const rg = cx.createLinearGradient(120,250,150,420);
  rg.addColorStop(0,d); rg.addColorStop(1,s);
  cx.fillStyle=rg; cx.fill();

  // ── NECK & HEAD ──────────────────────────────────────────────────
  cx.beginPath();
  cx.moveTo(L.nt[0][0], L.nt[0][1]);
  cx.lineTo(L.nt[1][0], L.nt[1][1]);
  cx.quadraticCurveTo(L.hx+14, L.hy+30, L.hx+L.hrx*0.5, L.hy+L.hry-4);
  cx.arc(L.hx, L.hy, (L.hrx+L.hry)/2, 0, Math.PI*2, true);
  cx.quadraticCurveTo(L.hx-L.hrx*0.5, L.hy+L.hry-4, L.nt[0][0], L.nt[0][1]);
  cx.fillStyle=s; cx.fill();
  // Head proper
  cx.beginPath(); cx.ellipse(L.hx, L.hy, L.hrx, L.hry, 0, 0, Math.PI*2);
  const hg = cx.createRadialGradient(L.hx-8,L.hy-10,4,L.hx,L.hy,L.hry);
  hg.addColorStop(0,'#fff8'); hg.addColorStop(1,s);
  cx.fillStyle=hg; cx.fill();
  // Neck shadow
  cx.beginPath(); cx.ellipse(L.hx, L.hy+L.hry-4, 14, 5, 0, 0, Math.PI*2);
  cx.fillStyle='rgba(0,0,0,0.09)'; cx.fill();

  // ── FACE ─────────────────────────────────────────────────────────
  const pal2 = SKIN[ST.skin];
  // Eyes
  cx.beginPath(); cx.ellipse(L.hx-11, L.hy+2, 6, 4, 0, 0, Math.PI*2);
  cx.fillStyle='#fff'; cx.fill();
  cx.beginPath(); cx.ellipse(L.hx+11, L.hy+2, 6, 4, 0, 0, Math.PI*2);
  cx.fillStyle='#fff'; cx.fill();
  cx.beginPath(); cx.ellipse(L.hx-10, L.hy+2, 3.5, 3.5, 0, 0, Math.PI*2);
  cx.fillStyle=pal2.eye; cx.fill();
  cx.beginPath(); cx.ellipse(L.hx+10, L.hy+2, 3.5, 3.5, 0, 0, Math.PI*2);
  cx.fillStyle=pal2.eye; cx.fill();
  cx.beginPath(); cx.ellipse(L.hx-9.5, L.hy+1.5, 1.5, 1.5, 0, 0, Math.PI*2);
  cx.fillStyle='#fff'; cx.fill();
  cx.beginPath(); cx.ellipse(L.hx+10.5, L.hy+1.5, 1.5, 1.5, 0, 0, Math.PI*2);
  cx.fillStyle='#fff'; cx.fill();
  // Lashes
  cx.strokeStyle=pal2.eye; cx.lineWidth=1.5; cx.lineCap='round';
  for(let [ox,d2] of [[-1,-1],[1,-1]]) {
    const ex = L.hx + ox*11;
    cx.beginPath(); cx.moveTo(ex-5,L.hy-1); cx.lineTo(ex-6,L.hy-5); cx.stroke();
    cx.beginPath(); cx.moveTo(ex,L.hy-3); cx.lineTo(ex,L.hy-7); cx.stroke();
    cx.beginPath(); cx.moveTo(ex+5,L.hy-1); cx.lineTo(ex+6,L.hy-5); cx.stroke();
  }
  // Brows
  const hc = HC[ST.hairCI];
  cx.strokeStyle=hc; cx.lineWidth=2.2; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(L.hx-17,L.hy-9); cx.quadraticCurveTo(L.hx-10,L.hy-13,L.hx-4,L.hy-10); cx.stroke();
  cx.beginPath(); cx.moveTo(L.hx+4,L.hy-10); cx.quadraticCurveTo(L.hx+10,L.hy-13,L.hx+17,L.hy-9); cx.stroke();
  // Nose
  cx.strokeStyle=d; cx.lineWidth=1.2;
  cx.beginPath(); cx.moveTo(L.hx-3,L.hy+10); cx.quadraticCurveTo(L.hx-6,L.hy+16,L.hx-4,L.hy+18); cx.stroke();
  cx.beginPath(); cx.moveTo(L.hx+3,L.hy+10); cx.quadraticCurveTo(L.hx+6,L.hy+16,L.hx+4,L.hy+18); cx.stroke();
  cx.beginPath(); cx.moveTo(L.hx-5,L.hy+18); cx.quadraticCurveTo(L.hx,L.hy+20,L.hx+5,L.hy+18); cx.stroke();
  // Lips
  cx.fillStyle=pal2.lip;
  cx.beginPath(); cx.moveTo(L.hx-8,L.hy+24); cx.quadraticCurveTo(L.hx,L.hy+21,L.hx+8,L.hy+24);
  cx.quadraticCurveTo(L.hx+5,L.hy+29,L.hx,L.hy+30); cx.quadraticCurveTo(L.hx-5,L.hy+29,L.hx-8,L.hy+24); cx.fill();
  cx.beginPath(); cx.moveTo(L.hx-8,L.hy+24); cx.quadraticCurveTo(L.hx,L.hy+27,L.hx+8,L.hy+24);
  cx.strokeStyle=pal2.lip; cx.lineWidth=1; cx.stroke();
  // Blush
  cx.fillStyle='rgba(255,140,130,0.2)';
  cx.beginPath(); cx.ellipse(L.hx-18,L.hy+10,8,5,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(L.hx+18,L.hy+10,8,5,0,0,Math.PI*2); cx.fill();
  // Ears
  cx.fillStyle=d;
  cx.beginPath(); cx.ellipse(L.hx-L.hrx+2,L.hy+4,5,8,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(L.hx+L.hrx-2,L.hy+4,5,8,0,0,Math.PI*2); cx.fill();
}
// ══ CLOTHING ITEMS ══════════════════════════════════════════════════════════
const CATS = [
  {id:'hair',lb:'💇 髮型'},{id:'top',lb:'👕 上衣'},{id:'bottom',lb:'👖 下身'},
  {id:'shoes',lb:'👟 鞋子'},{id:'acc',lb:'✨ 配件'},{id:'bag',lb:'👜 包包'}
];

// Helper shortcuts for cx (main canvas context)
const fr=(x,y,w,h,c)=>{ cx.fillStyle=c; cx.fillRect(x,y,w,h); };
function rr(x,y,w,h,r,c){ cx.fillStyle=c; cx.beginPath(); cx.roundRect(x,y,w,h,r); cx.fill(); }
function el(x,y,rx,ry,c,rot=0){ cx.fillStyle=c; cx.beginPath(); cx.ellipse(x,y,rx,ry,rot,0,Math.PI*2); cx.fill(); }
function ln(x1,y1,x2,y2,c,w=2){ cx.strokeStyle=c; cx.lineWidth=w; cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.stroke(); }

// Clothing items: draw functions draw ON main canvas (cx), using fashion coords
const ITEMS = {
 hair:[
  {id:'none',nm:'無',tg:'',draw:()=>{}},
  {id:'h1',nm:'短髮',tg:'清爽',draw:(g,hc)=>{
    el(110,30,30,26,hc); rr(80,28,60,22,4,hc);
    rr(78,42,10,26,4,hc); rr(132,42,10,26,4,hc);
    el(110,30,26,16,SKIN[ST.skin].s); // face cutout
  }},
  {id:'h2',nm:'長直髮',tg:'優雅',draw:(g,hc)=>{
    el(110,32,30,28,hc); rr(80,28,60,22,4,hc);
    rr(78,38,12,90,4,hc); rr(130,38,12,90,4,hc);
    rr(82,28,56,24,0,hc);
  }},
  {id:'h3',nm:'丸子頭',tg:'可愛',draw:(g,hc)=>{
    el(110,32,30,26,hc); rr(80,28,60,22,4,hc);
    el(110,10,16,16,hc);
    cx.strokeStyle=hc; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(102,22); cx.quadraticCurveTo(110,18,118,22); cx.stroke();
  }},
  {id:'h4',nm:'捲長髮',tg:'浪漫',draw:(g,hc)=>{
    el(110,32,32,28,hc); rr(78,28,64,22,4,hc);
    // Wavy sides
    for(let y=55;y<180;y+=22){
      el(76,y,14,10,hc); el(82,y+11,12,10,hc);
      el(144,y,14,10,hc); el(138,y+11,12,10,hc);
    }
  }},
  {id:'h5',nm:'龐克',tg:'個性',draw:(g,hc)=>{
    // Mohawk spikes

// ══ RENDER ═══════════════════════════════════════════════════════════════
function render() {
  cx.clearRect(0,0,CW,CH);
  // Light background
  const bg = cx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,'#f4f0ea'); bg.addColorStop(1,'#ede8e0');
  cx.fillStyle=bg; cx.fillRect(0,0,CW,CH);
  // Draw bottom first, then body, then clothes on top
  drawClothItem('bottom');
  drawClothItem('shoes');
  drawBody();
  drawClothItem('top');
  drawClothItem('bag');
  drawClothItem('hair', HC[ST.hairCI]);
  drawClothItem('acc');
}

function drawClothItem(cat, extra) {
  const id = ST.sel[cat]; if(!id||id==='none') return;
  const item = ITEMS[cat].find(i=>i.id===id); if(!item) return;
  if(cat==='hair') item.draw(ST.gender, extra);
  else item.draw(ST.gender);
}

// ══ ITEM PREVIEW THUMBNAILS ══════════════════════════════════════════════
function makeThumb(item, cat) {
  const tc = document.createElement('canvas');
  tc.width=72; tc.height=72;
  const tx = tc.getContext('2d');
  // Cream background
  tx.fillStyle='#f4f0ea'; tx.fillRect(0,0,72,72);
  if(item.id==='none'){
    tx.strokeStyle='#ccc'; tx.lineWidth=1.5; tx.setLineDash([4,3]);
    tx.strokeRect(4,4,64,64);
    tx.fillStyle='#bbb'; tx.font='20px sans-serif'; tx.textAlign='center'; tx.textBaseline='middle';
    tx.fillText('✕',36,36);
    return tc;
  }
  // Color swatch + emoji label
  const CMAP = { hair:'#8B5E3C', top:'#4488cc', bottom:'#3355aa', shoes:'#7a5540', acc:'#c8a456', bag:'#cc6644' };
  const EICO = { hair:'💇', top:'👕', bottom:'👖', shoes:'👟', acc:'✨', bag:'👜' };
  const grad = tx.createLinearGradient(0,0,72,72);
  const c = CMAP[cat]||'#888';
  grad.addColorStop(0, c+'cc'); grad.addColorStop(1, c+'66');
  tx.fillStyle=grad; tx.beginPath(); tx.roundRect(8,8,56,56,8); tx.fill();
  tx.font='bold 24px sans-serif'; tx.textAlign='center'; tx.textBaseline='middle';
  tx.fillText(EICO[cat]||'?',36,30);
  tx.fillStyle='#fff'; tx.font='bold 11px sans-serif';
  tx.fillText(item.nm,36,54);
  return tc;
}

// ══ UI ═══════════════════════════════════════════════════════════════════
function buildHairDots() {
  const bar = document.getElementById('hBar');
  bar.innerHTML='<label>髮色</label>';
  HC.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='hdot'+(i===ST.hairCI?' on':'');
    d.style.background=c; bar.appendChild(d);
    d.addEventListener('click',()=>{ ST.hairCI=i; buildHairDots(); render(); });
  });
}

function buildCatTabs() {
  const tabs = document.getElementById('ctabs'); tabs.innerHTML='';
  CATS.forEach(c=>{
    const t=document.createElement('div'); t.className='ctab'+(ST.cat===c.id?' on':'');
    t.textContent=c.lb; tabs.appendChild(t);
    t.addEventListener('click',()=>{ ST.cat=c.id; buildCatTabs(); buildGrid(); });
  });
}

function buildGrid() {
  const grid=document.getElementById('grid'); grid.innerHTML='';
  (ITEMS[ST.cat]||[]).forEach(item=>{
    const card=document.createElement('div');
    card.className='icard'+(ST.sel[ST.cat]===item.id?' sel':'')+(item.id==='none'?' none-card':'');
    card.appendChild(makeThumb(item,ST.cat));
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=item.nm; card.appendChild(nm);
    const tg=document.createElement('div'); tg.className='tg'; tg.textContent=item.tg; card.appendChild(tg);
    card.addEventListener('click',()=>{ ST.sel[ST.cat]=item.id; buildGrid(); render(); });
    grid.appendChild(card);
  });
}

// ══ CONTROLS ═════════════════════════════════════════════════════════════
document.getElementById('gCtrl').addEventListener('click',e=>{
  const b=e.target.closest('.cb'); if(!b) return;
  ST.gender=b.dataset.v;
  document.querySelectorAll('#gCtrl .cb').forEach(x=>x.classList.toggle('active',x.dataset.v===ST.gender));
  render();
});
document.getElementById('sCtrl').addEventListener('click',e=>{
  const b=e.target.closest('.cb'); if(!b) return;
  ST.skin=b.dataset.v;
  document.querySelectorAll('#sCtrl .cb').forEach(x=>x.classList.toggle('active',x.dataset.v===ST.skin));
  render();
});

// ══ RESIZE ═══════════════════════════════════════════════════════════════
function resize() {
  const aw=document.getElementById('aw');
  const W=aw.clientWidth-12, H=aw.clientHeight-12;
  const sc=Math.min(W/CW, H/CH);
  cv.style.width=CW*sc+'px'; cv.style.height=CH*sc+'px';
}
window.addEventListener('resize',()=>{ resize(); });

// ══ TOAST ═══════════════════════════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ══ ACTION BUTTONS ════════════════════════════════════════════════════════
document.getElementById('rndBtn').addEventListener('click',()=>{
  CATS.forEach(c=>{
    const it=ITEMS[c.id].filter(i=>i.id!=='none');
    if(it.length) ST.sel[c.id]=it[Math.floor(Math.random()*it.length)].id;
  });
  ST.hairCI=Math.floor(Math.random()*HC.length);
  buildHairDots(); buildGrid(); render(); toast('🎲 隨機穿搭！');
});
document.getElementById('clrBtn').addEventListener('click',()=>{
  Object.keys(ST.sel).forEach(k=>ST.sel[k]='none');
  buildGrid(); render(); toast('✕ 已清除');
});
document.getElementById('savBtn').addEventListener('click',()=>{
  // Flatten background for PNG
  cx.save(); cx.globalCompositeOperation='destination-over';
  const bg=cx.createLinearGradient(0,0,CW,CH);
  bg.addColorStop(0,'#f4f0ea'); bg.addColorStop(1,'#ede8e0');
  cx.fillStyle=bg; cx.fillRect(0,0,CW,CH); cx.restore();
  const a=document.createElement('a'); a.download='my-outfit.png'; a.href=cv.toDataURL(); a.click();
  render(); toast('💾 儲存完成！');
});

// ══ INIT ══════════════════════════════════════════════════════════════════
resize(); buildHairDots(); buildCatTabs(); buildGrid(); render();
</script>
