<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>水豚拔河！— CapyWorlds</title>
  <style>
    :root {
      --bg: #13100c; --bg2: #1e1812; --accent: #c8a456;
      --text: #e8ddd0; --cyan: #00e5ff; --orange: #ff8040;
      --green: #44ee88; --red: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
      height: 100dvh; overflow: hidden; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
    }
    .screen { display: none; width: 100%; max-width: 480px; padding: 24px 20px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    /* ── Lobby ── */
    .game-title { font-size: 2.4rem; font-weight: 900; color: var(--accent);
      text-shadow: 0 0 24px rgba(200,164,86,0.5); letter-spacing: 2px; }
    .game-sub { font-size: 1rem; color: #907a60; text-align: center; line-height: 1.5; }
    .name-input {
      width: 100%; padding: 14px 18px; font-size: 1.1rem; min-height: 52px;
      background: var(--bg2); border: 2px solid #3d3020; border-radius: 12px;
      color: var(--text); outline: none; text-align: center;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 16px; font-size: 1.2rem; font-weight: 700;
      border: none; border-radius: 14px; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s; letter-spacing: 1px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #e8c060);
      color: #1a0e00; }
    .btn-secondary { background: #2a2018; color: var(--text); border: 1px solid #3d3020; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Matchmaking ── */
    .spinner {
      width: 64px; height: 64px; border-radius: 50%;
      border: 4px solid #3d3020; border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .match-status { font-size: 1.1rem; color: var(--accent); text-align: center; }

    /* ── Game Screen ── */
    #screen-game { gap: 12px; justify-content: space-between; height: 100dvh;
      padding: 16px 20px 24px; }

    .scoreboard {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      background: var(--bg2); border-radius: 12px; padding: 10px 16px; gap: 8px;
    }
    .player-info { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .player-name { font-size: 0.85rem; color: #907a60; max-width: 100px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-wins { font-size: 1.6rem; font-weight: 900; }
    .p1-color { color: var(--cyan); }
    .p2-color { color: var(--orange); }
    .round-info { text-align: center; }
    .round-label { font-size: 0.75rem; color: #6a5a48; }
    .round-num { font-size: 1.3rem; font-weight: 700; color: var(--accent); }

    /* ── Timer ── */
    .timer-bar-wrap {
      width: 100%; background: #1a1510; border-radius: 8px; overflow: hidden;
      height: 8px; border: 1px solid #3d3020;
    }
    .timer-bar { height: 100%; background: var(--accent); transition: width 0.3s linear;
      border-radius: 8px; }
    .timer-text { font-size: 1.6rem; font-weight: 900; color: var(--accent);
      text-align: center; min-width: 60px; }

    /* ── Rope Area ── */
    .rope-area {
      width: 100%; flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .rope-names { width: 100%; display: flex; justify-content: space-between;
      font-size: 0.8rem; font-weight: 700; padding: 0 4px; }
    .rope-track {
      width: 100%; height: 48px; border-radius: 24px; position: relative;
      overflow: hidden; border: 2px solid #3d3020;
      background: linear-gradient(90deg, rgba(0,229,255,0.15) 0%, #1a1510 50%, rgba(255,128,64,0.15) 100%);
    }
    .rope-fill {
      position: absolute; top: 0; bottom: 0; left: 0; right: 0;
      display: flex;
    }
    .rope-fill-p1 { background: rgba(0,229,255,0.35); transition: width 0.15s ease; }
    .rope-fill-p2 { background: rgba(255,128,64,0.35); flex: 1; }
    .rope-center { position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); width: 3px; height: 100%; background: #3d3020; }
    .rope-marker {
      position: absolute; top: 50%; font-size: 2rem; line-height: 1;
      transform: translate(-50%, -50%);
      transition: left 0.15s cubic-bezier(0.25,0.46,0.45,0.94);
      filter: drop-shadow(0 0 8px rgba(200,164,86,0.8));
    }
    .rope-arrows { width: 100%; display: flex; justify-content: space-between;
      font-size: 0.75rem; padding: 0 4px; }

    /* ── Countdown overlay ── */
    .countdown-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; z-index: 100;
    }
    .countdown-overlay.hidden { display: none; }
    .countdown-num {
      font-size: clamp(5rem, 25vw, 8rem); font-weight: 900; line-height: 1;
      color: var(--accent); text-shadow: 0 0 40px rgba(200,164,86,0.7);
    }
    .countdown-label { font-size: 1.2rem; color: #907a60; }
    @keyframes pop { 0%{transform:scale(1.4);opacity:0} 100%{transform:scale(1);opacity:1} }

    /* ── Tap Button ── */
    .tap-btn {
      width: 100%; height: 120px; border-radius: 24px; border: none;
      font-size: 2rem; font-weight: 900; cursor: pointer;
      background: linear-gradient(135deg, #1e5080, #0a2a44);
      color: var(--cyan); border: 3px solid var(--cyan);
      box-shadow: 0 0 24px rgba(0,229,255,0.3);
      transition: transform 0.05s, box-shadow 0.05s;
      position: relative; overflow: hidden; letter-spacing: 2px;
    }
    .tap-btn:active, .tap-btn.tapped { transform: scale(0.94);
      box-shadow: 0 0 40px rgba(0,229,255,0.6); }
    .tap-btn.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .tap-count-label { font-size: 0.9rem; color: #4a8aaa; margin-top: 4px; }

    /* ── Result / Game Over ── */
    .result-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 200; padding: 24px;
    }
    .result-overlay.hidden { display: none; }
    .result-emoji { font-size: 5rem; animation: pop 0.5s ease; }
    .result-title { font-size: 2rem; font-weight: 900; text-align: center; }
    .result-sub { font-size: 1rem; color: #907a60; text-align: center; }
    .result-score { font-size: 3rem; font-weight: 900; color: var(--accent); }
    .win-text { color: var(--green); }
    .lose-text { color: var(--red); }
    .draw-text { color: var(--accent); }

    .back-link { font-size: 0.85rem; color: #907a60; text-decoration: none;
      border-bottom: 1px solid #3d3020; padding: 10px 14px; display: inline-block;
      min-height: 44px; line-height: 1.5; }
    .back-link:hover, .back-link:active { color: var(--accent); }

    /* ── Leaderboard & Stats ── */
    .lb-box { width: 100%; background: var(--bg2); border-radius: 14px;
      padding: 14px 16px; border: 1px solid #3d3020; }
    .lb-title { font-size: 0.85rem; font-weight: 700; color: var(--accent);
      letter-spacing: 1px; margin-bottom: 8px; }
    .lb-row { display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #2a2018; font-size: 0.85rem;
      min-height: 40px; }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { width: 24px; text-align: center; color: #6a5a48; font-size: 0.8rem; }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: 700; color: var(--accent); }
    .lb-empty { color: #6a5a48; font-size: 0.85rem; text-align: center; padding: 8px; }
    .my-stats { width: 100%; display: flex; justify-content: space-around;
      background: var(--bg2); border-radius: 12px; padding: 12px 16px;
      border: 1px solid #3d3020; }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
    .stat-lbl { font-size: 0.8rem; color: #6a5a48; }
    .player-total { font-size: 0.8rem; color: #6a5a48; margin-top: 2px; }

    .tap-ripple {
      position: absolute; border-radius: 50%;
      background: rgba(0,229,255,0.4); pointer-events: none;
      animation: ripple 0.4s ease-out forwards;
    }
    @keyframes ripple {
      from { transform: scale(0); opacity: 1; }
      to { transform: scale(4); opacity: 0; }
    }

    .waiting-hint { font-size: 0.85rem; color: #6a5a48; text-align: center; }

    /* ── Mobile touch improvements ── */
    button, .back-link { touch-action: manipulation; }
    .btn + .btn, .btn + .back-link { margin-top: 8px; }
    .result-overlay { padding: clamp(16px, 5vw, 24px); }
    @media (max-width: 400px) {
      .player-name { max-width: 80px; }
      .scoreboard { gap: 4px; }
    }
  </style>
</head>
<body>

<!-- ── Lobby ── -->
<div id="screen-lobby" class="screen active">
  <div class="game-title">🦫 水豚拔河！</div>
  <div class="game-sub">隨機配對，瘋狂點擊<br>把對手的水豚拉過來！</div>
  <input class="name-input" id="name-input" type="text" maxlength="16"
    placeholder="輸入你的暱稱" autocomplete="off" spellcheck="false">
  <button class="btn btn-primary" id="btn-find"
    ontouchend="onFindTap(event)" onclick="onFindTap(event)">尋找對手</button>
  <a href="../" class="back-link">← 返回遊戲列表</a>
  <div class="my-stats">
    <div class="stat-item"><div class="stat-val" id="my-total-wins">0</div><div class="stat-lbl">總勝場</div></div>
    <div class="stat-item"><div class="stat-val" id="my-streak">0</div><div class="stat-lbl">當前連勝</div></div>
    <div class="stat-item"><div class="stat-val" id="my-best">0</div><div class="stat-lbl">最佳連勝</div></div>
  </div>
  <div class="lb-box">
    <div class="lb-title">🏆 拔河王排行榜</div>
    <div id="lb-list"><div class="lb-empty">載入中…</div></div>
  </div>
</div>

<!-- ── Matchmaking ── -->
<div id="screen-match" class="screen">
  <div class="spinner"></div>
  <div class="match-status" id="match-status">尋找對手中…</div>
  <div class="waiting-hint">通常不到 30 秒</div>
  <button class="btn btn-secondary" id="btn-cancel"
    ontouchend="onCancelTap(event)" onclick="onCancelTap(event)">取消</button>
</div>

<!-- ── Game ── -->
<div id="screen-game" class="screen">
  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="player-info">
      <div class="player-name p1-color" id="p1-name">玩家1</div>
      <div class="player-wins p1-color" id="p1-wins">0</div>
      <div class="player-total" id="p1-total"></div>
    </div>
    <div class="round-info">
      <div class="round-label">第</div>
      <div class="round-num" id="round-num">1</div>
      <div class="round-label">局</div>
    </div>
    <div class="player-info">
      <div class="player-name p2-color" id="p2-name">玩家2</div>
      <div class="player-wins p2-color" id="p2-wins">0</div>
      <div class="player-total" id="p2-total"></div>
    </div>
  </div>

  <!-- Timer -->
  <div style="width:100%;display:flex;align-items:center;gap:12px;">
    <div class="timer-bar-wrap" style="flex:1">
      <div class="timer-bar" id="timer-bar" style="width:100%"></div>
    </div>
    <div class="timer-text" id="timer-text">30</div>
  </div>

  <!-- Rope -->
  <div class="rope-area">
    <div class="rope-names">
      <span class="p1-color" id="rope-p1-label">← 玩家1</span>
      <span class="p2-color" id="rope-p2-label">玩家2 →</span>
    </div>
    <div class="rope-track" id="rope-track">
      <div class="rope-fill">
        <div class="rope-fill-p1" id="rope-fill-p1" style="width:50%"></div>
        <div class="rope-fill-p2"></div>
      </div>
      <div class="rope-center"></div>
      <div class="rope-marker" id="rope-marker" style="left:50%">🦫</div>
    </div>
    <div class="rope-arrows">
      <span class="p1-color" style="font-size:1rem">◀◀</span>
      <span style="font-size:0.75rem;color:#6a5a48">拉繩方向</span>
      <span class="p2-color" style="font-size:1rem">▶▶</span>
    </div>
  </div>

  <!-- Tap Button -->
  <button class="tap-btn disabled" id="tap-btn"
    ontouchend="onTap(event)" onclick="onTap(event)">點我！</button>
  <div class="tap-count-label">本局點擊：<span id="tap-count-display">0</span> 下</div>
</div>

<!-- ── Countdown Overlay ── -->
<div class="countdown-overlay hidden" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
  <div class="countdown-label" id="countdown-label">準備好了嗎？</div>
</div>

<!-- ── Result Overlay ── -->
<div class="result-overlay hidden" id="result-overlay">
  <div class="result-emoji" id="result-emoji">🦫</div>
  <div class="result-title" id="result-title">你贏了！</div>
  <div class="result-score" id="result-score"></div>
  <div class="result-sub" id="result-sub"></div>
  <button class="btn btn-primary" id="btn-again" style="max-width:320px"
    ontouchend="onAgainTap(event)" onclick="onAgainTap(event)">再玩一局</button>
  <a href="../" class="back-link">返回遊戲列表</a>
</div>

<script>
// ── Config ──────────────────────────────────────────────
const API = '';
const POLL_MS = 300;
const ROUND_SEC = 30;
const GAME_ID = 'capy-tug';

// ── State ───────────────────────────────────────────────
let pid = localStorage.getItem('capy_tug_pid') || (() => {
  const id = Math.random().toString(36).slice(2) + Date.now().toString(36);
  localStorage.setItem('capy_tug_pid', id);
  return id;
})();

let roomId = null;
let myRole = null;       // 'p1' | 'p2'
let pollTimer = null;
let localTaps = 0;
let lastSentTaps = 0;
let tapSendTimer = null;
let gameState = null;    // last polled state object
let countdownInterval = null;
let isPlaying = false;

// ── Win tracking ──────────────────────────────────────────
let myTotalWins = parseInt(localStorage.getItem('capy_tug_total_wins')||'0');
let myStreak    = parseInt(localStorage.getItem('capy_tug_streak')||'0');
let myBestStreak= parseInt(localStorage.getItem('capy_tug_best')||'0');
let lbData = [];

function updateMyStats(){
  document.getElementById('my-total-wins').textContent=myTotalWins;
  document.getElementById('my-streak').textContent=myStreak;
  document.getElementById('my-best').textContent=myBestStreak;
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
async function fetchLeaderboard(){
  try{
    const res=await fetch(`/leaderboard/${GAME_ID}`);
    lbData=await res.json(); renderLeaderboard();
  }catch{ document.getElementById('lb-list').innerHTML='<div class="lb-empty">載入失敗</div>'; }
}
function renderLeaderboard(){
  const el=document.getElementById('lb-list');
  if(!lbData||!lbData.length){el.innerHTML='<div class="lb-empty">還沒有紀錄，快成為拔河王！</div>';return;}
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=lbData.slice(0,10).map((r,i)=>`
    <div class="lb-row">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-name">${escHtml(r.name)}</div>
      <div class="lb-score">${r.score} 勝</div>
    </div>`).join('');
}
async function submitScore(){
  const name=localStorage.getItem('capy_tug_name')||'水豚玩家';
  try{
    await fetch(`/leaderboard/${GAME_ID}`,{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,score:myTotalWins})});
    fetchLeaderboard();
  }catch{}
}

// ── Screens ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

// ── Lobby ───────────────────────────────────────────────
document.getElementById('name-input').value =
  localStorage.getItem('capy_tug_name') || '';

function onFindTap(e) {
  if (e.type === 'touchend') e.preventDefault();
  const name = document.getElementById('name-input').value.trim() || '水豚玩家';
  localStorage.setItem('capy_tug_name', name);
  startMatchmaking(name);
}

function onCancelTap(e) {
  if (e.type === 'touchend') e.preventDefault();
  stopPolling();
  roomId = null;
  showScreen('screen-lobby');
}

function onAgainTap(e) {
  if (e.type === 'touchend') e.preventDefault();
  document.getElementById('result-overlay').classList.add('hidden');
  roomId = null;
  myRole = null;
  localTaps = 0;
  lastSentTaps = 0;
  isPlaying = false;
  lastState = null;
  prevRound = 1;
  updateMyStats(); fetchLeaderboard();
  showScreen('screen-lobby');
}

// ── Matchmaking ──────────────────────────────────────────
async function startMatchmaking(name) {
  showScreen('screen-match');
  document.getElementById('match-status').textContent = '尋找對手中…';

  try {
    const res = await fetch(`${API}/match/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pid, name })
    });
    const data = await res.json();
    if (data.error) {
      document.getElementById('match-status').textContent = data.error;
      return;
    }
    roomId = data.room_id;
    myRole = data.role;
    document.getElementById('match-status').textContent =
      data.state === 'waiting' ? '等待對手加入… (房間碼: ' + roomId + ')' : '配對成功！';
    startPolling();
  } catch (err) {
    document.getElementById('match-status').textContent = '連線失敗，請重試';
  }
}

// ── Polling ──────────────────────────────────────────────
function startPolling() {
  stopPolling();
  pollOnce();
  pollTimer = setInterval(pollOnce, POLL_MS);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollOnce() {
  if (!roomId) return;
  try {
    const res = await fetch(`${API}/match/${roomId}?pid=${pid}`);
    if (!res.ok) return;
    const st = await res.json();
    handleState(st);
  } catch {}
}

// ── State Handler ────────────────────────────────────────
let lastState = null;
let shownCountdown = -1;

function handleState(st) {
  gameState = st;

  if (st.state === 'waiting') {
    document.getElementById('match-status').textContent =
      '等待對手加入… 房間碼：' + roomId;
    return;
  }

  // Show game screen once opponent joins
  if (lastState === 'waiting' || lastState === null) {
    showScreen('screen-game');
    updateNames(st);
  }
  lastState = st.state;

  updateScoreboard(st);
  updateRope(st);

  if (st.state === 'starting') {
    isPlaying = false;
    setTapEnabled(false);
    const secLeft = Math.ceil(st.time_left / 1000);
    showCountdown(secLeft);
  } else if (st.state === 'playing') {
    hideCountdown();
    isPlaying = true;
    setTapEnabled(true);
    updateTimer(st);
  } else if (st.state === 'done') {
    stopPolling();
    isPlaying = false;
    setTapEnabled(false);
    hideCountdown();
    showGameOver(st);
  }
}

function updateNames(st) {
  document.getElementById('p1-name').textContent = st.p1_name || '玩家1';
  document.getElementById('p2-name').textContent = st.p2_name || '玩家2';
  document.getElementById('rope-p1-label').textContent = '← ' + (st.p1_name || '玩家1');
  document.getElementById('rope-p2-label').textContent = (st.p2_name || '玩家2') + ' →';
  // Highlight "you"
  const myNameEl = document.getElementById(myRole + '-name');
  if (myNameEl) myNameEl.style.fontWeight = '900';
  // Show historical records
  const myLbEntry=lbData.find(r=>r.name===(myRole==='p1'?st.p1_name:st.p2_name));
  const oppLbEntry=lbData.find(r=>r.name===(myRole==='p1'?st.p2_name:st.p1_name));
  const myRec=myLbEntry?myLbEntry.score+'勝':myTotalWins+'勝';
  const oppRec=oppLbEntry?oppLbEntry.score+'勝':'新手';
  document.getElementById('p1-total').textContent=myRole==='p1'?'歷史：'+myRec:'歷史：'+oppRec;
  document.getElementById('p2-total').textContent=myRole==='p2'?'歷史：'+myRec:'歷史：'+oppRec;
}

function updateScoreboard(st) {
  document.getElementById('p1-wins').textContent = st.p1_wins;
  document.getElementById('p2-wins').textContent = st.p2_wins;
  document.getElementById('round-num').textContent = st.round;
}

function updateRope(st) {
  const pos = st.rope_pos; // 0=p1 side, 100=p2 side
  document.getElementById('rope-fill-p1').style.width = pos + '%';
  document.getElementById('rope-marker').style.left = pos + '%';
}

function updateTimer(st) {
  const left = Math.max(0, st.time_left);
  const pct = (left / (ROUND_SEC * 1000)) * 100;
  document.getElementById('timer-bar').style.width = pct + '%';
  document.getElementById('timer-text').textContent = Math.ceil(left / 1000);
  const col = pct > 50 ? 'var(--accent)' : pct > 25 ? '#ff9900' : 'var(--red)';
  document.getElementById('timer-bar').style.background = col;
  document.getElementById('timer-text').style.color = col;
}

// ── Countdown ────────────────────────────────────────────
function showCountdown(sec) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-num');
  const labelEl = document.getElementById('countdown-label');
  overlay.classList.remove('hidden');
  if (sec > 0) {
    numEl.textContent = sec;
    labelEl.textContent = '準備好了嗎？';
  } else {
    numEl.textContent = 'GO!';
    numEl.style.color = 'var(--green)';
    labelEl.textContent = '瘋狂點擊！';
  }
}

function hideCountdown() {
  document.getElementById('countdown-overlay').classList.add('hidden');
  document.getElementById('countdown-num').style.color = 'var(--accent)';
}

// ── Tapping ──────────────────────────────────────────────
function setTapEnabled(on) {
  const btn = document.getElementById('tap-btn');
  if (on) {
    btn.classList.remove('disabled');
    btn.textContent = '點我！';
  } else {
    btn.classList.add('disabled');
    btn.textContent = '等待中…';
  }
}

function onTap(e) {
  if (e.type === 'touchend') e.preventDefault();
  if (!isPlaying) return;
  localTaps++;
  document.getElementById('tap-count-display').textContent = localTaps;

  // Visual feedback
  const btn = document.getElementById('tap-btn');
  btn.classList.add('tapped');
  setTimeout(() => btn.classList.remove('tapped'), 60);

  // Ripple
  const rect = btn.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX - rect.left : rect.width / 2;
  const cy = e.touches ? e.touches[0].clientY - rect.top : rect.height / 2;
  const r = document.createElement('span');
  r.className = 'tap-ripple';
  r.style.cssText = `width:60px;height:60px;left:${cx-30}px;top:${cy-30}px`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 400);

  // Optimistic rope update
  if (gameState) {
    const diff = myRole === 'p1'
      ? (gameState.p1_taps + localTaps - lastSentTaps) - gameState.p2_taps
      : gameState.p1_taps - (gameState.p2_taps + localTaps - lastSentTaps);
    // No need to fake update; server poll is fast enough
  }

  // Debounce tap send
  clearTimeout(tapSendTimer);
  tapSendTimer = setTimeout(sendTaps, 120);
}

async function sendTaps() {
  if (!roomId || !isPlaying) return;
  const t = localTaps;
  try {
    await fetch(`${API}/match/${roomId}/tap`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pid, taps: t })
    });
    lastSentTaps = t;
  } catch {}
}

// ── Game Over ────────────────────────────────────────────
function showGameOver(st) {
  const myWins = myRole === 'p1' ? st.p1_wins : st.p2_wins;
  const oppWins = myRole === 'p1' ? st.p2_wins : st.p1_wins;
  const iWon = st.winner === myRole;
  // Track wins
  if (iWon) {
    myTotalWins++; myStreak++;
    if (myStreak > myBestStreak) myBestStreak = myStreak;
    localStorage.setItem('capy_tug_total_wins', myTotalWins);
    localStorage.setItem('capy_tug_streak', myStreak);
    localStorage.setItem('capy_tug_best', myBestStreak);
    submitScore();
  } else {
    myStreak = 0; localStorage.setItem('capy_tug_streak', 0);
  }
  const overlay = document.getElementById('result-overlay');
  document.getElementById('result-emoji').textContent = iWon ? '🎉' : '😢';
  document.getElementById('result-title').textContent = iWon ? '你贏了！' : '你輸了…';
  document.getElementById('result-title').className =
    'result-title ' + (iWon ? 'win-text' : 'lose-text');
  document.getElementById('result-score').textContent = myWins + ' : ' + oppWins;
  const oppName = myRole === 'p1' ? (st.p2_name || '對手') : (st.p1_name || '對手');
  const streakMsg = iWon && myStreak > 1 ? ` 🔥連勝${myStreak}場！` : '';
  document.getElementById('result-sub').textContent =
    iWon ? `恭喜擊敗 ${oppName}！${streakMsg}` : `敗給了 ${oppName}，加油！`;
  overlay.classList.remove('hidden');
}

// ── Round transition reset ───────────────────────────────
let prevRound = 1;
setInterval(() => {
  if (gameState && gameState.round !== prevRound) {
    prevRound = gameState.round;
    localTaps = 0;
    lastSentTaps = 0;
    document.getElementById('tap-count-display').textContent = '0';
  }
}, 200);

// ── Init ─────────────────────────────────────────────────
updateMyStats();
fetchLeaderboard();
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') onFindTap({ type: 'click', preventDefault: () => {} });
});
</script>
