<script>
'use strict';

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ─── AUDIO ───────────────────────────────────────────────────────────────────
const MUS_TRAVEL_LIST = [
  'bgm/mfcc-ethereal-landscape-space-music-358838.mp3',
  'bgm/ObservingTheStar.ogg',
  'bgm/through space.ogg',
];
const MUS_BATTLE = 'bgm/geoffharvey-andromeda-space-adventure-403080.mp3';
const audio = {
  buffers: {}, music: null, musicSrc: '',
  muted: false, _inited: false, _battleTimer: 0,
  _travelIdx: 0,
  init() {
    if (this._inited) return;
    this._inited = true;
    const _S = '../../assets/sfx/';
    const sfx = {
      shoot:      _S+'GameSFX3/Weapon/laser/Retro Gun Laser SingleShot 01.wav',
      explode:    _S+'GameSFX1/Explosion/Retro Explosion Short 01.wav',
      explodeBig: _S+'GameSFX1/Explosion/Retro Explosion Long 02.wav',
      hit:        _S+'GameSFX2/Impact/Retro Impact 20.wav',
      pickup:     _S+'GameSFX3/PickUp/Retro PickUp 10.wav',
      warpcore:   _S+'GameSFX3/PowerUp/Retro PowerUP 09.wav',
      heal:       _S+'GameSFX3/PickUp/Retro PickUp 18.wav',
      buy:        _S+'GameSFX1/Events/Retro Event UI 01.wav',
    };
    for (const [id, url] of Object.entries(sfx)) {
      const el = new Audio(url); el.preload = 'auto';
      this.buffers[id] = el;
    }
  },
  play(id, vol=1, rate=1, maxMs=0) {
    if (this.muted || !this.buffers[id]) return;
    const el = new Audio(this.buffers[id].src);
    el.volume = Math.min(1, vol * 0.6);
    el.playbackRate = rate;
    el.play().catch(()=>{});
    if (maxMs > 0) setTimeout(() => { el.pause(); el.src = ''; }, maxMs);
  },
  playMusic(src) {
    if (src === this.musicSrc) return;
    this.musicSrc = src;
    if (this.music) { this.music.pause(); this.music = null; }
    if (!src || this.muted) return;
    const el = new Audio(src);
    el.volume = 0.3;
    el.play().catch(()=>{});
    el.addEventListener('ended', () => {
      if (this.musicSrc !== src) return; // already switched to battle
      this._travelIdx = (this._travelIdx + 1) % MUS_TRAVEL_LIST.length;
      this.musicSrc = '';
      this.playMusic(MUS_TRAVEL_LIST[this._travelIdx]);
    });
    this.music = el;
  },
  toggleMute() {
    this.muted = !this.muted;
    if (this.music) {
      if (this.muted) this.music.pause();
      else this.music.play().catch(()=>{});
    }
    document.getElementById('mute-btn').textContent = (this.muted ? '🔇 靜音' : '🔊 音效');
    return this.muted;
  },
  tickMusic(dt) {
    if (!this._inited) return;
    if (state === 'title' || state === 'shop') { this.playMusic(MUS_TRAVEL_LIST[this._travelIdx]); return; }
    if (state === 'gameover' || state === 'victory') { this.playMusic(''); return; }
    if (state !== 'playing') return;
    let enemyNear = false;
    for (const en of dynamicEnemies) {
      if (en.alive && dist2(player.x,player.y,en.x,en.y) < 600**2) { enemyNear=true; break; }
    }
    if (!enemyNear) {
      for (const [,chunk] of chunks) {
        for (const en of chunk.enemies) {
          if (en.alive && dist2(player.x,player.y,en.x,en.y) < 500**2) { enemyNear=true; break; }
        }
        if (enemyNear) break;
      }
    }
    if (enemyNear) this._battleTimer = 4;
    else if (this._battleTimer > 0) this._battleTimer -= dt;
    this.playMusic(this._battleTimer > 0 ? MUS_BATTLE : MUS_TRAVEL_LIST[this._travelIdx]);
  }
};
document.getElementById('mute-btn').addEventListener('click', ()=>audio.toggleMute());
window.addEventListener('keydown', e=>{ audio.init(); if(e.code==='KeyM') audio.toggleMute(); });

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const CHUNK = 1800;
const DRAG = 0.93;
const BOOST_FORCE_MULT = 3.5;
const BOOST_MAX_SPD = 900;
const BOOST_FUEL_USE = 35;   // per second
const BOOST_FUEL_REGEN = 18; // per second
const BULLET_SPEED = 650;
const BULLET_LIFE = 1.2;
const BULLET_DMG = 12;
const FIRE_RATE = 0.22;
const SHIELD_REGEN = 8;
const SHIELD_REGEN_DELAY = 3;
const BH_RADIUS = 200;
const BH_DMG = 50;

// ─── DIFFICULTY CONFIGS ───────────────────────────────────────────────────────
const DIFFICULTIES = [
  {name:'星際見習', sub:'Scout',     hpMult:0.60, dmgMult:0.60, countMult:0.7,  bhMult:0.6,  creditMult:0.8,  desc:'敵人較弱，適合初次探索',         color:'#44ffaa'},
  {name:'一般任務', sub:'Normal',    hpMult:1.00, dmgMult:1.00, countMult:1.0,  bhMult:1.0,  creditMult:1.0,  desc:'標準挑戰難度',                   color:'#88ccff'},
  {name:'精英部隊', sub:'Veteran',   hpMult:1.35, dmgMult:1.30, countMult:1.3,  bhMult:1.3,  creditMult:1.3,  desc:'精銳敵人，黑洞引力增強',         color:'#ffcc44'},
  {name:'黑洞前線', sub:'Hard',      hpMult:1.75, dmgMult:1.65, countMult:1.6,  bhMult:1.7,  creditMult:1.65, desc:'強敵蜂擁，黑洞更危險',           color:'#ff8844'},
  {name:'虛空惡夢', sub:'Nightmare', hpMult:2.30, dmgMult:2.10, countMult:2.0,  bhMult:2.5,  creditMult:2.2,  desc:'極限挑戰，幾乎無法生存',         color:'#ff4466'},
];
let difficulty = 1; // 0=Scout … 4=Nightmare

// ─── RELICS ───────────────────────────────────────────────────────────────────
const RELIC_DEFS = [
  {id:'photon_core',  name:'光子核心',  desc:'子彈速度 +50%',          color:'#00ccff'},
  {id:'nanobots',     name:'奈米機器人',desc:'每6秒自動修復1點船殼',   color:'#44ff88'},
  {id:'energy_lens',  name:'能量透鏡',  desc:'每次射擊額外發射1顆子彈',color:'#ffdd44'},
  {id:'revenge_pod',  name:'復仇艙',    desc:'受傷時反射4發子彈',      color:'#ff4488'},
  {id:'void_crystal', name:'虛空晶石',  desc:'殺敵後30%機率掉落晶體',  color:'#aa44ff'},
  {id:'overclock',    name:'超頻芯片',  desc:'射速 +30%',              color:'#ff8800'},
];

const WARP_CORE_POSITIONS = [
  {x:2200, y:1000},    // 近 — 適合前幾局達成
  {x:4800, y:-2400},   // 中距離
  {x:-4200,y:3800},    // 中距離（另一方向）
  {x:-5500,y:-4500},   // 遠
  {x:8500, y:-3800},   // 最遠
];
const ESCAPE_PORTAL_POS = {x:12000,y:0};

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = 'title'; // title, playing, paused, shop, gameover, victory
let gameTime = 0;
let playTime = 0;
let statusMsg = '';
let statusTimer = 0;
let shopStation = null;
// Milestone flags (reset each run)
let milestones = { firstKill:false, firstMine:false, firstStation:false };

// ─── RNG ──────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function chunkSeed(cx, cy) {
  return (cx * 73856093) ^ (cy * 19349663) ^ 0xDEADBEEF;
}

// ─── META PROGRESSION (cross-run, localStorage) ──────────────────────────────
const META_KEY = 'voidNavigator_meta';
const META_DEFAULTS = {
  credits: 0,
  startSpeed: 0, startShield: 0, startHull: 0,
  oreBonus: 0, fuelBonus: 0, fireBonus: 0,
  coreDetector: 0, startKit: 0,
  totalRuns: 0, bestCores: 0, bestTime: 0,
};
const META_UPGRADES = [
  {id:'startSpeed',  name:'推進核心',   desc:'每局起始推力 +15%',  max:3, costs:[30,60,100]},
  {id:'startShield', name:'護盾強化',   desc:'每局最大護盾 +25',   max:3, costs:[25,50,85]},
  {id:'startHull',   name:'船殼強化',   desc:'每局最大船殼 +25',   max:3, costs:[25,50,85]},
  {id:'oreBonus',    name:'採礦晶片',   desc:'每局礦石收益 +20%',  max:3, costs:[20,40,70]},
  {id:'fuelBonus',   name:'燃料槽擴充', desc:'每局加速器燃料 +30%',max:3, costs:[20,45,75]},
  {id:'fireBonus',   name:'武器校準',   desc:'每局射速 +15%',      max:3, costs:[30,55,90]},
  {id:'coreDetector',name:'核心偵測器', desc:'HUD 顯示最近核心方向',max:1, costs:[80]},
  {id:'startKit',    name:'應急補給包', desc:'開局攜帶護盾×1+修復包×1',max:1, costs:[50]},
];
let meta = {...META_DEFAULTS};

function loadMeta() {
  try { const s=localStorage.getItem(META_KEY); if(s) meta={...META_DEFAULTS,...JSON.parse(s)}; }
  catch(e){}
}
function saveMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch(e){}
}
function metaLevel(id) { return meta[id]||0; }
function metaNextCost(id) {
  const u=META_UPGRADES.find(u=>u.id===id);
  const lv=metaLevel(id);
  return (lv<u.max) ? u.costs[lv] : null;
}

function calcRunRewards() {
  const oreC   = Math.floor(player.ore * 0.5);
  const crystC = Math.floor(player.crystal * 2);
  const coreC  = player.warpCores * 50;
  const timeC  = Math.floor(playTime / 12);
  const diffMult = DIFFICULTIES[difficulty].creditMult;
  const total  = Math.floor((oreC + crystC + coreC + timeC) * diffMult);
  return {oreC, crystC, coreC, timeC, total, diffMult};
}

function openMetaShop(mode) {
  const rewards = calcRunRewards();
  meta.credits  = (meta.credits||0) + rewards.total;
  meta.totalRuns = (meta.totalRuns||0) + 1;
  if (player.warpCores > (meta.bestCores||0)) meta.bestCores = player.warpCores;
  if (mode==='victory' || playTime > (meta.bestTime||0)) meta.bestTime = Math.floor(playTime);
  saveMeta();

  // Credits display
  document.getElementById('meta-credits-display').textContent =
    `★ 星際幣：${meta.credits}`;
  // Breakdown
  const earnDiv = document.getElementById('meta-earned');
  earnDiv.innerHTML =
    `本局獲得：<span>+${rewards.total} ★</span> &nbsp;|&nbsp; ` +
    `礦石換算 <span>+${rewards.oreC}</span> &nbsp;` +
    `晶體換算 <span>+${rewards.crystC}</span> &nbsp;` +
    `翹曲核心 <span>+${rewards.coreC}</span> &nbsp;` +
    `存活時間 <span>+${rewards.timeC}</span> &nbsp;` +
    `難度加成 <span>×${rewards.diffMult.toFixed(1)} (${DIFFICULTIES[difficulty].name})</span>`;
  renderMetaShop();
  document.getElementById('meta-overlay').style.display = 'block';
}

function renderMetaShop() {
  document.getElementById('meta-credits-display').textContent = `★ 星際幣：${meta.credits}`;
  const grid = document.getElementById('meta-grid');
  grid.innerHTML = '';
  for (const u of META_UPGRADES) {
    const lv  = metaLevel(u.id);
    const cost = metaNextCost(u.id);
    const maxed = lv >= u.max;
    const canAfford = !maxed && meta.credits >= cost;
    const div = document.createElement('div');
    div.className = 'meta-item' + (maxed?' maxed':(!canAfford?' cant-afford':''));
    // Level dots
    const dots = Array.from({length:u.max},(_,i)=>
      `<div class="meta-level-dot${i<lv?' filled':''}"></div>`).join('');
    div.innerHTML = `
      <div class="meta-item-name">${u.name}</div>
      <div class="meta-item-desc">${u.desc}</div>
      <div class="meta-item-level">${dots}
        <span style="font-size:10px;color:#665533;margin-left:4px">${lv}/${u.max}</span>
      </div>
      <div class="meta-item-cost${maxed?' free':''}">${maxed?'✓ 已解鎖最高級':'★ '+cost}</div>`;
    if (!maxed && canAfford) {
      div.onclick = () => {
        meta.credits -= cost;
        meta[u.id] = lv + 1;
        saveMeta();
        renderMetaShop();
      };
    }
    grid.appendChild(div);
  }
}

function closeMetaShop() {
  document.getElementById('meta-overlay').style.display = 'none';
  startGame();
}
document.getElementById('meta-close').addEventListener('click', closeMetaShop);

// Apply meta bonuses to a freshly created player
function applyMeta(p) {
  p.thrustForce  *= (1 + metaLevel('startSpeed')*0.15);
  p.maxShield    += metaLevel('startShield') * 25;
  p.shield        = p.maxShield;
  p.maxHull      += metaLevel('startHull') * 25;
  p.hull          = p.maxHull;
  p.maxBoostFuel *= (1 + metaLevel('fuelBonus') * 0.30);
  p.boostFuel     = p.maxBoostFuel;
  if (metaLevel('startKit')) {
    // Start kit handled in startGame via item drops near spawn
    p._startKit = true;
  }
}

loadMeta();

// ─── STARFIELD + NEBULA ───────────────────────────────────────────────────────
const nebulas = [];
(function initNebulas() {
  const rng = mulberry32(77);
  const cols = ['rgba(40,0,80','rgba(0,30,80','rgba(80,10,0','rgba(0,60,40'];
  for (let i = 0; i < 8; i++) {
    nebulas.push({
      x: (rng()-0.5)*8000, y: (rng()-0.5)*8000,
      rx: 400+rng()*600, ry: 250+rng()*450,
      angle: rng()*Math.PI,
      color: cols[Math.floor(rng()*cols.length)],
      alpha: 0.08+rng()*0.10,
      speed: 0.04+rng()*0.06
    });
  }
})();

const stars = [];
(function initStars() {
  const rng = mulberry32(42);
  const layers = [{n:200,speed:0.1,sz:1},{n:100,speed:0.25,sz:1.5},{n:50,speed:0.5,sz:2}];
  for (const l of layers) {
    for (let i = 0; i < l.n; i++) {
      const rv = rng();
      const color = rv < 0.07 ? `hsl(${200+Math.floor(rng()*40)},85%,82%)` // ice blue
                  : rv < 0.12 ? `hsl(${Math.floor(rng()*25)},75%,78%)`       // red-orange
                  : rv < 0.15 ? `hsl(55,90%,85%)`                             // yellow
                  : '#ffffff';
      stars.push({
        x: rng()*4000-2000, y: rng()*4000-2000,
        speed: l.speed, sz: l.sz,
        brightness: 0.4+rng()*0.6,
        color, twinkleOff: rng()*Math.PI*2
      });
    }
  }
})();

// ─── WORLD CHUNKS ─────────────────────────────────────────────────────────────
const chunks = new Map();
const loadedChunks = new Set();

function chunkKey(cx, cy) { return cx+','+cy; }

function distTier(cx, cy) {
  return Math.floor(Math.sqrt(cx*cx+cy*cy) / 2);
}

function generateChunk(cx, cy) {
  const key = chunkKey(cx, cy);
  if (chunks.has(key)) return;
  const rng = mulberry32(chunkSeed(cx, cy));
  const tier = distTier(cx, cy);
  const ox = cx * CHUNK, oy = cy * CHUNK;

  const asteroids = [];
  const numAst = Math.floor(rng()*8)+5;
  for (let i = 0; i < numAst; i++) {
    const ax = ox + rng()*CHUNK;
    const ay = oy + rng()*CHUNK;
    const r = 20 + rng()*40;
    const verts = [];
    const nv = Math.floor(rng()*4)+6;
    for (let v = 0; v < nv; v++) {
      const a = (v/nv)*Math.PI*2;
      const d = r*(0.6+rng()*0.4);
      verts.push({x:Math.cos(a)*d, y:Math.sin(a)*d});
    }
    const astHp = Math.ceil(r * 1.4) + 8; // 4-9 shots: r=20→36, r=40→64, r=60→92
    asteroids.push({x:ax,y:ay,r:r,verts,hp:astHp,maxHp:astHp,alive:true,
      ore: 2+Math.floor(rng()*4),
      color:`hsl(${25+rng()*20},${20+rng()*20}%,${30+rng()*20}%)`});
  }

  const enemies = [];
  const baseDist = Math.sqrt(cx*cx+cy*cy);
  const dConf = DIFFICULTIES[difficulty];
  // Increased base enemy count + difficulty scaling
  const baseCount = baseDist < 0.1 ? 3 : Math.min(14, 3 + Math.floor(rng()*(5+tier*2)));
  const numEnemies = Math.max(1, Math.round(baseCount * dConf.countMult));
  const types = ['drone','pirate','alien','gunship'];
  // New enemy types introduced at higher tiers
  const advTypes = tier >= 2 ? ['drone','pirate','alien','gunship','kamikaze'] : types;
  const allTypes = tier >= 3 ? [...advTypes, 'shielder'] : advTypes;
  // Carrier: large capital ship that spawns drones, appears at tier 3+
  const hasCarrier = tier >= 3 && rng() < 0.30;
  for (let i = 0; i < numEnemies; i++) {
    const ex = ox + rng()*CHUNK;
    const ey = oy + rng()*CHUNK;
    // typeIdx progresses with tier: drone only at 0, all types by tier 3
    const typePool = tier <= 1 ? types : allTypes;
    const typeIdx = Math.floor(rng()*Math.min(typePool.length, 1+tier+1));
    const t = typePool[Math.min(typeIdx, typePool.length-1)];
    const hpScale  = (1 + tier*0.15) * dConf.hpMult;
    const dmgScale = (1 + tier*0.13) * dConf.dmgMult;
    let hp, speed, dmg, fr, r, color;
    if (t==='drone')    {hp=30*hpScale;  speed=100; dmg=10*dmgScale; fr=0;   r=14; color='#88aacc';}
    if (t==='pirate')   {hp=55*hpScale;  speed=135; dmg=12*dmgScale; fr=1.8; r=15; color='#ff8833';}
    if (t==='alien')    {hp=80*hpScale;  speed=155; dmg=20*dmgScale; fr=1.4; r=17; color='#aa44ff';}
    if (t==='gunship')  {hp=110*hpScale; speed=115; dmg=15*dmgScale; fr=1.0; r=19; color='#ff3355';}
    if (t==='kamikaze') {hp=25*hpScale;  speed=210; dmg=45*dmgScale; fr=0;   r=11; color='#ff2200';}
    if (t==='shielder') {hp=90*hpScale;  speed=95;  dmg=14*dmgScale; fr=1.6; r=18; color='#4488ff';}
    const shieldMax = t==='shielder' ? Math.ceil(50*hpScale) : 0;
    enemies.push({x:ex,y:ey,vx:0,vy:0,type:t,hp:Math.ceil(hp),maxHp:Math.ceil(hp),
      speed,dmg:Math.ceil(dmg),fireRate:fr,fireTimer:rng()*fr,r,color,
      state:'patrol',patrolAngle:rng()*Math.PI*2,patrolTimer:0,
      angle:rng()*Math.PI*2,alive:true,
      // attack fields
      shotCount:0, charging:false, chargeCD:0, chargeDur:0,
      circleAngle:rng()*Math.PI*2, burstLeft:0,
      // shielder fields
      shield: shieldMax, maxShield: shieldMax, shieldRegen: 0});
  }
  // Spawn carrier if applicable
  if (hasCarrier) {
    const ex = ox + 200 + rng()*(CHUNK-400);
    const ey = oy + 200 + rng()*(CHUNK-400);
    const hpScale = (1 + tier*0.2) * dConf.hpMult;
    const dmgScale = (1 + tier*0.15) * dConf.dmgMult;
    enemies.push({x:ex,y:ey,vx:0,vy:0,type:'carrier',
      hp:Math.ceil(280*hpScale),maxHp:Math.ceil(280*hpScale),
      speed:60,dmg:Math.ceil(18*dmgScale),fireRate:2.5,fireTimer:2.5,r:30,color:'#cc4400',
      state:'patrol',patrolAngle:rng()*Math.PI*2,patrolTimer:0,
      angle:rng()*Math.PI*2,alive:true,
      shotCount:0,charging:false,chargeCD:0,chargeDur:0,
      circleAngle:rng()*Math.PI*2,burstLeft:0,
      droneSpawnTimer:8+rng()*4,droneSpawnCD:8});
  }

  const items = [];
  const numItems = Math.floor(rng()*5)+2;
  const itemTypes = ['energy','hull','ore','crystal','alientech','fuel','fuel'];
  for (let i = 0; i < numItems; i++) {
    const ix = ox + rng()*CHUNK;
    const iy = oy + rng()*CHUNK;
    const it = itemTypes[Math.floor(rng()*itemTypes.length)];
    items.push({x:ix,y:iy,type:it,r:12,bobOffset:rng()*Math.PI*2,alive:true});
  }
  // Rare relic caches (3% per chunk, only at tier 1+)
  if (tier >= 1 && rng() < 0.03) {
    const ix = ox + 200 + rng()*(CHUNK-400);
    const iy = oy + 200 + rng()*(CHUNK-400);
    items.push({x:ix,y:iy,type:'relic',r:14,bobOffset:rng()*Math.PI*2,alive:true});
  }

  // Warp cores at fixed positions
  for (const wcp of WARP_CORE_POSITIONS) {
    const wcx = Math.floor(wcp.x/CHUNK), wcy = Math.floor(wcp.y/CHUNK);
    if (wcx===cx && wcy===cy) {
      items.push({x:wcp.x,y:wcp.y,type:'warpcore',r:16,bobOffset:0,alive:true,
        id:`${wcp.x},${wcp.y}`});
    }
  }

  let station = null;
  // Guarantee a station at (2,0) for early-game access; elsewhere 1-in-5 chance
  const forceStation = (cx===2&&cy===0);
  if (forceStation || (rng() < 0.20 && (cx!==0||cy!==0))) {
    station = {
      x: ox + 200+rng()*(CHUNK-400),
      y: oy + 200+rng()*(CHUNK-400),
      r: 30, alive: true,
      angle: rng()*Math.PI*2
    };
  }

  let portal = null;
  const pcx = Math.floor(ESCAPE_PORTAL_POS.x/CHUNK);
  const pcy = Math.floor(ESCAPE_PORTAL_POS.y/CHUNK);
  if (pcx===cx && pcy===cy) {
    portal = {x:ESCAPE_PORTAL_POS.x, y:ESCAPE_PORTAL_POS.y, r:50, active:false};
  }

  chunks.set(key, {cx,cy,asteroids,enemies,items,station,portal,generated:true});
}

function getChunksAround(wx, wy, radius) {
  const result = [];
  const r = Math.ceil(radius/CHUNK)+1;
  const ccx = Math.floor(wx/CHUNK), ccy = Math.floor(wy/CHUNK);
  for (let dx=-r;dx<=r;dx++) for (let dy=-r;dy<=r;dy++) {
    result.push({cx:ccx+dx,cy:ccy+dy});
  }
  return result;
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
let bullets = [];
let enemyBullets = [];
let particles = [];
let dynamicEnemies = []; // hunter wave enemies (not bound to chunks)
let hunterTimer = 0;

function spawnBullet(x,y,angle,speed,dmg,owner='player',homing=false) {
  const b = {x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
    life:BULLET_LIFE+(homing?0.8:0),dmg,owner,r:4,homing};
  if (owner==='player') bullets.push(b);
  else enemyBullets.push(b);
}

function spawnParticle(x,y,vx,vy,life,color,r) {
  particles.push({x,y,vx,vy,life,maxLife:life,color,r});
}

function explosion(x,y,n,color) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const s = 50+Math.random()*150;
    spawnParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,0.3+Math.random()*0.5,color,2+Math.random()*3);
  }
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
const mouse = {x:W/2,y:H/2,down:false};

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='Escape') {
    if (state==='playing') state='paused';
    else if (state==='paused') state='playing';
    else if (state==='shop') { closeShop(); state='playing'; }
  }
  if (e.code==='Enter') {
    if (state==='title') startGame();
    else if (state==='gameover'||state==='victory') {
      document.getElementById('earth-btn').style.display='none';
      startGame();
    }
  }
  // Difficulty selection on title
  if (state==='title') {
    if (e.code==='ArrowLeft')  difficulty = Math.max(0, difficulty-1);
    if (e.code==='ArrowRight') difficulty = Math.min(4, difficulty+1);
    if (e.code==='Digit1') difficulty=0;
    if (e.code==='Digit2') difficulty=1;
    if (e.code==='Digit3') difficulty=2;
    if (e.code==='Digit4') difficulty=3;
    if (e.code==='Digit5') difficulty=4;
  }
  if (e.code==='KeyE') {
    if (state==='playing') tryOpenShop();
    else if (state==='shop') { closeShop(); state='playing'; }
  }
  if (e.code==='KeyQ' && state==='playing') {
    const wl = player.unlockedWeapons;
    if (wl.length > 1) {
      const idx = wl.indexOf(player.weaponMode);
      player.weaponMode = wl[(idx+1) % wl.length];
      player.waveCharge = 0;
      const names = {laser:'雷射砲', scatter:'散射炮', heavy:'重砲', missile:'導彈砲', wave:'波動砲'};
      setStatus(`切換武器：${names[player.weaponMode]}`);
    }
  }
  if (e.code==='Space' && state==='playing') {
    mouse.down = true;
  }
  if (e.code==='KeyR' && state==='playing') {
    if (player.returnCharges > 0) {
      player.returnCharges--;
      // Teleport to origin
      player.x = 600; player.y = 0;
      player.vx = 0; player.vy = 0;
      player.warpFlash = 1.2; // seconds of flash effect
      // Burst particles at destination
      for (let i=0;i<30;i++) {
        const a=Math.random()*Math.PI*2;
        const spd=60+Math.random()*120;
        particles.push({x:600,y:0,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
          life:0.8+Math.random()*0.6,maxLife:1.4,r:3+Math.random()*3,color:'#88ffff'});
      }
      setStatus('已傳送回原點！剩餘回程次數：' + player.returnCharges);
    } else {
      setStatus('無回程次數（拾取翹曲核心後可用）');
    }
  }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code==='Space') mouse.down = false;
});
canvas.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
canvas.addEventListener('mousedown', e => { if(e.button===0) { mouse.down=true; audio.init(); } });
canvas.addEventListener('mouseup', e => { if(e.button===0) mouse.down=false; });
