// ─── SHOP ─────────────────────────────────────────────────────────────────────
const shopOverlay = document.getElementById('shop-overlay');
const shopResources = document.getElementById('shop-resources');
const shopUpgrades = document.getElementById('shop-upgrades');
const shopPerks = document.getElementById('shop-perks');
document.getElementById('shop-close').addEventListener('click', () => {
  closeShop(); state='playing';
});

function tryOpenShop() {
  let nearest = null, nd = Infinity;
  for (const [,chunk] of chunks) {
    if (chunk.station&&chunk.station.alive) {
      const d = dist(player.x,player.y,chunk.station.x,chunk.station.y);
      if (d<80&&d<nd) { nd=d; nearest=chunk.station; }
    }
  }
  if (nearest) {
    shopStation=nearest; openShop(); state='shop';
    if (!milestones.firstStation) {
      milestones.firstStation = true;
      setStatus('太空站！用礦石升級引擎和武器，強化後去找翹曲核心');
    }
  }
}

function openShop() {
  shopOverlay.style.display='block';
  renderShop();
}
function closeShop() {
  shopOverlay.style.display='none';
  shopStation=null;
}
function renderShop() {
  shopResources.textContent=`礦石: ${player.ore} | 晶體: ${player.crystal} | 異星科技: ${player.alienTech}`;

  // ── Cost helpers ──────────────────────────────────────────────────────────
  // Each successive level costs ~1.5× more ore; crystal unlocks at lv5; alienTech at lv9
  function upgCost(base, nextLv) {
    const o = Math.round(base * Math.pow(1.5, nextLv-2));
    const c = nextLv>=5 ? Math.round(base*0.35*Math.pow(1.4,nextLv-5)) : 0;
    const a = nextLv>=9 ? Math.round(base*0.15*Math.pow(1.3,nextLv-9)) : 0;
    const cost={ore:o}; if(c) cost.crystal=c; if(a) cost.alienTech=a; return cost;
  }
  function perkCost(base, nextLv) {
    const c = Math.round(base * Math.pow(1.5, nextLv-2));
    const o = nextLv>=4 ? Math.round(base*0.5*Math.pow(1.4,nextLv-4)) : 0;
    const a = nextLv>=8 ? Math.round(base*0.2*Math.pow(1.3,nextLv-8)) : 0;
    const cost={crystal:c}; if(o) cost.ore=o; if(a) cost.alienTech=a; return cost;
  }

  // ── Ship upgrades (Mk1 → Mk12) ───────────────────────────────────────────
  const UPG_MAX = 12;
  const upgrades = [];
  function addUpg(key, label, baseCost, descFn, buyFn) {
    const cur = player[key]; if (cur >= UPG_MAX) return;
    const next = cur+1;
    upgrades.push({ name:`${label} Mk${next} (${descFn(next)})`,
      cost: upgCost(baseCost, next), req:()=>true,
      buy:()=>{ player[key]=next; if(buyFn) buyFn(next); } });
  }
  addUpg('engineLevel',     '引擎',     10, lv=>`速度+${Math.round(lv*15-15)}%`);
  addUpg('shieldLevel',     '護盾產生器', 8, lv=>`護盾+50`,
    ()=>{ player.maxShield+=50; player.shield=Math.min(player.shield+50,player.maxShield); });
  addUpg('hullLevel',       '船殼加固',  9, lv=>`船殼+50`,
    ()=>{ player.maxHull+=50; player.hull=Math.min(player.hull+50,player.maxHull); });
  addUpg('weaponLevel',     '武器系統', 12, lv=>`傷害+${Math.round((lv-1)*25)}%`);
  addUpg('boostRegenLevel', '加速器回復', 8, lv=>`回復+${Math.round((lv-1)*30)}%`);
  addUpg('boostUseLevel',   '衝刺節能',  7, lv=>`消耗-${Math.round((1-Math.pow(0.9,lv-1))*100)}%`);
  // Weapon unlocks
  if (!player.unlockedWeapons.includes('scatter')) {
    upgrades.push({name:'散射炮 — 三叉擴散彈 (按Q切換)',cost:{ore:35},req:()=>true,buy:()=>{
      player.unlockedWeapons.push('scatter');
      player.weaponMode='scatter';
      setStatus('散射炮解鎖！按 Q 切換武器');
    }});
  }
  if (!player.unlockedWeapons.includes('heavy')) {
    upgrades.push({name:'重砲 — 穿甲高傷害 慢速 (按Q切換)',cost:{ore:50,crystal:3},req:()=>true,buy:()=>{
      player.unlockedWeapons.push('heavy');
      player.weaponMode='heavy';
      setStatus('重砲解鎖！按 Q 切換武器');
    }});
  }
  if (!player.unlockedWeapons.includes('missile')) {
    upgrades.push({name:'導彈砲 — 追蹤飛彈 爆炸範圍傷害 (按Q切換)',cost:{ore:60,crystal:6},req:()=>true,buy:()=>{
      player.unlockedWeapons.push('missile');
      player.weaponMode='missile';
      setStatus('導彈砲解鎖！按 Q 切換武器');
    }});
  }
  if (!player.unlockedWeapons.includes('wave')) {
    upgrades.push({name:'波動砲 — 蓄力扇形衝擊波 超廣角 (按Q切換)',cost:{ore:80,crystal:10},req:()=>true,buy:()=>{
      player.unlockedWeapons.push('wave');
      player.weaponMode='wave';
      setStatus('波動砲解鎖！按 Q 切換武器');
    }});
  }
  // Consumables (always visible if needed)
  if (player.hull<player.maxHull) upgrades.push({name:'緊急維修 (船殼恢復)',cost:{ore:15},req:()=>true,buy:()=>{player.hull=player.maxHull;}});
  if (player.shield<player.maxShield) upgrades.push({name:'護盾充能 (護盾恢復)',cost:{ore:8},req:()=>true,buy:()=>{player.shield=player.maxShield;}});

  // ── Navigator talents (Lv.1 → Lv.10) ────────────────────────────────────
  const PERK_MAX = 10;
  const perks = [];
  function addPerk(key, label, baseCost, descFn) {
    const cur = player[key]; if (cur >= PERK_MAX) return;
    const next = cur+1;
    perks.push({ name:`${label} Lv.${next} (${descFn(next)})`,
      cost: perkCost(baseCost, next), req:()=>true,
      buy:()=>{ player[key]=next; } });
  }
  addPerk('deepScanner',  '深度掃描器', 10, lv=>`掃描+${lv*30}%`);
  addPerk('lootFinder',   '戰利品探測',  8, lv=>`物品+${lv*15}%`);
  addPerk('combatExpert', '戰鬥專家',    8, lv=>`射速+${lv*7}%`);
  addPerk('evasion',      '迴避訓練',   12, lv=>`閃避${lv*5}%`);
  addPerk('autoRepair',   '自動修復',   15, lv=>`回復${(lv*0.5).toFixed(1)}/s`);

  function renderItems(container, list) {
    container.innerHTML='';
    for (const item of list) {
      if (!item.req()) continue;
      const canAfford = canBuy(item.cost);
      const div = document.createElement('div');
      div.className='shop-item';
      const costStr = Object.entries(item.cost).map(([k,v])=>{
        const labels={ore:'礦石',crystal:'晶體',alienTech:'異星科技'};
        return `${labels[k]||k}x${v}`;
      }).join(' + ');
      div.innerHTML=`<span class="item-name">${item.name}</span>
        <span class="item-cost">${costStr}</span>
        <button ${canAfford?'':'disabled'}>購買</button>`;
      div.querySelector('button').addEventListener('click', () => {
        if (canBuy(item.cost)) {
          spendResources(item.cost);
          item.buy();
          audio.play('buy', 1, 1, 280);
          setStatus('購買成功！');
          renderShop();
        }
      });
      container.appendChild(div);
    }
  }
  renderItems(shopUpgrades, upgrades);
  renderItems(shopPerks, perks);
}

function canBuy(cost) {
  if (cost.ore&&player.ore<cost.ore) return false;
  if (cost.crystal&&player.crystal<cost.crystal) return false;
  if (cost.alienTech&&player.alienTech<cost.alienTech) return false;
  return true;
}
function spendResources(cost) {
  if (cost.ore) player.ore-=cost.ore;
  if (cost.crystal) player.crystal-=cost.crystal;
  if (cost.alienTech) player.alienTech-=cost.alienTech;
}

// ─── GAME INIT ────────────────────────────────────────────────────────────────
function startGame() {
  player = createPlayer();
  applyMeta(player);
  bullets = []; enemyBullets = []; particles = []; engineTrail = [];
  dynamicEnemies = []; hunterTimer = 0;
  chunks.clear();
  gameTime = 0; playTime = 0;
  statusMsg = ''; statusTimer = 0;
  milestones = { firstKill:false, firstMine:false, firstStation:false };
  state = 'playing';
  // Pre-generate boot chunks
  for(let dx=-1;dx<=2;dx++) for(let dy=-1;dy<=1;dy++) generateChunk(dx,dy);
  generateChunk(2,0);
  // Start kit
  if (player._startKit) {
    const c0 = chunks.get(chunkKey(0,0));
    if (c0) {
      c0.items.push({x:750,y:100,type:'energy',r:12,bobOffset:0,alive:true});
      c0.items.push({x:750,y:-100,type:'hull',r:12,bobOffset:1,alive:true});
    }
  }
  // Hint based on meta progress
  const run = meta.totalRuns||0;
  if (run===0) setStatus('射擊隕石採礦 → 往右找太空站升級 → 蒐集5個翹曲核心！');
  else if (run<3) setStatus(`第${run+1}局！最近的核心在右上方 2200 單位處`);
  else setStatus(`加油！目前最佳：${meta.bestCores||0}/5 核心`);
}

function setStatus(msg) { statusMsg=msg; statusTimer=3; }
function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }
function dist2(x1,y1,x2,y2) { return (x2-x1)**2+(y2-y1)**2; }
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }

// ─── UPDATE ───────────────────────────────────────────────────────────────────
let lastTime = 0;
function update(dt) {
  if (state!=='playing'&&state!=='shop') return;
  gameTime+=dt;
  if (state==='playing') playTime+=dt;

  // Load chunks
  const scanRange = 1 + player.deepScanner*0.3;
  const nearChunks = getChunksAround(player.x,player.y,CHUNK*(scanRange+1));
  for (const {cx,cy} of nearChunks) generateChunk(cx,cy);

  updatePlayer(dt);
  updateBullets(dt);
  updateEnemyBullets(dt);
  updateEnemies(dt);
  updateItems(dt);
  updatePortal(dt);
  updateParticles(dt);
  updateBlackHole(dt);

  // Status timer
  if (statusTimer>0) statusTimer-=dt;
}

function getPlayerDmg() {
  // +25% per weapon level above 1
  return Math.floor(BULLET_DMG * (1 + 0.25*(player.weaponLevel-1)));
}
function getPlayerFireRate() {
  let fr = FIRE_RATE;
  if (player.combatExpert > 0) fr *= (1 - player.combatExpert*0.07);
  fr *= (1 - metaLevel('fireBonus')*0.15);
  if (player.relics.includes('overclock')) fr *= 0.70;
  return Math.max(fr, 0.08);
}
function hasRelic(id) { return player.relics.includes(id); }
function getBulletSpeed() { return BULLET_SPEED * (hasRelic('photon_core') ? 1.5 : 1); }

function updatePlayer(dt) {
  // Engine level scales thrust (+15% per level above 1)
  const thrust = player.thrustForce * (1 + 0.15*(player.engineLevel-1));
  const up = keys['KeyW']||keys['ArrowUp'];
  const down = keys['KeyS']||keys['ArrowDown'];
  const left = keys['KeyA']||keys['ArrowLeft'];
  const right = keys['KeyD']||keys['ArrowRight'];

  // Boost fuel rates — scale dynamically with level (+30% regen / -10% use per level above 1)
  const curFuelRegen = 18 * (1 + 0.30*(player.boostRegenLevel-1));
  const curFuelUse   = 35 * Math.pow(0.90, player.boostUseLevel-1);

  // Boost (Shift key)
  const wantBoost = (keys['ShiftLeft']||keys['ShiftRight']) && (up||down||left||right);
  if (wantBoost && player.boostFuel > 0) {
    player.boosting = true;
    player.boostFuel = Math.max(0, player.boostFuel - curFuelUse*dt);
  } else {
    player.boosting = false;
    player.boostFuel = Math.min(player.maxBoostFuel, player.boostFuel + curFuelRegen*dt);
  }
  const thrustMult = player.boosting ? BOOST_FORCE_MULT : 1;

  if (up)    player.vy -= thrust*thrustMult*dt;
  if (down)  player.vy += thrust*thrustMult*dt;
  if (left)  player.vx -= thrust*thrustMult*dt;
  if (right) player.vx += thrust*thrustMult*dt;

  // Aim at mouse
  const sx = player.x - player.x + W/2;
  const sy = player.y - player.y + H/2;
  player.angle = Math.atan2(mouse.y-H/2, mouse.x-W/2);

  // Engine trail
  if (up||down||left||right) {
    const ta = player.angle+Math.PI + (Math.random()-0.5)*0.4;
    engineTrail.push({
      x:player.x+Math.cos(ta)*18,y:player.y+Math.sin(ta)*18,
      vx:(Math.random()-0.5)*30,vy:(Math.random()-0.5)*30,
      life:0.3,maxLife:0.3,color:`hsl(${200+Math.random()*30},100%,${60+Math.random()*20}%)`
    });
  }

  // Drag
  player.vx *= DRAG;
  player.vy *= DRAG;

  // Clamp max speed
  const spd = Math.sqrt(player.vx**2+player.vy**2);
  const normalMaxSpd = 500 + (player.engineLevel-1)*80;
  const maxSpd = player.boosting ? Math.max(BOOST_MAX_SPD, normalMaxSpd*1.5) : normalMaxSpd;
  if (spd>maxSpd) { player.vx*=maxSpd/spd; player.vy*=maxSpd/spd; }

  player.x += player.vx*dt;
  player.y += player.vy*dt;

  // Collision with asteroids
  for (const [,chunk] of chunks) {
    for (const ast of chunk.asteroids) {
      if (!ast.alive) continue;
      const d = dist(player.x,player.y,ast.x,ast.y);
      if (d < 22+ast.r) {
        const nx=(player.x-ast.x)/d, ny=(player.y-ast.y)/d;
        player.x = ast.x+nx*(22+ast.r);
        player.y = ast.y+ny*(22+ast.r);
        const dot = player.vx*nx+player.vy*ny;
        if (dot<0) { player.vx-=dot*nx*1.5; player.vy-=dot*ny*1.5; }
        if (player.invulTimer<=0) {
          damagePlayer(8);
          explosion(player.x,player.y,5,'#888888');
        }
      }
    }
  }

  // Kill combo tick
  if (player.killComboTimer > 0) {
    player.killComboTimer -= dt;
    if (player.killComboTimer <= 0) { player.killCombo = 0; player.killComboMult = 1; }
  }

  // Wave weapon: charge while holding mouse, fire on release
  if (player.weaponMode === 'wave') {
    if (mouse.down && player.fireTimer<=0) {
      player.waveCharge = Math.min(1, (player.waveCharge||0) + dt/1.2);
    } else if (!mouse.down && player.waveCharge > 0.1) {
      const wdmg = getPlayerDmg();
      const wang = player.angle;
      const shotCount = 5 + Math.floor(player.waveCharge * 7);
      const spreadAngle = 0.55 + player.waveCharge * 0.75;
      for (let si = 0; si < shotCount; si++) {
        const a = wang - spreadAngle/2 + (si/(shotCount-1))*spreadAngle;
        spawnBullet(player.x, player.y, a, BULLET_SPEED*(0.65+player.waveCharge*0.35), wdmg*(1.0+player.waveCharge*1.8), 'player');
      }
      audio.play('shoot', 0.7, 0.45);
      for (let k=0;k<10;k++) {
        const ta=wang+(Math.random()-0.5)*spreadAngle;
        spawnParticle(player.x,player.y,Math.cos(ta)*220,Math.sin(ta)*220,0.28,'#44ffaa',5+player.waveCharge*5);
      }
      player.fireTimer = 0.8 + player.waveCharge * 1.8;
      player.waveCharge = 0;
    }
  }

  // Fire
  if (player.fireTimer>0) player.fireTimer-=dt;
  if (mouse.down && player.fireTimer<=0 && player.weaponMode !== 'wave') {
    const dmg = getPlayerDmg();
    const fr  = getPlayerFireRate();
    const ang = player.angle;
    const mx  = player.x + Math.cos(ang)*25;
    const my  = player.y + Math.sin(ang)*25;
    const bspd = getBulletSpeed();
    if (player.weaponMode === 'scatter') {
      player.fireTimer = fr * 1.35;
      for (let si = -1; si <= 1; si++) {
        spawnBullet(player.x, player.y, ang + si*0.28, bspd*0.9, dmg*0.7, 'player');
      }
      if (hasRelic('energy_lens')) spawnBullet(player.x, player.y, ang+(Math.random()-0.5)*0.5, bspd*0.85, dmg*0.7, 'player');
      audio.play('shoot', 0.28);
      spawnParticle(mx, my, Math.cos(ang)*60, Math.sin(ang)*60, 0.1, '#ffff88', 7);
    } else if (player.weaponMode === 'heavy') {
      player.fireTimer = fr * 2.8;
      // Big slow piercing bolt — store pierce flag
      const b = {x:player.x, y:player.y,
        vx:Math.cos(ang)*bspd*0.55, vy:Math.sin(ang)*bspd*0.55,
        life:BULLET_LIFE*1.8, dmg:dmg*2.8, owner:'player', r:9, homing:false, pierce:true};
      bullets.push(b);
      if (hasRelic('energy_lens')) spawnBullet(player.x, player.y, ang+(Math.random()-0.5)*0.3, bspd*0.5, dmg*1.8, 'player');
      audio.play('shoot', 0.45, 0.75);
      spawnParticle(mx, my, Math.cos(ang)*100, Math.sin(ang)*100, 0.12, '#ff8800', 10);
    } else if (player.weaponMode === 'missile') {
      player.fireTimer = fr * 3.5;
      // Homing missile with explosion on hit (handled in bullet update)
      const b = {x:player.x, y:player.y,
        vx:Math.cos(ang)*bspd*0.65, vy:Math.sin(ang)*bspd*0.65,
        life:BULLET_LIFE*2.8, dmg:dmg*3.8, owner:'player', r:7, homing:true, pierce:false, isMissile:true};
      bullets.push(b);
      audio.play('shoot', 0.55, 0.6);
      spawnParticle(mx, my, Math.cos(ang)*60, Math.sin(ang)*60, 0.18, '#ff6600', 9);
      for (let k=0;k<3;k++) {
        const ta=ang+Math.PI+(Math.random()-0.5)*0.6;
        spawnParticle(player.x,player.y,Math.cos(ta)*40,Math.sin(ta)*40,0.2,'#ff8833',4);
      }
    } else {
      // Default laser
      player.fireTimer = fr;
      spawnBullet(player.x, player.y, ang, bspd, dmg, 'player');
      if (hasRelic('energy_lens')) spawnBullet(player.x, player.y, ang+(Math.random()-0.5)*0.25, bspd, dmg*0.8, 'player');
      audio.play('shoot', 0.22);
      spawnParticle(mx, my, Math.cos(ang)*80, Math.sin(ang)*80, 0.08, '#ffffaa', 6);
    }
  }

  // Invul timer
  if (player.invulTimer>0) player.invulTimer-=dt;
  // Warp flash timer
  if (player.warpFlash>0) player.warpFlash-=dt;

  // Shield regen
  if (player.shieldCooldown>0) player.shieldCooldown-=dt;
  else if (player.shield<player.maxShield) {
    player.shield=Math.min(player.maxShield,player.shield+SHIELD_REGEN*dt);
  }

  // Auto repair (perk)
  if (player.autoRepair > 0 && player.hull<player.maxHull) {
    player.hull=Math.min(player.maxHull, player.hull + player.autoRepair*0.5*dt);
  }
  // Nanobots relic: repair 1 hull every 6s
  if (hasRelic('nanobots') && player.hull < player.maxHull) {
    player.nanoTimer += dt;
    if (player.nanoTimer >= 6) {
      player.nanoTimer = 0;
      player.hull = Math.min(player.maxHull, player.hull + 1);
    }
  }
}

function damagePlayer(dmg) {
  if (player.invulTimer>0) return;
  if (player.evasion > 0 && Math.random() < player.evasion*0.05) { setStatus('閃避！'); return; }
  audio.play('hit', 0.7);
  if (player.shield>0) {
    const sd = Math.min(player.shield,dmg);
    player.shield-=sd; dmg-=sd;
  }
  if (dmg>0) player.hull-=dmg;
  player.shieldCooldown=SHIELD_REGEN_DELAY;
  player.invulTimer=0.5;
  // Revenge pod relic: fire 4 bullets outward
  if (hasRelic('revenge_pod')) {
    for (let ri=0; ri<4; ri++) {
      const ra = (ri/4)*Math.PI*2;
      spawnBullet(player.x, player.y, ra, getBulletSpeed()*0.9, getPlayerDmg()*0.8, 'player');
    }
  }
  if (player.hull<=0) {
    player.hull=0;
    explosion(player.x,player.y,30,'#ff4400');
    explosion(player.x,player.y,20,'#ffaa00');
    state='gameover';
    setTimeout(()=>openMetaShop('death'),1200);
  }
}

function updateBullets(dt) {
  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if (b.life<=0) { bullets.splice(i,1); continue; }
    // Hit asteroids
    let hitAst=false;
    for (const [,chunk] of chunks) {
      for (const ast of chunk.asteroids) {
        if (!ast.alive) continue;
        if (dist2(b.x,b.y,ast.x,ast.y)<(b.r+ast.r)**2) {
          ast.hp -= b.dmg;
          explosion(b.x,b.y,5,'#aa8855');
          if (ast.hp <= 0) {
            ast.alive = false;
            audio.play('explode', 0.5);
            explosion(ast.x,ast.y,18,'#886644');
            explosion(ast.x,ast.y,8,'#ffcc66');
            // Drop ore
            const oreCount = ast.ore || 3;
            const lootMult = 1 + player.lootFinder*0.15;
            for (let k=0; k<Math.ceil(oreCount*lootMult); k++) {
              chunk.items.push({x:ast.x+(Math.random()-0.5)*60,y:ast.y+(Math.random()-0.5)*60,
                type:'ore',r:12,bobOffset:Math.random()*Math.PI*2,alive:true});
            }
            if (Math.random() < 0.25) {
              chunk.items.push({x:ast.x+(Math.random()-0.5)*30,y:ast.y+(Math.random()-0.5)*30,
                type:'crystal',r:12,bobOffset:Math.random()*Math.PI*2,alive:true});
            }
          }
          bullets.splice(i,1); hitAst=true; break;
        }
      }
      if (hitAst) break;
    }
    if (hitAst) continue;
    // Hit enemies (chunks)
    let hitEnemy=false;
    for (const [,chunk] of chunks) {
      for (const en of chunk.enemies) {
        if (!en.alive) continue;
        if (dist2(b.x,b.y,en.x,en.y)<(b.r+en.r)**2) {
          if (b.isMissile) missileExplode(b.x,b.y,b.dmg,chunk);
          else { en.hp-=b.dmg; explosion(b.x,b.y,6,en.color); }
          if (en.hp<=0) {
            en.alive=false;
            audio.play('explodeBig', 0.6);
            explosion(en.x,en.y,20,en.color);
            explosion(en.x,en.y,10,'#ffffff');
            dropLoot(en.x,en.y,chunk);
            registerKill();
          }
          if (!b.pierce) { bullets.splice(i,1); hitEnemy=true; break; }
        }
      }
      if (hitEnemy) break;
    }
    if (hitEnemy) continue;
    // Hit dynamic (hunter) enemies
    for (const en of dynamicEnemies) {
      if (!en.alive) continue;
      if (dist2(b.x,b.y,en.x,en.y)<(b.r+en.r)**2) {
        en.hp-=b.dmg;
        explosion(b.x,b.y,6,en.color);
        if (en.hp<=0) {
          en.alive=false;
          explosion(en.x,en.y,20,en.color);
          explosion(en.x,en.y,10,'#ffffff');
          // Drop loot at nearest chunk
          const ncx=Math.floor(en.x/CHUNK), ncy=Math.floor(en.y/CHUNK);
          const nc=chunks.get(chunkKey(ncx,ncy));
          if(nc) dropLoot(en.x,en.y,nc);
          registerKill();
        }
        if (!b.pierce) { bullets.splice(i,1); hitEnemy=true; break; }
      }
    }
  }
}

function dropLoot(x,y,chunk) {
  const roll = Math.random();
  let type;
  if (roll<0.3) type='ore';
  else if (roll<0.55) type='energy';
  else if (roll<0.75) type='hull';
  else if (roll<0.9) type='crystal';
  else type='alientech';
  chunk.items.push({x,y,type,r:12,bobOffset:Math.random()*Math.PI*2,alive:true});
  // Void crystal relic: 30% chance extra crystal
  if (hasRelic('void_crystal') && Math.random() < 0.30) {
    chunk.items.push({x:x+(Math.random()-0.5)*40,y:y+(Math.random()-0.5)*40,
      type:'crystal',r:12,bobOffset:Math.random()*Math.PI*2,alive:true});
  }
  // Extra drop from kill combo
  const mult = player ? player.killComboMult : 1;
  if (mult >= 1.5 && Math.random() < (mult-1)) {
    const bonus = Math.random()<0.5?'ore':'crystal';
    chunk.items.push({x:x+(Math.random()-0.5)*40, y:y+(Math.random()-0.5)*40,
      type:bonus, r:12, bobOffset:Math.random()*Math.PI*2, alive:true});
  }
  if (!milestones.firstKill) {
    milestones.firstKill = true;
    setStatus('首次擊殺！繼續消滅敵人獲取補給');
  }
}

function missileExplode(bx, by, dmg, nearChunk) {
  // Area explosion: damages all enemies within 100px
  const EXPL_R = 100;
  audio.play('explodeBig', 0.7);
  explosion(bx,by,30,'#ff6600');
  explosion(bx,by,15,'#ffcc44');
  for (const [,chunk] of chunks) {
    for (const en of chunk.enemies) {
      if (!en.alive) continue;
      const d2=dist2(bx,by,en.x,en.y);
      if (d2 < EXPL_R**2) {
        const falloff = 1 - Math.sqrt(d2)/EXPL_R;
        en.hp -= dmg * falloff;
        explosion(en.x,en.y,6,en.color);
        if (en.hp<=0) {
          en.alive=false;
          explosion(en.x,en.y,18,en.color);
          dropLoot(en.x,en.y,chunk);
          registerKill();
        }
      }
    }
  }
  for (const en of dynamicEnemies) {
    if (!en.alive) continue;
    const d2=dist2(bx,by,en.x,en.y);
    if (d2 < EXPL_R**2) {
      const falloff = 1 - Math.sqrt(d2)/EXPL_R;
      en.hp -= dmg * falloff;
      if (en.hp<=0) {
        en.alive=false;
        explosion(en.x,en.y,18,en.color);
        const ncx=Math.floor(en.x/CHUNK), ncy=Math.floor(en.y/CHUNK);
        const nc=chunks.get(chunkKey(ncx,ncy));
        if(nc) dropLoot(en.x,en.y,nc);
        registerKill();
      }
    }
  }
}

function registerKill() {
  player.killCombo++;
  player.killComboTimer = 3.5;
  player.killComboMult = 1 + Math.floor((player.killCombo-1)/3) * 0.5;
  if (player.killCombo >= 3) setStatus(`💥 ${player.killCombo}連殺！ 戰利品 ×${player.killComboMult.toFixed(1)}`);
}

function updateEnemyBullets(dt) {
  for (let i=enemyBullets.length-1;i>=0;i--) {
    const b=enemyBullets[i];
    // Homing: slowly steer toward player
    if (b.homing) {
      const ha=Math.atan2(player.y-b.y,player.x-b.x);
      const ca=Math.atan2(b.vy,b.vx);
      let da=ha-ca; while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
      const na=ca+clamp(da,-2.2*dt,2.2*dt);
      const spd2=Math.sqrt(b.vx**2+b.vy**2);
      b.vx=Math.cos(na)*spd2; b.vy=Math.sin(na)*spd2;
    }
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if (b.life<=0) { enemyBullets.splice(i,1); continue; }
    // Hit player
    if (dist2(b.x,b.y,player.x,player.y)<(b.r+18)**2) {
      damagePlayer(b.dmg);
      explosion(b.x,b.y,8,'#ff3300');
      enemyBullets.splice(i,1);
    }
  }
}

function spawnHunterWave() {
  const dc = DIFFICULTIES[difficulty];
  const waveSize = 4 + Math.floor(Math.random()*4) + Math.round(dc.countMult);
  const types = ['pirate','alien','gunship','drone'];
  for (let i=0; i<waveSize; i++) {
    const ang = Math.random()*Math.PI*2;
    const d   = 750 + Math.random()*350;
    const ex  = player.x + Math.cos(ang)*d;
    const ey  = player.y + Math.sin(ang)*d;
    const t   = types[Math.floor(Math.random()*types.length)];
    const hs  = 1.6 + Math.random()*0.5;
    const hpS = hs * dc.hpMult, dmgS = hs * dc.dmgMult;
    let hp, speed, dmg, fr, r, color;
    if (t==='drone')   {hp=30*hpS; speed=145; dmg=10*dmgS; fr=0;   r=14; color='#88aacc';}
    if (t==='pirate')  {hp=55*hpS; speed=170; dmg=12*dmgS; fr=1.4; r=15; color='#ff8833';}
    if (t==='alien')   {hp=80*hpS; speed=185; dmg=20*dmgS; fr=1.1; r=17; color='#aa44ff';}
    if (t==='gunship') {hp=110*hpS;speed=145; dmg=15*dmgS; fr=0.8; r=19; color='#ff3355';}
    dynamicEnemies.push({x:ex,y:ey,vx:0,vy:0,type:t,
      hp:Math.ceil(hp),maxHp:Math.ceil(hp),
      speed,dmg:Math.ceil(dmg),fireRate:fr,fireTimer:Math.random()*fr,r,color,
      state:'chase',patrolAngle:0,patrolTimer:0,
      angle:Math.atan2(player.y-ey,player.x-ex),alive:true,
      shotCount:0,charging:false,chargeCD:0,chargeDur:0,
      circleAngle:Math.random()*Math.PI*2,burstLeft:0,isHunter:true});
  }
}

function updateEnemies(dt) {
  for (const [,chunk] of chunks) {
    for (const en of chunk.enemies) {
      if (!en.alive) continue;
      const dx=player.x-en.x, dy=player.y-en.y;
      const d=Math.sqrt(dx*dx+dy*dy);

      // State machine
      if (d<350) en.state='chase';
      if (d>500) en.state='patrol';
      if (en.state==='chase'&&d<250) en.state='attack';
      if (en.state==='attack'&&d>300) en.state='chase';

      if (en.state==='patrol') {
        en.patrolTimer-=dt;
        if (en.patrolTimer<=0) {
          en.patrolAngle+=( Math.random()-0.5)*1.5;
          en.patrolTimer=1+Math.random()*2;
        }
        en.vx += Math.cos(en.patrolAngle)*en.speed*0.3*dt;
        en.vy += Math.sin(en.patrolAngle)*en.speed*0.3*dt;
      } else if (en.state==='chase'||en.state==='attack') {
        const nx=dx/d, ny=dy/d;
        // Gunship: circle around player instead of charging straight
        if (en.type==='gunship' && en.state==='attack') {
          en.circleAngle += dt * 1.1;
          const orbitDist = 170;
          const tx = player.x + Math.cos(en.circleAngle)*orbitDist;
          const ty = player.y + Math.sin(en.circleAngle)*orbitDist;
          const cdx=tx-en.x, cdy=ty-en.y, cd=Math.sqrt(cdx*cdx+cdy*cdy)+0.01;
          en.vx += (cdx/cd)*en.speed*dt;
          en.vy += (cdy/cd)*en.speed*dt;
          en.angle = Math.atan2(dy,dx);
        } else {
          // Drone charge: speed burst when attacking close-up
          if (en.type==='drone') {
            if(en.charging){ en.chargeDur-=dt; if(en.chargeDur<=0){en.charging=false;en.chargeCD=3+Math.random()*2;} }
            else { en.chargeCD-=dt; }
            if(!en.charging && en.chargeCD<=0 && en.state==='attack' && d<220){
              en.charging=true; en.chargeDur=0.55; en.chargeCD=0;
              explosion(en.x,en.y,6,'#ff9944');
            }
          }
          const effSpeed = (en.type==='drone'&&en.charging) ? en.speed*3.2 : en.speed;
          en.vx += nx*effSpeed*dt;
          en.vy += ny*effSpeed*dt;
          en.angle = Math.atan2(dy,dx);
        }
      }

      // Drag
      en.vx*=0.85; en.vy*=0.85;
      const spd=Math.sqrt(en.vx**2+en.vy**2);
      const maxESpd = (en.type==='drone'&&en.charging) ? en.speed*3.2 : en.speed*1.05;
      if (spd>maxESpd) { en.vx*=maxESpd/spd; en.vy*=maxESpd/spd; }
      en.x+=en.vx*dt; en.y+=en.vy*dt;

      // Melee damage (drone)
      if (en.type==='drone'&&d<en.r+22&&player.invulTimer<=0) {
        damagePlayer(en.dmg*(en.charging?2:1)*dt);
      }

      // Ranged attacks
      if ((en.type==='pirate'||en.type==='alien'||en.type==='gunship')&&en.state==='attack') {
        en.fireTimer-=dt;
        if (en.fireTimer<=0) {
          en.fireTimer=en.fireRate;
          const ang=Math.atan2(dy,dx);
          if (en.type==='pirate') {
            // Every 3rd shot fires a spread of 3
            en.shotCount++;
            if (en.shotCount%3===0) {
              for(let si=-1;si<=1;si++) spawnBullet(en.x,en.y,ang+si*0.38,470,en.dmg*0.75,'enemy');
            } else {
              spawnBullet(en.x,en.y,ang,500,en.dmg,'enemy');
            }
          } else if (en.type==='alien') {
            // Slow homing bolt
            spawnBullet(en.x,en.y,ang,260,en.dmg*1.25,'enemy',true);
          } else if (en.type==='gunship') {
            // Rapid 2-shot burst
            spawnBullet(en.x,en.y,ang-0.08,520,en.dmg,'enemy');
            spawnBullet(en.x,en.y,ang+0.08,520,en.dmg,'enemy');
          }
        }
      }
      // Carrier: slow moving, fires multi-shot barrage + periodically spawns drones
      if (en.type==='carrier') {
        en.fireTimer-=dt;
        en.droneSpawnTimer-=dt;
        if (d < 500) {
          if (en.fireTimer<=0) {
            en.fireTimer=en.fireRate;
            const ang=Math.atan2(dy,dx);
            // 5-way spread volley
            for(let si=-2;si<=2;si++) spawnBullet(en.x,en.y,ang+si*0.25,440,en.dmg*0.85,'enemy');
          }
        }
        if (en.droneSpawnTimer<=0 && en.alive) {
          en.droneSpawnTimer=en.droneSpawnCD;
          // Spawn 2 drone escorts
          for (let k=0;k<2;k++) {
            const a=Math.random()*Math.PI*2;
            dynamicEnemies.push({x:en.x+Math.cos(a)*50,y:en.y+Math.sin(a)*50,
              vx:0,vy:0,type:'drone',hp:25,maxHp:25,speed:130,dmg:8,fireRate:0,
              fireTimer:0,r:14,color:'#88aacc',state:'chase',
              patrolAngle:a,patrolTimer:0,angle:a,alive:true,
              shotCount:0,charging:false,chargeCD:2+Math.random()*2,chargeDur:0,
              circleAngle:a,burstLeft:0,isHunter:true});
          }
          setStatus('⚠ 母艦放出護衛無人機！');
        }
      }

      // Collision with player (for nudging)
      if (d<en.r+22) {
        const nx=dx/d, ny=dy/d;
        en.x=player.x-nx*(en.r+22);
        en.y=player.y-ny*(en.r+22);
      }
    }
  }

  // ── Hunter wave: spawn relentless hunters after all 5 cores collected ──
  if (player.warpCores >= 5 && state === 'playing') {
    hunterTimer -= dt;
    if (hunterTimer <= 0) {
      spawnHunterWave();
      const interval = Math.max(5, 12 - difficulty*1.5);
      hunterTimer = interval + Math.random()*4;
      setStatus('⚠ 敵方艦隊鎖定位置！');
    }
  }

  // ── Update dynamic (hunter) enemies ──
  for (let hi = dynamicEnemies.length-1; hi>=0; hi--) {
    const en = dynamicEnemies[hi];
    if (!en.alive) { dynamicEnemies.splice(hi,1); continue; }
    const dx=player.x-en.x, dy=player.y-en.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    // Hunters always chase
    if (d>5) {
      const nx=dx/d, ny=dy/d;
      if (en.type==='gunship') {
        en.circleAngle += dt*1.1;
        const orbitDist=170;
        const tx=player.x+Math.cos(en.circleAngle)*orbitDist;
        const ty=player.y+Math.sin(en.circleAngle)*orbitDist;
        const cdx=tx-en.x, cdy=ty-en.y, cd=Math.sqrt(cdx*cdx+cdy*cdy)+0.01;
        en.vx+=(cdx/cd)*en.speed*dt; en.vy+=(cdy/cd)*en.speed*dt;
        en.angle=Math.atan2(dy,dx);
      } else {
        if (en.type==='drone') {
          if(en.charging){en.chargeDur-=dt;if(en.chargeDur<=0){en.charging=false;en.chargeCD=3+Math.random()*2;}}
          else{en.chargeCD-=dt;}
          if(!en.charging&&en.chargeCD<=0&&d<220){en.charging=true;en.chargeDur=0.55;en.chargeCD=0;}
        }
        const effSpeed=(en.type==='drone'&&en.charging)?en.speed*3.2:en.speed;
        en.vx+=nx*effSpeed*dt; en.vy+=ny*effSpeed*dt;
        en.angle=Math.atan2(dy,dx);
      }
    }
    en.vx*=0.85; en.vy*=0.85;
    const spd=Math.sqrt(en.vx**2+en.vy**2);
    const maxESpd=(en.type==='drone'&&en.charging)?en.speed*3.2:en.speed*1.05;
    if(spd>maxESpd){en.vx*=maxESpd/spd;en.vy*=maxESpd/spd;}
    en.x+=en.vx*dt; en.y+=en.vy*dt;
    // Melee
    if(en.type==='drone'&&d<en.r+22&&player.invulTimer<=0)
      damagePlayer(en.dmg*(en.charging?2:1)*dt);
    // Ranged
    if((en.type==='pirate'||en.type==='alien'||en.type==='gunship')&&d<280){
      en.fireTimer-=dt;
      if(en.fireTimer<=0){
        en.fireTimer=en.fireRate;
        const ang=Math.atan2(dy,dx);
        if(en.type==='pirate'){
          en.shotCount++;
          if(en.shotCount%3===0){for(let si=-1;si<=1;si++)spawnBullet(en.x,en.y,ang+si*0.38,470,en.dmg*0.75,'enemy');}
          else spawnBullet(en.x,en.y,ang,500,en.dmg,'enemy');
        }else if(en.type==='alien'){spawnBullet(en.x,en.y,ang,260,en.dmg*1.25,'enemy',true);}
        else if(en.type==='gunship'){spawnBullet(en.x,en.y,ang-0.08,520,en.dmg,'enemy');spawnBullet(en.x,en.y,ang+0.08,520,en.dmg,'enemy');}
      }
    }
    // Nudge
    if(d<en.r+22){en.x=player.x-(dx/d)*(en.r+22);en.y=player.y-(dy/d)*(en.r+22);}
  }
}

function updateItems(dt) {
  for (const [,chunk] of chunks) {
    for (const item of chunk.items) {
      if (!item.alive) continue;
      if (dist2(player.x,player.y,item.x,item.y)<(18+item.r)**2) {
        collectItem(item);
        item.alive=false;
      }
    }
  }
}

function collectItem(item) {
  const lootMult = 1 + player.lootFinder*0.15;
  audio.play('pickup', 0.7, 1, 220);
  switch(item.type) {
    case 'energy':
      player.shield=Math.min(player.maxShield,player.shield+30*lootMult);
      setStatus('護盾充能 +30');
      break;
    case 'hull':
      player.hull=Math.min(player.maxHull,player.hull+30*lootMult);
      setStatus('船殼修復 +30');
      break;
    case 'ore':
      const metaOreMult = 1 + metaLevel('oreBonus')*0.20;
      const oreAmt=Math.floor((2+Math.random()*3)*lootMult*metaOreMult);
      player.ore+=oreAmt;
      if (!milestones.firstMine) {
        milestones.firstMine = true;
        setStatus(`首次採礦！礦石 +${oreAmt} — 找到太空站可升級太空艇`);
      } else {
        setStatus(`礦石 +${oreAmt}`);
      }
      break;
    case 'crystal':
      const cryAmt=Math.floor((1+Math.random()*2)*lootMult);
      player.crystal+=cryAmt;
      setStatus(`晶體 +${cryAmt}`);
      break;
    case 'alientech':
      player.alienTech+=1;
      setStatus('異星科技 +1');
      break;
    case 'fuel':
      const fuelAmt = Math.floor((30 + Math.random()*25)*lootMult);
      player.boostFuel = Math.min(player.maxBoostFuel, player.boostFuel + fuelAmt);
      setStatus(`燃料電池 +${fuelAmt}`);
      break;
    case 'warpcore':
      if (!player.warpCoreSet.has(item.id)) {
        player.warpCoreSet.add(item.id);
        player.warpCores++;
        player.returnCharges++;
        audio.play('warpcore');
        setStatus(`翹曲核心 ${player.warpCores}/5 已蒐集！[R] 可回到原點`);
        explosion(item.x,item.y,30,'#ffdd00');
        explosion(item.x,item.y,20,'#ffffff');
        if (player.warpCores>=5) setStatus('所有翹曲核心已蒐集！前往逃脫傳送門！');
      }
      break;
  }
  explosion(item.x,item.y,8,'#ffffff');
}

function updatePortal(dt) {
  if (player.warpCores<5) return;
  const pcx=Math.floor(ESCAPE_PORTAL_POS.x/CHUNK), pcy=Math.floor(ESCAPE_PORTAL_POS.y/CHUNK);
  const chunk=chunks.get(chunkKey(pcx,pcy));
  if (!chunk||!chunk.portal) return;
  chunk.portal.active=true;
  if (dist2(player.x,player.y,ESCAPE_PORTAL_POS.x,ESCAPE_PORTAL_POS.y)<70**2) {
    state='victory';
    // Save run data for Earth game
    localStorage.setItem('earthData', JSON.stringify({
      ore: player.ore, crystal: player.crystal,
      alienTech: player.alienTech, warpCores: player.warpCores,
      difficulty: difficulty, playTime: Math.floor(playTime)
    }));
    document.getElementById('earth-btn').style.display='block';
    setTimeout(()=>openMetaShop('victory'), 2000);
  }
}

function updateBlackHole(dt) {
  const bhMult = DIFFICULTIES[difficulty].bhMult;
  const d=dist(player.x,player.y,0,0);
  if (d<BH_RADIUS) {
    damagePlayer(BH_DMG*bhMult*dt);
  }
  // Gravity scales with difficulty
  const pullForce = 0.5*bhMult*(gameTime/60);
  if (d>5) {
    const acc=Math.min(60*bhMult,pullForce/Math.pow(d,0.8));
    player.vx -= (player.x/d)*acc*dt;
    player.vy -= (player.y/d)*acc*dt;
  }
}

function updateParticles(dt) {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.9; p.vy*=0.9;
    p.life-=dt;
    if (p.life<=0) particles.splice(i,1);
  }
  for (let i=engineTrail.length-1;i>=0;i--) {
    const p=engineTrail[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.life-=dt;
    if (p.life<=0) engineTrail.splice(i,1);
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(timestamp) {
  ctx.fillStyle='#000010';
  ctx.fillRect(0,0,W,H);

  if (state==='title') { renderTitle(); return; }

  drawStars();

  ctx.save();
  ctx.translate(W/2-player.x, H/2-player.y);

  drawBlackHole();
  drawAsteroids();
  drawItems(timestamp);
  drawStations(timestamp);
  drawPortal(timestamp);
  drawEnemies(timestamp);
  drawEngineTrail();
  drawPlayer(timestamp);
  drawBullets(timestamp);
  drawParticles();

  ctx.restore();

  drawHUD(timestamp);

  if (state==='paused') drawPaused();
  if (state==='gameover') drawGameOver();
  if (state==='victory') drawVictory(timestamp);
}

function drawStars() {
  const now = performance.now() * 0.001;
  // Nebula clouds (parallax layer 0)
  for (const nb of nebulas) {
    const px = ((nb.x - player.x*nb.speed) % (W*3) + W*3) % (W*3) - W;
    const py = ((nb.y - player.y*nb.speed) % (H*3) + H*3) % (H*3) - H;
    const grad = ctx.createRadialGradient(px,py,0,px,py,nb.rx);
    grad.addColorStop(0, nb.color+`,${nb.alpha})`);
    grad.addColorStop(1, nb.color+',0)');
    ctx.save();
    ctx.translate(px,py);
    ctx.rotate(nb.angle);
    ctx.scale(1, nb.ry/nb.rx);
    ctx.translate(-px,-py);
    ctx.beginPath(); ctx.arc(px,py,nb.rx,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.restore();
  }
  // Stars with color twinkling
  for (const s of stars) {
    const px = ((s.x - player.x*s.speed) % W + W*2) % W;
    const py = ((s.y - player.y*s.speed) % H + H*2) % H;
    const twinkle = s.sz > 1.3 ? 0.5+0.5*Math.sin(now*1.8+s.twinkleOff) : 1;
    ctx.globalAlpha = s.brightness * twinkle;
    ctx.fillStyle = s.color;
    ctx.fillRect(px,py,s.sz,s.sz);
  }
  ctx.globalAlpha=1;
}

function drawBlackHole() {
  const x=0,y=0,r=BH_RADIUS;
  // Outer glow
  const grad=ctx.createRadialGradient(x,y,r*0.5,x,y,r*2.5);
  grad.addColorStop(0,'rgba(80,0,120,0.6)');
  grad.addColorStop(0.5,'rgba(30,0,60,0.3)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(x,y,r*2.5,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();

  // Core
  const coreGrad=ctx.createRadialGradient(x,y,0,x,y,r);
  coreGrad.addColorStop(0,'rgba(0,0,0,1)');
  coreGrad.addColorStop(0.7,'rgba(10,0,20,0.95)');
  coreGrad.addColorStop(1,'rgba(60,0,100,0.8)');
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=coreGrad;
  ctx.fill();

  // Accretion ring
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(gameTime*0.3);
  for (let i=0;i<3;i++) {
    ctx.rotate(Math.PI*2/3);
    ctx.beginPath();
    ctx.ellipse(0,0,r*1.6,r*0.4,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(150,50,255,${0.3-i*0.08})`;
    ctx.lineWidth=3-i;
    ctx.stroke();
  }
  ctx.restore();
}

function drawAsteroids() {
  for (const [,chunk] of chunks) {
    for (const ast of chunk.asteroids) {
      if (!ast.alive) continue;
      const dx=ast.x-player.x, dy=ast.y-player.y;
      if (Math.abs(dx)>W&&Math.abs(dy)>H) continue;
      ctx.save();
      ctx.translate(ast.x,ast.y);
      ctx.beginPath();
      ctx.moveTo(ast.verts[0].x,ast.verts[0].y);
      for (let i=1;i<ast.verts.length;i++) ctx.lineTo(ast.verts[i].x,ast.verts[i].y);
      ctx.closePath();
      ctx.fillStyle=ast.color;
      ctx.fill();
      ctx.strokeStyle='rgba(200,200,200,0.2)';
      ctx.lineWidth=1;
      ctx.stroke();
      // HP bar (always visible — tells player it's breakable)
      const hpf=ast.hp/ast.maxHp;
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.fillRect(-ast.r, -ast.r-10, ast.r*2, 5);
      ctx.fillStyle=hpf>0.5?'#ff8833':'#ffcc00';
      ctx.fillRect(-ast.r, -ast.r-10, ast.r*2*hpf, 5);
      // Ore icon hint
      ctx.fillStyle='rgba(180,130,60,0.7)';
      ctx.font='9px monospace';
      ctx.textAlign='center';
      ctx.fillText('⛏ '+ast.ore, 0, ast.r+12);
      ctx.restore();
    }
  }
}

function drawItems(t) {
  for (const [,chunk] of chunks) {
    for (const item of chunk.items) {
      if (!item.alive) continue;
      const bob = Math.sin(t*0.001*2.8+item.bobOffset)*4;
      const sx = item.x - player.x + W/2;
      const sy = item.y - player.y + H/2;
      if (sx<-80||sx>W+80||sy<-80||sy>H+80) continue;
      ctx.save();
      ctx.translate(item.x, item.y+bob);
      drawItemIcon(item.type, item.r, t, item.bobOffset||0);
      ctx.restore();
    }
  }
}

function drawItemIcon(type, r, t, seed) {
  ctx.shadowBlur = 0;
  if (type === 'ore') {
    // Jagged rock with orange veins
    ctx.shadowColor='#dd8833'; ctx.shadowBlur=10;
    ctx.fillStyle='#5a3a18'; ctx.strokeStyle='#bb6622'; ctx.lineWidth=2;
    ctx.beginPath();
    const n=8;
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2;
      const rd=r*(0.65+0.38*Math.sin(a*3.1+seed*7+1.2));
      i===0?ctx.moveTo(Math.cos(a)*rd,Math.sin(a)*rd):ctx.lineTo(Math.cos(a)*rd,Math.sin(a)*rd);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Orange mineral veins
    ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,140,40,0.65)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-r*.4,-r*.2); ctx.lineTo(r*.3,r*.35); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*.1,-r*.45); ctx.lineTo(r*.15,-r*.1); ctx.stroke();

  } else if (type === 'crystal') {
    // Tall gem with facets
    ctx.shadowColor='#cc44ff'; ctx.shadowBlur=20;
    ctx.fillStyle='#2a0044'; ctx.strokeStyle='#dd66ff'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(0, -r*1.35);
    ctx.lineTo(r*.85, -r*.2); ctx.lineTo(r*.6, r*.9);
    ctx.lineTo(-r*.6, r*.9); ctx.lineTo(-r*.85,-r*.2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Inner facet lines
    ctx.shadowBlur=0; ctx.strokeStyle='rgba(230,160,255,.45)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,-r*1.35); ctx.lineTo(0,r*.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*.85,-r*.2); ctx.lineTo(r*.85,-r*.2); ctx.stroke();
    // Shine spot
    ctx.fillStyle='rgba(255,220,255,.65)';
    ctx.beginPath(); ctx.arc(-r*.22,-r*.55,r*.13,0,Math.PI*2); ctx.fill();

  } else if (type === 'alientech') {
    // Hexagonal circuit board
    ctx.shadowColor='#ffee00'; ctx.shadowBlur=16;
    ctx.fillStyle='#1a1100'; ctx.strokeStyle='#ffcc00'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2+Math.PI/6;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Circuit traces
    ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,200,0,.65)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-r*.6,0); ctx.lineTo(r*.6,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-r*.6); ctx.lineTo(0,r*.6); ctx.stroke();
    // Solder dots
    ctx.fillStyle='#ffdd00';
    [[r*.5,0],[0,-r*.5],[-r*.45,r*.28],[r*.3,r*.42]].forEach(([px,py])=>{
      ctx.beginPath(); ctx.arc(px,py,r*.1,0,Math.PI*2); ctx.fill();
    });
    ctx.beginPath(); ctx.arc(0,0,r*.22,0,Math.PI*2); ctx.fill();

  } else if (type === 'energy') {
    // Battery cell with lightning bolt
    ctx.shadowColor='#00ffcc'; ctx.shadowBlur=16;
    const bw=r*.9, bh=r*1.7;
    ctx.fillStyle='#002233'; ctx.strokeStyle='#00ddbb'; ctx.lineWidth=2;
    ctx.fillRect(-bw,-bh*.5,bw*2,bh);
    ctx.strokeRect(-bw,-bh*.5,bw*2,bh);
    // Terminal cap
    ctx.fillStyle='#00ffcc';
    ctx.fillRect(-bw*.35,-bh*.5-r*.2,bw*.7,r*.22);
    // Charge bar
    ctx.fillStyle='#00ffcc';
    ctx.fillRect(-bw+3,-bh*.5+3,bw*2-6,bh*.62);
    // Lightning bolt cutout
    ctx.fillStyle='#001a22';
    ctx.beginPath();
    ctx.moveTo(-r*.18,-r*.42); ctx.lineTo(r*.1,-r*.04);
    ctx.lineTo(-r*.06,-r*.04); ctx.lineTo(r*.18,r*.42);
    ctx.lineTo(-r*.1,r*.04); ctx.lineTo(r*.06,r*.04);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;

  } else if (type === 'hull') {
    // Shield shape with cross
    ctx.shadowColor='#4488ff'; ctx.shadowBlur=16;
    ctx.fillStyle='#001144'; ctx.strokeStyle='#4488ff'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(0, -r*1.1);
    ctx.lineTo(r, -r*.4); ctx.lineTo(r, r*.35);
    ctx.quadraticCurveTo(r, r*1.15, 0, r*1.4);
    ctx.quadraticCurveTo(-r, r*1.15, -r, r*.35);
    ctx.lineTo(-r, -r*.4);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Shine
    ctx.shadowBlur=0; ctx.strokeStyle='rgba(120,180,255,.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-r*.4,-r*.7); ctx.lineTo(-r*.1,r*.3); ctx.stroke();
    // Cross
    ctx.strokeStyle='rgba(120,180,255,.75)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(0,-r*.4); ctx.lineTo(0,r*.55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*.38,r*.08); ctx.lineTo(r*.38,r*.08); ctx.stroke();
    ctx.shadowBlur=0;

  } else if (type === 'warpcore') {
    // Pulsing orb with orbiting stars
    const pulse=0.75+0.25*Math.sin(t*0.005);
    ctx.shadowColor='#ffdd00'; ctx.shadowBlur=28*pulse;
    ctx.beginPath(); ctx.arc(0,0,r*pulse,0,Math.PI*2);
    ctx.fillStyle='#ffdd00'; ctx.fill(); ctx.shadowBlur=0;
    // Outer ring
    ctx.strokeStyle='rgba(255,220,80,.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,r*1.5,0,Math.PI*2); ctx.stroke();
    // Orbiting dots
    ctx.fillStyle='#ffffff';
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2+t*0.002;
      ctx.beginPath(); ctx.arc(Math.cos(a)*r*1.5,Math.sin(a)*r*1.5,2.5,0,Math.PI*2); ctx.fill();
    }

  } else if (type === 'fuel') {
    // Fuel canister — orange cylinder with spark
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=14;
    const fw=r*0.75, fh=r*1.6;
    ctx.fillStyle='#331500'; ctx.strokeStyle='#ff7700'; ctx.lineWidth=2;
    ctx.fillRect(-fw,-fh*0.5,fw*2,fh);
    ctx.strokeRect(-fw,-fh*0.5,fw*2,fh);
    // Label band
    ctx.fillStyle='#ff9900';
    ctx.fillRect(-fw,-fh*0.12,fw*2,fh*0.24);
    // Cap top
    ctx.fillStyle='#ffcc44';
    ctx.fillRect(-fw*0.4,-fh*0.5-r*0.18,fw*0.8,r*0.2);
    // Flame spark
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.moveTo(0,-fh*0.42); ctx.lineTo(r*0.15,-fh*0.18); ctx.lineTo(-r*0.1,-fh*0.22);
    ctx.lineTo(0,-fh*0.05); ctx.lineTo(-r*0.15,-fh*0.22); ctx.lineTo(r*0.1,-fh*0.18);
    ctx.closePath(); ctx.fill();
  }
}

function drawStations(t) {
  for (const [,chunk] of chunks) {
    if (!chunk.station||!chunk.station.alive) continue;
    const st=chunk.station;
    ctx.save();
    ctx.translate(st.x,st.y);
    ctx.rotate(st.angle+t*0.0002);
    // Body
    ctx.fillStyle='#334455';
    ctx.strokeStyle='#55aaff';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.rect(-st.r,-st.r,st.r*2,st.r*2);
    ctx.fill(); ctx.stroke();
    // Solar panels
    ctx.fillStyle='#223366';
    ctx.strokeStyle='#4477cc';
    ctx.lineWidth=1;
    ctx.fillRect(-st.r*2.5,-6,st.r*1.4,12);
    ctx.strokeRect(-st.r*2.5,-6,st.r*1.4,12);
    ctx.fillRect(st.r+0,-6,st.r*1.4,12);
    ctx.strokeRect(st.r+0,-6,st.r*1.4,12);
    // Light
    const pulse=0.5+0.5*Math.sin(t*0.001*3);
    ctx.fillStyle=`rgba(0,255,150,${pulse})`;
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Interaction prompt
    const d=dist(player.x,player.y,st.x,st.y);
    if (d<120) {
      ctx.save();
      ctx.translate(st.x,st.y-50);
      ctx.fillStyle='rgba(0,0,0,0.7)';
      ctx.fillRect(-70,-14,140,24);
      ctx.fillStyle='#88ffcc';
      ctx.font='13px Courier New';
      ctx.textAlign='center';
      ctx.fillText('按 E 進入太空站',0,4);
      ctx.restore();
    }
  }
}

function drawPortal(t) {
  if (player.warpCores<5) return;
  const pcx=Math.floor(ESCAPE_PORTAL_POS.x/CHUNK), pcy=Math.floor(ESCAPE_PORTAL_POS.y/CHUNK);
  const chunk=chunks.get(chunkKey(pcx,pcy));
  if (!chunk||!chunk.portal||!chunk.portal.active) return;
  const por=chunk.portal;
  ctx.save();
  ctx.translate(por.x,por.y);
  ctx.rotate(t*0.001*1.5);
  for (let i=0;i<3;i++) {
    ctx.rotate(Math.PI*2/3);
    const grad=ctx.createRadialGradient(0,0,por.r*0.3,0,0,por.r*1.5);
    grad.addColorStop(0,'rgba(0,255,255,0.8)');
    grad.addColorStop(1,'rgba(0,255,255,0)');
    ctx.beginPath(); ctx.arc(0,0,por.r*1.5,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
  }
  const innerGrad=ctx.createRadialGradient(0,0,0,0,0,por.r);
  innerGrad.addColorStop(0,'rgba(255,255,255,0.9)');
  innerGrad.addColorStop(0.5,'rgba(0,200,255,0.7)');
  innerGrad.addColorStop(1,'rgba(0,100,200,0.2)');
  ctx.beginPath(); ctx.arc(0,0,por.r,0,Math.PI*2);
  ctx.fillStyle=innerGrad; ctx.fill();
  ctx.restore();

  // Label
  ctx.save();
  ctx.translate(por.x,por.y-80);
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(-60,-14,120,24);
  ctx.fillStyle='#00ffff';
  ctx.font='bold 13px Courier New';
  ctx.textAlign='center';
  ctx.fillText('逃脫傳送門',0,4);
  ctx.restore();
}

function drawOneEnemy(en, t) {
  ctx.save();
  ctx.translate(en.x,en.y);
  ctx.rotate(en.angle);
  const r=en.r;
  // Hunter glow
  if (en.isHunter) {
    ctx.shadowColor='#ff2200'; ctx.shadowBlur=18;
  }
  if (en.type==='drone') {
    ctx.beginPath();
    for (let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();
    ctx.fillStyle='#334455'; ctx.fill();
    ctx.strokeStyle='#88aacc'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fillStyle='#88aacc'; ctx.fill();
  } else if (en.type==='pirate') {
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(-r*0.7,r*0.6); ctx.lineTo(-r*0.4,0); ctx.lineTo(-r*0.7,-r*0.6);
    ctx.closePath();
    ctx.fillStyle='#553322'; ctx.fill(); ctx.strokeStyle='#ff8833'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#ff5500'; ctx.beginPath(); ctx.arc(-r*0.4,0,4,0,Math.PI*2); ctx.fill();
  } else if (en.type==='alien') {
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(0,r*0.7); ctx.lineTo(-r,0); ctx.lineTo(0,-r*0.7);
    ctx.closePath();
    ctx.fillStyle='#220033'; ctx.fill(); ctx.strokeStyle='#aa44ff'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#cc66ff'; ctx.lineWidth=1;
    for(let i=0;i<4;i++){const a=i/4*Math.PI*2+Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5);ctx.lineTo(Math.cos(a)*r*1.4,Math.sin(a)*r*1.4);ctx.stroke();}
  } else if (en.type==='gunship') {
    ctx.beginPath();
    ctx.moveTo(r*1.1,r*0.35); ctx.lineTo(r*1.1,-r*0.35);
    ctx.lineTo(-r*0.6,-r*0.55); ctx.lineTo(-r*1.0,-r*0.55);
    ctx.lineTo(-r*1.0,r*0.55); ctx.lineTo(-r*0.6,r*0.55);
    ctx.closePath();
    ctx.fillStyle='#1a1a2e'; ctx.fill(); ctx.strokeStyle='#ff4444'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#cc3333'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(r*0.6,r*0.28); ctx.lineTo(r*1.4,r*0.28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.6,-r*0.28); ctx.lineTo(r*1.4,-r*0.28); ctx.stroke();
    ctx.fillStyle='#ff3300';
    ctx.beginPath(); ctx.arc(-r*0.9,r*0.35,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-r*0.9,-r*0.35,4,0,Math.PI*2); ctx.fill();
  } else if (en.type==='carrier') {
    // Capital ship — large hexagonal body with multiple gun ports
    const pulse=0.7+0.3*Math.sin(t*0.003+en.droneSpawnTimer||0);
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=20*pulse;
    // Main hull (large rectangle)
    ctx.fillStyle='#1a0a00';
    ctx.fillRect(-r*1.2,-r*0.65,r*2.4,r*1.3);
    ctx.strokeStyle='#cc4400'; ctx.lineWidth=3;
    ctx.strokeRect(-r*1.2,-r*0.65,r*2.4,r*1.3);
    // Bridge
    ctx.fillStyle='#331100';
    ctx.fillRect(-r*0.4,-r*0.4,r*0.8,r*0.8);
    ctx.strokeStyle='#ff6600'; ctx.lineWidth=1;
    ctx.strokeRect(-r*0.4,-r*0.4,r*0.8,r*0.8);
    // Gun ports (5 total)
    ctx.fillStyle='#ff3300';
    for(let gi=0;gi<5;gi++) {
      const gx=r*1.2+4; const gy=-r*0.5+gi*r*0.25;
      ctx.beginPath(); ctx.arc(gx,gy,4,0,Math.PI*2); ctx.fill();
    }
    // Warning beacon (pulsing)
    ctx.fillStyle=`rgba(255,100,0,${pulse})`;
    ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
    // Drone bay indicator
    const dtPct=1-(en.droneSpawnTimer||0)/(en.droneSpawnCD||8);
    ctx.fillStyle='#222200'; ctx.fillRect(-r*0.8,r*0.55,r*1.6,6);
    ctx.fillStyle=`hsl(${40+dtPct*20},100%,55%)`; ctx.fillRect(-r*0.8,r*0.55,r*1.6*dtPct,6);
  }
  ctx.shadowBlur=0;
  const hpFrac=en.hp/en.maxHp;
  ctx.fillStyle='#550000'; ctx.fillRect(-r,-r-14,r*2,6);
  ctx.fillStyle=hpFrac>0.5?'#00cc44':'#ff4400'; ctx.fillRect(-r,-r-14,r*2*hpFrac,6);
  if (en.type==='carrier') {
    // Show BOSS label
    ctx.fillStyle='#ff4400'; ctx.font='bold 10px Courier New'; ctx.textAlign='center';
    ctx.fillText('母艦',0,-r-18);
  }
  ctx.restore();
}

function drawEnemies(t) {
  for (const [,chunk] of chunks) {
    for (const en of chunk.enemies) {
      if (!en.alive) continue;
      drawOneEnemy(en, t);
    }
  }
  // Dynamic hunter enemies
  for (const en of dynamicEnemies) {
    if (!en.alive) continue;
    drawOneEnemy(en, t);
  }
}

function drawEngineTrail() {
  for (const p of engineTrail) {
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha*0.7;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3*alpha,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPlayer(t) {
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(player.angle);

  // Warp flash — cyan ring on arrival
  if (player.warpFlash>0) {
    const wf=player.warpFlash/1.2;
    ctx.beginPath(); ctx.arc(0,0,32+30*(1-wf),0,Math.PI*2);
    ctx.strokeStyle=`rgba(100,255,255,${wf*0.85})`;
    ctx.lineWidth=4*wf;
    ctx.shadowColor='#00ffff'; ctx.shadowBlur=20*wf;
    ctx.stroke(); ctx.shadowBlur=0;
  }

  // Shield bubble
  if (player.shield>0) {
    const sf=player.shield/player.maxShield;
    ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,150,255,${sf*0.4})`;
    ctx.lineWidth=2;
    if (player.invulTimer>0) ctx.strokeStyle=`rgba(255,255,255,${sf*0.6})`;
    ctx.stroke();
  }

  // Engine glow
  const engGrad=ctx.createRadialGradient(-20,0,0,-20,0,14);
  engGrad.addColorStop(0,'rgba(0,150,255,0.9)');
  engGrad.addColorStop(1,'rgba(0,50,255,0)');
  ctx.beginPath(); ctx.arc(-20,0,14,0,Math.PI*2);
  ctx.fillStyle=engGrad; ctx.fill();

  // Ship body
  ctx.beginPath();
  ctx.moveTo(24,0);
  ctx.lineTo(-14,13);
  ctx.lineTo(-8,0);
  ctx.lineTo(-14,-13);
  ctx.closePath();
  if (player.invulTimer>0&&Math.floor(t*0.01)%2===0) {
    ctx.fillStyle='rgba(255,255,255,0.8)';
  } else {
    ctx.fillStyle='#334466';
  }
  ctx.fill();
  ctx.strokeStyle='#66aaff';
  ctx.lineWidth=2;
  ctx.stroke();

  // Cockpit
  ctx.beginPath(); ctx.arc(10,0,5,0,Math.PI*2);
  ctx.fillStyle='#aaddff'; ctx.fill();

  ctx.restore();
}

function drawBullets(t) {
  for (const b of bullets) {
    const ang=Math.atan2(b.vy,b.vx);
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(ang);
    if (b.isMissile) {
      // Homing missile — red warhead with exhaust trail
      ctx.shadowColor='#ff2200'; ctx.shadowBlur=14;
      ctx.fillStyle='#cc2200';
      ctx.beginPath(); ctx.moveTo(b.r+2,0); ctx.lineTo(-b.r,b.r*0.5); ctx.lineTo(-b.r,-b.r*0.5); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ff6600';
      ctx.beginPath(); ctx.arc(b.r,0,3,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ff4400'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-b.r,0); ctx.lineTo(-b.r-8+Math.random()*6,0); ctx.stroke();
    } else if (b.pierce) {
      // Heavy cannon — big orange glowing orb
      ctx.shadowColor='#ff6600'; ctx.shadowBlur=18;
      ctx.fillStyle='#ff8800';
      ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ffcc44'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.stroke();
    } else {
      ctx.shadowColor='#88ffff'; ctx.shadowBlur=8;
      ctx.fillStyle='#00ffff';
      ctx.beginPath(); ctx.ellipse(0,0,8,3,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  ctx.shadowBlur=0;
  for (const b of enemyBullets) {
    const ang=Math.atan2(b.vy,b.vx);
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(ang);
    if (b.homing) {
      // Homing bolt: pulsing purple orb with crosshair
      const pulse=0.8+0.2*Math.sin(t*0.015);
      ctx.shadowColor='#cc44ff'; ctx.shadowBlur=14*pulse;
      ctx.fillStyle='#cc44ff';
      ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(200,100,255,0.7)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(8,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(0,8); ctx.stroke();
    } else {
      ctx.fillStyle='#ff6600';
      ctx.shadowColor='#ff6600'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(0,0,7,3,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  ctx.shadowBlur=0;
}

function drawParticles() {
  for (const p of particles) {
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*alpha,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD(t) {
  // Top left panel
  ctx.fillStyle='rgba(0,5,20,0.75)';
  ctx.fillRect(10,10,220,122);
  ctx.strokeStyle='rgba(50,100,200,0.5)';
  ctx.lineWidth=1;
  ctx.strokeRect(10,10,220,122);

  // Hull bar
  ctx.fillStyle='#331111';
  ctx.fillRect(50,20,160,14);
  const hf=player.hull/player.maxHull;
  ctx.fillStyle=hf>0.5?'#cc2222':hf>0.25?'#ff6600':'#ff0000';
  ctx.fillRect(50,20,160*hf,14);
  ctx.fillStyle='#ffffff'; ctx.font='13px Courier New'; ctx.textAlign='left';
  ctx.fillText('船殼',14,32);
  ctx.fillText(`${Math.ceil(player.hull)}/${player.maxHull}`,55,31);

  // Shield bar
  ctx.fillStyle='#111133';
  ctx.fillRect(50,40,160,14);
  const sf=player.shield/player.maxShield;
  ctx.fillStyle='#2255cc';
  ctx.fillRect(50,40,160*sf,14);
  ctx.fillStyle='#aaddff';
  ctx.fillText('護盾',14,52);
  ctx.fillText(`${Math.ceil(player.shield)}/${player.maxShield}`,55,51);

  // Boost fuel bar
  const boostY = 60;
  ctx.fillStyle='#112200';
  ctx.fillRect(50,boostY,160,10);
  const bf=player.boostFuel/player.maxBoostFuel;
  const bfLow = bf < 0.2;
  const bfBlink = bfLow && Math.floor(performance.now()*0.005)%2===0;
  ctx.fillStyle=player.boosting?'#aaff22':bfLow?(bfBlink?'#ff4400':'#882200'):'#55aa22';
  ctx.fillRect(50,boostY,160*bf,10);
  ctx.fillStyle=player.boosting?'#ccff44':bfLow?'#ff8844':'#88cc44';
  ctx.fillText('加速',14,boostY+9);
  if (player.boosting) {
    ctx.fillStyle='#ccff44'; ctx.font='bold 13px Courier New';
    ctx.fillText('◀▶ BOOST!',90,boostY+9);
    ctx.font='13px Courier New';
  } else if (bfLow && bfBlink) {
    ctx.fillStyle='#ff6633'; ctx.font='bold 11px Courier New';
    ctx.fillText('⚠ 燃料不足',55,boostY+9);
    ctx.font='13px Courier New';
  }

  // Resources
  ctx.fillStyle='#aaaaaa'; ctx.font='13px Courier New';
  ctx.fillText(`礦石: ${player.ore}  晶體: ${player.crystal}  異星: ${player.alienTech}`,14,90);

  // Return charges
  if (player.returnCharges > 0) {
    ctx.fillStyle='#44ffee';
    ctx.fillText(`[R] 回到原點  ×${player.returnCharges}`,14,108);
  } else {
    ctx.fillStyle='rgba(100,140,140,0.55)';
    ctx.fillText('[R] 回到原點  ×0',14,108);
  }

  // Speed / gravity warning
  const d=dist(player.x,player.y,0,0);
  if (d<600) {
    ctx.fillStyle='rgba(150,0,200,0.15)';
    ctx.fillRect(10,138,220,20);
    ctx.fillStyle='#cc66ff'; ctx.font='13px Courier New';
    ctx.fillText('⚠ 黑洞引力強化中',14,152);
  }

  // Top center: Warp cores
  const cx2=W/2;
  ctx.fillStyle='rgba(0,5,20,0.75)';
  ctx.fillRect(cx2-120,10,240,36);
  ctx.strokeStyle='rgba(50,100,200,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(cx2-120,10,240,36);
  ctx.fillStyle='#aaaaaa'; ctx.font='13px Courier New'; ctx.textAlign='center';
  ctx.fillText('翹曲核心',cx2,24);
  for (let i=0;i<5;i++) {
    const sx=cx2-90+i*38;
    const collected=i<player.warpCores;
    if (collected) {
      const pulse=0.7+0.3*Math.sin(t*0.001*4+i);
      ctx.fillStyle=`rgba(255,220,0,${pulse})`;
      ctx.shadowColor='#ffdd00'; ctx.shadowBlur=8;
    } else {
      ctx.fillStyle='#333333';
      ctx.shadowBlur=0;
    }
    ctx.beginPath(); ctx.arc(sx,34,8,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    if (!collected) {
      ctx.strokeStyle='#555555'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(sx,34,8,0,Math.PI*2); ctx.stroke();
    }
  }

  // Minimap (top right)
  drawMinimap(t);

  // Weapon indicator (bottom left)
  if (state === 'playing') {
    const wNames = {laser:'雷射砲 ●', scatter:'散射炮 ▲▲▲', heavy:'重砲 ◆', missile:'導彈砲 ◎', wave:'波動砲 ≋'};
    const wColors = {laser:'#00ffff', scatter:'#ffee44', heavy:'#ff8800', missile:'#ff4466', wave:'#44ffaa'};
    const wm = player.weaponMode;
    ctx.fillStyle='rgba(0,5,20,0.7)';
    ctx.fillRect(10, H-50, 180, 40);
    ctx.strokeStyle=wColors[wm]+'55'; ctx.lineWidth=1;
    ctx.strokeRect(10, H-50, 180, 40);
    ctx.fillStyle=wColors[wm];
    ctx.font='bold 13px Courier New'; ctx.textAlign='left';
    ctx.fillText(wNames[wm]||wm, 18, H-30);
    // Wave charge bar
    if (wm === 'wave' && player.waveCharge > 0) {
      ctx.fillStyle='#112200'; ctx.fillRect(18, H-22, 150, 8);
      const wc=player.waveCharge;
      ctx.fillStyle=`hsl(${130-wc*50},100%,${55+wc*20}%)`;
      ctx.fillRect(18, H-22, 150*wc, 8);
      ctx.fillStyle='#88ffcc'; ctx.font='9px Courier New';
      ctx.fillText(`蓄力 ${Math.floor(wc*100)}%`, 18, H-14);
    } else if (player.unlockedWeapons.length > 1) {
      ctx.fillStyle='rgba(150,180,200,0.6)';
      ctx.font='10px Courier New';
      ctx.fillText('[Q] 切換武器', 18, H-14);
    }
  }

  // Kill combo display (bottom right area)
  if (player.killCombo >= 3 && player.killComboTimer > 0) {
    const fade = Math.min(1, player.killComboTimer);
    ctx.globalAlpha = fade;
    ctx.textAlign = 'right';
    ctx.font = 'bold 20px Courier New';
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 12;
    ctx.fillText(`${player.killCombo}連殺`, W-220, H-24);
    ctx.shadowBlur=0;
    if (player.killComboMult > 1) {
      ctx.font = '13px Courier New';
      ctx.fillStyle = '#ffaa44';
      ctx.fillText(`戰利品 ×${player.killComboMult.toFixed(1)}`, W-220, H-8);
    }
    ctx.globalAlpha=1;
  }

  // Status message (bottom center)
  if (statusTimer>0&&statusMsg) {
    const alpha=Math.min(1,statusTimer);
    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,5,20,0.8)';
    ctx.fillRect(W/2-180,H-60,360,32);
    ctx.fillStyle='#88ffcc';
    ctx.font='14px Courier New'; ctx.textAlign='center';
    ctx.fillText(statusMsg,W/2,H-38);
    ctx.globalAlpha=1;
  }

  // Warp core location hints (when none collected)
  if (player.warpCores===0 && Math.floor(t*0.001)%8<4) {
    ctx.fillStyle='rgba(255,220,0,0.5)';
    ctx.font='12px Courier New'; ctx.textAlign='center';
    ctx.fillText('翹曲核心分佈在銀河各處 — 向遠方探索！',W/2,H-70);
  }

  // Core detector HUD arrow (meta perk)
  if (metaLevel('coreDetector') > 0) {
    // Find nearest uncollected warp core
    let nearestCore = null, nearestDist = Infinity;
    for (const wcp of WARP_CORE_POSITIONS) {
      const id=`${wcp.x},${wcp.y}`;
      if (player.warpCoreSet.has(id)) continue;
      const d2 = (wcp.x-player.x)**2+(wcp.y-player.y)**2;
      if (d2 < nearestDist) { nearestDist=d2; nearestCore=wcp; }
    }
    if (nearestCore) {
      const ang = Math.atan2(nearestCore.y-player.y, nearestCore.x-player.x);
      const cx3=W/2, cy3=H/2, arrowR=Math.min(W,H)*0.38;
      const ax=cx3+Math.cos(ang)*arrowR, ay=cy3+Math.sin(ang)*arrowR;
      ctx.save(); ctx.translate(ax,ay); ctx.rotate(ang);
      const pulse=0.6+0.4*Math.sin(t*0.003);
      ctx.globalAlpha=pulse;
      ctx.fillStyle='#ffdd00';
      ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(-8,8); ctx.lineTo(-8,-8); ctx.closePath();
      ctx.fill();
      ctx.font='12px Courier New'; ctx.textAlign='center'; ctx.fillStyle='#ffdd00';
      ctx.fillText(`${Math.floor(Math.sqrt(nearestDist))}u`,0,20);
      ctx.restore(); ctx.globalAlpha=1;
    }
  }

  // Critical hull warning — red screen vignette flash
  if (player.hull / player.maxHull < 0.25) {
    const pct = 1 - player.hull/player.maxHull;
    const pulse = 0.5+0.5*Math.sin(t*0.006);
    const grad = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.75);
    grad.addColorStop(0,'rgba(150,0,0,0)');
    grad.addColorStop(1,`rgba(200,0,0,${pct*0.45*pulse})`);
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);
    if (Math.floor(t*0.005)%2===0) {
      ctx.fillStyle=`rgba(255,50,50,${pct*0.8})`;
      ctx.font='bold 16px Courier New'; ctx.textAlign='center';
      ctx.fillText('⚠ 船殼臨界損傷 ⚠', W/2, H/2-60);
    }
  }

  // Portal compass arrow when all 5 cores collected
  if (player.warpCores >= 5) {
    const px2=ESCAPE_PORTAL_POS.x, py2=ESCAPE_PORTAL_POS.y;
    const pdx=px2-player.x, pdy=py2-player.y;
    const pdist=Math.sqrt(pdx*pdx+pdy*pdy);
    if (pdist > 150) { // only show when portal not on screen
      const pang=Math.atan2(pdy,pdx);
      const arR=Math.min(W,H)*0.42;
      const ax2=W/2+Math.cos(pang)*arR, ay2=H/2+Math.sin(pang)*arR;
      const ppulse=0.7+0.3*Math.sin(t*0.004);
      ctx.save(); ctx.translate(ax2,ay2); ctx.rotate(pang);
      ctx.globalAlpha=ppulse;
      ctx.shadowColor='#00ff88'; ctx.shadowBlur=15;
      ctx.fillStyle='#00ff88';
      ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-10,10); ctx.lineTo(-10,-10); ctx.closePath(); ctx.fill();
      ctx.font='11px Courier New'; ctx.textAlign='center'; ctx.fillStyle='#44ffaa';
      ctx.fillText(`傳送門 ${Math.floor(pdist)}u`,0,22);
      ctx.restore(); ctx.globalAlpha=1; ctx.shadowBlur=0;
    }
  }
}

function drawMinimap(t) {
  const mx=W-210, my=10, mw=200, mh=200;
  const mapRange=2000;
  const scale=mw/mapRange;

  ctx.fillStyle='rgba(0,5,20,0.85)';
  ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='rgba(50,100,200,0.6)'; ctx.lineWidth=1;
  ctx.strokeRect(mx,my,mw,mh);

  ctx.save();
  ctx.beginPath(); ctx.rect(mx,my,mw,mh); ctx.clip();

  const toMapX=(wx)=>mx+mw/2+(wx-player.x)*scale;
  const toMapY=(wy)=>my+mh/2+(wy-player.y)*scale;

  // Black hole
  const bx=toMapX(0), by=toMapY(0);
  ctx.beginPath(); ctx.arc(bx,by,8,0,Math.PI*2);
  ctx.fillStyle='rgba(100,0,150,0.8)'; ctx.fill();
  ctx.strokeStyle='#660099'; ctx.lineWidth=1; ctx.stroke();

  // Asteroids (small dots)
  for (const [,chunk] of chunks) {
    for (const ast of chunk.asteroids) {
      if (!ast.alive) continue;
      const ax=toMapX(ast.x), ay=toMapY(ast.y);
      if (ax<mx||ax>mx+mw||ay<my||ay>my+mh) continue;
      ctx.fillStyle='rgba(100,80,60,0.5)';
      ctx.fillRect(ax-1,ay-1,2,2);
    }
  }

  // Space stations (green squares)
  for (const [,chunk] of chunks) {
    if (!chunk.station||!chunk.station.alive) continue;
    const sx=toMapX(chunk.station.x), sy=toMapY(chunk.station.y);
    if (sx<mx||sx>mx+mw||sy<my||sy>my+mh) continue;
    ctx.fillStyle='#00cc66';
    ctx.fillRect(sx-3,sy-3,6,6);
  }

  // Enemies (red dots)
  for (const [,chunk] of chunks) {
    for (const en of chunk.enemies) {
      if (!en.alive) continue;
      const ex=toMapX(en.x), ey=toMapY(en.y);
      if (ex<mx||ex>mx+mw||ey<my||ey>my+mh) continue;
      ctx.fillStyle='#ff3333';
      ctx.beginPath(); ctx.arc(ex,ey,2,0,Math.PI*2); ctx.fill();
    }
  }

  // Items (cyan dots)
  for (const [,chunk] of chunks) {
    for (const item of chunk.items) {
      if (!item.alive) continue;
      const ix=toMapX(item.x), iy=toMapY(item.y);
      if (ix<mx||ix>mx+mw||iy<my||iy>my+mh) continue;
      if (item.type==='warpcore') {
        const pulse=0.5+0.5*Math.sin(t*0.001*4);
        ctx.fillStyle=`rgba(255,220,0,${pulse})`;
        ctx.beginPath(); ctx.arc(ix,iy,4,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle='rgba(0,200,200,0.6)';
        ctx.beginPath(); ctx.arc(ix,iy,2,0,Math.PI*2); ctx.fill();
      }
    }
  }

  // Warp core arrows (if outside minimap range)
  for (const wcp of WARP_CORE_POSITIONS) {
    const id=`${wcp.x},${wcp.y}`;
    if (player.warpCoreSet.has(id)) continue;
    const dx=wcp.x-player.x, dy=wcp.y-player.y;
    const d2=Math.sqrt(dx*dx+dy*dy);
    if (d2>mapRange/2) {
      // Arrow at minimap edge
      const ang=Math.atan2(dy,dx);
      const ex=mx+mw/2+Math.cos(ang)*(mw/2-8);
      const ey=my+mh/2+Math.sin(ang)*(mh/2-8);
      ctx.save(); ctx.translate(ex,ey); ctx.rotate(ang);
      ctx.fillStyle='#ffdd00';
      ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-4,4); ctx.lineTo(-4,-4); ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // Portal arrow
  if (player.warpCores>=5) {
    const pdx=ESCAPE_PORTAL_POS.x-player.x, pdy=ESCAPE_PORTAL_POS.y-player.y;
    const pd=Math.sqrt(pdx*pdx+pdy*pdy);
    if (pd>mapRange/2) {
      const ang=Math.atan2(pdy,pdx);
      const ex=mx+mw/2+Math.cos(ang)*(mw/2-8);
      const ey=my+mh/2+Math.sin(ang)*(mh/2-8);
      ctx.save(); ctx.translate(ex,ey); ctx.rotate(ang);
      ctx.fillStyle='#00ffff';
      ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(-5,5); ctx.lineTo(-5,-5); ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // Player dot (center)
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(mx+mw/2,my+mh/2,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#aaaaff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(mx+mw/2,my+mh/2,6,0,Math.PI*2); ctx.stroke();

  ctx.restore();

  // Coordinates
  ctx.fillStyle='rgba(100,120,160,0.7)'; ctx.font='12px Courier New'; ctx.textAlign='right';
  ctx.fillText(`${Math.floor(player.x)}, ${Math.floor(player.y)}`,mx+mw-2,my+mh+12);
}

// ─── SCREENS ──────────────────────────────────────────────────────────────────
function renderTitle() {
  // Starfield on title
  for (const s of stars) {
    const px=(s.x*3%W+W)%W, py=(s.y*3%H+H)%H;
    ctx.globalAlpha=s.brightness*0.6;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(px,py,s.sz,s.sz);
  }
  ctx.globalAlpha=1;

  // Title glow
  const t=performance.now();
  const pulse=0.8+0.2*Math.sin(t*0.001);

  ctx.save();
  ctx.textAlign='center';

  // Big title
  ctx.font=`bold 56px 'Courier New', monospace`;
  ctx.shadowColor='#4488ff'; ctx.shadowBlur=30*pulse;
  ctx.fillStyle=`rgba(100,170,255,${pulse})`;
  ctx.fillText('虛空領航員',W/2,H/2-120);

  ctx.font='24px Courier New';
  ctx.fillStyle='#6699cc';
  ctx.shadowBlur=10;
  ctx.fillText('Void Navigator',W/2,H/2-75);

  ctx.shadowBlur=0;

  // Story
  ctx.font='14px Courier New';
  ctx.fillStyle='#8899aa';
  const lines=['領航員陳，你被黑洞吸入了未知的銀河！','駕駛你的太空艇，蒐集5個翹曲核心，逃離這裡！'];
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H/2+i*22));

  // ── Difficulty selector ──
  const dc = DIFFICULTIES[difficulty];
  const selY = H/2 + 55;
  ctx.font='13px Courier New';
  ctx.fillStyle='#556688';
  ctx.fillText('— 難度選擇 —',W/2,selY-6);

  // 5 difficulty pills
  const pillW=90, pillGap=8, totalW=(pillW+pillGap)*5-pillGap;
  const startX = W/2 - totalW/2;
  for (let i=0;i<5;i++) {
    const d2=DIFFICULTIES[i];
    const px=startX+i*(pillW+pillGap);
    const py=selY+6;
    const isSelected=(i===difficulty);
    ctx.fillStyle=isSelected?d2.color+'33':'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.roundRect(px,py,pillW,32,6); ctx.fill();
    ctx.strokeStyle=isSelected?d2.color:'rgba(255,255,255,0.15)';
    ctx.lineWidth=isSelected?2:1;
    ctx.beginPath(); ctx.roundRect(px,py,pillW,32,6); ctx.stroke();
    ctx.fillStyle=isSelected?d2.color:'#667788';
    ctx.font=isSelected?'bold 12px Courier New':'12px Courier New';
    ctx.textAlign='center';
    ctx.fillText(d2.name,px+pillW/2,py+13);
    ctx.font='10px Courier New';
    ctx.fillStyle=isSelected?d2.color+'cc':'#445566';
    ctx.fillText(d2.sub,px+pillW/2,py+25);
  }

  // Selected difficulty description
  ctx.font='12px Courier New';
  ctx.fillStyle=dc.color;
  ctx.fillText(dc.desc,W/2,selY+52);
  ctx.fillStyle='#445566';
  ctx.fillText('← → 更換難度   數字鍵 1-5',W/2,selY+68);

  // Controls
  ctx.font='12px Courier New';
  ctx.fillStyle='#445566';
  const controls=['WASD: 推進   Shift: 加速器   滑鼠: 瞄準   左鍵/空白: 射擊',
                  'R: 回到原點   Q: 切換武器（太空站購買散射炮/重砲）'];
  controls.forEach((l,i)=>ctx.fillText(l,W/2,selY+88+i*18));

  // Start prompt
  const blinkAlpha=0.5+0.5*Math.sin(t*0.002);
  ctx.globalAlpha=blinkAlpha;
  ctx.font='18px Courier New';
  ctx.fillStyle='#aaddff';
  ctx.fillText('按 ENTER 或點擊開始',W/2,selY+116);
  ctx.globalAlpha=1;

  ctx.restore();
}

function drawPaused() {
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 48px Courier New';
  ctx.fillStyle='#aaddff';
  ctx.shadowColor='#4488ff'; ctx.shadowBlur=20;
  ctx.fillText('PAUSED',W/2,H/2);
  ctx.shadowBlur=0;
  ctx.font='16px Courier New';
  ctx.fillStyle='#7799aa';
  ctx.fillText('按 ESC 繼續',W/2,H/2+40);
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 44px Courier New';
  ctx.fillStyle='#ff4422';
  ctx.shadowColor='#ff2200'; ctx.shadowBlur=20;
  ctx.fillText('太空艇毀滅，任務失敗',W/2,H/2-60);
  ctx.shadowBlur=0;
  ctx.font='16px Courier New';
  ctx.fillStyle='#aa8877';
  ctx.fillText(`礦石: ${player.ore}  晶體: ${player.crystal}  翹曲核心: ${player.warpCores}/5`,W/2,H/2-10);
  ctx.fillText(`存活時間: ${Math.floor(playTime)}秒`,W/2,H/2+20);
  ctx.font='18px Courier New';
  ctx.fillStyle='#aaddff';
  const blinkAlpha=0.5+0.5*Math.sin(performance.now()*0.002);
  ctx.globalAlpha=blinkAlpha;
  ctx.fillText('按 ENTER 重新開始',W/2,H/2+70);
  ctx.globalAlpha=1;
}

function drawVictory(t) {
  // Victory particles
  if (Math.random()<0.3) {
    const px=Math.random()*W, py=Math.random()*H;
    spawnParticle(px-player.x+W/2,py-player.y+H/2,
      (Math.random()-0.5)*100,(Math.random()-0.5)*100,1,
      `hsl(${Math.random()*360},100%,70%)`,3);
  }

  ctx.fillStyle='rgba(0,0,20,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  const pulse=0.8+0.2*Math.sin(t*0.002);
  ctx.font='bold 42px Courier New';
  ctx.fillStyle=`rgba(0,255,200,${pulse})`;
  ctx.shadowColor='#00ffcc'; ctx.shadowBlur=25*pulse;
  ctx.fillText('你逃出去了！成功返回地球！',W/2,H/2-70);
  ctx.shadowBlur=0;

  const dc=DIFFICULTIES[difficulty];
  ctx.font='14px Courier New';
  ctx.fillStyle=dc.color;
  ctx.fillText(`難度：${dc.name} (${dc.sub})  ×${dc.creditMult.toFixed(1)} 星際幣`,W/2,H/2-28);

  ctx.font='16px Courier New';
  ctx.fillStyle='#88ccff';
  ctx.fillText(`飛行時間: ${Math.floor(playTime)}秒`,W/2,H/2+4);
  ctx.fillText(`礦石: ${player.ore}  晶體: ${player.crystal}  異星科技: ${player.alienTech}`,W/2,H/2+26);

  const blinkAlpha=0.5+0.5*Math.sin(t*0.003);
  ctx.globalAlpha=blinkAlpha;
  ctx.font='18px Courier New';
  ctx.fillStyle='#ffee88';
  ctx.fillText('按 ENTER 再次挑戰',W/2,H/2+72);
  ctx.globalAlpha=1;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(timestamp) {
  const dt=Math.min((timestamp-lastTime)/1000,0.05);
  lastTime=timestamp;
  update(dt);
  audio.tickMusic(dt);
  render(timestamp);
  requestAnimationFrame(loop);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
player = createPlayer();
// Pre-generate origin chunk
generateChunk(0,0);
generateChunk(1,0);
generateChunk(-1,0);
generateChunk(0,1);
generateChunk(0,-1);
generateChunk(2,0);  // guaranteed station here

requestAnimationFrame(loop);
</script>
