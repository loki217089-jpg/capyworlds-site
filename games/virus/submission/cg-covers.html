<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIRUS.EXE — CrazyGames Cover Generator</title>
<style>
body { background:#050a05; color:#00ff41; font-family:monospace; padding:20px; margin:0; }
h1 { color:#39ff14; text-shadow:0 0 20px #00ff41; letter-spacing:4px; margin-bottom:4px; }
p.sub { color:#336633; margin:0 0 20px; font-size:13px; }
.tabs { display:flex; gap:8px; margin-bottom:16px; }
.tab { padding:8px 20px; border:1px solid #1a3a1a; background:#090f09; color:#336633;
  cursor:pointer; font-family:monospace; font-size:13px; letter-spacing:1px; }
.tab.active { border-color:#00ff41; color:#00ff41; background:#0d1a0d; }
.section { display:none; flex-direction:column; align-items:center; gap:12px; }
.section.active { display:flex; }
canvas { border:1px solid #1a3a1a; max-width:100%; }
button.dl { padding:10px 36px; background:#050a05; border:2px solid #00ff41; color:#00ff41;
  font-size:16px; font-family:monospace; cursor:pointer; letter-spacing:2px; }
button.dl:hover { background:#0d1a0d; }
.size-label { color:#336633; font-size:12px; }
</style>
</head>
<body>
<h1>VIRUS.EXE — CG Cover Generator</h1>
<p class="sub">CrazyGames 封面圖產生器 | 共3張尺寸</p>
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Landscape 1920×1080</div>
  <div class="tab" onclick="switchTab(1)">Portrait 800×1200</div>
  <div class="tab" onclick="switchTab(2)">Square 800×800</div>
</div>

<div class="section active" id="sec0">
  <canvas id="cvL" width="1920" height="1080" style="max-width:960px;max-height:540px;"></canvas>
  <div class="size-label">1920 × 1080 px (Landscape 16:9)</div>
  <button class="dl" onclick="download('cvL','virus-exe-landscape-1920x1080.png')">⬇ Download Landscape PNG</button>
</div>
<div class="section" id="sec1">
  <canvas id="cvP" width="800" height="1200" style="max-width:400px;max-height:600px;"></canvas>
  <div class="size-label">800 × 1200 px (Portrait 2:3)</div>
  <button class="dl" onclick="download('cvP','virus-exe-portrait-800x1200.png')">⬇ Download Portrait PNG</button>
</div>
<div class="section" id="sec2">
  <canvas id="cvS" width="800" height="800" style="max-width:600px;max-height:600px;"></canvas>
  <div class="size-label">800 × 800 px (Square 1:1)</div>
  <button class="dl" onclick="download('cvS','virus-exe-square-800x800.png')">⬇ Download Square PNG</button>
</div>

<script>
const font = new FontFace('VT323','url(https://fonts.gstatic.com/s/vt323/v17/pxiKyp0ihIEF2isfFJU.woff2)');
font.load().then(f=>{ document.fonts.add(f); drawAll(); }).catch(()=>drawAll());

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.section').forEach((s,j)=>s.classList.toggle('active',i===j));
}

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function hexBg(ctx,W,H,count){
  const chars='0123456789ABCDEF';
  ctx.font='11px monospace';
  for(let i=0;i<count;i++){
    ctx.fillStyle=`rgba(0,255,65,${Math.random()*0.15+0.04})`;
    ctx.fillText(chars[rnd(0,15)]+chars[rnd(0,15)],rnd(0,W),rnd(0,H));
  }
}

function scanlines(ctx,W,H){
  for(let y=0;y<H;y+=4){
    ctx.fillStyle='rgba(0,255,65,0.022)';
    ctx.fillRect(0,y,W,2);
  }
}

function corners(ctx,W,H,sz=18){
  ctx.strokeStyle='#00ff41'; ctx.lineWidth=2;
  [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
    ctx.beginPath();
    ctx.moveTo(x+sx*sz,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*sz);
    ctx.stroke();
  });
}

function topbar(ctx,W,ver){
  ctx.fillStyle='#090f09'; ctx.fillRect(0,0,W,44);
  ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1; ctx.strokeRect(0,0,W,44);
  ctx.font='14px monospace'; ctx.fillStyle='#336633'; ctx.textAlign='left';
  ctx.fillText('SYS://PURGE.exe  VER_2.0  [RUNNING]',12,28);
  ctx.fillStyle='#ff2244'; ctx.textAlign='right';
  ctx.fillText('⚠ THREAT LEVEL: CRITICAL',W-12,28);
}

function bottombar(ctx,W,H){
  ctx.fillStyle='#090f09'; ctx.fillRect(0,H-36,W,36);
  ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1; ctx.strokeRect(0,H-36,W,36);
  ctx.font='13px monospace'; ctx.fillStyle='#336633'; ctx.textAlign='left';
  ctx.fillText('capyworlds.com/games/virus/',12,H-13);
  ctx.fillStyle='#00ff41'; ctx.textAlign='right';
  ctx.fillText('[ HTML5 · Free · Hacking Action ]',W-12,H-13);
}

function bigTitle(ctx,W,cx,y,fontSize){
  ctx.save();
  ctx.shadowColor='#00ff41'; ctx.shadowBlur=50;
  ctx.font=`bold ${fontSize}px VT323,monospace`;
  ctx.fillStyle='#39ff14'; ctx.textAlign='center';
  ctx.fillText('VIRUS.EXE',cx,y);
  ctx.restore();
  ctx.save(); ctx.globalAlpha=0.2; ctx.fillStyle='#ff0044';
  ctx.font=`bold ${fontSize}px VT323,monospace`; ctx.textAlign='center';
  ctx.fillText('VIRUS.EXE',cx+5,y-3);
  ctx.restore();
}

function subtitle(ctx,W,cx,y,sz){
  ctx.save();
  ctx.shadowColor='#00c030'; ctx.shadowBlur=14;
  ctx.font=`bold ${sz}px VT323,monospace`;
  ctx.fillStyle='#00ff41'; ctx.textAlign='center';
  ctx.fillText('SYSTEM  PURGE',cx,y);
  ctx.restore();
}

function divider(ctx,W,x0,x1,y){
  const g=ctx.createLinearGradient(x0,y,x1,y);
  g.addColorStop(0,'transparent'); g.addColorStop(0.1,'#00ff41');
  g.addColorStop(0.9,'#00ff41'); g.addColorStop(1,'transparent');
  ctx.strokeStyle=g; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();
}

function drivePanel(ctx,x,y,label,pct,color,critical){
  ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1; ctx.strokeRect(x,y,170,80);
  ctx.fillStyle='#090f09'; ctx.fillRect(x+1,y+1,168,78);
  ctx.font='14px monospace'; ctx.fillStyle='#00ff41'; ctx.textAlign='left';
  ctx.fillText(`DRIVE ${label}`,x+10,y+22);
  ctx.fillStyle='#336633'; ctx.fillText(`${Math.floor(pct*100)}% INFECTED`,x+10,y+40);
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(x+10,y+52,148,10);
  ctx.fillStyle=color; ctx.fillRect(x+10,y+52,148*pct,10);
  if(critical){ ctx.fillStyle='#ff2244'; ctx.fillText('◉ CRITICAL',x+10,y+75); }
}

function scanBar(ctx,x,y,w,pct){
  ctx.fillStyle='#090f09'; ctx.fillRect(x,y,w,14);
  ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,14);
  ctx.fillStyle='#00ff41'; ctx.fillRect(x+1,y+1,(w-2)*pct,12);
  ctx.font='11px monospace'; ctx.fillStyle='#00ff41'; ctx.textAlign='left';
  ctx.fillText(`Scanning... ${Math.floor(pct*100)}%  ██████████████░░░░░░`,x+4,y+11);
}

function virusList(ctx,x,y){
  const list=[
    {c:'#ff2244',t:'▌ RANSOMWARE.sys  [ACTIVE]  ██████ HP:340'},
    {c:'#ffe600',t:'▌ TROJAN.dll      [WARN]    ████░░ HP:180'},
    {c:'#00ff41',t:'▌ ADWARE.exe      [CLEAR]   ░░░░░░ HP:0  '},
  ];
  ctx.font='12px monospace'; ctx.textAlign='left';
  list.forEach((v,i)=>{ ctx.fillStyle=v.c; ctx.fillText(v.t,x,y+i*18); });
}

// ─── LANDSCAPE 1920×1080 ───────────────────────────────────
function drawLandscape(){
  const cv=document.getElementById('cvL');
  const ctx=cv.getContext('2d');
  const W=1920,H=1080;
  ctx.fillStyle='#050a05'; ctx.fillRect(0,0,W,H);
  hexBg(ctx,W,H,600);

  topbar(ctx,W);

  // Left column — title area
  bigTitle(ctx,W,640,320,180);
  subtitle(ctx,W,640,390,60);
  divider(ctx,W,100,1160,430);
  ctx.font='17px monospace'; ctx.fillStyle='#336633'; ctx.textAlign='center';
  ctx.fillText('Eliminate Viruses  ◆  Defend the Core  ◆  Hack Back',640,465);

  // scan bar
  scanBar(ctx,100,490,1100,0.67);

  // drive panels row
  drivePanel(ctx,100,530,'C:',0.72,'#00ff41',false);
  drivePanel(ctx,320,530,'D:',0.45,'#ffe600',false);
  drivePanel(ctx,540,530,'E:',0.88,'#ff2244',true);

  // virus list
  virusList(ctx,100,660);

  // Right column — stats panel
  const rx=1280,rw=540;
  ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1; ctx.strokeRect(rx,60,rw,H-96);
  ctx.fillStyle='#090f09'; ctx.fillRect(rx+1,61,rw-2,H-98);

  ctx.font='bold 28px VT323,monospace'; ctx.fillStyle='#00ff41'; ctx.textAlign='center';
  ctx.fillText('[ SYSTEM STATUS ]',rx+rw/2,110);
  divider(ctx,W,rx+20,rx+rw-20,125);

  const stats=[
    ['THREATS DETECTED','247'],['NEUTRALIZED','183'],['CORE INTEGRITY','61%'],
    ['FIREWALL','ACTIVE'],['ENCRYPTION','AES-256'],['MODE','PURGE v2.0'],
  ];
  stats.forEach(([k,v],i)=>{
    const sy=165+i*90;
    ctx.font='16px monospace'; ctx.fillStyle='#336633'; ctx.textAlign='left';
    ctx.fillText(k,rx+30,sy);
    ctx.font='bold 38px VT323,monospace';
    ctx.fillStyle=v.includes('%')&&parseInt(v)<70?'#ff2244':v==='ACTIVE'?'#00ff41':'#ffe600';
    ctx.fillText(v,rx+30,sy+36);
    ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(rx+20,sy+48); ctx.lineTo(rx+rw-20,sy+48); ctx.stroke();
  });

  // big red warning bottom right
  ctx.save();
  ctx.font='bold 90px VT323,monospace'; ctx.fillStyle='rgba(255,34,68,0.08)';
  ctx.textAlign='center'; ctx.fillText('⚠ WARNING',rx+rw/2,H-120);
  ctx.restore();

  scanlines(ctx,W,H);
  corners(ctx,W,H,24);
  bottombar(ctx,W,H);
}

// ─── PORTRAIT 800×1200 ────────────────────────────────────
function drawPortrait(){
  const cv=document.getElementById('cvP');
  const ctx=cv.getContext('2d');
  const W=800,H=1200;
  ctx.fillStyle='#050a05'; ctx.fillRect(0,0,W,H);
  hexBg(ctx,W,H,350);

  topbar(ctx,W);

  bigTitle(ctx,W,W/2,220,130);
  subtitle(ctx,W,W/2,280,50);
  divider(ctx,W,40,W-40,310);

  ctx.font='14px monospace'; ctx.fillStyle='#336633'; ctx.textAlign='center';
  ctx.fillText('Eliminate Viruses  ◆  Hack Back',W/2,338);

  scanBar(ctx,40,360,W-80,0.67);

  // Drive panels — 2 columns
  drivePanel(ctx,40,395,'C:',0.72,'#00ff41',false);
  drivePanel(ctx,230,395,'D:',0.45,'#ffe600',false);
  drivePanel(ctx,420,395,'E:',0.88,'#ff2244',true);

  divider(ctx,W,40,W-40,498);

  // Big stats
  const stats=[['THREATS','247'],['CLEARED','183'],['INTEGRITY','61%'],['MODE','PURGE']];
  stats.forEach(([k,v],i)=>{
    const sx=40+(i%2)*370, sy=530+Math.floor(i/2)*130;
    ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,340,110);
    ctx.fillStyle='#090f09'; ctx.fillRect(sx+1,sy+1,338,108);
    ctx.font='13px monospace'; ctx.fillStyle='#336633'; ctx.textAlign='left';
    ctx.fillText(k,sx+14,sy+30);
    ctx.font='bold 56px VT323,monospace';
    ctx.fillStyle=v.includes('%')&&parseInt(v)<70?'#ff2244':v==='PURGE'?'#ffe600':'#00ff41';
    ctx.fillText(v,sx+14,sy+88);
  });

  divider(ctx,W,40,W-40,800);
  virusList(ctx,40,830);

  // warning watermark
  ctx.save();
  ctx.font='bold 100px VT323,monospace'; ctx.fillStyle='rgba(255,34,68,0.06)';
  ctx.textAlign='center'; ctx.translate(W/2,1020); ctx.rotate(-0.25);
  ctx.fillText('⚠ CRITICAL',0,0); ctx.restore();

  scanlines(ctx,W,H);
  corners(ctx,W,H,18);
  bottombar(ctx,W,H);
}

// ─── SQUARE 800×800 ───────────────────────────────────────
function drawSquare(){
  const cv=document.getElementById('cvS');
  const ctx=cv.getContext('2d');
  const W=800,H=800;
  ctx.fillStyle='#050a05'; ctx.fillRect(0,0,W,H);
  hexBg(ctx,W,H,280);

  topbar(ctx,W);
  bigTitle(ctx,W,W/2,220,130);
  subtitle(ctx,W,W/2,278,48);
  divider(ctx,W,40,W-40,308);

  ctx.font='13px monospace'; ctx.fillStyle='#336633'; ctx.textAlign='center';
  ctx.fillText('Eliminate Viruses  ◆  Defend the Core',W/2,332);

  scanBar(ctx,40,352,W-80,0.67);

  drivePanel(ctx,40,386,'C:',0.72,'#00ff41',false);
  drivePanel(ctx,230,386,'D:',0.45,'#ffe600',false);
  drivePanel(ctx,420,386,'E:',0.88,'#ff2244',true);

  divider(ctx,W,40,W-40,488);
  virusList(ctx,40,512);

  ctx.save();
  ctx.font='bold 120px VT323,monospace'; ctx.fillStyle='rgba(255,34,68,0.07)';
  ctx.textAlign='center'; ctx.fillText('⚠',W/2,730); ctx.restore();

  scanlines(ctx,W,H);
  corners(ctx,W,H,18);
  bottombar(ctx,W,H);
}

function drawAll(){ drawLandscape(); drawPortrait(); drawSquare(); }

function download(id,name){
  const cv=document.getElementById(id);
  const a=document.createElement('a');
  a.download=name; a.href=cv.toDataURL('image/png'); a.click();
}

drawAll();
</script>
</body>
</html>
