<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>VIRUS.EXE 截圖產生器</title>
<style>
body { background:#111; display:flex; flex-direction:column; align-items:center; padding:20px; font-family:monospace; color:#0f0; gap:12px; }
canvas { border:2px solid #1a3a1a; }
.btns { display:flex; gap:12px; }
button { padding:10px 32px; background:#050a05; border:2px solid #00ff41; color:#00ff41; font-size:15px; font-family:monospace; cursor:pointer; letter-spacing:1px; }
button.red { border-color:#ff2244; color:#ff2244; }
button:hover { opacity:0.8; }
p { color:#336633; font-size:12px; }
</style>
</head>
<body>
<p style="color:#00ff41">▶ VIRUS.EXE Screenshot Generator (1280×720)</p>
<canvas id="cv" width="1280" height="720"></canvas>
<div class="btns">
  <button onclick="scene=0;draw()">Scene 1: Drive Select</button>
  <button onclick="scene=1;draw()">Scene 2: Battle</button>
  <button onclick="scene=2;draw()">Scene 3: Upgrade</button>
  <button onclick="dl()">⬇ Download Screenshot</button>
</div>
<p>Recommended: download one of each scene (3 screenshots total)</p>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W=1280, H=720;
let scene = 0;

const font = new FontFace('VT323','url(https://fonts.gstatic.com/s/vt323/v17/pxiKyp0ihIEF2isfFJU.woff2)');
font.load().then(f=>{document.fonts.add(f);draw();}).catch(()=>draw());

function scanlines(){
  for(let y=0;y<H;y+=4){
    ctx.fillStyle='rgba(0,255,65,0.022)';
    ctx.fillRect(0,y,W,2);
  }
}
function hexNoise(){
  const chars='0123456789ABCDEF';
  ctx.font='12px monospace';
  for(let i=0;i<300;i++){
    ctx.fillStyle=`rgba(0,255,65,${Math.random()*0.12+0.02})`;
    ctx.fillText(chars[~~(Math.random()*16)]+chars[~~(Math.random()*16)],Math.random()*W,Math.random()*H);
  }
}
function bar(x,y,w,h,pct,col){
  ctx.fillStyle='#0a0f0a';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#1a3a1a';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
  ctx.fillStyle=col;ctx.fillRect(x+1,y+1,(w-2)*pct,h-2);
}

function drawScene0(){ // Drive Select
  ctx.font='bold 52px VT323, monospace';ctx.fillStyle='#39ff14';ctx.textAlign='center';
  ctx.shadowColor='#00ff41';ctx.shadowBlur=30;
  ctx.fillText('VIRUS.EXE — SYSTEM PURGE',W/2,90);
  ctx.shadowBlur=0;
  ctx.font='20px monospace';ctx.fillStyle='#336633';
  ctx.fillText('SELECT INFECTED DRIVE  ◆  CHOOSE YOUR CHALLENGE',W/2,130);

  const drives=[
    {id:'C:',name:'System Root',waves:10,diff:'NORMAL',pct:0.72,col:'#00ff41'},
    {id:'D:',name:'Data Disk',waves:15,diff:'HARD',pct:0.58,col:'#ffe600'},
    {id:'E:',name:'Exec Env',waves:20,diff:'BRUTAL',pct:0.91,col:'#ff2244'},
  ];
  drives.forEach((d,i)=>{
    const x=80+i*400, y=200, w=340, h=260;
    ctx.fillStyle='#090f09';ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=d.col;ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
    ctx.font='38px VT323, monospace';ctx.fillStyle=d.col;ctx.textAlign='left';
    ctx.fillText(`DRIVE ${d.id}`,x+20,y+52);
    ctx.font='16px monospace';ctx.fillStyle='#336633';
    ctx.fillText(d.name,x+20,y+78);
    ctx.font='14px monospace';ctx.fillStyle='#2a5a2a';
    ctx.fillText(`${d.waves} 波  ◆  難度: ${d.diff}`,x+20,y+106);
    ctx.fillText('感染率:',x+20,y+136);
    bar(x+20,y+148,300,16,d.pct,d.col);
    ctx.font='13px monospace';ctx.fillStyle=d.col;
    ctx.fillText(`${~~(d.pct*100)}%`,x+20,y+182);
    // Skills preview
    const skills=['穿甲射擊','過載脈衝','防火牆'];
    ctx.font='13px monospace';ctx.fillStyle='#1a6a1a';
    skills.forEach((s,j)=>ctx.fillText(`◆ ${s}`,x+20,y+208+j*18));
    // Select hint
    ctx.font='22px VT323, monospace';ctx.fillStyle=d.col;ctx.textAlign='center';
    ctx.fillText('[ 點擊進入 ]',x+w/2,y+h-18);
  });
  ctx.textAlign='left';
  ctx.font='13px monospace';ctx.fillStyle='#1a3a1a';
  ctx.fillText('◈ 高分：18450  ◆  擊殺：394  ◆  連線：8×',80,510);
}

function drawScene1(){ // Battle
  // Panels layout
  const leftW=420,rightW=W-leftW-10;
  
  // Left: drive status
  ctx.fillStyle='#090f09';ctx.fillRect(0,60,leftW,H-60);
  ctx.strokeStyle='#1a3a1a';ctx.lineWidth=1;ctx.strokeRect(0,60,leftW,H-60);
  
  ctx.font='22px VT323, monospace';ctx.fillStyle='#00ff41';ctx.textAlign='left';
  ctx.fillText('▸ DRIVE C:  System Root',12,92);
  ctx.font='14px monospace';ctx.fillStyle='#336633';
  ctx.fillText('WAVE 6 / 10  ◆  掃描進度',12,118);
  bar(12,128,394,18,0.6,'#00ff41');
  
  // Virus list
  const viruses=[
    {name:'RANSOMWARE.sys',hp:340,maxHp:600,col:'#ff2244',active:true},
    {name:'TROJAN.dll',hp:0,maxHp:400,col:'#ffe600',active:false},
    {name:'WORM.bat',hp:180,maxHp:180,col:'#ff2244',active:true},
    {name:'ROOTKIT.sys',hp:120,maxHp:300,col:'#ffe600',active:true},
    {name:'ADWARE.exe',hp:0,maxHp:200,col:'#00ff41',active:false},
    {name:'KEYLOGGER.dll',hp:90,maxHp:90,col:'#ff2244',active:true},
  ];
  ctx.font='15px monospace';
  viruses.forEach((v,i)=>{
    const y=168+i*70;
    ctx.fillStyle=v.active?'#0d1a0d':'#080808';
    ctx.fillRect(12,y-4,leftW-24,62);
    ctx.strokeStyle=v.active?v.col:'#1a2a1a';ctx.lineWidth=1;
    ctx.strokeRect(12,y-4,leftW-24,62);
    ctx.fillStyle=v.active?v.col:'#2a4a2a';
    ctx.fillText((v.active?'◉ ':'◎ ')+v.name,20,y+16);
    if(v.active){
      bar(20,y+26,leftW-48,12,v.hp/v.maxHp,v.col);
      ctx.font='12px monospace';ctx.fillStyle=v.col;
      ctx.fillText(`HP: ${v.hp}/${v.maxHp}`,20,y+52);
    } else {
      ctx.font='12px monospace';ctx.fillStyle='#1a4a1a';
      ctx.fillText('[ ELIMINATED ]',20,y+42);
    }
    ctx.font='15px monospace';
  });
  
  // Right: canvas game area
  const rx=leftW+10,ry=60,rw=rightW,rh=H-60;
  ctx.fillStyle='#050a05';ctx.fillRect(rx,ry,rw,rh);
  
  // Hex bg in game area
  ctx.save();ctx.rect(rx,ry,rw,rh);ctx.clip();
  for(let i=0;i<150;i++){
    const chars='0123456789ABCDEF';
    ctx.fillStyle=`rgba(0,255,65,${Math.random()*0.1+0.02})`;
    ctx.font='11px monospace';
    ctx.fillText(chars[~~(Math.random()*16)]+chars[~~(Math.random()*16)],rx+Math.random()*rw,ry+Math.random()*rh);
  }
  
  // Player character (cursor)
  const px=rx+rw/2, py=ry+rh/2+30;
  ctx.font='24px VT323, monospace';ctx.fillStyle='#39ff14';ctx.textAlign='center';
  ctx.shadowColor='#00ff41';ctx.shadowBlur=15;
  ctx.fillText('◈',px,py);ctx.shadowBlur=0;
  
  // Enemies
  const enemies=[
    {x:rx+120,y:ry+120,hp:0.4,col:'#ff2244',sym:'☠'},
    {x:rx+rw-140,y:ry+90,hp:0.8,col:'#ff2244',sym:'☠'},
    {x:rx+rw-80,y:ry+rh-120,hp:0.2,col:'#ff8800',sym:'☣'},
    {x:rx+200,y:ry+rh-80,hp:0.6,col:'#ff2244',sym:'☠'},
    {x:rx+rw/2-120,y:ry+80,hp:0.9,col:'#ff2244',sym:'☠'},
  ];
  enemies.forEach(e=>{
    ctx.font='22px VT323, monospace';ctx.fillStyle=e.col;ctx.textAlign='center';
    ctx.shadowColor=e.col;ctx.shadowBlur=10;
    ctx.fillText(e.sym,e.x,e.y);
    ctx.shadowBlur=0;
    bar(e.x-24,e.y+4,48,6,e.hp,e.col);
  });
  
  // Bullets
  const bullets=[[px-60,py-40],[px+40,py-80],[px-100,py+20]];
  bullets.forEach(([bx,by])=>{
    ctx.strokeStyle='#ffee88';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bx-6,by-6);ctx.lineTo(bx+6,by+6);ctx.stroke();
  });
  
  ctx.restore();
  ctx.textAlign='left';
  
  // HUD combo
  ctx.font='42px VT323, monospace';ctx.fillStyle='#ffaa00';ctx.textAlign='right';
  ctx.shadowColor='#ffaa00';ctx.shadowBlur=20;
  ctx.fillText('COMBO ×5.3  🔥',W-12,H-30);ctx.shadowBlur=0;
  
  // Top HUD bar
  ctx.fillStyle='#090f09';ctx.fillRect(0,0,W,60);
  ctx.strokeStyle='#1a3a1a';ctx.lineWidth=1;ctx.strokeRect(0,0,W,60);
  ctx.font='26px VT323, monospace';ctx.fillStyle='#00ff41';ctx.textAlign='left';
  ctx.fillText('VIRUS.EXE',12,40);
  ctx.font='16px monospace';ctx.fillStyle='#336633';
  ctx.textAlign='center';
  ctx.fillText('HP  ████████░░  240/300',W/2-200,38);
  ctx.fillStyle='#ffe600';
  ctx.fillText('SHARDS: 1,840',W/2+80,38);
  ctx.fillStyle='#00ff41';ctx.textAlign='right';
  ctx.fillText('SCORE: 12,450',W-12,38);
  ctx.textAlign='left';
}

function drawScene2(){ // Upgrade
  ctx.fillStyle='rgba(5,10,5,0.94)';ctx.fillRect(0,0,W,H);
  hexNoise();
  
  ctx.font='52px VT323, monospace';ctx.fillStyle='#39ff14';ctx.textAlign='center';
  ctx.shadowColor='#00ff41';ctx.shadowBlur=30;
  ctx.fillText('⬆  SELECT UPGRADE MODULE',W/2,90);ctx.shadowBlur=0;
  ctx.font='18px monospace';ctx.fillStyle='#336633';
  ctx.fillText('WAVE 6 CLEARED  ◆  CHOOSE AN UPGRADE',W/2,128);
  
  const upgrades=[
    {ic:'🔫',name:'Armor Pierce',en:'ARMOR PIERCE',desc:['Damage +60%','Effective vs all viruses','Instant effect'],col:'#ff2244'},
    {ic:'⚡',name:'Overload Pulse',en:'OVERLOAD PULSE',desc:['AoE burst damage','6s cooldown','Clear the screen'],col:'#ffe600'},
    {ic:'🛡',name:'Firewall+',en:'FIREWALL+',desc:['Max HP +40','Restore 30 HP now','Defense boost'],col:'#00cfff'},
  ];
  
  upgrades.forEach((u,i)=>{
    const x=60+i*400, y=180, w=360, h=340;
    const isHovered=(i===1);
    ctx.fillStyle=isHovered?'#0d1a0d':'#090f09';ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=isHovered?u.col:'#1a3a1a';ctx.lineWidth=isHovered?2:1;
    ctx.strokeRect(x,y,w,h);
    if(isHovered){
      ctx.save();ctx.globalAlpha=0.08;ctx.fillStyle=u.col;ctx.fillRect(x,y,w,h);ctx.restore();
    }
    ctx.font='72px VT323, monospace';ctx.textAlign='center';
    ctx.fillText(u.ic,x+w/2,y+90);
    ctx.font='34px VT323, monospace';ctx.fillStyle=u.col;
    ctx.fillText(u.name,x+w/2,y+140);
    ctx.font='15px monospace';ctx.fillStyle='#1a6a1a';
    ctx.fillText(u.en,x+w/2,y+168);
    ctx.font='16px monospace';ctx.fillStyle='#4a9a4a';ctx.textAlign='left';
    u.desc.forEach((d,j)=>ctx.fillText('◆ '+d,x+40,y+210+j*28));
    ctx.font='22px VT323, monospace';ctx.fillStyle=isHovered?u.col:'#2a5a2a';ctx.textAlign='center';
    ctx.fillText(isHovered?'[ SELECT THIS UPGRADE ]':'[ CLICK TO SELECT ]',x+w/2,y+h-22);
  });
  ctx.textAlign='left';
  
  // Bottom hint
  ctx.font='14px monospace';ctx.fillStyle='#1a3a1a';ctx.textAlign='center';
  ctx.fillText('Next Wave: BOSS FIGHT  ◆  Prepare your weapons',W/2,H-30);
  ctx.textAlign='left';
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050a05';ctx.fillRect(0,0,W,H);
  hexNoise();
  [drawScene0,drawScene1,drawScene2][scene]();
  scanlines();
  // Corner brackets
  ctx.strokeStyle='#00ff41';ctx.lineWidth=2;
  [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy])=>{
    ctx.beginPath();ctx.moveTo(x+sx*16,y);ctx.lineTo(x,y);ctx.lineTo(x,y+sy*16);ctx.stroke();
  });
}

draw();

function dl(){
  draw();
  setTimeout(()=>{
    const names=['screenshot-1-drive-select','screenshot-2-battle','screenshot-3-upgrade'];
    const a=document.createElement('a');
    a.download=`virus-exe-${names[scene]}.png`;
    a.href=cv.toDataURL('image/png');a.click();
  },100);
}
</script>
</body>
</html>
