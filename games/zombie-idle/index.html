<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>殭屍蔓延 — Zombie Idle</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6193561251326215" crossorigin="anonymous"></script>
<style>
:root {
  --bg:     #050a05;
  --bg2:    #0a120a;
  --bg3:    #111b11;
  --panel:  #0d170d;
  --border: #1a2e1a;
  --green:  #3ddc58;
  --green2: #22a838;
  --toxic:  #7fff00;
  --red:    #ef4444;
  --yellow: #fbbf24;
  --purple: #a78bfa;
  --text:   #bbdcbb;
  --dim:    #5a7a5a;
  --gold:   #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── HEADER ─────────────────────────────────── */
#hdr {
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  padding: 6px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
#hdr h1 { font-size: 17px; color: var(--green); text-shadow: 0 0 12px #3ddc5870; letter-spacing: 2px; }
#hdr-stats { display: flex; gap: 18px; }
.hs { display: flex; flex-direction: column; align-items: center; }
.hs-l { color: var(--dim); font-size: 13px; }
.hs-v { color: var(--green); font-size: 13px; font-weight: bold; }
#save-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--dim); padding: 8px 14px; cursor: pointer;
  font-size: 14px; border-radius: 3px; font-family: inherit;
  transition: color .15s, border-color .15s;
}
#save-btn:hover, #save-btn:active { color: var(--text); border-color: var(--green2); }

/* ── TICKER ─────────────────────────────────── */
#tick-w {
  background: #020702;
  border-bottom: 1px solid var(--border);
  padding: 3px 0; overflow: hidden; flex-shrink: 0;
}
#tick {
  display: inline-block;
  white-space: nowrap; font-size: 14px; color: var(--dim);
  padding-left: 100%;
  animation: scroll 50s linear infinite;
}
@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

/* ── LAYOUT ──────────────────────────────────── */
#game { display: flex; flex: 1; overflow: hidden; }

/* ── LEFT ────────────────────────────────────── */
#left {
  width: 275px; flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#buy-btns {
  display: flex; gap: 8px; padding: 7px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
.bb {
  flex: 1; padding: 8px 4px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--dim); cursor: pointer; font-size: 14px;
  border-radius: 3px; font-family: inherit; transition: all .1s;
}
.bb:hover, .bb:active { color: var(--text); }
.bb.on { background: var(--green2); border-color: var(--green); color: #fff; font-weight: bold; }
#left-ttl {
  padding: 6px 10px; font-size: 13px; color: var(--dim);
  border-bottom: 1px solid var(--border); letter-spacing: 1px; flex-shrink: 0;
}
#zlist { overflow-y: auto; flex: 1; }

/* Zombie row */
.zrow {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 9px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s; position: relative;
}
.zrow:hover, .zrow:active { background: var(--bg3); }
.zrow.ok  { border-left: 3px solid var(--green2); }
.zrow.dim { opacity: .32; cursor: default; }
.zem { font-size: 26px; width: 32px; text-align: center; flex-shrink: 0; }
.zi  { flex: 1; min-width: 0; }
.zn  { font-size: 15px; font-weight: bold; }
.zpr { font-size: 13px; color: var(--dim); }
.zco { font-size: 14px; color: var(--red); }
.zco.ok { color: var(--green); }
.zct {
  background: var(--bg); border: 1px solid var(--border);
  min-width: 34px; text-align: center; padding: 2px 3px;
  font-size: 15px; font-weight: bold; border-radius: 3px; color: var(--yellow);
}
.zprog {
  position: absolute; bottom: 0; left: 0;
  height: 2px; background: var(--green2); transition: width .4s;
}

/* ── CENTER ──────────────────────────────────── */
#center {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; position: relative; overflow: hidden;
}
#center::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, #0c1e0c 0%, #050a05 70%);
  pointer-events: none;
}
#click-area {
  position: relative; cursor: pointer; z-index: 1;
  transition: transform .06s; -webkit-tap-highlight-color: transparent;
  outline: none;
}
#click-area:active { transform: scale(.93); }
#bsvg {
  width: 155px; height: 155px;
  filter: drop-shadow(0 0 22px #3ddc5855);
  animation: float 3.5s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
#click-area:hover #bsvg { filter: drop-shadow(0 0 32px #3ddc5888); }
#clabel {
  position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
  font-size: 13px; color: var(--dim); white-space: nowrap;
}
#stats {
  margin-top: 42px; text-align: center; z-index: 1;
}
#bd { font-size: 30px; color: var(--green); font-weight: bold; text-shadow: 0 0 14px #3ddc5855; }
#bl { font-size: 14px; color: var(--dim); margin-bottom: 2px; }
#bps-line { font-size: 14px; }
#cp-line  { font-size: 14px; color: var(--dim); margin-top: 3px; }

/* Event bar */
#evt {
  position: fixed; top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-90px);
  background: #1a0505; border: 2px solid var(--red);
  padding: 9px 22px; font-size: 15px; color: var(--red);
  border-radius: 4px; z-index: 100; transition: transform .35s;
  text-align: center; pointer-events: none;
}
#evt.on { transform: translateX(-50%) translateY(0); }

/* Particles */
.pt {
  position: fixed; pointer-events: none;
  font-size: 13px; color: var(--green); font-weight: bold;
  z-index: 200; animation: ptf .9s ease-out forwards;
}
@keyframes ptf {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(-55px) scale(.5); }
}

/* ── RIGHT ───────────────────────────────────── */
#right {
  width: 295px; flex-shrink: 0;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tb {
  flex: 1; padding: 12px 8px;
  background: transparent; border: none; border-bottom: 2px solid transparent;
  color: var(--dim); cursor: pointer; font-size: 14px; font-family: inherit;
  transition: all .15s;
}
.tb:hover, .tb:active { color: var(--text); }
.tb.on { color: var(--green); border-bottom-color: var(--green); }
.tp { display: none; flex: 1; overflow-y: auto; }
.tp.on { display: block; }

/* Upgrades */
#upg-list { padding: 7px; display: flex; flex-direction: column; gap: 5px; }
.uc {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 7px 9px; cursor: pointer; transition: all .15s;
}
.uc:hover { border-color: var(--green2); background: var(--bg2); }
.uc.no { opacity: .45; cursor: default; }
.uc.no:hover { border-color: var(--border); background: var(--bg3); }
.ut { display: flex; justify-content: space-between; align-items: flex-start; }
.un { font-size: 15px; font-weight: bold; }
.uco { font-size: 14px; color: var(--red); }
.uco.ok { color: var(--green); }
.ud { font-size: 13px; color: var(--dim); margin-top: 2px; }

/* Achievements */
#ach-list { padding: 7px; display: flex; flex-direction: column; gap: 5px; }
.ac {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 7px 9px;
  display: flex; gap: 7px; align-items: center;
}
.ac.got { border-color: var(--gold); }
.ac.nope .ai, .ac.nope .an, .ac.nope .ad { opacity: .3; }
.ai { font-size: 18px; flex-shrink: 0; }
.an { font-size: 14px; font-weight: bold; }
.ad { font-size: 13px; color: var(--dim); }

/* Prestige */
#pres-panel { padding: 14px; display: flex; flex-direction: column; gap: 11px; }
#dna-box { text-align: center; }
#dna-num { font-size: 28px; color: var(--purple); font-weight: bold; }
#dna-lbl { font-size: 14px; color: var(--dim); }
#dna-gain { font-size: 15px; margin-top: 3px; }
#pres-btn {
  background: #1a0a2e; border: 2px solid var(--purple);
  color: var(--purple); padding: 14px;
  cursor: pointer; font-family: inherit; font-size: 13px;
  font-weight: bold; border-radius: 4px; transition: all .2s; letter-spacing: 1px;
}
#pres-btn:hover, #pres-btn:active { background: #250c40; box-shadow: 0 0 16px #a78bfa30; }
#pres-info { font-size: 13px; color: var(--dim); line-height: 1.7; }
#dna-upg-list { display: flex; flex-direction: column; gap: 6px; }
#pres-prog-wrap { margin: 6px 0; background: #1a0a2e; border-radius: 4px; overflow: hidden; height: 14px; position: relative; }
#pres-prog-bar  { height: 100%; background: linear-gradient(90deg,#6d28d9,#a78bfa); transition: width .4s; width:0%; }
#pres-prog-txt  { font-size: 11px; color: var(--dim); margin-top: 3px; text-align: center; }
#pres-streak    { font-size: 12px; color: var(--purple); text-align: center; margin-top: 4px; }
.du {
  background: var(--bg3); border: 1px solid #2a1a4a;
  border-radius: 4px; padding: 8px 9px; cursor: pointer; transition: all .15s;
}
.du:hover { border-color: var(--purple); }
.du.got { opacity: .5; pointer-events: none; border-style: dashed; }
.du.no  { opacity: .55; cursor: not-allowed; }
.dun { font-size: 15px; color: var(--purple); font-weight: bold; }
.duc { font-size: 13px; color: var(--dim); }
.dud { font-size: 13px; color: var(--text); margin-top: 2px; }

/* Toast */
#toast {
  position: fixed; bottom: 18px; right: 18px;
  background: var(--bg2); border: 1px solid var(--gold);
  border-radius: 6px; padding: 9px 13px; max-width: 230px;
  z-index: 1000; transform: translateX(270px); transition: transform .3s;
  pointer-events: none;
}
#toast.on { transform: translateX(0); }
#t-ttl { font-size: 15px; font-weight: bold; }
#t-dsc { font-size: 13px; color: var(--dim); margin-top: 2px; }

/* ── ZOMBIE FIELD ─────────────────────────────── */
#zombie-field {
  width: 100%; height: 220px;
  position: relative; overflow: hidden;
  margin: 10px 0 4px;
  background: rgba(0,15,0,0.5);
  border: 1px solid var(--border);
  border-radius: 4px; flex-shrink: 0;
  cursor: crosshair;
}
#zf-canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
#wave-banner {
  position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); border: 1px solid rgba(100,100,100,0.3);
  padding: 2px 10px; font-size: 11px; color: var(--dim);
  border-radius: 3px; white-space: nowrap; z-index: 5; pointer-events: none;
}
#skip-btn {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  background: rgba(0,60,0,0.85); border: 1px solid var(--green3);
  color: var(--green2); font-family: 'Share Tech Mono', monospace;
  font-size: 13px; padding: 8px 16px; border-radius: 3px;
  cursor: pointer; z-index: 10; display: none; letter-spacing: 1px;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
#skip-btn:hover, #skip-btn:active { background: rgba(0,120,0,0.9); box-shadow: 0 0 8px var(--green3); }
#skip-btn.wave-on { border-color: #fbbf24; color: #fbbf24; background: rgba(60,40,0,0.9); }
#skip-btn.wave-on:hover { background: rgba(100,60,0,0.95); box-shadow: 0 0 8px #fbbf24; }
#zf-left-label {
  position: absolute; top: 6px; left: 6px;
  font-size: 10px; color: rgba(61,220,88,0.5); pointer-events: none; z-index: 4;
}
#zf-right-label {
  position: absolute; top: 6px; right: 6px;
  font-size: 10px; color: rgba(239,68,68,0.5); pointer-events: none; z-index: 4;
}
/* Purchase flash */
@keyframes buyFlash {
  0%   { background: rgba(61,220,88,0.28); }
  100% { background: transparent; }
}
.zrow.flash { animation: buyFlash 0.45s ease-out forwards; }
/* Mute button */
#mute-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--dim); padding: 8px 14px; cursor: pointer;
  font-size: 14px; border-radius: 3px; font-family: inherit;
  transition: color .15s, border-color .15s; margin-left: 6px;
}
#mute-btn:hover, #mute-btn:active { color: var(--text); border-color: var(--green2); }
/* Auto-upgrade button */
#auto-upg {
  margin: 6px 7px 2px; padding: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--dim); cursor: pointer; font-family: inherit;
  font-size: 13px; border-radius: 3px; transition: all .15s;
  width: calc(100% - 14px); text-align: center; display: block;
}
#auto-upg:hover { color: var(--text); border-color: var(--green2); }
#auto-upg.glow  { border-color: var(--green); color: var(--green); box-shadow: 0 0 8px #3ddc5830; }

/* Touch targets */
button, .bb, .tb, .zrow { touch-action: manipulation; }

/* Responsive */
@media(max-width:780px){
  #left { width: 220px; } #right { width: 230px; }
  #bsvg { width: 120px; height: 120px; } #bd { font-size: 22px; }
}
@media(max-width:540px){
  #game { flex-direction: column; }
  #left,#right { width: 100%; max-height: 220px; }
  #center { min-height: 260px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <h1>🧟 殭屍蔓延</h1>
  <div id="hdr-stats">
    <div class="hs"><span class="hs-l">🧠 腦髓</span><span class="hs-v" id="h-b">0</span></div>
    <div class="hs"><span class="hs-l">⚡ /秒</span><span class="hs-v" id="h-bps">0</span></div>
    <div class="hs"><span class="hs-l">🧬 DNA</span><span class="hs-v" id="h-dna">0</span></div>
    <div class="hs"><span class="hs-l">⏱ 遊玩</span><span class="hs-v" id="h-t">0:00</span></div>
  </div>
  <button id="save-btn" onclick="save()">💾 儲存</button>
  <button id="mute-btn" onclick="toggleMute()">🔊</button>
</div>

<!-- TICKER -->
<div id="tick-w"><span id="tick">載入中...</span></div>

<!-- GAME -->
<div id="game">

  <!-- LEFT: ZOMBIES -->
  <div id="left">
    <div id="buy-btns">
      <button class="bb on" onclick="setBuy(1)"   id="bm1">×1</button>
      <button class="bb"    onclick="setBuy(10)"  id="bm10">×10</button>
      <button class="bb"    onclick="setBuy(100)" id="bm100">×100</button>
      <button class="bb"    onclick="setBuy(-1)"  id="bm-1">最多</button>
    </div>
    <div id="left-ttl">— 殭屍部隊 —</div>
    <div id="zlist"></div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="click-area" onclick="onClickBrain(event)" tabindex="0"
         onkeydown="if(event.key===' '||event.key==='Enter')onClickBrain(event)">
      <svg id="bsvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1a2e1a"/>
            <stop offset="100%" stop-color="#050a05"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Orbit ring -->
        <circle cx="100" cy="100" r="88" fill="none" stroke="#3ddc58" stroke-width=".8"
                stroke-dasharray="5 8" opacity=".25">
          <animateTransform attributeName="transform" type="rotate"
            from="0 100 100" to="360 100 100" dur="12s" repeatCount="indefinite"/>
        </circle>
        <!-- Brain body -->
        <path d="M100,38 C116,36 133,42 141,54 C149,66 146,78 139,87
                 C150,89 159,97 160,109 C161,122 153,132 142,136
                 C146,146 143,156 133,161 C122,167 108,163 102,155
                 C100,165 92,170 80,168 C66,165 57,153 60,142
                 C49,139 41,129 42,117 C43,105 52,97 62,94
                 C55,85 56,73 65,65 C74,57 88,54 98,57 C96,48 97,39 100,38 Z"
              fill="#1e0d24" stroke="#7fff00" stroke-width="2" filter="url(#glow)"/>
        <!-- Folds -->
        <path d="M100,38 C99,55 89,65 88,80" stroke="#7fff00" stroke-width="1.4" fill="none" opacity=".65"/>
        <path d="M118,44 C113,58 115,70 110,83" stroke="#7fff00" stroke-width="1.4" fill="none" opacity=".65"/>
        <path d="M78,62 C84,73 79,84 83,96" stroke="#7fff00" stroke-width="1.4" fill="none" opacity=".65"/>
        <path d="M62,100 C76,97 90,101 100,99 C110,97 124,101 138,99"
              stroke="#7fff00" stroke-width="1.4" fill="none" opacity=".65"/>
        <path d="M60,118 C74,115 88,119 100,117 C112,115 126,119 140,117"
              stroke="#7fff00" stroke-width="1.4" fill="none" opacity=".65"/>
        <path d="M68,136 C80,133 92,137 100,135 C108,133 120,137 130,135"
              stroke="#7fff00" stroke-width="1.4" fill="none" opacity=".65"/>
        <!-- Eyes -->
        <circle cx="83" cy="103" r="5" fill="#ef4444" opacity=".9">
          <animate attributeName="opacity" values=".9;.4;.9" dur="2.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="117" cy="103" r="5" fill="#ef4444" opacity=".9">
          <animate attributeName="opacity" values=".9;.4;.9" dur="2.8s" begin=".3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="83" cy="103" r="2" fill="#ff0" opacity=".6"/>
        <circle cx="117" cy="103" r="2" fill="#ff0" opacity=".6"/>
        <!-- Drips -->
        <path d="M88,161 Q90,172 89,177" stroke="#3ddc58" stroke-width="2.5" fill="none"
              stroke-linecap="round" opacity=".7"/>
        <path d="M112,159 Q114,168 113,172" stroke="#3ddc58" stroke-width="2.5" fill="none"
              stroke-linecap="round" opacity=".7"/>
        <!-- Pulse -->
        <circle cx="100" cy="100" r="6" fill="#3ddc58" opacity=".3">
          <animate attributeName="r" values="5;11;5" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".3;.6;.3" dur="2s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div id="clabel">點擊獲取腦髓</div>
    </div>
    <div id="zombie-field">
    <canvas id="zf-canvas"></canvas>
    <div id="wave-banner">準備中...</div>
    <div id="zf-left-label"></div>
    <div id="zf-right-label"></div>
    <button id="skip-btn" onclick="skipWave()">⚡ 立即開戰</button>
  </div>
    <div id="stats">
      <div id="bl">🧠 腦髓</div>
      <div id="bd">0</div>
      <div id="bps-line">每秒 <span id="bps-v">0</span> 個腦髓</div>
      <div id="cp-line">點擊力量: <span id="cp-v">1</span></div>
    </div>
  </div>

  <!-- RIGHT: TABS -->
  <div id="right">
    <div id="tabs">
      <button class="tb on" onclick="showTab('upg')"  id="tb-upg">⚡ 強化</button>
      <button class="tb"    onclick="showTab('ach')"  id="tb-ach">🏆 成就</button>
      <button class="tb"    onclick="showTab('pres')" id="tb-pres">🧬 進化</button>
    </div>
    <div class="tp on" id="tp-upg">
      <button id="auto-upg" onclick="autoUpgrade()">⚡ 一鍵購買所有可升級項目</button>
      <div id="upg-list"></div>
    </div>
    <div class="tp"    id="tp-ach"><div id="ach-list"></div></div>
    <div class="tp"    id="tp-pres">
      <div id="pres-panel">
        <div id="dna-box">
          <div id="dna-num">0</div>
          <div id="dna-lbl">🧬 DNA 積分</div>
          <div id="dna-gain">下次進化可獲得: <span id="dna-g" style="color:var(--purple)">0</span> DNA</div>
        </div>
        <div id="pres-prog-wrap"><div id="pres-prog-bar"></div></div>
        <div id="pres-prog-txt"></div>
        <button id="pres-btn" onclick="prestige()">🧬 觸發進化重置</button>
        <div id="pres-streak"></div>
        <div id="pres-milestones"></div>
        <div id="pres-info">

//  HELPERS
// ══════════════════════════════════════════════

function fmt(n) {
  if (!isFinite(n) || n === undefined) return '0';
  if (n < 0) return '-' + fmt(-n);
  if (n < 1000) return Math.floor(n).toString();
  const sfx = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','Ud','Dd'];
  const i = Math.min(Math.floor(Math.log10(n) / 3), sfx.length - 1);
  const v = n / Math.pow(1000, i);
  return (v >= 100 ? v.toFixed(0) : v >= 10 ? v.toFixed(1) : v.toFixed(2)) + sfx[i];
}

function fmtT(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = Math.floor(s % 60);
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
    : `${m}:${String(ss).padStart(2,'0')}`;
}

function totZ(s) { return s.z.reduce((a, z) => a + z.n, 0); }

// Cost to buy `amt` of zombie `zid` starting from current count
function zCost(zid, amt) {
  if (amt <= 0) return 0;
  const bc = ZD[zid].bc, cnt = G.z[zid].n;
  return bc * Math.pow(1.15, cnt) * (Math.pow(1.15, amt) - 1) / 0.15;
}

function zNextCost(zid) { return ZD[zid].bc * Math.pow(1.15, G.z[zid].n); }

function maxBuy(zid) {
  const bc = ZD[zid].bc;
  let cnt = G.z[zid].n, funds = G.b, n = 0;
  while (true) {
    const c = bc * Math.pow(1.15, cnt + n);
    if (funds < c || n >= 9999) break;
    funds -= c; n++;
  }
  return n;
}

function zMult(zid) {
  let m = 1;
  for (const u of UD) {
    if (!G.upg[u.id]) continue;
    if (u.ty === 'z' && u.zi === zid) m *= u.ml;
    if (u.ty === 'g') m *= u.ml;
  }
  for (const d of DNAD) { if (G.du[d.id] && d.tp==='g') m *= d.ml; }
  return m;
}

function bps() {
  let s = 0;
  for (const z of ZD) { if (G.z[z.id].n > 0) s += G.z[z.id].n * z.bp * zMult(z.id); }
  const tpBonus = 1 + G.tp * 0.08; // +8% per prestige (permanent)
  let pmBps = 1;
  for (const m of PRES_MILES) { if (G.pm && G.pm[m.id]) pmBps *= m.bps; }
  return s * (Date.now() < G.ee ? G.em : 1) * tpBonus * pmBps;
}

function clickPow() {
  let cp = 1;
  for (const u of UD) { if (u.ty === 'c' && G.upg[u.id]) cp *= u.ml; }
  for (const d of DNAD) { if (G.du[d.id] && d.tp==='c') cp *= d.ml; }
  const b = bps();
  if (b > 0) cp += b * 0.01; // BPS bonus
  cp *= (1 + G.tp * 0.05); // +5% per prestige
  for (const m of PRES_MILES) { if (G.pm && G.pm[m.id]) cp *= m.cp; }
  return Math.max(1, cp);
}

function dnaGain() { return Math.floor(Math.sqrt(G.tb / 1e9)); }

function isUnlocked(u) {
  if (!u.rq) return true;
  if (u.rq.zi !== undefined && G.z[u.rq.zi].n < u.rq.n) return false;
  if (u.rq.tz !== undefined && totZ(G) < u.rq.tz) return false;
  return true;
}

// ══════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════

function tick() {
  const now = Date.now(), dt = Math.min((now - G.lt) / 1000, 10);
  G.lt = now; G.pt += dt;
  const earned = bps() * dt;
  G.b += earned; G.tb += earned;
  if (now - G.ls > 30000) save();
  if (Math.random() < dt / 300) triggerEvent();
  checkAch();
  renderHdr();
  renderCenter();
  renderZombies();
  renderZombieField();
}

// ══════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════

function onClickBrain(e) {
  try { startBGM(); sfxClick(); } catch(e) {}
  const cp = Math.max(1, Math.floor(clickPow()));
  G.b += cp; G.tb += cp; G.tc++;
  const x = (e.clientX ?? e.touches?.[0]?.clientX) || 400, y = (e.clientY ?? e.touches?.[0]?.clientY) || 300;
  spawnPt(x, y, '+' + fmt(cp));
  const s = document.getElementById('bsvg');
  s.style.transform = 'scale(1.12)';
  setTimeout(() => s.style.transform = '', 100);
}

function setBuy(m) {
  G.bm = m;
  document.querySelectorAll('.bb').forEach(b => b.classList.remove('on'));
  document.getElementById('bm' + m).classList.add('on');
  renderZombies();
}

function buyZ(zid) {
  const amt = G.bm === -1 ? maxBuy(zid) : G.bm;
  if (amt <= 0) { try { sfxDeny(); } catch(e){} return; }
  const cost = zCost(zid, amt);
  if (G.b < cost) { try { sfxDeny(); } catch(e){} return; }
  G.b -= cost; G.z[zid].n += amt;
  // 先更新畫面，再播音效（避免音效例外阻斷渲染）
  renderZombies(); renderZombieField(); renderUpg();
  const row = document.getElementById('zr-' + zid);
  if (row) { row.classList.add('flash'); setTimeout(() => row && row.classList.remove('flash'), 460); }
  try { sfxBuy(); } catch(e) {}
}

function buyUpg(id) {
  if (G.upg[id]) return;
  const u = UD.find(x => x.id === id);
  if (!u || G.b < u.co || !isUnlocked(u)) return;
  G.b -= u.co; G.upg[id] = true;
  renderUpg(); renderZombies();
}

function buyDNA(id) {
  if (G.du[id]) return;
  const d = DNAD.find(x => x.id === id);
  if (!d || G.dna < d.co) return;
  G.dna -= d.co; G.du[id] = true;
  renderPres();
}

function prestige() {
  const gain = dnaGain();
  if (gain <= 0) { toast('⚠️ 無法進化', '需要更多腦髓才能獲得 DNA！', '#ef4444'); return; }
  if (!confirm(`確認進化？\n獲得 ${gain} DNA 積分\n所有腦髓和殭屍將被重置`)) return;
  G.dna += gain; G.tp++;
  G.b = 0; G.tb = 0;
  G.z = ZD.map(z => ({ id: z.id, n: 0 }));
  G.upg = {}; G.em = 1; G.ee = 0;
  if (!G.pm) G.pm = {};
  for (const m of PRES_MILES) {
    if (!G.pm[m.id] && G.tp >= m.tp) {
      G.pm[m.id] = true;
      setTimeout(() => toast(`${m.ic} 里程碑解鎖！`, `${m.nm}：${m.tp_label} (永久)`, '#f59e0b'), 800);
    }
  }
  toast('🧬 進化成功！', `獲得 ${gain} DNA 積分 ／ 生產加成 +${G.tp*8}%`, '#a78bfa');
  save();
  render();
}

function triggerEvent() {
  if (bps() < 1) return;
  const ev = EVTS[Math.floor(Math.random() * EVTS.length)];
  G.em = ev.ml; G.ee = Date.now() + ev.dur * 1000;
  const el = document.getElementById('evt');
  el.innerHTML = `<b>${ev.nm}</b><br><small>${ev.ds}</small>`;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 5000);
}

function checkAch() {
  for (const a of ACHD) {
    if (!G.ach[a.id] && a.c(G)) {
      G.ach[a.id] = true;
      toast('🏆 成就解鎖！', `${a.ic} ${a.nm}`, '#f59e0b');
    }
  }
}

function renderHdr() {
  document.getElementById('h-b').textContent   = fmt(G.b);
  document.getElementById('h-bps').textContent = fmt(bps());
  document.getElementById('h-dna').textContent = fmt(G.dna);
  document.getElementById('h-t').textContent   = fmtT(G.pt);
}

function renderCenter() {
  document.getElementById('bd').textContent    = fmt(G.b);
  document.getElementById('bps-v').textContent = fmt(bps());
  document.getElementById('cp-v').textContent  = fmt(Math.floor(clickPow()));
}

function renderZombies() {
  const list = document.getElementById('zlist');
  list.innerHTML = '';
  for (const zd of ZD) {
    const zs = G.z[zd.id];
    const visible = zs.n > 0 || G.tb >= zd.bc * 0.5 || zd.id === 0;
    if (!visible) {
      // Show teaser for next locked zombie
      const prev = zd.id > 0 ? G.z[zd.id - 1].n : 1;
      if (prev === 0) continue;
      const div = document.createElement('div');
      div.className = 'zrow dim';
      div.innerHTML = `<div class="zem">❓</div><div class="zi"><div class="zn" style="color:var(--dim)">???</div><div class="zpr">尚未解鎖</div></div>`;
      list.appendChild(div); continue;
    }
    const amt    = G.bm === -1 ? Math.max(1, maxBuy(zd.id)) : G.bm;
    const rawAmt = G.bm === -1 ? maxBuy(zd.id) : G.bm;
    const cost   = zCost(zd.id, Math.max(1, rawAmt));
    const afford = G.b >= cost && rawAmt > 0;
    const prod   = zd.bp * zMult(zd.id);
    const pct    = Math.min(100, (G.b / zNextCost(zd.id)) * 100);
    const label  = G.bm !== 1 ? ` (${amt})` : '';
    const div    = document.createElement('div');
    div.id        = 'zr-' + zd.id;
    div.className = 'zrow' + (afford ? ' ok' : '');
    div.onclick   = () => buyZ(zd.id);
    div.innerHTML = `
      <div class="zem">${zd.em}</div>
      <div class="zi">
        <div class="zn">${zd.name}</div>
        <div class="zpr">${zs.n > 0 ? fmt(zs.n * prod) + '/秒' : fmt(prod) + '/秒 × 數量'}</div>
        <div class="zco${afford ? ' ok' : ''}">🧠 ${fmt(cost)}${label}</div>
      </div>
      <div class="zct">${zs.n}</div>
      <div class="zprog" style="width:${pct}%"></div>`;
    list.appendChild(div);
  }
}

let curTab = 'upg';

function renderUpg() {
  const list = document.getElementById('upg-list');
  list.innerHTML = '';
  let shown = 0;
  for (const u of UD) {
    if (G.upg[u.id] || !isUnlocked(u)) continue;
    const ok = G.b >= u.co;
    const div = document.createElement('div');
    div.className = 'uc' + (ok ? '' : ' no');
    div.onclick = () => buyUpg(u.id);
    div.innerHTML = `
      <div class="ut">
        <div class="un">${u.nm}</div>
        <div class="uco${ok ? ' ok' : ''}">🧠 ${fmt(u.co)}</div>
      </div>
      <div class="ud">${u.ds}</div>`;
    list.appendChild(div);
    shown++;
  }
  if (!shown) list.innerHTML = '<div style="padding:14px;color:var(--dim);font-size:14px;text-align:center">所有強化均已購買或尚未解鎖</div>';
  // glow auto-upg button if anything is affordable
  const btn = document.getElementById('auto-upg');
  if (btn) {
    const hasAffordable = UD.some(u => !G.upg[u.id] && isUnlocked(u) && G.b >= u.co);
    btn.className = hasAffordable ? 'glow' : '';
  }
}

function renderAch() {
  const list = document.getElementById('ach-list');
  let got = 0;
  list.innerHTML = '';
  for (const a of ACHD) {
    const unlocked = !!G.ach[a.id];
    if (unlocked) got++;
    const div = document.createElement('div');
    div.className = 'ac ' + (unlocked ? 'got' : 'nope');
    div.innerHTML = `
      <div class="ai">${a.ic}</div>
      <div>
        <div class="an">${unlocked ? a.nm : '???'}</div>
        <div class="ad">${unlocked ? a.ds : '尚未解鎖'}</div>
      </div>`;
    list.appendChild(div);
  }
  const info = document.createElement('div');
  info.style.cssText = 'padding:8px;font-size:13px;color:var(--dim);text-align:center';
  info.textContent = `已解鎖 ${got} / ${ACHD.length}`;
  list.insertBefore(info, list.firstChild);
}

function renderPres() {
  document.getElementById('dna-num').textContent = fmt(G.dna);
  const gain = dnaGain();
  document.getElementById('dna-g').textContent = fmt(gain);

  // Progress bar toward next DNA threshold
  const curThresh = gain * gain * 1e9;
  const nextThresh = (gain + 1) * (gain + 1) * 1e9;
  const pct = gain === 0
    ? Math.min(100, (G.tb / 1e9) * 100)
    : Math.min(100, ((G.tb - curThresh) / (nextThresh - curThresh)) * 100);
  document.getElementById('pres-prog-bar').style.width = pct.toFixed(1) + '%';
  document.getElementById('pres-prog-txt').textContent =
    `總腦髓 ${fmt(G.tb)} / ${fmt(nextThresh)}　→ 下次 ${gain + 1} DNA`;

  // Prestige streak info
  const bonusPct = (G.tp * 8);
  document.getElementById('pres-streak').textContent =
    G.tp > 0 ? `已進化 ${G.tp} 次 ⟶ 生產 +${bonusPct}% ／ 點擊 +${G.tp*5}%` : '';

  // Milestone display
  let msHtml = '<div style="margin-top:10px;font-size:11px;color:#a78bfa;margin-bottom:4px">🎯 進化里程碑</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
  for (const m of PRES_MILES) {
    const done = G.pm && G.pm[m.id];
    msHtml += `<div title="${m.ds}\n效果：${m.tp_label}" style="padding:4px 8px;border-radius:4px;font-size:11px;${done?'background:#1a0a2e;border:1px solid #6d28d9;color:#a78bfa':'background:#0a0a0f;border:1px solid #1a1a2e;color:#333'}">${m.ic} ${done?m.nm:'??? (需 '+m.tp+' 次進化)'}</div>`;
  }
  msHtml += '</div>';
  const msEl = document.getElementById('pres-milestones');
  if (msEl) msEl.innerHTML = msHtml;

  const list = document.getElementById('dna-upg-list');
  list.innerHTML = '';
  for (const d of DNAD) {
    const bought = !!G.du[d.id];
    const ok     = G.dna >= d.co;
    const div    = document.createElement('div');
    div.className = 'du' + (bought ? ' got' : ok ? '' : ' no');
    div.onclick = () => buyDNA(d.id);
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between">
        <div class="dun">${bought ? '✓ ' : ''}${d.nm}</div>
        <div class="duc">${bought ? '已購買' : '🧬 ' + d.co + ' DNA'}</div>
      </div>
      <div class="dud">${d.ds}</div>`;
    list.appendChild(div);
  }
}

const SAVE_KEY = 'zi_v1';

function save() {
  G.ls = Date.now();
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(G));
    const btn = document.getElementById('save-btn');
    btn.textContent = '✓ 已儲存';
    setTimeout(() => btn.textContent = '💾 儲存', 2000);
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const sv = JSON.parse(raw);
    Object.assign(G, sv);
    // Ensure zombie array is complete
    G.z = ZD.map(z => {
      const s = (sv.z || []).find(x => x.id === z.id);
      return s || { id: z.id, n: 0 };
    });
    // Offline progress (capped at 8h, 50% efficiency)
    const off = Math.min((Date.now() - (sv.lt || Date.now())) / 1000, 28800);
    if (off > 60) {
      const earn = bps() * off * 0.5;
      G.b += earn; G.tb += earn;
      setTimeout(() => toast('⏰ 離線收益', `離線 ${fmtT(off)}，獲得 ${fmt(earn)} 🧠`, '#3ddc58'), 1200);
    }
    G.lt = Date.now();
    G.em = 1; G.ee = 0;
  } catch(e) {}
}

// ══════════════════════════════════════════════
//  BATTLEFIELD (對抗戰場)
// ══════════════════════════════════════════════

const MAX_DISPLAY = 50; // 每方最多顯示數量

let zfCanvas, zfCtx, zfW = 0, zfH = 0;
let zfZombies    = []; // 我方: {x,y,zdId,hp,maxHp,atkTimer,target,sz,em,facing,atkType,range,rof,spd}
let zfEnemies    = []; // 敵方: {x,y,typeId,hp,maxHp,atkTimer,target,sz,em,facing,atkType,range,rof,spd}
let zfProjectiles= []; // 飛行物: {x,y,vx,vy,col,dmg,sz,src,type,life}
let zfEffects    = []; // 視覺效果: {x,y,r,maxR,col,life}
let zfLastTs     = 0;
let zfKnownCounts= {};

// 波次狀態
let waveNum   = 0;
let waveTimer = 20;   // 倒數秒數到下一波
let waveActive= false;
let waveCooldown = 0;
let waveSpawnQueue = [];

// ── 初始化 ────────────────────────────────────
function zfInit() {
  zfCanvas = document.getElementById('zf-canvas');
  if (!zfCanvas) return;
  zfCtx = zfCanvas.getContext('2d');
  zfResize();
  zfCanvas.addEventListener('mousedown', zfClick);
  zfCanvas.addEventListener('touchstart', zfClick, {passive: false});
  requestAnimationFrame(zfLoop);
}

function zfResize() {
  const rect = zfCanvas.parentElement.getBoundingClientRect();
  zfW = zfCanvas.width  = rect.width  || 400;
  zfH = zfCanvas.height = rect.height || 220;
}

// ── 生成單位 ──────────────────────────────────
function zfSpawnZombie(zdId) {
  if (zfZombies.length >= MAX_DISPLAY) return;
  const zd = ZD[zdId];
  const bt = ZOMBIE_BATTLE[zdId];
  zfZombies.push({
    x: 15 + Math.random() * (zfW * 0.37),
    y: zfH * 0.28 + Math.random() * zfH * 0.58,
    zdId, hp: bt.hp, maxHp: bt.hp,
    atkTimer: Math.random() / bt.rof,
    target: null, sz: 17 + Math.random() * 8,
    em: zd.em, facing: 1,
    atkType: bt.atkType, range: bt.range, rof: bt.rof, spd: bt.spd
  });
}

function zfSpawnEnemy(typeId) {
  if (zfEnemies.length >= MAX_DISPLAY) return;
  const scale = 1 + waveNum * 0.2;
  const ed = ENEMY_DATA[typeId];
  zfEnemies.push({
    x: zfW - 15 - Math.random() * (zfW * 0.18),
    y: zfH * 0.28 + Math.random() * zfH * 0.58,
    typeId, hp: Math.ceil(ed.hp * scale), maxHp: Math.ceil(ed.hp * scale),
    atkTimer: Math.random() / ed.rof,
    target: null, sz: 17 + Math.random() * 8,
    em: ed.em, facing: -1,
    atkType: ed.atkType, range: ed.range, rof: ed.rof,
    spd: ed.spd * (1 + waveNum * 0.05)
  });
}

// ── 波次系統 ──────────────────────────────────
function zfBuildWave(n) {
  const count = 3 + n * 2;
  const queue = [];
  const maxType = Math.min(n - 1, ENEMY_DATA.length - 1);
  for (let i = 0; i < count; i++) {
    // 越高波次越容易出現高階敵人
    const roll = Math.random();
    const tier = roll < 0.4 ? 0 : Math.min(Math.floor(roll * (maxType + 1)), maxType);
    queue.push({ typeId: tier, delay: 0.8 + i * 1.1, spawned: false });
  }
  return queue;
}

function zfUpdateWave(dt) {
  if (waveActive) {
    for (const e of waveSpawnQueue) {
      e.delay -= dt;
      if (e.delay <= 0 && !e.spawned) { e.spawned = true; zfSpawnEnemy(e.typeId); }
    }
    const allSpawned = waveSpawnQueue.every(e => e.spawned);
    if (allSpawned && zfEnemies.length === 0) {
      waveActive = false;
      waveCooldown = 6;
      sfxWaveClear(); stopBattleBeats();
      const bonus = Math.floor(bps() * 4 * (1 + waveNum * 0.5));
      G.b += bonus; G.tb += bonus;
      spawnPt(window.innerWidth / 2, 200, '+' + fmt(bonus) + ' 🧠');
      toast('⚔️ 波次擊退！', `第 ${waveNum} 波全滅！獲得 ${fmt(bonus)} 腦髓`, '#3ddc58');
      waveNum++;
      waveTimer = Math.max(15, 35 - waveNum * 0.8);
    }
  } else {
    if (waveCooldown > 0) { waveCooldown -= dt; return; }
    waveTimer -= dt;
    if (waveTimer <= 0 && totZ(G) > 0) {
      waveActive = true;
      waveSpawnQueue = zfBuildWave(waveNum + 1);
      sfxWaveStart(); startBattleBeats();
    }
  }
}

// ── 同步我方殭屍顯示數量 ──────────────────────
function zfSyncCounts() {
  let totalOwned = 0;
  ZD.forEach(zd => { totalOwned += G.z[zd.id].n; });
  if (totalOwned === 0) return;
  ZD.forEach(zd => {
    const owned = G.z[zd.id].n;
    if (owned === 0) return;
    const share = owned / totalOwned;
    const target = Math.max(1, Math.round(MAX_DISPLAY * share));
    const have   = zfZombies.filter(z => z.zdId === zd.id).length;
    const canAdd = Math.min(target - have, 6);
    for (let i = 0; i < canAdd; i++) zfSpawnZombie(zd.id);
    // 如果顯示數已超出，移除多餘的（從尾端）
    if (have > target) {
      let removed = 0;
      for (let i = zfZombies.length - 1; i >= 0 && removed < have - target; i--) {
        if (zfZombies[i].zdId === zd.id) { zfZombies.splice(i, 1); removed++; }
      }
    }
    zfKnownCounts[zd.id] = zfZombies.filter(z => z.zdId === zd.id).length;
  });
}

// ── 戰鬥輔助 ──────────────────────────────────
function zfFindTarget(unit, list) {
  let best = null, bd = Infinity;
  for (const t of list) {
    const d = Math.hypot(t.x - unit.x, t.y - unit.y);
    if (d < bd) { bd = d; best = t; }
  }
  return (best && bd < unit.range * 2.5 + 100) ? best : null;
}

function zfSpawnProj(sx, sy, tx, ty, col, dmg, sz, src, type) {
  const dx = tx - sx, dy = ty - sy, d = Math.hypot(dx, dy) || 1;
  const spd = type === 'ranged' ? 230 : 160;
  zfProjectiles.push({ x:sx, y:sy, vx:(dx/d)*spd, vy:(dy/d)*spd, col, dmg, sz, src, type, life:2.0 });
}

function zfSpawnFx(x, y, r, col) {
  zfEffects.push({ x, y, r:0, maxR:r, col, life:1 });
}

// ── 更新我方殭屍 ──────────────────────────────
function zfUpdateZombies(dt) {
  const dead = [];
  for (const z of zfZombies) {
    if (z.hp <= 0) { dead.push(z); continue; }
    z.atkTimer -= dt;
    if (z.target && z.target.hp <= 0) z.target = null;
    z.target = z.target || zfFindTarget(z, zfEnemies);

    if (z.target) {
      const dx = z.target.x - z.x, dy = z.target.y - z.y, d = Math.hypot(dx, dy);
      z.facing = dx > 0 ? 1 : -1;
      if (d > z.range) {
        z.x += (dx/d) * z.spd * dt;
        z.y += (dy/d) * z.spd * dt;
      } else if (z.atkTimer <= 0) {
        z.atkTimer = 1 / z.rof;
        const atk = (ZD[z.zdId].bp * 0.5 + 3) * zMult(z.zdId) * 0.1;
        if (z.atkType === 'melee') {
          z.target.hp -= atk; zfSpawnFx(z.target.x, z.target.y, 18, '#3ddc58');
        } else if (z.atkType === 'ranged') {
          zfSpawnProj(z.x, z.y, z.target.x, z.target.y, '#3ddc88', atk, 4, 'z', 'ranged');
        } else if (z.atkType === 'aoe') {
          zfSpawnProj(z.x, z.y, z.target.x, z.target.y, '#a78bfa', atk * 1.5, 7, 'z', 'aoe');
        } else if (z.atkType === 'poison') {
          for (const e of zfEnemies) {
            if (Math.hypot(e.x - z.x, e.y - z.y) < z.range) e.hp -= atk * 0.6;
          }
          zfSpawnFx(z.x, z.y, z.range * 0.6, '#7fff00');
        } else if (z.atkType === 'summon') {
          z.target.hp -= atk * 0.4;
          if (Math.random() < 0.25 && zfZombies.length < MAX_DISPLAY) {
            const bt = ZOMBIE_BATTLE[0];
            zfZombies.push({ x:z.x+(Math.random()-0.5)*40, y:z.y+(Math.random()-0.5)*20,
              zdId:0, hp:bt.hp, maxHp:bt.hp, atkTimer:0.5, target:null,
              sz:14, em:'🧟', facing:1, atkType:'melee', range:bt.range, rof:bt.rof, spd:bt.spd });
          }
        }
      }
    } else {
      z.x += z.spd * 0.18 * dt; z.facing = 1;
      if (z.x > zfW * 0.78) z.x -= z.spd * 0.36 * dt;
    }
    z.y = Math.max(zfH*0.27, Math.min(zfH*0.9, z.y));
  }
  for (const d of dead) { const i = zfZombies.indexOf(d); if(i>=0) zfZombies.splice(i,1); }
}

// ── 更新敵方 ──────────────────────────────────
function zfUpdateEnemies(dt) {
  const dead = [];
  for (const e of zfEnemies) {
    if (e.hp <= 0) {
      dead.push(e);
      const scale = 1 + waveNum * 0.2;
      const bonus = Math.ceil(ENEMY_DATA[e.typeId].hp * scale * 0.8 + bps() * 0.05);
      G.b += bonus; G.tb += bonus;
      zfSpawnFx(e.x, e.y, 32, '#ef4444');
      continue;
    }
    e.atkTimer -= dt;
    if (e.target && e.target.hp <= 0) e.target = null;
    e.target = e.target || zfFindTarget(e, zfZombies);

    if (e.target) {
      const dx = e.target.x - e.x, dy = e.target.y - e.y, d = Math.hypot(dx, dy);
      e.facing = dx > 0 ? 1 : -1;
      if (d > e.range) {
        e.x += (dx/d) * e.spd * dt; e.y += (dy/d) * e.spd * dt;
      } else if (e.atkTimer <= 0) {
        e.atkTimer = 1 / e.rof;
        const scale = 1 + waveNum * 0.2;
        const atk = ENEMY_DATA[e.typeId].atk * scale;
        if (e.atkType === 'melee') {
          e.target.hp -= atk; zfSpawnFx(e.target.x, e.target.y, 16, '#ef4444');
        } else if (e.atkType === 'ranged') {
          zfSpawnProj(e.x, e.y, e.target.x, e.target.y, '#ff6666', atk, 4, 'e', 'ranged');
        } else if (e.atkType === 'aoe') {
          zfSpawnProj(e.x, e.y, e.target.x, e.target.y, '#fbbf24', atk * 1.5, 8, 'e', 'aoe');
        }
      }
    } else {
      e.x -= e.spd * dt; e.facing = -1;
      if (e.x < -35) {
        dead.push(e);
        G.em = Math.max((Date.now() < G.ee ? G.em : 1) * 0.6, 0.4);
        G.ee = Date.now() + 10000;
        toast('💀 防線突破！', '敵人衝破了我方陣線！生產力暫時下降', '#ef4444');
      }
    }
    e.y = Math.max(zfH*0.27, Math.min(zfH*0.9, e.y));
  }
  for (const d of dead) { const i = zfEnemies.indexOf(d); if(i>=0) zfEnemies.splice(i,1); }
}

// ── 更新飛行物 & 效果 ────────────────────────
function zfUpdateProjectiles(dt) {
  const dead = [];
  for (const p of zfProjectiles) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) { dead.push(p); continue; }
    const targets = p.src === 'z' ? zfEnemies : zfZombies;
    for (const t of targets) {
      if (Math.hypot(p.x - t.x, p.y - t.y) < t.sz * 0.75) {
        t.hp -= p.dmg;
        if (p.type === 'aoe') {
          zfSpawnFx(t.x, t.y, 55, p.col);
          for (const t2 of targets) {
            if (Math.hypot(p.x - t2.x, p.y - t2.y) < 55) t2.hp -= p.dmg * 0.5;
          }
        }
        dead.push(p); break;
      }
    }
  }
  for (const d of dead) { const i = zfProjectiles.indexOf(d); if(i>=0) zfProjectiles.splice(i,1); }
  for (const ef of zfEffects) { ef.r += (ef.maxR - ef.r) * 0.25; ef.life -= dt * 3; }
  zfEffects = zfEffects.filter(ef => ef.life > 0);
}

// ── 渲染戰場 ──────────────────────────────────
function zfDraw() {
  zfCtx.clearRect(0, 0, zfW, zfH);

  // 領地背景
  const gL = zfCtx.createLinearGradient(0, 0, zfW * 0.46, 0);
  gL.addColorStop(0, 'rgba(20,70,20,0.28)'); gL.addColorStop(1, 'rgba(0,0,0,0)');
  zfCtx.fillStyle = gL; zfCtx.fillRect(0, 0, zfW * 0.46, zfH);

  const gR = zfCtx.createLinearGradient(zfW, 0, zfW * 0.54, 0);
  gR.addColorStop(0, 'rgba(80,15,15,0.28)'); gR.addColorStop(1, 'rgba(0,0,0,0)');
  zfCtx.fillStyle = gR; zfCtx.fillRect(zfW * 0.54, 0, zfW * 0.46, zfH);

  // 中線
  const frontX = zfEnemies.length > 0
    ? Math.max(zfW*0.28, Math.min(...zfEnemies.map(e=>e.x)) - 20)
    : zfW * 0.52;
  zfCtx.strokeStyle = 'rgba(255,80,80,0.25)';
  zfCtx.lineWidth = 1; zfCtx.setLineDash([4,6]);
  zfCtx.beginPath(); zfCtx.moveTo(frontX,0); zfCtx.lineTo(frontX,zfH); zfCtx.stroke();
  zfCtx.setLineDash([]);

  // 地面線
  zfCtx.strokeStyle = 'rgba(61,220,88,0.1)'; zfCtx.lineWidth = 1;
  zfCtx.beginPath(); zfCtx.moveTo(0,zfH*0.94); zfCtx.lineTo(zfW,zfH*0.94); zfCtx.stroke();

  // 爆炸/效果圓
  for (const ef of zfEffects) {
    zfCtx.save();
    zfCtx.globalAlpha = ef.life * 0.4;
    zfCtx.strokeStyle = ef.col; zfCtx.lineWidth = 2;
    zfCtx.shadowBlur = 8; zfCtx.shadowColor = ef.col;
    zfCtx.beginPath(); zfCtx.arc(ef.x, ef.y, ef.r, 0, Math.PI*2); zfCtx.stroke();
    zfCtx.restore();
  }

  // 繪製我方殭屍
  for (const z of zfZombies) {
    zfCtx.save();
    zfCtx.globalAlpha = z.hp/z.maxHp < 0.3 ? 0.45 : 0.9;
    // HP條
    if (z.hp < z.maxHp) {
      const bw=22, bh=3, bx=z.x-bw/2, by=z.y-z.sz*0.65-5;
      zfCtx.fillStyle='#111'; zfCtx.fillRect(bx,by,bw,bh);
      const pct=Math.max(0,z.hp/z.maxHp);
      zfCtx.fillStyle=pct>0.5?'#3ddc58':pct>0.25?'#fbbf24':'#ef4444';
      zfCtx.fillRect(bx,by,bw*pct,bh);
    }
    zfCtx.font = z.sz+'px serif'; zfCtx.textAlign='center'; zfCtx.textBaseline='middle';
    if (z.facing < 0) { zfCtx.scale(-1,1); zfCtx.fillText(z.em,-z.x,z.y); }
    else { zfCtx.fillText(z.em, z.x, z.y); }
    zfCtx.restore();
  }

  // 繪製敵方
  for (const e of zfEnemies) {
    zfCtx.save();
    zfCtx.globalAlpha = e.hp/e.maxHp < 0.3 ? 0.45 : 0.9;
    // HP條
    if (e.hp < e.maxHp) {
      const bw=22, bh=3, bx=e.x-bw/2, by=e.y-e.sz*0.65-5;
      zfCtx.fillStyle='#111'; zfCtx.fillRect(bx,by,bw,bh);
      const pct=Math.max(0,e.hp/e.maxHp);
      zfCtx.fillStyle=pct>0.5?'#ef4444':pct>0.25?'#fbbf24':'#888';
      zfCtx.fillRect(bx,by,bw*pct,bh);
    }
    zfCtx.font = e.sz+'px serif'; zfCtx.textAlign='center'; zfCtx.textBaseline='middle';
    zfCtx.shadowBlur=6; zfCtx.shadowColor='rgba(239,68,68,0.4)';
    if (e.facing > 0) { zfCtx.fillText(e.em, e.x, e.y); }
    else { zfCtx.scale(-1,1); zfCtx.fillText(e.em,-e.x,e.y); }
    zfCtx.restore();
  }

  // 繪製飛行物
  for (const p of zfProjectiles) {
    zfCtx.save();
    zfCtx.globalAlpha = 0.88;
    zfCtx.fillStyle = p.col; zfCtx.shadowBlur=8; zfCtx.shadowColor=p.col;
    zfCtx.beginPath(); zfCtx.arc(p.x, p.y, p.sz, 0, Math.PI*2); zfCtx.fill();
    zfCtx.restore();
  }

  // 更新標籤
  const wBanner = document.getElementById('wave-banner');
  if (wBanner) {
    if (totZ(G) === 0) {
      wBanner.textContent = '尚無殭屍... 召喚部隊開始戰鬥！';
      wBanner.style.color = 'var(--dim)';
    } else if (waveActive) {
      const rem = zfEnemies.length + waveSpawnQueue.filter(e=>!e.spawned).length;
      wBanner.textContent = `⚔️ 第 ${waveNum+1} 波來襲 — 剩餘: ${rem} 敵`;
      wBanner.style.color = '#ef4444';
    } else if (waveCooldown > 0) {
      wBanner.textContent = `✅ 第 ${waveNum} 波擊退！下波準備中...`;
      wBanner.style.color = '#3ddc58';
    } else {
      const sec = Math.ceil(Math.max(0, waveTimer));
      wBanner.textContent = `🌊 第 ${waveNum+1} 波倒計時: ${sec}s`;
      wBanner.style.color = sec <= 5 ? '#fbbf24' : 'var(--dim)';
    }
  }
  const leftLbl  = document.getElementById('zf-left-label');
  const rightLbl = document.getElementById('zf-right-label');
  if (leftLbl)  leftLbl.textContent  = `🟢 我方 ${zfZombies.length}`;
  if (rightLbl) rightLbl.textContent = `🔴 敵方 ${zfEnemies.length}`;

  const skipBtn = document.getElementById('skip-btn');
  if (skipBtn) {
    if (totZ(G) === 0) {
      skipBtn.style.display = 'none';
    } else if (waveActive) {
      skipBtn.style.display = '';
      const pending = waveSpawnQueue.filter(e => !e.spawned).length;
      skipBtn.textContent = pending > 0 ? `⚡ 全部召喚 (${pending})` : '⚡ 全部召喚';
      skipBtn.classList.add('wave-on');
    } else {
      skipBtn.style.display = '';
      const sec = Math.ceil(Math.max(0, waveCooldown > 0 ? waveCooldown : waveTimer));
      skipBtn.textContent = sec > 0 ? `⚡ 跳過等待 (${sec}s)` : '⚡ 立即開戰';
      skipBtn.classList.remove('wave-on');
    }
  }
}

// ── 點擊戰場 ──────────────────────────────────
function zfClick(e) {
  if(e.type==='touchstart') e.preventDefault();
  const rect = zfCanvas.getBoundingClientRect();
  const cx = (e.clientX ?? e.touches?.[0]?.clientX);
  const cy = (e.clientY ?? e.touches?.[0]?.clientY);
  const mx = (cx-rect.left)*(zfW/rect.width);
  const my = (cy-rect.top)*(zfH/rect.height);
  for (const en of zfEnemies) {
    if (Math.hypot(mx-en.x, my-en.y) < en.sz) {
      en.hp -= bps()*0.25 + 8;
      zfSpawnFx(en.x, en.y, 28, '#fbbf24');
      sfxClick();
      return;
    }
  }
}

// ── 主迴圈 ────────────────────────────────────
function zfLoop(ts) {
  requestAnimationFrame(zfLoop);
  const dt = Math.min((ts - zfLastTs) / 1000, 0.05);
  zfLastTs = ts;
  if (zfW === 0) zfResize();
  if (totZ(G) > 0 || waveActive) {
    zfSyncCounts();
    zfUpdateWave(dt);
    zfUpdateZombies(dt);
    zfUpdateEnemies(dt);
    zfUpdateProjectiles(dt);
  }
  zfDraw();
}

function renderZombieField() {
  zfSyncCounts();
}



// ══════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════

let _actx = null;
let muted = false;
let bgmOn = false;
const bgmNodes = [];

function getACtx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  bgmNodes.forEach(g => { try { g.gain.value = muted ? 0 : g._vol; } catch(e){} });
  if (muted) stopBattleBeats();
}

function startBGM() {
  if (bgmOn || muted) return;
  bgmOn = true;
  const ctx = getACtx();

  // Noise layer
  const buf = ctx.createBuffer(1, ctx.sampleRate * 3, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const flt = ctx.createBiquadFilter();
  flt.type = 'lowpass'; flt.frequency.value = 130;
  const ng = ctx.createGain(); ng.gain.value = ng._vol = 0.022;
  src.connect(flt); flt.connect(ng); ng.connect(ctx.destination);
  src.start(); bgmNodes.push(ng);

  // Drone oscillators
  [[55, 0.032], [82.4, 0.022], [110, 0.013]].forEach(([f, v]) => {
    const o  = ctx.createOscillator();
    const g  = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.value = g._vol = v;
    const lfo = ctx.createOscillator();
    const lg  = ctx.createGain();
    lfo.frequency.value = 0.13 + Math.random() * 0.22;
    lg.gain.value = v * 0.38;
    lfo.connect(lg); lg.connect(g.gain); lfo.start();
    o.connect(g); g.connect(ctx.destination); o.start();
    bgmNodes.push(g);
  });
}

function sfxClick() {
  if (muted) return;
  const ctx = getACtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(280, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + 0.09);
  g.gain.setValueAtTime(0.22, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.09);
}

function sfxBuy() {
  if (muted) return;
  const ctx = getACtx();
  [200, 280, 380].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(0.13, ctx.currentTime + i * 0.07);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.07 + 0.13);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + i * 0.07);
    o.stop(ctx.currentTime + i * 0.07 + 0.13);
  });
}

function sfxDeny() {
  if (muted) return;
  const ctx = getACtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(140, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(75, ctx.currentTime + 0.15);
  g.gain.setValueAtTime(0.18, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.15);
}

// ── 波次音效 ──────────────────────────────────
function sfxWaveStart() {
  if (muted) return;
  const ctx = getACtx();
  // 警報音：上升鋸齒三連發
  [0, 0.18, 0.36].forEach(delay => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(330, ctx.currentTime + delay);
    o.frequency.linearRampToValueAtTime(660, ctx.currentTime + delay + 0.14);
    g.gain.setValueAtTime(0.2, ctx.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.14);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + 0.14);
  });
}

function sfxWaveClear() {
  if (muted) return;
  const ctx = getACtx();
  // 勝利小旋律
  [262, 330, 392, 523].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(0.14, ctx.currentTime + i * 0.11);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.11 + 0.25);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + i * 0.11); o.stop(ctx.currentTime + i * 0.11 + 0.25);
  });
}

function sfxWaveSkip() {
  if (muted) return;
  const ctx = getACtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(500, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.07);
  g.gain.setValueAtTime(0.18, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.07);
}

// ── 戰鬥 BGM（節奏打擊層）────────────────────
let battleBeatId = null;
let battleGainNode = null;

function startBattleBeats() {
  if (battleBeatId || muted) return;
  const ctx = getACtx();
  battleGainNode = ctx.createGain();
  battleGainNode.gain.setValueAtTime(0, ctx.currentTime);
  battleGainNode.gain.linearRampToValueAtTime(0.11, ctx.currentTime + 0.35);
  battleGainNode.connect(ctx.destination);

  let beat = 0;
  const interval = 375; // 160 BPM

  function tick() {
    if (!battleBeatId) return;
    const t = ctx.currentTime;
    const g = battleGainNode;
    // 踢鼓：拍 0, 2
    if (beat % 4 === 0 || beat % 4 === 2) {
      const o = ctx.createOscillator(), gg = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(160, t);
      o.frequency.exponentialRampToValueAtTime(30, t + 0.14);
      gg.gain.setValueAtTime(0.9, t);
      gg.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      o.connect(gg); gg.connect(g);
      o.start(t); o.stop(t + 0.16);
    }
    // 軍鼓：拍 1, 3
    if (beat % 4 === 1 || beat % 4 === 3) {
      const len = Math.ceil(ctx.sampleRate * 0.1);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const flt = ctx.createBiquadFilter(); flt.type = 'bandpass';
      flt.frequency.value = 2800; flt.Q.value = 0.8;
      const gg = ctx.createGain();
      gg.gain.setValueAtTime(0.55, t);
      gg.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      src.connect(flt); flt.connect(gg); gg.connect(g);
      src.start(t);
    }
    // 高帽：每拍
    {
      const len = Math.ceil(ctx.sampleRate * 0.03);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const flt = ctx.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 9000;
      const gg = ctx.createGain();
      gg.gain.setValueAtTime(0.18, t);
      gg.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
      src.connect(flt); flt.connect(gg); gg.connect(g);
      src.start(t);
    }
    beat++;
    battleBeatId = setTimeout(tick, interval);
  }
  battleBeatId = setTimeout(tick, 0);
}

function stopBattleBeats() {
  if (battleBeatId) { clearTimeout(battleBeatId); battleBeatId = null; }
  if (battleGainNode && _actx) {
    try { battleGainNode.gain.linearRampToValueAtTime(0, _actx.currentTime + 0.5); } catch(e) {}
    setTimeout(() => { try { battleGainNode.disconnect(); } catch(e) {} battleGainNode = null; }, 600);
  }
}

// ── 跳過波次 ──────────────────────────────────
function skipWave() {
  if (totZ(G) === 0) return;
  startBGM();
  if (waveActive) {
    // 立刻把剩餘待生成的敵人全部召喚出來
    for (const e of waveSpawnQueue) {
      if (!e.spawned) { e.delay = 0; e.spawned = true; zfSpawnEnemy(e.typeId); }
    }
    sfxWaveSkip();
  } else {
    // 跳過冷卻 / 倒計時，立即開始下一波
    waveCooldown = 0;
    waveTimer = 0;
    waveActive = true;
    waveSpawnQueue = zfBuildWave(waveNum + 1);
    sfxWaveStart();
    startBattleBeats();
  }
}

// ══════════════════════════════════════════════
//  AUTO UPGRADE
// ══════════════════════════════════════════════

function autoUpgrade() {
  let bought = 0;
  for (const u of UD) {
    if (G.upg[u.id] || !isUnlocked(u)) continue;
    if (G.b >= u.co) { G.b -= u.co; G.upg[u.id] = true; bought++; }
  }
  if (bought > 0) {
    sfxBuy();
    toast('⚡ 自動升級', `購買了 ${bought} 項強化！`, '#3ddc58');
    renderUpg(); renderZombies();
  } else {
    sfxDeny();
    toast('⚡ 無可購買', '目前沒有能負擔的強化項目', '#5a7a5a');
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════

function init() {
  load();
  // Sync buy-mode button state with loaded save
  document.querySelectorAll('.bb').forEach(b => b.classList.remove('on'));
  const bmId = 'bm' + G.bm;
  const bmEl = document.getElementById(bmId);
  if (bmEl) bmEl.classList.add('on');

  render();
  zfInit();

  // Use mousedown (not click) so the purchase fires before tick() can clear
  // innerHTML and detach the element, which would swallow the click event.
  document.getElementById('zlist').addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const row = e.target.closest('.zrow');
    if (!row || row.classList.contains('dim')) return;
    const zid = parseInt(row.id.replace('zr-', ''), 10);
    if (!isNaN(zid)) buyZ(zid);
  });
  document.getElementById('zlist').addEventListener('touchstart', e => {
    const row = e.target.closest('.zrow');
    if (!row || row.classList.contains('dim')) return;
    e.preventDefault();
    const zid = parseInt(row.id.replace('zr-', ''), 10);
    if (!isNaN(zid)) buyZ(zid);
  }, {passive: false});

  setInterval(tick, 50);
  setInterval(rotateTicker, 48000);
  rotateTicker();
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
  });
  // First-time welcome
  if (G.tc === 0 && G.tb === 0) {
    setTimeout(() => toast('🧟 殭屍末日開始！', '點擊腦髓獲取資源，召喚殭屍大軍！', '#3ddc58'), 600);
  }
}

init();
