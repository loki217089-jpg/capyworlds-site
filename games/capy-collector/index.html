<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Capy Collector 水豚收藏家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#1a1410;--bg2:#261e16;--bg3:#332a1f;
  --accent:#f0c040;--accent2:#e8a020;
  --text:#f0e6d6;--text2:#b8a890;
  --card-n:#d0c8b8;--card-r:#60b0f0;--card-sr:#c070f0;--card-ssr:#f0c040;
  --cream:#faf4ed;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;}
body{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* Top Bar */
.top-bar{position:relative;z-index:200;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:6px 12px;background:var(--bg2);
  border-bottom:1px solid rgba(240,192,64,0.2);height:48px;}
.top-bar .title{font-size:16px;font-weight:bold;color:var(--accent);}
.top-bar .res-bar{display:flex;gap:10px;font-size:13px;}
.res-item{display:flex;align-items:center;gap:3px;}
.res-item .icon{width:18px;height:18px;}
.btn-group{display:flex;gap:6px;}
.top-btn{background:none;border:1px solid rgba(240,192,64,0.3);color:var(--accent);
  border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;}
.top-btn:active{transform:scale(0.95);}

/* Main Content */
.main-area{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative;}

/* Tab Screens */
.screen{display:none;padding:12px;min-height:100%;}
.screen.active{display:block;}

/* Bottom Tabs */
.tab-bar{position:relative;z-index:200;flex-shrink:0;display:flex;
  background:var(--bg2);border-top:1px solid rgba(240,192,64,0.2);height:58px;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;color:var(--text2);font-size:10px;transition:color 0.2s;
  border:none;background:none;-webkit-tap-highlight-color:transparent;}
.tab .tab-icon{font-size:22px;line-height:1;}
.tab.active{color:var(--accent);}
.tab.active .tab-icon{transform:scale(1.15);}
.tab .badge{position:absolute;top:4px;right:calc(50% - 16px);width:8px;height:8px;
  background:#ff3030;border-radius:50%;display:none;}

/* Home Screen */
.home-bg{width:100%;border-radius:12px;margin-bottom:12px;object-fit:cover;max-height:200px;}
.home-welcome{text-align:center;padding:16px 0;}
.home-welcome h2{font-size:20px;color:var(--accent);margin-bottom:6px;}
.home-welcome p{font-size:13px;color:var(--text2);}
.home-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.stat-card{background:var(--bg2);border-radius:10px;padding:12px;text-align:center;
  border:1px solid rgba(240,192,64,0.15);}
.stat-card .val{font-size:22px;font-weight:bold;color:var(--accent);}
.stat-card .label{font-size:11px;color:var(--text2);margin-top:2px;}

/* Summon Screen */
.summon-area{text-align:center;}
.summon-stage{position:relative;width:100%;max-width:320px;margin:0 auto;
  height:300px;display:flex;align-items:center;justify-content:center;}
.card-display{width:180px;height:250px;perspective:600px;cursor:pointer;}
.card-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;
  transform-style:preserve-3d;}
.card-inner.flipped{transform:rotateY(180deg);}
.card-front,.card-back{position:absolute;width:100%;height:100%;
  backface-visibility:hidden;border-radius:12px;overflow:hidden;}
.card-front{background:var(--bg3);border:3px solid var(--card-n);
  display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotateY(180deg);}
.card-back{background-image:url('../../assets/capy-collector/card-back.png');
  background-size:cover;background-position:center;border-radius:12px;}
.card-front .char-img{width:120px;height:120px;border-radius:50%;
  background-color:var(--cream);background-size:cover;background-position:center;margin-bottom:8px;}
.card-front .char-name{font-size:15px;font-weight:bold;color:var(--text);}
.card-front .char-rarity{font-size:12px;font-weight:bold;padding:2px 10px;
  border-radius:10px;margin-top:4px;}
.rarity-N{color:var(--card-n);border:1px solid var(--card-n);}
.rarity-R{color:var(--card-r);border:1px solid var(--card-r);}
.rarity-SR{color:var(--card-sr);border:1px solid var(--card-sr);}
.rarity-SSR{color:var(--card-ssr);border:1px solid var(--card-ssr);
  text-shadow:0 0 8px rgba(240,192,64,0.6);}
.summon-glow{position:absolute;width:200px;height:200px;border-radius:50%;
  pointer-events:none;opacity:0;transition:opacity 0.3s;}
.summon-btns{display:flex;gap:12px;justify-content:center;margin-top:16px;}
.summon-btn{padding:14px 28px;border-radius:12px;border:none;font-size:16px;
  font-weight:bold;cursor:pointer;transition:transform 0.1s;color:#1a1410;}
.summon-btn:active{transform:scale(0.95);}
.summon-btn.s1{background:linear-gradient(135deg,#f0c040,#e8a020);}
.summon-btn.s10{background:linear-gradient(135deg,#c070f0,#9050d0);color:#fff;}
.summon-cost{font-size:11px;font-weight:normal;opacity:0.8;display:block;margin-top:2px;}

/* Collection Screen */
.coll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
.coll-card{background:var(--bg2);border-radius:10px;padding:8px;text-align:center;
  border:2px solid var(--bg3);cursor:pointer;transition:transform 0.15s;}
.coll-card:active{transform:scale(0.96);}
.coll-card.owned{border-color:var(--card-n);}
.coll-card.rarity-R-border{border-color:var(--card-r);}
.coll-card.rarity-SR-border{border-color:var(--card-sr);}
.coll-card.rarity-SSR-border{border-color:var(--card-ssr);box-shadow:0 0 12px rgba(240,192,64,0.3);}
.coll-card .portrait{width:64px;height:64px;border-radius:50%;margin:0 auto 4px;
  background-color:var(--cream);background-size:cover;background-position:center;}
.coll-card .cname{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.coll-card .clevel{font-size:10px;color:var(--accent);margin-top:2px;}
.coll-card.locked{opacity:0.35;border-color:var(--bg3);}
.coll-card.locked .portrait{filter:brightness(0.3);}

/* Scene Screen */
.scene-list{display:flex;flex-direction:column;gap:12px;}
.scene-card{background:var(--bg2);border-radius:12px;overflow:hidden;
  border:1px solid rgba(240,192,64,0.15);}
.scene-banner{height:100px;background-size:cover;background-position:center;
  position:relative;display:flex;align-items:flex-end;padding:8px;}
.scene-banner::after{content:'';position:absolute;inset:0;
  background:linear-gradient(transparent 40%,rgba(0,0,0,0.7));}
.scene-banner .scene-name{position:relative;z-index:1;font-size:14px;font-weight:bold;color:#fff;}
.scene-slots{display:flex;gap:8px;padding:10px;flex-wrap:wrap;}
.scene-slot{width:52px;height:52px;border-radius:50%;border:2px dashed var(--text2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:var(--bg3);transition:border-color 0.2s;}
.scene-slot:active{border-color:var(--accent);}
.scene-slot.filled{border-style:solid;border-color:var(--accent);}
.scene-slot .slot-img{width:44px;height:44px;border-radius:50%;
  background-color:var(--cream);background-size:cover;background-position:center;}
.scene-slot .slot-empty{font-size:20px;color:var(--text2);}
.scene-income{padding:0 10px 10px;font-size:12px;color:var(--text2);}

/* Upgrade Screen */
.upgrade-panel{background:var(--bg2);border-radius:12px;padding:16px;
  border:1px solid rgba(240,192,64,0.15);margin-bottom:12px;}
.upgrade-char{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.upgrade-portrait{width:72px;height:72px;border-radius:50%;
  background-color:var(--cream);background-size:cover;background-position:center;
  border:3px solid var(--card-n);flex-shrink:0;}
.upgrade-info{flex:1;}
.upgrade-info .uname{font-size:16px;font-weight:bold;}
.upgrade-info .ulevel{font-size:13px;color:var(--accent);}
.upgrade-info .uskill{font-size:12px;color:var(--text2);margin-top:2px;}
.upgrade-btn{width:100%;padding:12px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#f0c040,#e8a020);color:#1a1410;
  font-size:15px;font-weight:bold;cursor:pointer;transition:transform 0.1s;}
.upgrade-btn:active{transform:scale(0.97);}
.upgrade-btn:disabled{opacity:0.4;cursor:default;}

/* Animations */
@keyframes glow-pulse{0%,100%{opacity:0.3;transform:scale(0.95);}50%{opacity:1;transform:scale(1.05);}}
@keyframes card-shine{0%{left:-100%;}100%{left:200%;}}
@keyframes float-up{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes particle-rise{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(0.5);}}
@keyframes flash-white{0%{opacity:0;}20%{opacity:0.8;}100%{opacity:0;}}
@keyframes rainbow-border{0%{border-color:hsl(0,80%,60%);}33%{border-color:hsl(120,80%,60%);}66%{border-color:hsl(240,80%,60%);}100%{border-color:hsl(360,80%,60%);}}
.glow-anim{animation:glow-pulse 1.5s ease-in-out infinite;}
.shake-anim{animation:shake 0.3s ease-in-out;}
.ssr-glow{animation:rainbow-border 2s linear infinite;}
.awakened-1{box-shadow:0 0 8px rgba(240,192,64,0.5);}
.awakened-2{box-shadow:0 0 12px rgba(240,192,64,0.7);}
.awakened-3{box-shadow:0 0 16px rgba(240,192,64,0.9);animation:glow-pulse 2s ease-in-out infinite;}
.float-num{position:absolute;pointer-events:none;font-weight:bold;font-size:16px;
  color:var(--accent);animation:float-up 1s ease-out forwards;}

/* Assign Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:400;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border-radius:16px;padding:20px;
  max-width:min(400px,calc(100vw - 32px));max-height:80vh;overflow-y:auto;
  border:2px solid var(--accent);}
.modal h3{font-size:16px;color:var(--accent);margin-bottom:12px;text-align:center;}
.modal-chars{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.modal-char{background:var(--bg3);border-radius:10px;padding:8px;text-align:center;
  cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;}
.modal-char:active{border-color:var(--accent);}
.modal-char .mc-img{width:52px;height:52px;border-radius:50%;margin:0 auto 4px;
  background-color:var(--cream);background-size:cover;background-position:center;}
.modal-char .mc-name{font-size:11px;color:var(--text);}
.modal-close{margin-top:12px;width:100%;padding:10px;border-radius:8px;border:none;
  background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;}

/* Scrollbar */
.main-area::-webkit-scrollbar{width:4px;}
.main-area::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
</style>
</head>

let lang = localStorage.getItem('capyCollLang') || 'en';
let audioMuted = localStorage.getItem('capyCollMuted') === '1';
let state = {
  coins: 500, gems: 10, hearts: 0, stars: 0,
  chars: {},       // {charId: {level, count}}
  deployed: {},    // {sceneId: [charId, charId, ...]}
  unlockedScenes: ['beach','bedroom','dock','garden'],
  totalSummons: 0,
  lastTick: Date.now()
};

function t(key){ return I18N[lang][key] || key; }

function saveGame(){
  localStorage.setItem('capyCollSave', JSON.stringify(state));
}
function loadGame(){
  const s = localStorage.getItem('capyCollSave');
  if(s){ try{ Object.assign(state, JSON.parse(s)); }catch(e){} }

  // Calculate offline earnings
  const now = Date.now();
  const dt = (now - state.lastTick) / 1000;
  state.offlineEarnings = {coins:0, gems:0, hearts:0, stars:0, seconds:Math.min(dt, 3600)};
  if(dt > 10 && dt <= 3600){ // at least 10 seconds away, max 1 hour
    SCENES.forEach(sc=>{
      (state.deployed[sc.id]||[]).forEach(cid=>{
        if(!cid) return;
        const c = CHARS.find(x=>x.id===cid);
        if(!c) return;
        const cd = state.chars[cid];
        if(!cd) return;
        const base = c.skillVal * cd.level;
        const earned = {coins:0, gems:0, hearts:0, stars:0};
        if(c.skill==='idleCoins') earned.coins = base * dt;
        else if(c.skill==='idleGems') earned.gems = base * 0.2 * dt;
        else if(c.skill==='idleHearts') earned.hearts = base * 0.5 * dt;
        else if(c.skill==='idleStars') earned.stars = base * 0.3 * dt;
        else if(c.skill==='idleAll'){ earned.coins=base*dt; earned.gems=base*0.1*dt; earned.hearts=base*0.3*dt; earned.stars=base*0.2*dt; }
        state.offlineEarnings.coins += earned.coins;
        state.offlineEarnings.gems += earned.gems;
        state.offlineEarnings.hearts += earned.hearts;
        state.offlineEarnings.stars += earned.stars;
        state.coins += earned.coins;
        state.gems += earned.gems;
        state.hearts += earned.hearts;
        state.stars += earned.stars;
      });
    });
  }

  state.lastTick = now;
  SCENES.forEach(sc=>{ if(!state.deployed[sc.id]) state.deployed[sc.id]=[]; });
}

/* ===== AUDIO ===== */
const AUDIO_CTX = new (window.AudioContext||window.webkitAudioContext)();
const AUDIO_BUFS = {};
let bgmSource=null, bgmGain=null, bgmLoaded=false;
const BGM_URL = '../../assets/JDSherbert - Minigame Music Pack [FREE]/JDSherbert - Minigame Music Pack - Beach Vibes.ogg';

function loadAudio(name,url){
  fetch(url).then(r=>r.arrayBuffer()).then(ab=>AUDIO_CTX.decodeAudioData(ab))
    .then(buf=>{AUDIO_BUFS[name]=buf;}).catch(()=>{});
}
function playAudio(name,vol=0.7,rate=1,maxMs=0){
  if(audioMuted)return;const buf=AUDIO_BUFS[name];if(!buf)return;
  if(AUDIO_CTX.state==='suspended')AUDIO_CTX.resume();
  const src=AUDIO_CTX.createBufferSource();src.buffer=buf;src.playbackRate.value=rate;
  const gain=AUDIO_CTX.createGain();gain.gain.value=vol;
  src.connect(gain);gain.connect(AUDIO_CTX.destination);
  src.start(0,0,maxMs>0?maxMs/1000:buf.duration);
}
function startBGM(url){
  if(bgmLoaded||audioMuted)return;bgmLoaded=true;
  fetch(url).then(r=>r.arrayBuffer()).then(ab=>AUDIO_CTX.decodeAudioData(ab)).then(buf=>{
    if(AUDIO_CTX.state==='suspended')AUDIO_CTX.resume();
    bgmSource=AUDIO_CTX.createBufferSource();bgmSource.buffer=buf;bgmSource.loop=true;
    bgmGain=AUDIO_CTX.createGain();bgmGain.gain.value=0.18;
    bgmSource.connect(bgmGain);bgmGain.connect(AUDIO_CTX.destination);bgmSource.start();
  }).catch(()=>{});
}
function toggleMute(){
  audioMuted=!audioMuted;
  if(bgmGain)bgmGain.gain.value=audioMuted?0:0.18;
  document.getElementById('mute-btn').textContent=audioMuted?'🔇':'🔊';
  localStorage.setItem('capyCollMuted',audioMuted?'1':'0');
  if(!audioMuted&&!bgmLoaded)startBGM(BGM_URL);
}

/* ===== SPRITE SYSTEM (Grid-based, clean sheets) ===== */
// char-sheet.png: 2400×1792, 4col×3row, cell=600×597
// scene-sheet.png: 2048×2048, 2col×4row, cell=1024×512
// Scenes: (0,0)beach (1,0)bedroom (0,1)dock (1,1)garden
//         (0,2)hotspring (1,2)castle (0,3)home-bg (1,3)empty
const charDataUrls = {};
const sceneDataUrls = {};
const homeBgUrl = {val:''};
let spritesReady = false;

function cropFromImage(img, sx, sy, sw, sh){
  const c = document.createElement('canvas');
  c.width = sw; c.height = sh;
  c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
  return c.toDataURL('image/png');
}

function loadAllSprites(callback){
  let loaded = 0;
  const total = 5; // char×2 + scene + food×2
  const charImg = new Image(), charImg2 = new Image(), sceneImg = new Image();
  const foodImg1 = new Image(), foodImg2 = new Image();

  function onLoad(){
    loaded++;
    if(loaded < total) return;

    // Crop characters from both sheets
    CHARS.forEach(c => {
      const img = c.sheet===2 ? charImg2 : charImg;
      charDataUrls[c.id] = cropFromImage(img, c.col*CS_CW, c.row*CS_CH, CS_CW, CS_CH);
    });

    // Crop scenes
    const sceneGrid = [
      {id:'beach',col:0,row:0},{id:'bedroom',col:1,row:0},
      {id:'dock',col:0,row:1},{id:'garden',col:1,row:1},
      {id:'hotspring',col:0,row:2},{id:'castle',col:1,row:2}
    ];
    sceneGrid.forEach(s => {
      sceneDataUrls[s.id] = cropFromImage(sceneImg, s.col*SS_CW, s.row*SS_CH, SS_CW, SS_CH);
    });
    homeBgUrl.val = cropFromImage(sceneImg, 0, 3*SS_CH, SS_CW, SS_CH);

    // Crop food items (ingredients + recipes) from both food sheets
    const foodSheets = {1: foodImg1, 2: foodImg2};
    INGREDIENTS.forEach(ing => {
      const img = foodSheets[ing.sheet];
      foodDataUrls['ing_'+ing.id] = cropFromImage(img, ing.col*FS_CW, ing.row*FS_CH, FS_CW, FS_CH);
    });
    RECIPE_ITEMS.forEach(ri => {
      const img = foodSheets[ri.sheet];
      foodDataUrls['recipe_'+ri.id] = cropFromImage(img, ri.col*FS_CW, ri.row*FS_CH, FS_CW, FS_CH);
    });

    spritesReady = true;
    callback();
  }

  [charImg,charImg2,sceneImg,foodImg1,foodImg2].forEach(i=>{i.onload=onLoad;i.onerror=onLoad;});
  charImg.src = CHAR_SHEET; charImg2.src = CHAR_SHEET2; sceneImg.src = SCENE_SHEET;
  foodImg1.src = FOOD_SHEET1; foodImg2.src = FOOD_SHEET2;
}

function getCharPortraitStyle(c){
  const url = charDataUrls[c.id];
  if(!url) return 'background:var(--bg3);';
  return `background-image:url('${url}');background-size:cover;background-position:center;`;
}
function getSceneBgStyle(sc){
  const url = sceneDataUrls[sc.id];
  if(!url) return 'background:var(--bg3);';
  return `background-image:url('${url}');background-size:cover;background-position:center;`;
}

/* ===== GACHA / SUMMON ===== */
function rollRarity(premium=false){
  const weights = premium ? PREMIUM_WEIGHTS : RARITY_WEIGHTS;
  const r = Math.random()*100;
  let cum=0;
  for(const [rarity,w] of Object.entries(weights)){
    cum+=w; if(r<cum) return rarity;
  }
  return 'N';
}
function rollChar(premium=false){
  const rarity = rollRarity(premium);
  const pool = CHARS.filter(c=>c.rarity===rarity);
  return pool[Math.floor(Math.random()*pool.length)];
}
function addChar(c){
  if(!state.chars[c.id]){
    state.chars[c.id] = {level:1, count:1};
    return 'new';
  } else {
    state.chars[c.id].count++;
    // Auto level up on 3 duplicates
    const ch = state.chars[c.id];
    if(ch.count >= 3){
      ch.level++; ch.count -= 3;
    }
    return 'dup';
  }
}

let summonQueue = [];
let summonShowing = false;

function doSummon(count, premium=false){
  if(premium){
    const cost = count===1 ? 10 : 90;
    if(state.gems < cost){ showToast(t('noGems')); return; }
    state.gems -= cost;
  } else {
    const cost = count===1 ? SUMMON_COST_1 : SUMMON_COST_10;
    if(state.coins < cost){ showToast(t('noCoins')); return; }
    state.coins -= cost;
  }
  updateResDisplay();
  playAudio('summon', 0.6, 1, 280);

  summonQueue = [];
  for(let i=0;i<count;i++){
    const c = rollChar(premium);
    const result = addChar(c);
    summonQueue.push({char:c, result});
  }
  // Guarantee: 10-pull has minimum rarity
  if(count===10 && summonQueue.length===10){
    const minRarity = premium ? 'SR' : 'R';
    const rarityOrder = ['N','R','SR','SSR'];
    const minIdx = rarityOrder.indexOf(minRarity);
    const hasMin = summonQueue.some(q => rarityOrder.indexOf(q.char.rarity) >= minIdx);
    if(!hasMin){
      // Upgrade last card
      const pool = CHARS.filter(c => c.rarity === minRarity);
      const upgraded = pool[Math.floor(Math.random()*pool.length)];
      const last = summonQueue[summonQueue.length-1];
      last.char = upgraded;
      last.result = addChar(upgraded); // re-add (the old one was already added, but this is simpler)
    }
  }
  state.totalSummons += count;
  saveGame();
  showNextSummon();
}

function showNextSummon(){
  if(summonQueue.length===0){
    $('summon-overlay').style.display='none';
    summonShowing=false;
    renderSummon();
    return;
  }
  summonShowing=true;
  const item = summonQueue.shift();
  const c = item.char;
  const overlay = $('summon-overlay');
  overlay.style.display='flex';

  // Set card back, prepare flip
  const inner = $('summon-card-inner');
  inner.classList.remove('flipped');

  // Set character on front
  const charImg = $('summon-char-img');
  charImg.style.cssText = getCharPortraitStyle(c);

  $('summon-char-name').textContent = lang==='tw'?c.nameTw:c.nameEn;
  const rarityEl = $('summon-char-rarity');
  rarityEl.textContent = c.rarity + (item.result==='new'?' ✨'+t('newCapy'):' '+t('duplicate'));
  rarityEl.className = 'char-rarity rarity-'+c.rarity;

  // Card border color
  const front = $('summon-card-front');
  front.style.borderColor = RARITY_COLORS[c.rarity];

  // Glow effect
  const glow = $('summon-glow');
  const glowColors = {N:'rgba(200,200,180,0.3)',R:'rgba(96,176,240,0.4)',
    SR:'rgba(192,112,240,0.5)',SSR:'rgba(240,192,64,0.6)'};
  glow.style.background = `radial-gradient(circle,${glowColors[c.rarity]},transparent 70%)`;
  glow.style.opacity='0';

  // Flip after delay
  setTimeout(()=>{
    inner.classList.add('flipped');
    glow.style.opacity='1';
    glow.classList.add('glow-anim');
    if(c.rarity==='SSR'){
      playAudio('ssr',0.8,1,0);
      flashScreen('white');
      spawnParticles(overlay,'⭐',8);
      front.classList.add('ssr-glow');
    } else if(c.rarity==='SR'){
      playAudio('upgrade',0.6,1,280);
      spawnParticles(overlay,'✨',5);
      front.classList.remove('ssr-glow');
    } else {
      playAudio('collect',0.5,1,280);
      front.classList.remove('ssr-glow');
    }
  }, 600);

  $('summon-tap-hint').textContent = t('tapContinue') +
    (summonQueue.length>0?` (${summonQueue.length} left)`:'');
}

function onSummonOverlayTap(){
  if(!summonShowing) return;
  $('summon-glow').classList.remove('glow-anim');

function spawnParticles(parentEl, emoji, count){
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.textContent = emoji;
    p.style.cssText = `position:absolute;font-size:${14+Math.random()*10}px;pointer-events:none;`
      +`left:${30+Math.random()*40}%;top:${20+Math.random()*30}%;`
      +`animation:particle-rise ${0.8+Math.random()*0.6}s ease-out forwards;`
      +`animation-delay:${Math.random()*0.3}s;`;
    parentEl.appendChild(p);
    setTimeout(()=>p.remove(), 1500);
  }
}

/* ===== SCENES + IDLE INCOME ===== */
function calcCharIncome(charId){
  const cd = state.chars[charId]; if(!cd) return {coins:0,gems:0,hearts:0,stars:0};
  const c = CHARS.find(x=>x.id===charId);
  const affectionBonus = 1 + (cd.affection || 0) * 0.1; // +10% per affection level
  const awakenBonus = 1 + (cd.awakened || 0) * 0.5; // +50% per awakening
  const base = c.skillVal * cd.level * affectionBonus * awakenBonus;
  const out = {coins:0,gems:0,hearts:0,stars:0};
  if(c.skill==='idleCoins') out.coins=base;
  else if(c.skill==='idleGems') out.gems=base*0.2;
  else if(c.skill==='idleHearts') out.hearts=base*0.5;
  else if(c.skill==='idleStars') out.stars=base*0.3;
  else if(c.skill==='idleAll'){ out.coins=base; out.gems=base*0.1; out.hearts=base*0.3; out.stars=base*0.2; }
  const k = state.kitchen;
  const kitchenMult = (k && k.buff && k.buff.type==='production' && Date.now() < k.buffEnd) ? k.buff.mult : 1;
  out.coins *= kitchenMult;
  out.gems *= kitchenMult;
  out.hearts *= kitchenMult;
  out.stars *= kitchenMult;
  return out;
}

function calcTotalIncome(){
  let total=0;
  SCENES.forEach(sc=>{
    (state.deployed[sc.id]||[]).forEach(cid=>{
      if(cid){const inc=calcCharIncome(cid); total+=inc.coins+inc.gems*5+inc.hearts*2+inc.stars*3;}
    });
  });
  return total;
}

function tickIncome(){
  const now = Date.now();
  const dt = (now - state.lastTick)/1000;
  state.lastTick = now;
  if(dt<=0||dt>3600) return; // cap at 1hr offline

  SCENES.forEach(sc=>{
    (state.deployed[sc.id]||[]).forEach(cid=>{
      if(!cid) return;
      const inc = calcCharIncome(cid);
      state.coins += inc.coins * dt;
      state.gems += inc.gems * dt;
      state.hearts += inc.hearts * dt;
      state.stars += inc.stars * dt;
    });
  });
  updateResDisplay();
}

let assigningScene = null;
let assigningSlot = null;

function renderScenes(){
  let html='<div class="scene-list">';
  SCENES.forEach(sc=>{
    const deployed = state.deployed[sc.id]||[];
    const sceneName = lang==='tw'?sc.nameTw:sc.nameEn;

    // Calculate scene income
    let scIncome = 0;
    deployed.forEach(cid=>{
      if(cid){const inc=calcCharIncome(cid); scIncome+=inc.coins+inc.gems*5+inc.hearts*2+inc.stars*3;}
    });

    const isLocked = sc.cost && !state.unlockedScenes.includes(sc.id);

    html+=`<div class="scene-card" style="position:relative;${isLocked?'opacity:0.7;':''}">
      <div class="scene-banner" style="${getSceneBgStyle(sc)}${isLocked?'filter:brightness(0.4);':''}">
        <span class="scene-name">${sceneName}</span>
      </div>`;

    if(isLocked){
      html+=`<div style="padding:16px;text-align:center;">
        <div style="font-size:28px;margin-bottom:6px;">🔒</div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:10px;">${t('locked')}</p>
        <button onclick="unlockScene('${sc.id}')" style="padding:10px 24px;border-radius:10px;border:none;
          background:linear-gradient(135deg,#c070f0,#9050d0);color:#fff;font-size:14px;font-weight:bold;cursor:pointer;">
          ${t('unlock')} — 💎 ${sc.cost}
        </button>
      </div>`;
    } else {
      html+=`<div class="scene-slots">`;
      for(let i=0;i<sc.slots;i++){
        const cid = deployed[i];
        if(cid && state.chars[cid]){
          const c = CHARS.find(x=>x.id===cid);
          html+=`<div class="scene-slot filled" onclick="onSlotClick('${sc.id}',${i})">
            <div class="slot-img" style="${getCharPortraitStyle(c)}"></div>
          </div>`;
        } else {
          html+=`<div class="scene-slot" onclick="onSlotClick('${sc.id}',${i})">
            <span class="slot-empty">+</span>
          </div>`;
        }
      }
      html+=`</div>`;
      if(scIncome>0) html+=`<div class="scene-income">${t('income')}: 🪙${scIncome.toFixed(1)}${t('perSec')}</div>`;
    }
    html+=`</div>`;
  });
  html+='</div>';
  $('screen-scenes').innerHTML=html;
}

function onSlotClick(sceneId, slotIdx){
  const deployed = state.deployed[sceneId]||[];
  const current = deployed[slotIdx];

  if(current){
    // Remove
    deployed[slotIdx] = null;
    saveGame();
    renderScenes();
    return;
  }
  // Show assign modal
  assigningScene = sceneId;
  assigningSlot = slotIdx;
  showAssignModal();
}

function showAssignModal(){
  const modal = $('assign-modal');
  if(!modal){
    const m=document.createElement('div');
    m.id='assign-modal';m.className='modal-overlay';
    m.innerHTML=`<div class="modal">
      <h3 id="assign-title">${t('assign')}</h3>
      <div class="modal-chars" id="assign-chars"></div>
      <button class="modal-close" onclick="closeAssignModal()">${t('close')}</button>
    </div>`;
    document.body.appendChild(m);
  }
  // Get available chars (owned and not deployed elsewhere)
  const allDeployed = new Set();
  Object.values(state.deployed).forEach(arr=>arr.forEach(c=>{if(c)allDeployed.add(c);}));

  const available = Object.keys(state.chars).filter(cid=>!allDeployed.has(cid));
  let html='';
  if(available.length===0){
    html=`<p style="color:var(--text2);text-align:center;padding:20px;">No available capybaras. Summon more!</p>`;
  } else {
    available.forEach(cid=>{
      const c=CHARS.find(x=>x.id===cid);
      const cd=state.chars[cid];
      html+=`<div class="modal-char" onclick="assignChar('${cid}')">
        <div class="mc-img" style="${getCharPortraitStyle(c)}"></div>
        <div class="mc-name">${lang==='tw'?c.nameTw:c.nameEn}</div>
        <div style="font-size:10px;color:var(--accent);">${t('level')}${cd.level}</div>
      </div>`;
    });
  }
  $('assign-chars').innerHTML=html;
  $('assign-modal').classList.add('show');
}

function closeAssignModal(){
  const m=$('assign-modal');if(m)m.classList.remove('show');
}

function assignChar(charId){
  if(!assigningScene) return;
  if(!state.deployed[assigningScene]) state.deployed[assigningScene]=[];
  state.deployed[assigningScene][assigningSlot] = charId;
  saveGame();
  closeAssignModal();
  renderScenes();
  playAudio('collect',0.5,1,200);
}

function unlockScene(sceneId){
  const sc = SCENES.find(s=>s.id===sceneId);
  if(!sc||!sc.cost) return;
  if(state.gems < sc.cost){ showToast(t('noGems')); return; }
  state.gems -= sc.cost;
  if(!state.unlockedScenes.includes(sceneId)) state.unlockedScenes.push(sceneId);
  saveGame();
  updateResDisplay();
  playAudio('ssr',0.7,1,0);
  flashScreen('rgba(192,112,240,0.3)');
  const sceneScreen = $('screen-scenes');
  if(sceneScreen) spawnParticles(sceneScreen,'💎',6);
  renderScenes();
}

/* ===== UPGRADES ===== */
function getLevelUpCost(level){
  return Math.floor(LEVEL_UP_BASE * Math.pow(1.5, level-1));
}

function renderUpgrades(){
  const owned = Object.keys(state.chars);
  if(owned.length===0){
    $('screen-upgrades').innerHTML=`<p style="text-align:center;color:var(--text2);padding:40px;">

  }
  let html='';
  owned.forEach(cid=>{
    const c = CHARS.find(x=>x.id===cid);
    const cd = state.chars[cid];
    const cost = getLevelUpCost(cd.level);
    const canAfford = state.coins >= cost;
    const skillDesc = getSkillDesc(c);
    const inc = calcCharIncome(cid);
    const incStr = Object.entries(inc).filter(([k,v])=>v>0)
      .map(([k,v])=>`${k==='coins'?'🪙':k==='gems'?'💎':k==='hearts'?'❤️':'⭐'}${v.toFixed(1)}`).join(' ');

    html+=`<div class="upgrade-panel">
      <div class="upgrade-char">
        <div class="upgrade-portrait ${cd.awakened?'awakened-'+cd.awakened:''}" style="${getCharPortraitStyle(c)};border-color:${RARITY_COLORS[c.rarity]};"></div>
        <div class="upgrade-info">
          <div class="uname" style="color:${RARITY_COLORS[c.rarity]}">${lang==='tw'?c.nameTw:c.nameEn}
            <span style="font-size:12px;opacity:0.7;">[${c.rarity}]</span></div>
          <div class="ulevel">${t('level')}${cd.level} (×${cd.count}/3)</div>
          <div class="uskill">${skillDesc}: ${incStr}${t('perSec')}</div>
        </div>
      </div>
      <button class="upgrade-btn" ${canAfford?'':`disabled`}
        onclick="doLevelUp('${cid}')">
        ${t('levelUp')} — 🪙 ${cost}
      </button>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button style="flex:1;padding:8px;border-radius:8px;border:none;background:linear-gradient(135deg,#ff6090,#ff4060);
          color:#fff;font-size:13px;cursor:pointer;${state.hearts>=getAffectionCost((cd.affection||0)+1)?'':'opacity:0.4;'}"
          onclick="doAffection('${cid}')">
          ❤️ ${lang==='tw'?'親密度':'Bond'} ${cd.affection||0}/10 — ❤️${getAffectionCost((cd.affection||0)+1)}
        </button>
        ${cd.level>=10 ? `<button style="flex:1;padding:8px;border-radius:8px;border:none;
          background:linear-gradient(135deg,#f0c040,#ff8800);color:#1a1410;font-size:13px;cursor:pointer;
          ${(cd.awakened||0)<3 && state.stars>=100*((cd.awakened||0)+1)?'':'opacity:0.4;'}"
          onclick="doAwaken('${cid}')">

      </div>
    </div>`;
  });
  html += renderExpeditions();
  html += renderAchievements();
  $('screen-upgrades').innerHTML=html;
}

function doLevelUp(charId){
  const cd = state.chars[charId]; if(!cd) return;
  const cost = getLevelUpCost(cd.level);
  if(state.coins < cost) return;
  state.coins -= cost;
  cd.level++;
  saveGame();
  updateResDisplay();
  playAudio('upgrade',0.7,1,280);
  const upgradeScreen = $('screen-upgrades');
  if(upgradeScreen) spawnParticles(upgradeScreen,'⬆️',4);
  renderUpgrades();
}

/* ===== AFFECTION SYSTEM ===== */
function getAffectionCost(level){
  return Math.floor(50 * level);
}

function doAffection(charId){
  const cd = state.chars[charId]; if(!cd) return;
  if((cd.affection||0) >= 10){ showToast(lang==='tw'?'親密度已滿！':'Max bond!'); return; }
  if(!cd.affection) cd.affection = 0;
  const cost = getAffectionCost(cd.affection + 1);
  if(state.hearts < cost){ showToast(t('noHearts')); return; }
  state.hearts -= cost;
  cd.affection++;
  saveGame();
  updateResDisplay();
  playAudio('collect',0.6,1,200);
  const el = $('screen-upgrades');
  if(el) spawnParticles(el,'❤️',5);
  renderUpgrades();
}

/* ===== AWAKENING SYSTEM ===== */
function doAwaken(charId){
  const cd = state.chars[charId]; if(!cd) return;
  if(!cd.awakened) cd.awakened = 0;
  if(cd.level < 10){ showToast(lang==='tw'?'需要 Lv.10+':'Requires Lv.10+'); return; }
  if(cd.awakened >= 3){ showToast(lang==='tw'?'已滿覺醒':'Max awakened'); return; }
  const cost = 100 * (cd.awakened + 1);
  if(state.stars < cost){ showToast(t('noStars')); return; }
  state.stars -= cost;
  cd.awakened++;
  saveGame();
  updateResDisplay();
  playAudio('ssr',0.8,1,0);
  flashScreen('rgba(240,192,64,0.4)');
  const el = $('screen-upgrades');
  if(el) spawnParticles(el,'⭐',8);
  renderUpgrades();
}

/* ===== EXPEDITION SYSTEM ===== */
const EXPEDITIONS = [
  {id:'forest',  nameEn:'Forest Trail',    nameTw:'森林小徑',  duration:300,  reward:{coins:500,hearts:30},        slots:1, minRarity:'N'},
  {id:'ocean',   nameEn:'Ocean Voyage',    nameTw:'海上航行',  duration:900,  reward:{coins:2000,gems:5,hearts:50}, slots:2, minRarity:'R'},
  {id:'volcano', nameEn:'Volcano Depths',  nameTw:'火山深處',  duration:1800, reward:{coins:5000,gems:15,stars:30}, slots:2, minRarity:'SR'},
  {id:'space',   nameEn:'Space Mission',   nameTw:'太空任務',  duration:3600, reward:{coins:10000,gems:30,hearts:100,stars:50}, slots:3, minRarity:'SR'}
];

function getExpeditionState(){
  if(!state.expeditions) state.expeditions = {};
  return state.expeditions;
}

function startExpedition(expId, charIds){
  const exp = EXPEDITIONS.find(e=>e.id===expId);
  if(!exp) return;
  const exState = getExpeditionState();
  if(exState[expId] && exState[expId].endTime > Date.now()) return;
  exState[expId] = {
    charIds: charIds,
    startTime: Date.now(),
    endTime: Date.now() + exp.duration * 1000
  };
  saveGame();
  playAudio('summon',0.5,1,200);
  renderExpeditions();
}

function claimExpedition(expId){
  const exState = getExpeditionState();
  const ex = exState[expId];
  if(!ex || ex.endTime > Date.now()) return;
  const exp = EXPEDITIONS.find(e=>e.id===expId);
  if(!exp) return;
  Object.entries(exp.reward).forEach(([key, val])=>{
    state[key] = (state[key]||0) + val;
  });
  state.expeditionsCompleted = (state.expeditionsCompleted||0) + 1;
  delete exState[expId];
  saveGame();
  updateResDisplay();
  playAudio('ssr',0.6,1,0);
  flashScreen('rgba(240,192,64,0.3)');
  showToast((lang==='tw'?'遠征完成！':'Expedition complete!'));
  renderExpeditions();
}

function renderExpeditions(){
  let html = `<h3 style="color:var(--accent);margin:20px 0 12px;font-size:15px;border-top:1px solid var(--bg3);padding-top:16px;">
    🗺️ ${lang==='tw'?'遠征':'Expeditions'}</h3>`;
  const exState = getExpeditionState();
  EXPEDITIONS.forEach(exp=>{
    const running = exState[exp.id];
    const expName = lang==='tw' ? exp.nameTw : exp.nameEn;
    const mins = Math.floor(exp.duration / 60);
    const rewardStr = Object.entries(exp.reward)
      .map(([k,v])=>`${k==='coins'?'🪙':k==='gems'?'💎':k==='hearts'?'❤️':'⭐'}${v}`).join(' ');
    html += `<div style="background:var(--bg2);border-radius:10px;padding:12px;margin-bottom:8px;
      border:1px solid rgba(240,192,64,0.15);">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:14px;font-weight:bold;color:var(--text);">${expName}</div>
          <div style="font-size:11px;color:var(--text2);">${mins}min · ${exp.slots} ${lang==='tw'?'隻':'slots'} · ${exp.minRarity}+</div>
          <div style="font-size:12px;margin-top:2px;">${rewardStr}</div>
        </div>`;
    if(running){
      const remaining = Math.max(0, Math.floor((running.endTime - Date.now())/1000));
      if(remaining > 0){
        const m = Math.floor(remaining/60);
        const s = remaining%60;
        html += `<div style="text-align:center;">
          <div style="font-size:18px;color:var(--accent);font-weight:bold;" id="exp-timer-${exp.id}">${m}:${String(s).padStart(2,'0')}</div>
          <div style="font-size:10px;color:var(--text2);">${lang==='tw'?'進行中':'In progress'}</div>
        </div>`;
      } else {
        html += `<button onclick="claimExpedition('${exp.id}')" style="padding:8px 16px;border-radius:8px;border:none;
          background:linear-gradient(135deg,#44dd66,#22bb44);color:#fff;font-size:13px;font-weight:bold;cursor:pointer;
          animation:glow-pulse 1.5s infinite;">
          ${lang==='tw'?'領取':'Claim'}
        </button>`;
      }
    } else {
      html += `<button onclick="showExpeditionPicker('${exp.id}')" style="padding:8px 16px;border-radius:8px;border:none;
        background:linear-gradient(135deg,#f0c040,#e8a020);color:#1a1410;font-size:13px;font-weight:bold;cursor:pointer;">
        ${lang==='tw'?'出發':'Go'}
      </button>`;
    }
    html += `</div></div>`;
  });
  return html;
}

let pickingExpedition = null;
let pickedChars = [];

function showExpeditionPicker(expId){
  pickingExpedition = expId;
  pickedChars = [];
  const exp = EXPEDITIONS.find(e=>e.id===expId);
  const onExpedition = new Set();
  Object.values(getExpeditionState()).forEach(ex=>{
    if(ex.endTime > Date.now()) ex.charIds.forEach(id=>onExpedition.add(id));
  });
  const allDeployed = new Set();
  Object.values(state.deployed).forEach(arr=>arr.forEach(c=>{if(c)allDeployed.add(c);}));
  const rarityOrder = ['N','R','SR','SSR'];
  const minIdx = rarityOrder.indexOf(exp.minRarity);
  const available = Object.keys(state.chars).filter(cid=>{
    if(allDeployed.has(cid)||onExpedition.has(cid)) return false;
    const c = CHARS.find(x=>x.id===cid);
    return rarityOrder.indexOf(c.rarity) >= minIdx;
  });
  const modal = $('assign-modal') || document.createElement('div');
  modal.id = 'assign-modal';
  modal.className = 'modal-overlay show';
  const expName = lang==='tw' ? exp.nameTw : exp.nameEn;
  let charHtml = '';
  if(available.length === 0){
    charHtml = `<p style="color:var(--text2);text-align:center;padding:20px;">
      ${lang==='tw'?'沒有可用的水豚':'No available capybaras'}</p>`;
  } else {
    available.forEach(cid=>{
      const c = CHARS.find(x=>x.id===cid);
      charHtml += `<div class="modal-char" id="exp-pick-${cid}" onclick="toggleExpPick('${cid}')"
        style="border:2px solid transparent;">
        <div class="mc-img" style="${getCharPortraitStyle(c)}"></div>
        <div class="mc-name">${lang==='tw'?c.nameTw:c.nameEn}</div>
      </div>`;
    });
  }
  modal.innerHTML = `<div class="modal">
    <h3>${expName} (${exp.slots} ${lang==='tw'?'隻':'slots'})</h3>
    <div class="modal-chars">${charHtml}</div>
    <button id="exp-go-btn" class="modal-close" onclick="confirmExpedition()"
      style="background:var(--accent);color:#1a1410;font-weight:bold;" disabled>
      ${lang==='tw'?'出發！':'Go!'} (0/${exp.slots})
    </button>
    <button class="modal-close" onclick="closeAssignModal()">${t('close')}</button>
  </div>`;
  if(!document.getElementById('assign-modal')) document.body.appendChild(modal);
}

function toggleExpPick(cid){
  const exp = EXPEDITIONS.find(e=>e.id===pickingExpedition);
  const idx = pickedChars.indexOf(cid);
  if(idx>=0){
    pickedChars.splice(idx,1);
    const el = document.getElementById('exp-pick-'+cid);
    if(el) el.style.borderColor = 'transparent';
  } else {
    if(pickedChars.length >= exp.slots) return;
    pickedChars.push(cid);
    const el = document.getElementById('exp-pick-'+cid);
    if(el) el.style.borderColor = 'var(--accent)';
  }
  const btn = document.getElementById('exp-go-btn');
  if(btn){
    btn.disabled = pickedChars.length === 0;
    btn.textContent = `${lang==='tw'?'出發！':'Go!'} (${pickedChars.length}/${exp.slots})`;
  }
}

function confirmExpedition(){
  if(!pickingExpedition || pickedChars.length===0) return;
  startExpedition(pickingExpedition, [...pickedChars]);
  closeAssignModal();
  pickingExpedition = null;
  pickedChars = [];
}

// Food sprite data URLs (populated on load)
const foodDataUrls = {};

function getKitchenState(){
  if(!state.kitchen) state.kitchen = {cooldownEnd:0, currentIngredients:null, buff:null, buffEnd:0};
  return state.kitchen;
}

function refreshIngredients(){
  const k = getKitchenState();
  const shuffled = [...INGREDIENTS].sort(()=>Math.random()-0.5);
  k.currentIngredients = shuffled.slice(0,3).map(i=>i.id);
  saveGame();
}

function cookRecipe(ing1, ing2){
  const k = getKitchenState();
  if(Date.now() < k.cooldownEnd){
    const remaining = Math.ceil((k.cooldownEnd - Date.now())/1000);
    showToast(`⏰ ${Math.floor(remaining/60)}:${String(remaining%60).padStart(2,'0')}`);
    return;
  }
  const pair = [ing1, ing2].sort();
  const recipe = RECIPES.find(r => {
    const sorted = [...r.ing].sort();
    return sorted[0]===pair[0] && sorted[1]===pair[1];
  });
  if(!recipe){
    showToast(lang==='tw'?'這個組合...不太行':'This combination... doesn\'t work');
    return;
  }
  Object.entries(recipe.reward).forEach(([key,val])=>{
    state[key] = (state[key]||0) + val;
  });
  if(recipe.buff){
    if(recipe.buff.type==='affection' && recipe.buff.charRandom){
      const owned = Object.keys(state.chars);
      if(owned.length>0){
        const rId = owned[Math.floor(Math.random()*owned.length)];
        const cd = state.chars[rId];
        if(!cd.affection) cd.affection=0;
        if(cd.affection<10) cd.affection++;
        const c = CHARS.find(x=>x.id===rId);
        showToast(`${recipe.emoji} ${lang==='tw'?c.nameTw:c.nameEn} ❤️+1`);
      }
    } else if(recipe.buff.type==='production'||recipe.buff.type==='luck'){
      k.buff = recipe.buff;
      k.buffEnd = Date.now() + recipe.buff.duration * 1000;
    }
  }
  k.cooldownEnd = Date.now() + 180000;
  refreshIngredients();
  saveGame();
  updateResDisplay();
  playAudio('ssr',0.5,1,0);
  flashScreen('rgba(255,200,50,0.2)');
  const rName = lang==='tw'?recipe.nameTw:recipe.nameEn;
  const rewardStr = Object.entries(recipe.reward)
    .map(([k,v])=>`${k==='coins'?'🪙':k==='gems'?'💎':k==='hearts'?'❤️':'⭐'}${v}`).join(' ');
  showToast(`${recipe.emoji} ${rName}! ${rewardStr}`);
  renderHome();
}

function renderKitchen(){
  const k = getKitchenState();
  if(!k.currentIngredients) refreshIngredients();
  const cooldownActive = Date.now() < k.cooldownEnd;
  const remaining = cooldownActive ? Math.ceil((k.cooldownEnd - Date.now())/1000) : 0;
  let buffHtml = '';
  if(k.buff && Date.now() < k.buffEnd){
    const buffRemain = Math.ceil((k.buffEnd - Date.now())/1000);
    const buffMin = Math.floor(buffRemain/60);
    const buffDesc = k.buff.type==='production'
      ? `${lang==='tw'?'產出':'Production'} x${k.buff.mult}`
      : `${lang==='tw'?'幸運加成':'Lucky boost'}`;
    buffHtml = `<div style="background:rgba(240,192,64,0.15);border:1px solid var(--accent);border-radius:8px;
      padding:6px 10px;margin-bottom:8px;font-size:12px;color:var(--accent);text-align:center;">
      ✨ ${buffDesc} — ${buffMin}:${String(buffRemain%60).padStart(2,'0')}</div>`;
  }
  const ings = (k.currentIngredients||[]).map(id => INGREDIENTS.find(i=>i.id===id));
  let html = `<h3 style="color:var(--accent);margin:20px 0 8px;font-size:15px;border-top:1px solid var(--bg3);padding-top:16px;">
    🍳 ${lang==='tw'?'水豚廚房':'Capy Kitchen'}</h3>
    ${buffHtml}
    <div style="background:var(--bg2);border-radius:10px;padding:12px;border:1px solid rgba(240,192,64,0.15);">
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px;">
      ${lang==='tw'?'選 2 個食材組合料理！':'Pick 2 ingredients to cook!'}</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px;" id="kitchen-ingredients">`;
  ings.forEach(ing => {
    if(!ing) return;
    const name = lang==='tw'?ing.nameTw:ing.nameEn;
    html += `<button class="kitchen-ing" data-id="${ing.id}" onclick="toggleKitchenIng(this,'${ing.id}')"
      style="flex:1;padding:12px 4px;border-radius:10px;border:2px solid var(--bg3);background:var(--bg3);
      cursor:pointer;text-align:center;transition:border-color 0.2s;${cooldownActive?'opacity:0.4;pointer-events:none;':''}">
      <div style="width:56px;height:56px;margin:0 auto;border-radius:8px;background-color:var(--cream);
        background-image:url('${foodDataUrls['ing_'+ing.id]||''}');background-size:cover;background-position:center;"></div>
      <div style="font-size:11px;color:var(--text);margin-top:4px;">${name}</div>
    </button>`;
  });
  html += `</div>
    <button id="cook-btn" onclick="doCook()" disabled
      style="width:100%;padding:10px;border-radius:10px;border:none;
      background:linear-gradient(135deg,#ff8c00,#ff6600);color:#fff;font-size:15px;font-weight:bold;
      cursor:pointer;opacity:0.4;transition:opacity 0.2s;">
      ${cooldownActive ? `⏰ ${Math.floor(remaining/60)}:${String(remaining%60).padStart(2,'0')}` : '🍳 '+(lang==='tw'?'開始料理！':'Cook!')}
    </button>
    </div>`;
  return html;
}

let kitchenSelected = [];

function toggleKitchenIng(el, id){
  const idx = kitchenSelected.indexOf(id);
  if(idx>=0){
    kitchenSelected.splice(idx,1);
    el.style.borderColor = 'var(--bg3)';
  } else {
    if(kitchenSelected.length>=2) return;
    kitchenSelected.push(id);
    el.style.borderColor = 'var(--accent)';
  }
  const btn = document.getElementById('cook-btn');
  if(btn){
    btn.disabled = kitchenSelected.length < 2;
    btn.style.opacity = kitchenSelected.length >= 2 ? '1' : '0.4';
  }
}

function doCook(){
  if(kitchenSelected.length < 2) return;
  cookRecipe(kitchenSelected[0], kitchenSelected[1]);
  kitchenSelected = [];
}

function checkAchievements(){
  if(!state.achievements) state.achievements = [];
  let newOnes = false;
  ACHIEVEMENTS.forEach(a=>{
    if(state.achievements.includes(a.id)) return;
    if(a.check()){
      state.achievements.push(a.id);
      Object.entries(a.reward).forEach(([k,v])=>{ state[k]=(state[k]||0)+v; });
      const name = lang==='tw'?a.nameTw:a.nameEn;
      showToast(`🏆 ${name}!`);
      newOnes = true;
    }
  });
  if(newOnes){ saveGame(); updateResDisplay(); }
}

function renderAchievements(){
  if(!state.achievements) state.achievements = [];
  let html = `<h3 style="color:var(--accent);margin:20px 0 12px;font-size:15px;border-top:1px solid var(--bg3);padding-top:16px;">
    🏆 ${lang==='tw'?'成就':'Achievements'} (${state.achievements.length}/${ACHIEVEMENTS.length})</h3>`;
  ACHIEVEMENTS.forEach(a=>{
    const done = state.achievements.includes(a.id);
    const name = lang==='tw'?a.nameTw:a.nameEn;
    const rewardStr = Object.entries(a.reward)
      .map(([k,v])=>`${k==='coins'?'🪙':k==='gems'?'💎':k==='hearts'?'❤️':'⭐'}${v}`).join(' ');
    html += `<div style="display:flex;align-items:center;gap:8px;padding:8px;
      background:var(--bg2);border-radius:8px;margin-bottom:4px;
      opacity:${done?'1':'0.5'};border:1px solid ${done?'var(--accent)':'var(--bg3)'};">
      <span style="font-size:20px;">${done?'🏆':'🔒'}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:bold;">${name}</div>
        <div style="font-size:11px;color:var(--text2);">${rewardStr}</div>
      </div>
      ${done?'<span style="color:var(--accent);font-size:12px;">✅</span>':''}
    </div>`;
  });
  return html;
}

/* ===== WORKSHOP (Resource Conversion) ===== */
function convertResource(from, to, fromAmt, toAmt){
  if(state[from] < fromAmt){
    const names = {coins:'🪙',gems:'💎',hearts:'❤️',stars:'⭐'};
    showToast(`${names[from]} ${lang==='tw'?'不足！':'not enough!'}`);
    return;
  }
  state[from] -= fromAmt;
  state[to] = (state[to]||0) + toAmt;
  saveGame();
  updateResDisplay();
  playAudio('collect',0.5,1,200);
  renderHome();
}

function getSkillDesc(c){
  const skills = {
    idleCoins: lang==='tw'?'產生金幣':'Produces coins',
    idleGems: lang==='tw'?'產生寶石':'Produces gems',
    idleHearts: lang==='tw'?'產生愛心':'Produces hearts',
    idleStars: lang==='tw'?'產生星星':'Produces stars',
    idleAll: lang==='tw'?'產生所有資源':'Produces all resources'
  };
  return skills[c.skill]||c.skill;
}

/* ===== TUTORIAL ===== */
const TUTORIAL_STEPS = [
  c => `<div style="font-size:40px;margin-bottom:12px;">🦫</div><h3 style="color:var(--accent);margin-bottom:8px;">${t('tutTitle')}</h3>`,
  c => `<div style="font-size:32px;margin-bottom:8px;">🪙</div><p>${t('tut1')}</p>`,
  c => `<div style="font-size:32px;margin-bottom:8px;">✨</div><p>${t('tut2')}</p>`,
  c => `<div style="font-size:32px;margin-bottom:8px;">🏝️</div><p>${t('tut3')}</p>`,
  c => `<div style="font-size:32px;margin-bottom:8px;">⬆️</div><p>${t('tut4')}</p>`,
  c => `<div style="font-size:32px;margin-bottom:8px;">🎉</div><p>${t('tut5')}</p>`
];
let tutStep=0;

function showTutorial(){
  if(localStorage.getItem('capyCollTutDone')) return;
  tutStep=0;
  $('tutorial-overlay').style.display='flex';
  renderTutStep();
}
function renderTutStep(){
  $('tutorial-content').innerHTML = TUTORIAL_STEPS[tutStep]();
  $('tutorial-next').textContent = tutStep>=TUTORIAL_STEPS.length-1 ? t('gotIt') : 'Next →';
}
function nextTutStep(){
  tutStep++;
  if(tutStep>=TUTORIAL_STEPS.length){
    $('tutorial-overlay').style.display='none';
    localStorage.setItem('capyCollTutDone','1');
    return;
  }
  renderTutStep();
}

/* ===== LANGUAGE ===== */
function applyLang(){
  $('game-title').textContent = t('title');
  document.querySelectorAll('.tab').forEach(tab=>{
    const key = tab.dataset.tab;
    const label = tab.querySelector('.tab-label');
    if(label) label.textContent = t(key);
  });
  $('lang-btn').textContent = lang==='en'?'繁中':'EN';
  // Re-render active screen
  const active = document.querySelector('.tab.active');
  if(active) switchTab(active.dataset.tab);
}
function toggleLang(){
  lang = lang==='en'?'tw':'en';
  localStorage.setItem('capyCollLang', lang);
  applyLang();
}

/* ===== INIT ===== */
function init(){
  loadGame();
  updateResDisplay();

  // Load SFX
  loadAudio('collect','../../assets/sfx/400 Sounds Pack/Items/coin_collect.wav');
  loadAudio('summon','../../assets/sfx/400 Sounds Pack/UI/synth_confirmation.wav');
  loadAudio('upgrade','../../assets/sfx/GameSFX3/PowerUp/Retro PowerUP 09.wav');
  loadAudio('ssr','../../assets/sfx/400 Sounds Pack/Musical Effects/brass_level_complete.wav');
  loadAudio('error','../../assets/sfx/400 Sounds Pack/Musical Effects/8_bit_negative.wav');

  // Mute button
  if(audioMuted) $('mute-btn').textContent='🔇';

  // BGM on first interaction
  const startOnce=()=>{startBGM(BGM_URL);document.removeEventListener('click',startOnce);
    document.removeEventListener('touchend',startOnce);};
  document.addEventListener('click',startOnce);
  document.addEventListener('touchend',startOnce);

  // Tab navigation
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>switchTab(tab.dataset.tab));
    tab.addEventListener('touchend',(e)=>{e.preventDefault();switchTab(tab.dataset.tab);});
  });

  // Top buttons
  $('lang-btn').addEventListener('click',toggleLang);
  $('mute-btn').addEventListener('click',toggleMute);

  // Summon overlay
  $('summon-overlay').addEventListener('click',onSummonOverlayTap);
  $('summon-overlay').addEventListener('touchend',(e)=>{e.preventDefault();onSummonOverlayTap();});

  // Tutorial
  $('tutorial-next').addEventListener('click',nextTutStep);

  // Load sprites first, then render UI
  $('screen-home').innerHTML='<p style="text-align:center;padding:40px;color:var(--text2);">Loading...</p>';
  loadAllSprites(()=>{
    // Apply language & render
    applyLang();
    showTutorial();
    renderHome();
  });

  // Main loop: tick income every second
  setInterval(()=>{
    tickIncome();
    checkAchievements();
    saveGame();
    // Update kitchen cooldown timer
    const kState = state.kitchen;
    if(kState && kState.cooldownEnd > Date.now()){
      const cookBtn = document.getElementById('cook-btn');
      if(cookBtn){
        const rem = Math.ceil((kState.cooldownEnd - Date.now())/1000);
        cookBtn.textContent = `⏰ ${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;
      }
    }
    // Clear expired buff
    if(kState && kState.buff && kState.buffEnd <= Date.now()){
      kState.buff = null;
    }
    // Update expedition timers
    const exState = state.expeditions||{};
    EXPEDITIONS.forEach(exp=>{
      const ex = exState[exp.id];
      if(ex && ex.endTime > Date.now()){
        const remaining = Math.max(0, Math.floor((ex.endTime - Date.now())/1000));
        const el = document.getElementById('exp-timer-'+exp.id);
        if(el) el.textContent = Math.floor(remaining/60)+':'+String(remaining%60).padStart(2,'0');
      }
    });
  }, 1000);

  // Auto-save every 30s
  setInterval(saveGame, 30000);
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
