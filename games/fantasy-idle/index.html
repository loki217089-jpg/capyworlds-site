<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Relic Chronicle — Fantasy Idle RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0c0a;--bg2:#1a1610;--bg3:#252015;--accent:#c8a456;--accent2:#e8c86a;--text:#e0d6c8;--text2:#a89880;--red:#e05040;--green:#50c060;--blue:#50a0e0;--purple:#a070e0;--ssr:#ff9900}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;user-select:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg2);border-bottom:1px solid #333;flex-shrink:0;z-index:200;position:relative;min-height:44px}
.top-bar a{color:var(--accent);text-decoration:none;font-size:14px}
.player-info{display:flex;align-items:center;gap:8px;font-size:13px}
.player-lv{color:var(--accent2);font-weight:bold}
.resources{display:flex;gap:10px;font-size:12px;flex-wrap:wrap;justify-content:flex-end}
.res-item{display:flex;align-items:center;gap:3px;white-space:nowrap}
.res-icon{font-size:14px}
.res-val{font-weight:bold;color:var(--accent2);min-width:28px;text-align:right}
.btn-group{display:flex;gap:6px;align-items:center}
.btn-group button{background:none;border:1px solid #555;color:var(--text);border-radius:4px;padding:2px 8px;font-size:13px;cursor:pointer;min-width:32px;min-height:32px}
.btn-group button:active{background:rgba(200,164,86,0.2)}
.game-area{flex:1;overflow:hidden;min-height:0;position:relative;background:var(--bg)}
.game-area canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:100%;max-height:100%}
canvas{touch-action:none}
.info-bar{flex-shrink:0;background:var(--bg2);border-top:1px solid #333;padding:6px 12px;font-size:12px;color:var(--text2);min-height:36px;display:flex;align-items:center;gap:8px;overflow:hidden;z-index:200;position:relative}
.info-bar .log-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-wrap{width:120px;height:10px;background:#222;border-radius:5px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width 0.3s}
.tab-bar{display:flex;flex-shrink:0;background:var(--bg2);border-top:1px solid #333;z-index:200;position:relative}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;font-size:10px;color:var(--text2);cursor:pointer;border:none;background:none;gap:2px;min-height:52px;position:relative}
.tab-btn .tab-icon{font-size:20px}
.tab-btn.active{color:var(--accent2);background:rgba(200,164,86,0.08)}
.tab-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--accent)}
.tab-btn .notif{position:absolute;top:4px;right:calc(50% - 16px);width:8px;height:8px;background:var(--red);border-radius:50%;display:none}
.panel{display:none;position:absolute;bottom:0;left:0;right:0;top:0;background:var(--bg);z-index:100;overflow-y:auto;padding:12px}
.panel.active{display:block}
.panel h2{color:var(--accent2);font-size:16px;margin-bottom:10px;border-bottom:1px solid #333;padding-bottom:6px}
.panel h3{color:var(--accent);font-size:13px;margin:10px 0 6px}
.card{background:var(--bg2);border:1px solid #333;border-radius:8px;padding:10px;margin-bottom:8px}
.card.rarity-N{border-left:3px solid #888}
.card.rarity-R{border-left:3px solid var(--blue)}
.card.rarity-SR{border-left:3px solid var(--purple)}
.card.rarity-SSR{border-left:3px solid var(--ssr)}
.card-row{display:flex;align-items:center;gap:8px}
.card-icon{font-size:28px;width:40px;text-align:center;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-weight:bold;font-size:13px}
.card-desc{font-size:11px;color:var(--text2);margin-top:2px}
.card-stats{font-size:11px;color:var(--green);margin-top:2px}
.rarity-label{font-size:10px;font-weight:bold;padding:1px 6px;border-radius:3px;color:#fff}
.rarity-N .rarity-label{background:#666}
.rarity-R .rarity-label{background:var(--blue)}
.rarity-SR .rarity-label{background:var(--purple)}
.rarity-SSR .rarity-label{background:var(--ssr)}
.btn{display:inline-block;padding:8px 16px;border-radius:6px;border:none;font-size:13px;font-weight:bold;cursor:pointer;transition:transform 0.1s}
.btn:active{transform:scale(0.95)}
.btn-gold{background:linear-gradient(135deg,#c8a456,#e8c86a);color:#1a1610}
.btn-blue{background:linear-gradient(135deg,#4080c0,#50a0e0);color:#fff}
.btn-green{background:linear-gradient(135deg,#40a050,#50c060);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:0.4;cursor:default;transform:none}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.region-card{background:var(--bg3);border:1px solid #444;border-radius:8px;padding:12px;cursor:pointer;transition:border-color 0.2s;text-align:center}
.region-card:hover{border-color:var(--accent)}
.region-card.active{border-color:var(--accent2);box-shadow:0 0 12px rgba(200,164,86,0.2)}
.region-card.locked{opacity:0.4;cursor:default}
.region-card .r-emoji{font-size:32px;display:block;margin-bottom:4px}
.region-card .r-name{font-size:12px;font-weight:bold;color:var(--accent2)}
.region-card .r-req{font-size:10px;color:var(--text2);margin-top:2px}
.hero-slot{background:var(--bg3);border:1px solid #444;border-radius:8px;padding:10px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.hero-slot .h-emoji{font-size:28px}
.hero-slot .h-name{font-size:11px;font-weight:bold}
.hero-slot .h-lv{font-size:10px;color:var(--text2)}
.hero-slot.empty{border-style:dashed;color:var(--text2);font-size:12px;cursor:pointer}
.codex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.codex-item{background:var(--bg3);border:1px solid #444;border-radius:6px;padding:8px 4px;text-align:center;font-size:24px;min-height:56px;display:flex;align-items:center;justify-content:center;position:relative}
.codex-item.found{border-color:var(--accent);background:rgba(200,164,86,0.05)}
.codex-item.unfound{opacity:0.3;font-size:20px}
.codex-item .ci-rarity{position:absolute;top:2px;right:2px;font-size:8px;font-weight:bold}
.shop-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid #444;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.shop-item .si-info{flex:1}
.shop-item .si-name{font-size:12px;font-weight:bold}
.shop-item .si-desc{font-size:10px;color:var(--text2)}
.shop-item .si-price{font-size:11px;color:var(--accent2);margin-right:8px;white-space:nowrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay-box{background:var(--bg2);border:1px solid var(--accent);border-radius:12px;padding:20px;max-width:min(400px,calc(100vw - 32px));max-height:88vh;overflow-y:auto;text-align:center}
.overlay-box h2{color:var(--accent2);margin-bottom:12px}
.overlay-box p{font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5}
.float-num{position:absolute;pointer-events:none;font-weight:bold;font-size:14px;z-index:300;animation:floatUp 1s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(200,164,86,0.3)}50%{box-shadow:0 0 20px rgba(200,164,86,0.6)}}
.found-anim{animation:pulse 0.5s ease}
@media(min-width:768px){
  .panel{max-width:480px;margin:0 auto;left:50%;transform:translateX(-50%)}
  .top-bar,.info-bar,.tab-bar,.game-area{max-width:600px;width:100%;margin-left:auto;margin-right:auto}
}
</style>
</head>

// ===== CHUNK 3: Game State, Save/Load, Core =====
const GW = 480, GH = 320;
let canvas, ctx, gameArea;

const defaultState = () => ({
  level: 1, exp: 0, gold: 0, shards: 0,
  currentRegion: 0, exploreProgress: 0, exploreCount: 0,
  heroes: [], maxParty: 2,
  foundRelics: {}, // {relicId: true}
  equipment: {weapon: null, armor: null, charm: null, scroll: null},
  purchased: {}, // {shopItemId: true}
  totalRelics: 0, totalKills: 0, totalGold: 0,
  lastOnline: Date.now(),
  tutorialDone: false, muted: false
});

let S = defaultState();
let activeTab = 'none';
let battleState = null; // {enemy, enemyHp, playerHp, maxPlayerHp, timer}
let floatingNums = [];
let particles = [];
let logQueue = [];
let lastTick = 0;
let exploreSpeed = 3000; // ms per explore cycle
let sceneObjects = []; // decorative objects for canvas

function saveGame() {
  S.lastOnline = Date.now();
  localStorage.setItem('relicChronicle', JSON.stringify(S));
}

function loadGame() {
  try {
    const raw = localStorage.getItem('relicChronicle');
    if (raw) {
      const saved = JSON.parse(raw);
      S = {...defaultState(), ...saved};
      // Ensure foundRelics is an object
      if (typeof S.foundRelics !== 'object') S.foundRelics = {};
      return true;
    }
  } catch(e) {}
  S = defaultState();
  return false;
}

function calcOfflineReward() {
  const elapsed = Date.now() - S.lastOnline;
  if (elapsed < 60000) return null; // less than 1 min
  const cycles = Math.min(Math.floor(elapsed / exploreSpeed), 500);
  const region = REGIONS[S.currentRegion];
  const avgGold = region.monsters.reduce((s,m) => s + m.gold, 0) / region.monsters.length;
  const avgExp = region.monsters.reduce((s,m) => s + m.exp, 0) / region.monsters.length;
  const goldMult = 1 + getBonus('goldBonus');
  const expMult = 1 + getBonus('expBonus');
  const gold = Math.floor(cycles * avgGold * 0.5 * goldMult);
  const exp = Math.floor(cycles * avgExp * 0.5 * expMult);
  const shards = Math.floor(cycles * 0.05);
  return {gold, exp, shards, minutes: Math.floor(elapsed / 60000)};
}

function getBonus(type) {
  let bonus = 0;
  // Equipment bonuses
  for (const slot of ['weapon','armor','charm','scroll']) {
    const itemId = S.equipment[slot];
    if (!itemId) continue;
    const item = SHOP_ITEMS.find(si => si.id === itemId);
    if (item && item[type]) bonus += item[type];
  }
  // Hero perk bonuses
  for (const h of S.heroes) {
    const tmpl = HERO_TEMPLATES.find(ht => ht.id === h.id);
    if (tmpl && tmpl.perk[type]) bonus += tmpl.perk[type] * (1 + (h.level - 1) * 0.1);
  }
  // Codex set bonuses
  for (let ri = 0; ri < REGIONS.length; ri++) {
    const region = REGIONS[ri];
    const found = region.relics.filter(r => S.foundRelics[r.id]).length;
    if (found === 8) { // complete set
      if (type === 'atk') bonus += 5 * (ri + 1);
      if (type === 'def') bonus += 3 * (ri + 1);
      if (type === 'relicRate') bonus += 0.05;
      if (type === 'goldBonus') bonus += 0.05;
      if (type === 'expBonus') bonus += 0.05;
    }
  }
  return bonus;
}

function getCombatPower() {
  let atk = 5 + S.level * 2 + getBonus('atk');
  let def = 2 + S.level * 1 + getBonus('def');
  let hp = 50 + S.level * 5 + getBonus('hp') * (50 + S.level * 5);
  for (const h of S.heroes) {
    const tmpl = HERO_TEMPLATES.find(ht => ht.id === h.id);
    if (!tmpl) continue;
    const lvMult = 1 + (h.level - 1) * 0.15;
    atk += tmpl.atk * lvMult;
    def += tmpl.def * lvMult * 0.5;
    hp += tmpl.hp * lvMult;
  }
  // Equipment direct stats
  const wpn = S.equipment.weapon ? SHOP_ITEMS.find(i => i.id === S.equipment.weapon) : null;
  const arm = S.equipment.armor ? SHOP_ITEMS.find(i => i.id === S.equipment.armor) : null;
  if (wpn) atk += wpn.atk || 0;
  if (arm) def += arm.def || 0;
  return {atk: Math.floor(atk), def: Math.floor(def), hp: Math.floor(hp)};
}

function getRelicDiscoveryRate() {
  let base = 0.08;
  base += getBonus('relicRate');
  return Math.min(base, 0.75);
}

function addExp(amount) {
  const mult = 1 + getBonus('expBonus');
  amount = Math.floor(amount * mult);
  S.exp += amount;
  while (S.exp >= EXP_TABLE[S.level - 1] && S.level < 99) {
    S.exp -= EXP_TABLE[S.level - 1];
    S.level++;
    addLog(t('lvUp') + ' Lv.' + S.level);
    spawnParticles(GW/2, GH/2, '#ffe066', 20);
    // Check region unlocks
    for (let i = 0; i < REGIONS.length; i++) {
      if (S.level >= REGIONS[i].unlockLv && i > S.currentRegion) {
        // Don't auto-switch, just notify
        addLog(t('newRegion') + ' ' + (lang==='zh' ? REGIONS[i].relics[0].nameZh.slice(0,2) : REGIONS[i].id));
      }
    }
  }
  return amount;
}

function addGold(amount) {
  const mult = 1 + getBonus('goldBonus');
  amount = Math.floor(amount * mult);
  S.gold += amount;
  S.totalGold += amount;
  return amount;
}

function addLog(msg) {
  logQueue.push(msg);
  if (logQueue.length > 20) logQueue.shift();
}

function formatNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

function spawnFloat(x, y, text, color) {
  floatingNums.push({x, y, text, color, life: 1});
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 1,
      color, life: 1, size: 2 + Math.random() * 3
    });
  }
}

// ===== CHUNK 4: Exploration + Combat =====
function startExplore() {
  if (battleState) return;
  S.exploreProgress = 0;
}

function tickExplore(dt) {
  if (battleState) return;
  const speedMult = 1 + getBonus('speedBonus');
  const cycleDuration = exploreSpeed / speedMult;
  S.exploreProgress += (dt / cycleDuration) * 100;

  if (S.exploreProgress >= 100) {
    S.exploreProgress = 0;
    S.exploreCount++;
    // Every 10th explore = boss
    if (S.exploreCount % 10 === 0) {
      startBattle(true);
    } else {
      startBattle(false);
    }
  }
}

function startBattle(isBoss) {
  const region = REGIONS[S.currentRegion];
  let enemy;
  if (isBoss) {
    enemy = {...region.boss, isBoss: true};
    addLog(t('bossAppears'));
  } else {
    const idx = Math.floor(Math.random() * region.monsters.length);
    enemy = {...region.monsters[idx], isBoss: false};
  }
  const cp = getCombatPower();
  battleState = {
    enemy,
    enemyHp: enemy.hp,
    enemyMaxHp: enemy.hp,
    playerHp: cp.hp,
    maxPlayerHp: cp.hp,
    timer: 0,
    hits: 0
  };
}

function tickBattle(dt) {
  if (!battleState) return;
  battleState.timer += dt;

  // Attack every 500ms
  if (battleState.timer >= 500) {
    battleState.timer -= 500;
    battleState.hits++;
    const cp = getCombatPower();
    const e = battleState.enemy;

    // Player attacks enemy
    let dmg = Math.max(1, cp.atk - e.def * 0.5);
    // Crit chance
    const critRate = getBonus('crit') || 0;
    let crit = false;
    if (Math.random() < critRate) {
      dmg *= 2;
      crit = true;
    }
    dmg = Math.floor(dmg * (0.9 + Math.random() * 0.2));
    battleState.enemyHp -= dmg;

    // Spawn damage number on enemy
    const ex = GW * 0.65 + (Math.random()-0.5)*30;
    const ey = GH * 0.4 + (Math.random()-0.5)*20;
    spawnFloat(ex, ey, '-' + dmg, crit ? '#ffcc00' : '#ff6644');
    if (crit) spawnParticles(ex, ey, '#ffcc00', 6);

    // Enemy attacks player
    let eDmg = Math.max(1, e.atk - cp.def * 0.5);
    eDmg = Math.floor(eDmg * (0.9 + Math.random() * 0.2));
    battleState.playerHp -= eDmg;

    const px = GW * 0.3 + (Math.random()-0.5)*20;
    const py = GH * 0.5 + (Math.random()-0.5)*20;
    spawnFloat(px, py, '-' + eDmg, '#ff4444');

    // Check outcomes
    if (battleState.enemyHp <= 0) {
      // Victory!
      onBattleWin();
    } else if (battleState.playerHp <= 0) {
      // Defeat - just restart exploring (no penalty in idle games)
      addLog(lang==='zh' ? '探索失敗，休息後重新出發...' : 'Exploration failed, resting...');
      battleState = null;
      S.exploreProgress = 0;
    }
  }
}

function onBattleWin() {
  const e = battleState.enemy;
  const eName = lang === 'zh' ? e.nameZh : e.name;
  addLog(t('defeated') + ' ' + e.emoji + ' ' + eName);

  const goldGained = addGold(e.gold);
  const expGained = addExp(e.exp);
  S.totalKills++;

  spawnFloat(GW*0.5, GH*0.3, '+' + goldGained + '🪙', '#ffe066');
  spawnFloat(GW*0.5, GH*0.4, '+' + expGained + '⭐', '#88ff88');
  spawnParticles(GW*0.65, GH*0.45, '#ff8844', 12);

  if (e.isBoss && e.shards) {
    S.shards += e.shards;
    spawnFloat(GW*0.5, GH*0.5, '+' + e.shards + '💎', '#aa88ff');
  }

  // Relic discovery check
  tryDiscoverRelic();

  battleState = null;
  saveGame();
}

function tryDiscoverRelic() {
  const rate = getRelicDiscoveryRate();
  if (Math.random() > rate) return;

  const region = REGIONS[S.currentRegion];
  // Filter relics not yet found
  const undiscovered = region.relics.filter(r => !S.foundRelics[r.id]);
  if (undiscovered.length === 0) return; // all found in this region

  // Weighted by rarity
  const weights = undiscovered.map(r => {
    const w = {N:50, R:30, SR:15, SSR:5};
    return w[r.rarity] || 10;
  });
  const totalW = weights.reduce((a,b) => a+b, 0);
  let roll = Math.random() * totalW;
  let chosen = undiscovered[0];
  for (let i = 0; i < undiscovered.length; i++) {
    roll -= weights[i];
    if (roll <= 0) { chosen = undiscovered[i]; break; }
  }

  S.foundRelics[chosen.id] = true;
  S.totalRelics++;

  // Shard reward based on rarity
  const shardReward = {N:1, R:3, SR:8, SSR:20};
  S.shards += (shardReward[chosen.rarity] || 1);

  const rName = lang === 'zh' ? chosen.nameZh : chosen.name;
  addLog(t('relicFound') + ' ' + chosen.emoji + ' ' + rName + ' [' + chosen.rarity + ']');

  // Show overlay for SR+ relics
  if (chosen.rarity === 'SR' || chosen.rarity === 'SSR') {
    showRelicOverlay(chosen);
  }

  // Flash codex notification
  const notif = document.getElementById('codex-notif');
  if (notif) notif.style.display = 'block';

  // Check set completion
  const allFound = region.relics.every(r => S.foundRelics[r.id]);
  if (allFound) {
    addLog(t('regionComplete') + ' ' + t('setBonus'));
    spawnParticles(GW/2, GH/2, RARITY_COLORS.SSR, 30);
  }

  spawnParticles(GW/2, GH/2, RARITY_COLORS[chosen.rarity], 20);
}

function showRelicOverlay(relic) {
  const box = document.getElementById('overlay-box');
  const rName = lang === 'zh' ? relic.nameZh : relic.name;
  const rDesc = lang === 'zh' ? relic.descZh : relic.desc;
  box.innerHTML = `
    <h2>${t('relicFound')}</h2>
    <div style="font-size:48px;margin:12px 0;animation:pulse 0.6s">${relic.emoji}</div>
    <div style="font-size:18px;font-weight:bold;color:${RARITY_COLORS[relic.rarity]}">${rName}</div>
    <div style="font-size:12px;margin:4px 0"><span class="rarity-label" style="background:${RARITY_COLORS[relic.rarity]}">${relic.rarity}</span></div>
    <p style="color:var(--text2);margin:8px 0">${rDesc}</p>
    <button class="btn btn-gold" onclick="closeOverlay()">OK</button>
  `;
  document.getElementById('overlay').style.display = 'flex';
}

function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ===== CHUNK 5: Canvas Rendering =====
function initCanvas() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  gameArea = document.getElementById('game-area');
  canvas.width = GW;
  canvas.height = GH;
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  generateSceneObjects();
}

function resizeCanvas() {
  const aw = gameArea.clientWidth || window.innerWidth;
  const ah = gameArea.clientHeight || 300;
  if (aw <= 0 || ah <= 0) {
    canvas.style.width = GW + 'px';
    canvas.style.height = GH + 'px';
    return;
  }
  const scale = Math.min(aw / GW, ah / GH);
  canvas.style.width = Math.min(GW * scale, aw) + 'px';
  canvas.style.height = Math.min(GH * scale, ah) + 'px';
}

function generateSceneObjects() {
  sceneObjects = [];
  const region = REGIONS[S.currentRegion];
  const rid = region.id;
  for (let i = 0; i < 8; i++) {
    const obj = {x: 30 + Math.random() * (GW - 60), y: GH * 0.55 + Math.random() * (GH * 0.35)};
    if (rid === 'forest') {obj.type = Math.random()>0.5?'tree':'bush'; obj.color = '#2d5a27';}
    else if (rid === 'desert') {obj.type = Math.random()>0.5?'cactus':'rock'; obj.color = '#c4a35a';}
    else if (rid === 'snow') {obj.type = Math.random()>0.5?'pine':'snowrock'; obj.color = '#a8c8e8';}
    else if (rid === 'ocean') {obj.type = Math.random()>0.5?'coral':'kelp'; obj.color = '#1a5276';}
    else if (rid === 'sky') {obj.type = Math.random()>0.5?'cloud':'pillar'; obj.color = '#7eb8da';}
    else if (rid === 'volcano') {obj.type = Math.random()>0.5?'lava':'rock'; obj.color = '#8b2500';}
    obj.size = 10 + Math.random() * 20;
    sceneObjects.push(obj);
  }
  // Sort by y for depth
  sceneObjects.sort((a,b) => a.y - b.y);
}

function drawScene() {
  const region = REGIONS[S.currentRegion];
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, region.bg1);
  grad.addColorStop(0.5, region.bg2);
  grad.addColorStop(1, darkenColor(region.bg2, 0.5));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Ground
  ctx.fillStyle = darkenColor(region.color, 0.6);
  ctx.fillRect(0, GH * 0.7, GW, GH * 0.3);

  // Ground line
  ctx.strokeStyle = region.color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GH * 0.7);
  for (let x = 0; x <= GW; x += 20) {
    ctx.lineTo(x, GH * 0.7 + Math.sin(x * 0.03) * 3);
  }
  ctx.stroke();

  // Scene decorations
  drawSceneObjects(region.id);

  // Region-specific ambient
  drawAmbient(region.id);

  // Player character (left side)
  drawPlayer(GW * 0.25, GH * 0.55);

  // Enemy (if battle)
  if (battleState) {
    drawEnemy(GW * 0.7, GH * 0.48);
    drawBattleUI();
  } else {
    // Exploration animation - walking dots
    const t2 = Date.now() * 0.002;
    ctx.fillStyle = 'rgba(200,164,86,0.3)';
    for (let i = 0; i < 3; i++) {
      const dx = (t2 * 30 + i * 40) % 120;
      ctx.beginPath();
      ctx.arc(GW*0.35 + dx, GH*0.68, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Region name banner
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, GW, 28);
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = region.color;
  ctx.textAlign = 'left';
  const rName = lang === 'zh'
    ? ['古森林','荒漠遺跡','雪山之巔','深海神殿','浮空群島','龍脊火山'][S.currentRegion]
    : ['Ancient Forest','Desert Ruins','Frozen Peak','Ocean Temple','Sky Islands','Dragon Ridge'][S.currentRegion];
  ctx.fillText(region.emoji + ' ' + rName, 10, 19);

  // Level + combat power (right side of banner)
  ctx.textAlign = 'right';
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#e0d6c8';
  const cp = getCombatPower();
  ctx.fillText('⚔' + cp.atk + ' 🛡' + cp.def + ' ❤' + cp.hp, GW - 10, 18);

  // Floating numbers
  ctx.textAlign = 'center';
  for (const fn of floatingNums) {
    ctx.globalAlpha = fn.life;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = fn.color;
    ctx.fillText(fn.text, fn.x, fn.y);
  }
  ctx.globalAlpha = 1;

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawSceneObjects(rid) {
  for (const obj of sceneObjects) {
    ctx.fillStyle = obj.color;
    const s = obj.size;
    if (obj.type === 'tree') {
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(obj.x - 3, obj.y - s, 6, s);
      ctx.fillStyle = '#2d5a27';
      ctx.beginPath(); ctx.arc(obj.x, obj.y - s, s*0.6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3d7a37';
      ctx.beginPath(); ctx.arc(obj.x - 4, obj.y - s - 3, s*0.4, 0, Math.PI*2); ctx.fill();
    } else if (obj.type === 'bush') {
      ctx.fillStyle = '#1d4a17';
      ctx.beginPath(); ctx.arc(obj.x, obj.y, s*0.4, 0, Math.PI*2); ctx.fill();
    } else if (obj.type === 'cactus') {
      ctx.fillStyle = '#4a7a30';
      ctx.fillRect(obj.x-3, obj.y-s, 6, s);
      ctx.fillRect(obj.x-10, obj.y-s*0.6, 7, 4);
      ctx.fillRect(obj.x+3, obj.y-s*0.4, 7, 4);
    } else if (obj.type === 'rock') {
      ctx.fillStyle = rid==='volcano' ? '#4a2010' : '#667';
      ctx.beginPath(); ctx.moveTo(obj.x-s*0.5,obj.y); ctx.lineTo(obj.x-s*0.3,obj.y-s*0.5); ctx.lineTo(obj.x+s*0.3,obj.y-s*0.4); ctx.lineTo(obj.x+s*0.5,obj.y); ctx.fill();
    } else if (obj.type === 'pine') {
      ctx.fillStyle = '#1a3a2a';
      ctx.beginPath(); ctx.moveTo(obj.x,obj.y-s); ctx.lineTo(obj.x-s*0.4,obj.y); ctx.lineTo(obj.x+s*0.4,obj.y); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.moveTo(obj.x,obj.y-s); ctx.lineTo(obj.x-s*0.15,obj.y-s*0.3); ctx.lineTo(obj.x+s*0.1,obj.y-s*0.5); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (obj.type === 'coral') {
      ctx.fillStyle = '#e06080';
      ctx.beginPath(); ctx.arc(obj.x, obj.y, s*0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f080a0';
      ctx.beginPath(); ctx.arc(obj.x+5, obj.y-4, s*0.2, 0, Math.PI*2); ctx.fill();
    } else if (obj.type === 'kelp') {
      ctx.strokeStyle = '#306030';
      ctx.lineWidth = 2;
      const wave = Math.sin(Date.now()*0.002+obj.x)*3;
      ctx.beginPath(); ctx.moveTo(obj.x,obj.y); ctx.quadraticCurveTo(obj.x+wave,obj.y-s*0.5,obj.x+wave*1.5,obj.y-s); ctx.stroke();
    } else if (obj.type === 'cloud') {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      const cx = obj.x + Math.sin(Date.now()*0.0005+obj.y)*10;
      ctx.beginPath(); ctx.arc(cx,obj.y,s*0.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+s*0.3,obj.y+2,s*0.35,0,Math.PI*2); ctx.fill();
    } else if (obj.type === 'pillar') {
      ctx.fillStyle = '#aac';
      ctx.fillRect(obj.x-4,obj.y-s,8,s);
      ctx.fillRect(obj.x-6,obj.y-s,12,3);
    } else if (obj.type === 'lava') {
      ctx.fillStyle = '#ff4400';
      ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.003+obj.x)*0.3;
      ctx.beginPath(); ctx.arc(obj.x,obj.y,s*0.3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (obj.type === 'snowrock') {
      ctx.fillStyle = '#889';
      ctx.beginPath(); ctx.moveTo(obj.x-s*0.4,obj.y); ctx.lineTo(obj.x,obj.y-s*0.4); ctx.lineTo(obj.x+s*0.4,obj.y); ctx.fill();
      ctx.fillStyle = '#dde';
      ctx.beginPath(); ctx.moveTo(obj.x-s*0.3,obj.y-s*0.1); ctx.lineTo(obj.x,obj.y-s*0.4); ctx.lineTo(obj.x+s*0.25,obj.y-s*0.05); ctx.fill();
    }
  }
}

function drawAmbient(rid) {
  const t2 = Date.now() * 0.001;
  if (rid === 'forest') {
    // Floating leaves
    for (let i = 0; i < 5; i++) {
      const lx = ((t2 * 15 + i * 97) % (GW+40)) - 20;
      const ly = 30 + Math.sin(t2 + i * 2) * 20 + i * 30;
      ctx.fillStyle = 'rgba(100,180,60,0.5)';
      ctx.fillRect(lx, ly, 4, 3);
    }
  } else if (rid === 'snow') {
    for (let i = 0; i < 15; i++) {
      const sx = ((t2 * 10 + i * 63) % GW);
      const sy = ((t2 * 20 + i * 47) % GH);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2); ctx.fill();
    }
  } else if (rid === 'ocean') {
    // Bubbles
    for (let i = 0; i < 8; i++) {
      const bx = 40 + i * 55;
      const by = GH - ((t2 * 30 + i * 40) % (GH * 0.6));
      ctx.strokeStyle = 'rgba(100,180,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(bx, by, 3 + i%3, 0, Math.PI*2); ctx.stroke();
    }
  } else if (rid === 'volcano') {
    // Embers
    for (let i = 0; i < 6; i++) {
      const ex = 50 + i * 70 + Math.sin(t2*2+i)*10;
      const ey = GH * 0.6 - ((t2 * 25 + i * 30) % (GH * 0.4));
      ctx.fillStyle = `rgba(255,${100+Math.floor(Math.random()*80)},0,${0.3+Math.random()*0.4})`;
      ctx.fillRect(ex, ey, 2, 2);
    }
  }
}

function drawPlayer(x, y) {
  const bob = Math.sin(Date.now() * 0.004) * 2;
  // Body
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(x-8, y-20+bob, 16, 20);
  // Head
  ctx.fillStyle = '#ffcc88';
  ctx.beginPath(); ctx.arc(x, y-26+bob, 8, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#222';
  ctx.fillRect(x-4, y-28+bob, 2, 2);
  ctx.fillRect(x+2, y-28+bob, 2, 2);
  // Hat
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(x-10, y-34+bob, 20, 4);
  ctx.fillRect(x-6, y-38+bob, 12, 4);
  // Weapon equipped indicator
  if (S.equipment.weapon) {
    ctx.fillStyle = '#ccc';
    ctx.fillRect(x+10, y-18+bob, 3, 16);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(x+8, y-20+bob, 7, 3);
  }
}

function drawEnemy(x, y) {
  if (!battleState) return;
  const e = battleState.enemy;
  const shake = battleState.hits > 0 ? Math.sin(Date.now()*0.05) * 2 : 0;
  ctx.font = e.isBoss ? '42px sans-serif' : '32px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(e.emoji, x + shake, y + 10);
  if (e.isBoss) {
    ctx.fillStyle = 'rgba(255,150,0,0.15)';
    ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.fill();
  }
}

function drawBattleUI() {
  if (!battleState) return;
  const b = battleState;
  // Enemy HP bar
  const ex = GW * 0.55, ey = GH * 0.28, bw = 100, bh = 8;
  ctx.fillStyle = '#333';
  ctx.fillRect(ex, ey, bw, bh);
  const hpRatio = Math.max(0, b.enemyHp / b.enemyMaxHp);
  ctx.fillStyle = b.enemy.isBoss ? '#ff9900' : '#e05040';
  ctx.fillRect(ex, ey, bw * hpRatio, bh);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(ex, ey, bw, bh);
  // Enemy name
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  const eName = lang==='zh' ? b.enemy.nameZh : b.enemy.name;
  ctx.fillText(eName + ' ' + Math.max(0,Math.floor(b.enemyHp))+'/'+b.enemyMaxHp, ex, ey - 3);

  // Player HP bar (bottom-left)
  const px = 20, py = GH * 0.72;
  ctx.fillStyle = '#333';
  ctx.fillRect(px, py, 80, 6);
  const pRatio = Math.max(0, b.playerHp / b.maxPlayerHp);
  ctx.fillStyle = '#50c060';
  ctx.fillRect(px, py, 80 * pRatio, 6);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(px, py, 80, 6);
  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText('HP '+Math.max(0,Math.floor(b.playerHp))+'/'+b.maxPlayerHp, px, py - 2);
}

function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

// ===== CHUNK 6: UI Panels =====
function renderMapPanel() {
  const panel = document.getElementById('panel-map');
  let html = '<h2>🗺️ ' + t('selectRegion') + '</h2><div class="grid-2">';
  REGIONS.forEach((r, i) => {
    const unlocked = S.level >= r.unlockLv;
    const isCurrent = i === S.currentRegion;
    const rName = lang === 'zh'
      ? ['古森林','荒漠遺跡','雪山之巔','深海神殿','浮空群島','龍脊火山'][i]
      : ['Ancient Forest','Desert Ruins','Frozen Peak','Ocean Temple','Sky Islands','Dragon Ridge'][i];
    const transport = lang === 'zh'
      ? ['🚶 步行','🐫 駱駝','⛏️ 攀岩','🚢 潛水艇','🎈 飛空艇','🐉 馴龍'][i]
      : ['🚶 On foot','🐫 Camel','⛏️ Climbing','🚢 Submarine','🎈 Airship','🐉 Dragon'][i];
    const found = r.relics.filter(rl => S.foundRelics[rl.id]).length;
    html += `<div class="region-card ${unlocked?'':'locked'} ${isCurrent?'active':''}" onclick="${unlocked?'switchRegion('+i+')':''}">
      <span class="r-emoji">${r.emoji}</span>
      <span class="r-name">${rName}</span>
      <div style="font-size:10px;color:var(--text2);margin-top:4px">${transport}</div>
      <div style="font-size:10px;margin-top:2px;color:${found===8?'var(--ssr)':'var(--text2)'}">📖 ${found}/8</div>
      ${!unlocked ? '<div style="font-size:10px;color:var(--red);margin-top:2px">🔒 '+t('unlockAt')+r.unlockLv+'</div>' : ''}
      ${isCurrent ? '<div style="font-size:10px;color:var(--accent);margin-top:2px">▶ '+t('currentRegion')+'</div>' : ''}
    </div>`;
  });
  html += '</div>';
  panel.innerHTML = html;
}

function switchRegion(idx) {
  if (idx === S.currentRegion) return;
  if (S.level < REGIONS[idx].unlockLv) return;
  S.currentRegion = idx;
  battleState = null;
  S.exploreProgress = 0;
  generateSceneObjects();
  renderMapPanel();
  saveGame();
  addLog(lang==='zh' ? '前往新秘境...' : 'Traveling to new region...');
}

function renderTeamPanel() {
  const panel = document.getElementById('panel-team');
  let html = '<h2>👥 ' + t('team') + '</h2>';

  // Current party
  html += '<h3>' + t('partySlots') + ' (' + S.heroes.length + '/' + S.maxParty + ')</h3>';
  html += '<div class="grid-2">';
  for (let i = 0; i < S.maxParty; i++) {
    if (i < S.heroes.length) {
      const h = S.heroes[i];
      const tmpl = HERO_TEMPLATES.find(ht => ht.id === h.id);
      const hName = lang === 'zh' ? t(tmpl.cls) : tmpl.cls.charAt(0).toUpperCase() + tmpl.cls.slice(1);
      const lvCost = Math.floor(tmpl.cost * Math.pow(1.5, h.level - 1));
      html += `<div class="hero-slot">
        <span class="h-emoji">${tmpl.emoji}</span>
        <span class="h-name">${hName}</span>
        <span class="h-lv">Lv.${h.level}</span>
        <div style="font-size:10px;color:var(--text2)">ATK ${Math.floor(tmpl.atk*(1+(h.level-1)*0.15))} DEF ${Math.floor(tmpl.def*(1+(h.level-1)*0.15)*0.5)}</div>
        <button class="btn btn-gold btn-sm" onclick="upgradeHero(${i})" ${S.gold>=lvCost?'':'disabled'}>
          ${t('upgrade')} 🪙${formatNum(lvCost)}
        </button>
      </div>`;
    } else {
      html += `<div class="hero-slot empty" onclick="showRecruitPanel()">${t('emptySlot')}<br><span style="font-size:10px">${t('tapToRecruit')}</span></div>`;
    }
  }
  html += '</div>';

  // Recruit section
  if (S.heroes.length < S.maxParty) {
    html += '<h3>' + t('heroRecruit') + '</h3>';
    HERO_TEMPLATES.forEach(tmpl => {
      if (S.heroes.find(h => h.id === tmpl.id)) return; // already recruited
      const hName = lang === 'zh' ? t(tmpl.cls) : tmpl.cls.charAt(0).toUpperCase() + tmpl.cls.slice(1);
      const hDesc = lang === 'zh' ? t(tmpl.cls + 'Desc') : t(tmpl.cls + 'Desc');
      html += `<div class="card card-row" style="cursor:pointer" onclick="recruitHero('${tmpl.id}')">
        <div class="card-icon">${tmpl.emoji}</div>
        <div class="card-info">
          <div class="card-name">${hName}</div>
          <div class="card-desc">${hDesc}</div>
          <div class="card-stats">ATK ${tmpl.atk} DEF ${tmpl.def} HP ${tmpl.hp}</div>
        </div>
        <button class="btn btn-gold btn-sm" ${S.gold>=tmpl.cost?'':'disabled'}>🪙${tmpl.cost}</button>
      </div>`;
    });
  }

  // Extra party slot (costs shards)
  if (S.maxParty < 5) {
    const slotCost = S.maxParty * 20;
    html += `<div style="margin-top:12px;text-align:center">
      <button class="btn btn-blue" onclick="buyPartySlot()" ${S.shards>=slotCost?'':'disabled'}>
        +1 ${t('partySlots')} (💎${slotCost})
      </button>
    </div>`;
  }

  panel.innerHTML = html;
}

function recruitHero(id) {
  if (S.heroes.length >= S.maxParty) return;
  if (S.heroes.find(h => h.id === id)) return;
  const tmpl = HERO_TEMPLATES.find(ht => ht.id === id);
  if (S.gold < tmpl.cost) {
    addLog(lang==='zh' ? '金幣不足！需要 🪙'+tmpl.cost : 'Not enough gold! Need 🪙'+tmpl.cost);
    return;
  }
  S.gold -= tmpl.cost;
  S.heroes.push({id, level: 1});
  addLog(lang==='zh' ? '招募了 '+t(tmpl.cls)+'！' : 'Recruited '+tmpl.cls+'!');
  spawnParticles(GW/2, GH/2, '#ffe066', 15);
  renderTeamPanel();
  saveGame();
}

function upgradeHero(idx) {
  const h = S.heroes[idx];
  const tmpl = HERO_TEMPLATES.find(ht => ht.id === h.id);
  const cost = Math.floor(tmpl.cost * Math.pow(1.5, h.level - 1));
  if (S.gold < cost) return;
  S.gold -= cost;
  h.level++;
  renderTeamPanel();
  saveGame();
}

function buyPartySlot() {
  if (S.maxParty >= 5) return;
  const cost = S.maxParty * 20;
  if (S.shards < cost) return;
  S.shards -= cost;
  S.maxParty++;
  renderTeamPanel();
  saveGame();
}

function showRecruitPanel() {
  // Already shown in team panel, just scroll
}

function renderCodexPanel() {
  const panel = document.getElementById('panel-codex');
  // Hide notification
  const notif = document.getElementById('codex-notif');
  if (notif) notif.style.display = 'none';

  const totalFound = Object.keys(S.foundRelics).length;
  const totalRelics = REGIONS.reduce((s,r) => s + r.relics.length, 0);

  let html = '<h2>📖 ' + t('codex') + '</h2>';
  html += `<div style="text-align:center;margin-bottom:12px;font-size:13px;color:var(--accent2)">${t('codexProgress')}: ${totalFound}/${totalRelics}</div>`;

  // Progress bar
  html += `<div class="progress-wrap" style="width:100%;height:12px;margin-bottom:16px"><div class="progress-fill" style="width:${(totalFound/totalRelics*100).toFixed(1)}%"></div></div>`;

  REGIONS.forEach((r, ri) => {
    const rName = lang === 'zh'
      ? ['古森林','荒漠遺跡','雪山之巔','深海神殿','浮空群島','龍脊火山'][ri]
      : ['Ancient Forest','Desert Ruins','Frozen Peak','Ocean Temple','Sky Islands','Dragon Ridge'][ri];
    const found = r.relics.filter(rl => S.foundRelics[rl.id]).length;
    const complete = found === 8;
    html += `<h3 style="color:${complete?'var(--ssr)':r.color}">${r.emoji} ${rName} (${found}/8) ${complete?'✅':''}</h3>`;
    html += '<div class="codex-grid">';
    r.relics.forEach(rl => {
      const isFound = S.foundRelics[rl.id];
      const rName2 = lang==='zh' ? rl.nameZh : rl.name;
      html += `<div class="codex-item ${isFound?'found':'unfound'}" title="${isFound?rName2:'???'}">
        ${isFound ? rl.emoji : '❓'}
        <span class="ci-rarity" style="color:${RARITY_COLORS[rl.rarity]}">${rl.rarity}</span>
      </div>`;
    });
    html += '</div>';
  });
  panel.innerHTML = html;
}

function renderShopPanel() {
  const panel = document.getElementById('panel-shop');
  let html = '<h2>🏪 ' + t('shop') + '</h2>';

  const categories = ['weapon','armor','charm','scroll'];
  const catNames = {weapon: t('weapon'), armor: t('armor'), charm: t('charm'), scroll: t('scroll')};
  const catEmojis = {weapon:'⚔️', armor:'🛡️', charm:'🍀', scroll:'📜'};

  categories.forEach(cat => {
    html += `<h3>${catEmojis[cat]} ${catNames[cat]}</h3>`;
    const items = SHOP_ITEMS.filter(i => i.cat === cat);
    items.forEach(item => {
      const owned = S.purchased[item.id];
      const equipped = S.equipment[cat] === item.id;
      const iName = lang === 'zh' ? item.nameZh : item.name;
      const currIcon = item.currency === 'shards' ? '💎' : '🪙';
      const canAfford = item.currency === 'shards' ? S.shards >= item.cost : S.gold >= item.cost;

      let statText = '';
      if (item.atk) statText = '+' + item.atk + ' ' + t('atkLabel');
      if (item.def) statText = '+' + item.def + ' ' + t('defLabel');
      if (item.relicRate) statText = '+' + Math.floor(item.relicRate*100) + '% ' + t('discoveryRate');
      if (item.expBonus) statText = '+' + Math.floor(item.expBonus*100) + '% EXP';
      if (item.goldBonus) statText = '+' + Math.floor(item.goldBonus*100) + '% ' + t('gold');
      if (item.speedBonus) statText = '+' + Math.floor(item.speedBonus*100) + '% ' + t('speed');

      html += `<div class="shop-item">
        <div class="si-info">
          <div class="si-name">${item.emoji} ${iName}</div>
          <div class="si-desc">${statText}</div>
        </div>`;
      if (equipped) {
        html += `<span style="color:var(--green);font-size:11px">✅ ${t('equipped')}</span>`;
      } else if (owned) {
        html += `<button class="btn btn-green btn-sm" onclick="equipItem('${item.id}','${cat}')">Equip</button>`;
      } else {
        html += `<span class="si-price">${currIcon}${item.cost}</span>
          <button class="btn btn-gold btn-sm" onclick="buyItem('${item.id}')" ${canAfford?'':'disabled'}>${t('buy')}</button>`;
      }
      html += '</div>';
    });
  });
  panel.innerHTML = html;
}

function buyItem(id) {
  const item = SHOP_ITEMS.find(i => i.id === id);
  if (!item || S.purchased[id]) return;
  if (item.currency === 'shards') {
    if (S.shards < item.cost) return;
    S.shards -= item.cost;
  } else {
    if (S.gold < item.cost) return;
    S.gold -= item.cost;
  }
  S.purchased[id] = true;
  S.equipment[item.cat] = id; // auto equip
  renderShopPanel();
  saveGame();
}

function equipItem(id, cat) {
  S.equipment[cat] = id;
  renderShopPanel();
  saveGame();
}

function switchTab(tab) {
  const panels = ['map','team','codex','shop'];
  const wasActive = activeTab === tab;
  activeTab = wasActive ? 'none' : tab;

  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === activeTab);
  });

  // Hide/show panels
  panels.forEach(p => {
    const el = document.getElementById('panel-' + p);
    el.classList.toggle('active', p === activeTab);
  });

  // Render panel content
  if (!wasActive) {
    if (tab === 'map') renderMapPanel();
    else if (tab === 'team') renderTeamPanel();
    else if (tab === 'codex') renderCodexPanel();
    else if (tab === 'shop') renderShopPanel();
  }
}

// ===== CHUNK 7: Tutorial, Audio, Init, Main Loop =====

// Audio
const AUDIO_CTX = new (window.AudioContext||window.webkitAudioContext)();
const AUDIO_BUFS = {};
let bgmSource = null, bgmGain = null, bgmLoaded = false;

function loadAudio(name, url){
  fetch(url).then(r=>r.arrayBuffer()).then(ab=>AUDIO_CTX.decodeAudioData(ab))
    .then(buf=>{ AUDIO_BUFS[name]=buf; }).catch(()=>{});
}
function playAudio(name, vol=0.7, rate=1, maxMs=0){
  if(S.muted) return;
  const buf=AUDIO_BUFS[name]; if(!buf) return;
  if(AUDIO_CTX.state==='suspended') AUDIO_CTX.resume();
  const src=AUDIO_CTX.createBufferSource();
  src.buffer=buf; src.playbackRate.value=rate;
  const gain=AUDIO_CTX.createGain(); gain.gain.value=vol;
  src.connect(gain); gain.connect(AUDIO_CTX.destination);
  src.start(0,0,maxMs>0?maxMs/1000:buf.duration);
}
function startBGM(url){
  if(bgmLoaded||S.muted) return; bgmLoaded=true;
  fetch(url).then(r=>r.arrayBuffer()).then(ab=>AUDIO_CTX.decodeAudioData(ab)).then(buf=>{
    if(AUDIO_CTX.state==='suspended') AUDIO_CTX.resume();
    bgmSource=AUDIO_CTX.createBufferSource();
    bgmSource.buffer=buf; bgmSource.loop=true;
    bgmGain=AUDIO_CTX.createGain(); bgmGain.gain.value=0.18;
    bgmSource.connect(bgmGain); bgmGain.connect(AUDIO_CTX.destination);
    bgmSource.start();
  }).catch(()=>{});
}
function toggleMute(){
  S.muted=!S.muted;
  if(bgmGain) bgmGain.gain.value=S.muted?0:0.18;
  document.getElementById('mute-btn').textContent=S.muted?'🔇':'🔊';
  localStorage.setItem('relicMuted',S.muted?'1':'0');
  if(!S.muted&&!bgmLoaded) startBGM(BGM_URL);
}
const BGM_URL = '../../assets/music/Fantasy RPG Music Pack Vol.3/Loops/ogg/Ambient 1 Loop.ogg';

// Tutorial
function showTutorial() {
  const box = document.getElementById('overlay-box');
  box.innerHTML = `
    <h2>${t('tutTitle')}</h2>
    <div style="text-align:left;margin:16px 0">
      <p>${t('tut1')}</p>
      <p>${t('tut2')}</p>
      <p>${t('tut3')}</p>
      <p>${t('tut4')}</p>
      <p>${t('tut5')}</p>
    </div>
    <button class="btn btn-gold" onclick="closeTutorial()" style="font-size:16px;padding:12px 32px">${t('tutStart')}</button>
  `;
  document.getElementById('overlay').style.display = 'flex';
}

function closeTutorial() {
  S.tutorialDone = true;
  closeOverlay();
  saveGame();
}

function showOfflineReward(reward) {
  const box = document.getElementById('overlay-box');
  box.innerHTML = `
    <h2>⏰ ${t('offline')}</h2>
    <p style="font-size:11px;color:var(--text2)">(${reward.minutes} min)</p>
    <div style="font-size:16px;margin:12px 0">
      <div>🪙 +${formatNum(reward.gold)} ${t('gold')}</div>
      <div>⭐ +${formatNum(reward.exp)} ${t('exp')}</div>
      <div>💎 +${reward.shards} ${t('shards')}</div>
    </div>
    <button class="btn btn-gold" onclick="closeOverlay()">OK</button>
  `;
  document.getElementById('overlay').style.display = 'flex';
}

// Language
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('relicLang', lang);
  applyLang();
}

function applyLang() {
  document.getElementById('lang-btn').textContent = lang === 'en' ? '繁中' : 'EN';
  document.getElementById('back-btn').textContent = t('back');
  document.getElementById('tab-explore-label').textContent = t('explore');
  document.getElementById('tab-map-label').textContent = t('map');
  document.getElementById('tab-team-label').textContent = t('team');
  document.getElementById('tab-codex-label').textContent = t('codex');
  document.getElementById('tab-shop-label').textContent = t('shop');
  document.title = t('title') + ' — Fantasy Idle RPG';
  // Re-render active panel
  if (activeTab !== 'none') {
    if (activeTab === 'map') renderMapPanel();
    else if (activeTab === 'team') renderTeamPanel();
    else if (activeTab === 'codex') renderCodexPanel();
    else if (activeTab === 'shop') renderShopPanel();
  }
}

// HUD Update
function updateHUD() {
  document.getElementById('player-lv').textContent = t('lv') + S.level;
  document.getElementById('player-title').textContent = t('relicHunter');
  document.getElementById('res-gold').textContent = formatNum(S.gold);
  document.getElementById('res-exp').textContent = formatNum(S.exp) + '/' + formatNum(EXP_TABLE[S.level-1]||999);
  document.getElementById('res-shards').textContent = formatNum(S.shards);
  document.getElementById('explore-progress').style.width = (battleState ? 100 : S.exploreProgress) + '%';

  // Log text
  if (logQueue.length > 0) {
    document.getElementById('log-text').textContent = logQueue[logQueue.length - 1];
  }
}

// Main Game Loop
function gameLoop(ts) {
  if (!lastTick) lastTick = ts;
  const dt = Math.min(ts - lastTick, 100); // cap dt
  lastTick = ts;

  // Tick game logic
  if (battleState) {
    tickBattle(dt);
  } else {
    tickExplore(dt);
  }

  // Update floating nums
  floatingNums = floatingNums.filter(fn => {
    fn.life -= dt * 0.002;
    fn.y -= dt * 0.04;
    return fn.life > 0;
  });

  // Update particles
  particles = particles.filter(p => {
    p.life -= dt * 0.002;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    return p.life > 0;
  });

  // Draw
  drawScene();
  updateHUD();

  // Auto save every 30s
  if (Math.floor(ts / 30000) !== Math.floor((ts - dt) / 30000)) {
    saveGame();
  }

  requestAnimationFrame(gameLoop);
}

// Init
function init() {
  const hadSave = loadGame();
  S.muted = localStorage.getItem('relicMuted') === '1';

  initCanvas();
  applyLang();

  // Bind tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Bind controls
  document.getElementById('lang-btn').addEventListener('click', toggleLang);
  document.getElementById('mute-btn').addEventListener('click', toggleMute);
  if (S.muted) document.getElementById('mute-btn').textContent = '🔇';

  // Audio
  loadAudio('collect', '../../assets/sfx/400 Sounds Pack/Items/coin_collect.wav');
  loadAudio('upgrade', '../../assets/sfx/GameSFX3/PowerUp/Retro PowerUP 09.wav');
  loadAudio('hit', '../../assets/sfx/GameSFX2/Impact/Retro Impact Punch 07.wav');
  const startOnce = () => {
    startBGM(BGM_URL);
    document.removeEventListener('click', startOnce);
    document.removeEventListener('touchend', startOnce);
  };
  document.addEventListener('click', startOnce);
  document.addEventListener('touchend', startOnce);

  // Tutorial or offline reward
  if (!hadSave || !S.tutorialDone) {
    showTutorial();
  } else {
    const reward = calcOfflineReward();
    if (reward && (reward.gold > 0 || reward.exp > 0)) {
      S.gold += reward.gold;
      addExp(reward.exp);
      S.shards += reward.shards;
      showOfflineReward(reward);
    }
  }

  generateSceneObjects();
  // Delay first frame to ensure DOM layout is complete (CLAUDE.md Canvas黑屏教訓)
  requestAnimationFrame(() => {
    resizeCanvas();
    requestAnimationFrame(gameLoop);
  });
}

// Close overlay on click outside
document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('overlay')) closeOverlay();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('overlay').style.display !== 'none') {
      closeOverlay();
    } else if (activeTab !== 'none') {
      switchTab(activeTab); // close panel
    }
  }
  if (e.key === 'm' || e.key === 'M') toggleMute();
});

init();
</script>
