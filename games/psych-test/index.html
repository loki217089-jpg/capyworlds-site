<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>潛意識人格測驗 — CapyWorlds</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0e0c12;--bg2:#15121e;--bg3:#1e1a2a;--border:#ffffff18;--text:#e0d8f0;--sub:#9080b0;--accent:#a06ae8}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
header h1{font-size:15px;color:#c8a0ff;letter-spacing:.5px}
header a{color:var(--sub);font-size:12px;text-decoration:none;margin-left:auto}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;flex:1;min-height:0}
.screen.on{display:flex}

/* ── INTRO SCREEN ── */
#s-intro{align-items:center;justify-content:center;padding:24px 20px;text-align:center;gap:0}
.intro-orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#d0a0ff,#6020c0 60%,#1a0840);
  box-shadow:0 0 60px #8040ff60,0 0 120px #8040ff30;margin-bottom:28px;
  animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 60px #8040ff60,0 0 120px #8040ff30}
  50%{transform:scale(1.06);box-shadow:0 0 80px #a060ff80,0 0 160px #8040ff50}}
.intro-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:.5px}
.intro-sub{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:32px;max-width:min(90vw, 320px)}
.intro-info{display:flex;gap:20px;margin-bottom:36px}
.info-chip{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3)}
.info-chip .num{font-size:20px;font-weight:700;color:#c8a0ff}
.info-chip .lbl{font-size:13px;color:var(--sub)}
.start-btn{padding:14px 48px;border-radius:30px;border:none;background:linear-gradient(135deg,#a060f0,#6020c0);color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 24px #8040ff50;transition:all .2s}
.start-btn:active{transform:scale(.97)}

/* ── QUIZ SCREEN ── */
#s-quiz{padding:0;flex:1}
.quiz-inner{display:flex;flex-direction:column;flex:1;padding:16px;gap:14px;max-width:480px;margin:0 auto;width:100%;height:100%}
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#7020c0,#c080ff);border-radius:3px;transition:width .4s ease}
.prog-txt{font-size:13px;color:var(--sub);white-space:nowrap}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,#8040ff20,transparent 70%)}
.q-num{font-size:11px;color:#8060c0;margin-bottom:8px;letter-spacing:.5px}
.q-text{font-size:16px;font-weight:600;color:#fff;line-height:1.6}
.choices{display:flex;flex-direction:column;gap:12px;flex:1;justify-content:center}
.choice{padding:16px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.choice:active{transform:scale(.98)}
.choice.picked{border-color:#a060f0;background:#2a1a40;box-shadow:0 0 16px #8040ff30}
.choice-ico{font-size:22px;flex-shrink:0;width:36px;text-align:center}
.choice-txt{font-size:14px;color:var(--text);line-height:1.4}
.choice.picked .choice-txt{color:#e0c8ff}

/* ── RESULT SCREEN ── */
#s-result{align-items:stretch;overflow-y:auto;padding:16px;gap:16px}
.res-header{text-align:center;padding:24px 16px;border-radius:16px;position:relative;overflow:hidden}
.res-type-orb{width:90px;height:90px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.res-type-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;opacity:.8}
.res-type-name{font-size:28px;font-weight:700;color:#fff;margin-bottom:6px}
.res-type-sub{font-size:14px;opacity:.85;line-height:1.5}
.res-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px}
.res-section h3{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;opacity:.7}
.res-desc{font-size:14px;line-height:1.8;color:#d8d0e8}
.trait-row{display:flex;flex-direction:column;gap:8px}
.trait{display:flex;align-items:center;gap:10px}
.trait-lbl{font-size:12px;color:var(--sub);width:64px;flex-shrink:0}
.trait-bar{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.trait-fill{height:100%;border-radius:4px;transition:width 1s ease}
.tags-row{display:flex;flex-wrap:wrap;gap:6px}
.res-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid}
.compat-row{display:flex;gap:10px;flex-wrap:wrap}
.compat-card{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);text-align:center}
.compat-card .ico{font-size:24px;margin-bottom:4px}
.compat-card .ct{font-size:12px;color:var(--sub);margin-bottom:2px}
.compat-card .cn{font-size:13px;font-weight:600}
.res-actions{display:flex;gap:10px;margin-top:4px}
.res-btn{flex:1;padding:14px 12px;border-radius:10px;border:1.5px solid;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.res-btn:active{transform:scale(.97)}
.start-btn, .choice, .res-btn { touch-action: manipulation; }
.res-btn.pri{background:linear-gradient(135deg,#a060f0,#6020c0);border-color:transparent;color:#fff}
.res-btn.sec{background:transparent;color:var(--accent);border-color:var(--accent)}

@media (max-width: 380px) {
  .res-actions { flex-direction: column; }
  .res-btn { width: 100%; }
}

/* ── ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease forwards}
</style>
</head>

   choices:[
     {e:'🌅',t:'站在山頂看日出，風把頭髮吹起',ty:'fire'},
     {e:'🕯️',t:'深夜書桌前的一盞小燈',ty:'moon'},
     {e:'🍜',t:'和朋友圍著一桌熱鬧的食物',ty:'forest'},
     {e:'🌊',t:'海邊，浪打來那一瞬間',ty:'wave'}
   ]
 }
];
// ══ GAME STATE ════════════════════════════════════════════════════════════
let scores = {wave:0,fire:0,moon:0,spark:0,forest:0,crystal:0};
let cur = 0;
let picked = null;

// ══ SCREEN SWITCH ═════════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ══ QUIZ ══════════════════════════════════════════════════════════════════
function startQuiz() {
  scores = {wave:0,fire:0,moon:0,spark:0,forest:0,crystal:0};
  cur = 0; picked = null;
  show('s-quiz');
  renderQ();
}

function renderQ() {
  const q = QS[cur];
  picked = null;
  // Progress
  document.getElementById('progFill').style.width = (cur / QS.length * 100) + '%';
  document.getElementById('progTxt').textContent = cur + ' / ' + QS.length;
  // Question card
  const qCard = document.getElementById('qCard');
  qCard.classList.remove('fade-up');
  void qCard.offsetWidth;
  qCard.classList.add('fade-up');
  document.getElementById('qNum').textContent = 'QUESTION ' + (cur + 1);
  document.getElementById('qText').textContent = q.q;
  // Choices
  const chWrap = document.getElementById('choices');
  chWrap.innerHTML = '';
  chWrap.classList.remove('fade-up');
  void chWrap.offsetWidth;
  chWrap.classList.add('fade-up');
  q.choices.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.innerHTML = `<div class="choice-ico">${c.e}</div><div class="choice-txt">${c.t}</div>`;
    div.addEventListener('click', () => pickChoice(i, c.ty, div));
    div.addEventListener('touchend', (e) => { e.preventDefault(); pickChoice(i, c.ty, div); });
    chWrap.appendChild(div);
  });
}

function pickChoice(idx, typeId, el) {
  if(picked !== null) return;
  picked = idx;
  document.querySelectorAll('.choice').forEach(c=>c.classList.remove('picked'));
  el.classList.add('picked');
  scores[typeId] = (scores[typeId] || 0) + 1;
  // Auto advance after short delay
  setTimeout(() => {
    cur++;
    if(cur >= QS.length) showResult();
    else renderQ();
  }, 420);
}

// ══ RESULT ════════════════════════════════════════════════════════════════
function showResult() {
  // Find winner
  const winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const T = TYPES[winner];

  // Header
  const hdr = document.getElementById('resHeader');
  hdr.style.background = T.bg;
  const orb = document.getElementById('resOrb');
  orb.textContent = T.ico;
  orb.style.background = `radial-gradient(circle at 35% 35%, ${T.color}ff, ${T.color}66)`;
  orb.style.boxShadow = `0 0 40px ${T.glow}, 0 0 80px ${T.glow}`;
  document.getElementById('resLabel').textContent = T.sub.toUpperCase();
  document.getElementById('resLabel').style.color = T.color;
  document.getElementById('resName').textContent = T.ico + ' ' + T.name;
  document.getElementById('resSub').textContent = T.sub;
  document.getElementById('resSub').style.color = T.color;

  // Desc
  document.getElementById('resDesc').textContent = T.desc;

  // Traits
  const tr = document.getElementById('resTraits');
  tr.innerHTML = '';
  T.traits.forEach(trait => {
    const row = document.createElement('div');
    row.className = 'trait';
    row.innerHTML = `<div class="trait-lbl">${trait.l}</div>
      <div class="trait-bar"><div class="trait-fill" style="width:0%;background:${trait.c}" data-v="${trait.v}"></div></div>`;
    tr.appendChild(row);
  });

  // Tags
  const tg = document.getElementById('resTags');
  tg.innerHTML = '';
  T.tags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'res-tag';
    span.textContent = tag;
    span.style.color = T.tagColor;
    span.style.borderColor = T.tagColor + '60';
    span.style.background = T.tagColor + '14';
    tg.appendChild(span);
  });

  // Compat
  const cp = document.getElementById('resCompat');
  cp.innerHTML = `
    <div class="compat-card">
      <div class="ico">${T.compat.go.ico}</div>
      <div class="ct">最速配</div>
      <div class="cn">${T.compat.go.name}</div>
    </div>
    <div class="compat-card">
      <div class="ico">${T.compat.op.ico}</div>
      <div class="ct">互補型</div>
      <div class="cn">${T.compat.op.name}</div>
    </div>`;

  // Progress bar fill = final update
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progTxt').textContent = QS.length + ' / ' + QS.length;

  show('s-result');

  // Animate trait bars after render
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.trait-fill').forEach(el=>{
      el.style.width = el.dataset.v + '%';
    });
  }));
  // Scroll to top
  document.getElementById('s-result').scrollTop = 0;
}

// ══ SHARE ════════════════════════════════════════════════════════════════
document.getElementById('shareBtn').addEventListener('click', () => {
  const winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const T = TYPES[winner];
  const txt = `🔮 潛意識人格測驗結果\n\n${T.ico} ${T.name}（${T.sub}）\n\n${T.tags.join(' · ')}\n\n速配：${T.compat.go.ico}${T.compat.go.name}　互補：${T.compat.op.ico}${T.compat.op.name}\n\n→ 來測測你的潛意識人格：capyworlds.pages.dev/games/psych-test/`;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('shareBtn');
    btn.textContent = '✅ 已複製！';
    setTimeout(()=>btn.textContent='📋 複製結果', 2000);
  });
});

// ══ INIT ═════════════════════════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('retryBtn').addEventListener('click', ()=>{ show('s-intro'); });
</script>
</body>
</html>
