<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>地球再生 — Earth Reborn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010901;overflow:hidden;font-family:'Courier New',monospace;color:#ccc;user-select:none}
canvas{display:block;cursor:crosshair}
#lp{position:absolute;left:0;top:56px;width:182px;bottom:30px;background:rgba(1,7,2,.93);border-right:1px solid #1a3020;overflow-y:auto;pointer-events:all}
#rb{position:absolute;left:0;top:0;right:0;height:56px;background:rgba(0,5,1,.94);border-bottom:1px solid #1a3020;display:flex;align-items:center;padding:0 6px;gap:8px;pointer-events:none;z-index:10}
.ri{display:flex;align-items:center;gap:3px}
.ric{font-size:14px}
.rvl{font-size:12px;font-weight:bold;min-width:30px;color:#ccffcc}
.rrt{font-size:10px;color:#3a6035;margin-left:1px}
#rp{position:absolute;right:0;top:56px;width:188px;bottom:30px;background:rgba(1,7,2,.93);border-left:1px solid #1a3020;padding:9px;pointer-events:all;overflow-y:auto;font-size:11px}
#sb{position:absolute;left:0;bottom:0;right:0;height:30px;background:rgba(0,5,1,.94);border-top:1px solid #1a3020;display:flex;align-items:center;padding:0 10px;font-size:11px;color:#3a6035;pointer-events:none;z-index:10}
.cat{padding:7px 10px 2px;color:#44aa66;font-size:10px;text-transform:uppercase;letter-spacing:1px;display:block}
.bb{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.05);color:#aaa;padding:5px 10px;cursor:pointer;font-size:11px;font-family:'Courier New';line-height:1.3;transition:background .1s}
.bb:hover:not([disabled]){background:rgba(60,160,60,.1);color:#ccffcc}
.bb[disabled]{opacity:.3;cursor:default}
.bb.sel{background:rgba(60,160,60,.18);color:#aaffaa;border-left:2px solid #44aa44}
.bco{color:#3a6035;font-size:10px}
#sto{position:absolute;inset:0;background:rgba(0,3,1,.98);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;pointer-events:all}
#sto h1{color:#44ee88;font-size:30px;letter-spacing:5px;margin-bottom:16px;text-shadow:0 0 40px #22ee6644}
#stb{color:#99bbaa;font-size:13px;line-height:2;text-align:center;max-width:650px}
#stb em{color:#66ffaa;font-style:normal}
#stb strong{color:#ffdd88}
#sts{margin-top:28px;background:rgba(20,55,20,.75);border:1px solid #33aa55;color:#88ff99;padding:10px 36px;border-radius:6px;cursor:pointer;font-size:14px;font-family:'Courier New';letter-spacing:2px}
#sts:hover{box-shadow:0 0 28px rgba(60,200,80,.35);background:rgba(30,70,30,.8)}
/* Panel toggle buttons */
.ptog{position:fixed;top:50%;transform:translateY(-50%);width:22px;height:52px;background:rgba(0,18,4,.92);border:1px solid #2a5030;cursor:pointer;color:#44aa66;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:50;user-select:none;transition:left .15s,right .15s}
#lptog{left:182px;border-radius:0 6px 6px 0;border-left:none}
#rptog{right:188px;border-radius:6px 0 0 6px;border-right:none}
.ptog:hover{background:rgba(20,60,20,.95);color:#88ffaa}
/* Mobile resource bar */
@media(max-width:767px){
  .rvl{font-size:10px;min-width:20px}
  .rrt{display:none}
  #rb{gap:4px;padding:0 4px;overflow-x:auto}
  .ri{gap:2px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lp" style="display:none"></div>
<div id="rb" style="display:none"></div>
<div id="rp" style="display:none">
  <h3 style="color:#44aa66;margin-bottom:8px;font-size:12px">📋 建築資訊</h3>
  <div id="rpc" style="color:#667766;line-height:1.6">選擇左側建築以查看詳情與建造需求</div>
</div>
<div id="sb" style="display:none">
  <span id="smsg"></span>
  <span id="sera" style="margin-left:auto;color:#44aa66;font-weight:bold"></span>
</div>
<div class="ptog" id="lptog" onclick="toggleLP()">◀</div>
<div class="ptog" id="rptog" onclick="toggleRP()">▶</div>
<div id="sto">
  <h1>地球再生</h1>
  <div id="stb"></div>
  <button id="sts">開始重建文明</button>
</div>
<script>
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=canvas.width=window.innerWidth,H=canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});

// ── LAYOUT ──
const LP_W0=182,RP_W0=188,RB_H=56,SB_H=30;
let LP_W=LP_W0,RP_W=RP_W0;
const TILE_W=92,TILE_H=108;
const WORLD_TILES=22;
const TERRAIN=['mountain','mountain','forest','forest','forest','forest',
  'plains','plains','plains','plains','plains','plains','plains','plains',
  'plains','plains','coast','coast','coast','sea','sea','sea'];

// ── RESOURCES ──
const RES_ICONS={pop:'👥',food:'🌾',wood:'🪵',stone:'🪨',energy:'⚡',knowledge:'📚'};
const RES_COLORS={pop:'#88ffcc',food:'#ffdd66',wood:'#cc9955',stone:'#bbbbbb',energy:'#ffaa33',knowledge:'#aaaaff'};

// ── ERAS ──
const ERAS=[
  {name:'蠻荒時代', color:'#88aa55', unlockReq:()=>true},
  {name:'定居時代', color:'#aacc77', unlockReq:()=>gs.res.pop>=15},
  {name:'城市時代', color:'#ccdd88', unlockReq:()=>gs.res.pop>=40&&gs.builtTypes.has('quarry')},
  {name:'工業時代', color:'#ffcc44', unlockReq:()=>gs.res.pop>=80&&gs.builtTypes.has('town_hall')},
  {name:'星際時代', color:'#88ccff', unlockReq:()=>gs.res.pop>=120&&gs.builtTypes.has('lab')&&gs.res.energy>=200},
];

// ── BUILDINGS ──
const BLDGS=[
  {id:'campfire',  name:'篝火',      era:0,pCap:8,  prod:{},                     cost:{},
   terrain:['plains'],     desc:'基礎住所 +8人口上限'},
  {id:'gather',    name:'採集小屋',  era:0,pCap:0,  prod:{wood:0.4,food:0.4},    cost:{},
   terrain:['forest','coast'],desc:'同時採集木材與食物'},
  {id:'farm',      name:'農地',      era:0,pCap:0,  prod:{food:1.8},              cost:{wood:8},
   terrain:['plains'],     desc:'穩定食物來源 +1.8食/秒'},
  {id:'cabin',     name:'木屋',      era:1,pCap:18, prod:{},                     cost:{wood:22},
   terrain:['plains'],     desc:'木造住宅 +18人口上限'},
  {id:'lumber',    name:'木材場',    era:1,pCap:0,  prod:{wood:2.0},              cost:{wood:18},
   terrain:['forest','plains'],desc:'持續伐木 +2木/秒'},
  {id:'fish',      name:'漁村',      era:1,pCap:0,  prod:{food:2.8},              cost:{wood:15},
   terrain:['coast'],      desc:'海岸漁業 +2.8食/秒'},
  {id:'quarry',    name:'採石場',    era:1,pCap:0,  prod:{stone:1.2},             cost:{wood:20},
   terrain:['mountain','plains'],desc:'開採石材 +1.2石/秒'},
  {id:'stone_house',name:'石造住宅', era:2,pCap:35, prod:{},                     cost:{stone:35},
   terrain:['plains'],     desc:'石造住所 +35人口上限'},
  {id:'market',    name:'市集',      era:2,pCap:0,  prod:{},                     cost:{wood:25,stone:18},
   terrain:['plains'],     desc:'活絡人口，成長率 ×2',special:'popRate2x'},
  {id:'mine',      name:'礦山',      era:2,pCap:0,  prod:{stone:2.0,energy:0.5}, cost:{stone:40},
   terrain:['mountain','plains'],desc:'深層礦山 +2石 +0.5能/秒'},
  {id:'town_hall', name:'市政廳',    era:2,pCap:0,  prod:{knowledge:0.3},         cost:{stone:60},
   terrain:['plains'],     desc:'城市中心，解鎖工業時代'},
  {id:'factory',   name:'工廠',      era:3,pCap:0,  prod:{energy:2.5},            cost:{stone:55,energy:15},
   terrain:['plains'],     desc:'工業發電 +2.5能/秒'},
  {id:'power',     name:'發電廠',    era:3,pCap:0,  prod:{energy:6.0},            cost:{stone:90,energy:30},
   terrain:['plains'],     desc:'大型發電 +6能/秒'},
  {id:'hospital',  name:'醫院',      era:3,pCap:60, prod:{},                     cost:{stone:60,energy:25,knowledge:20},
   terrain:['plains'],     desc:'醫療提升 +60人口上限'},
  {id:'lab',       name:'研究院',    era:3,pCap:0,  prod:{knowledge:1.8},         cost:{stone:70,energy:35},
   terrain:['plains'],     desc:'知識研究 +1.8知/秒'},
  {id:'university',name:'大學',      era:4,pCap:0,  prod:{knowledge:5.0},         cost:{stone:100,energy:60,knowledge:40},
   terrain:['plains'],     desc:'最高學府 +5知/秒'},
  {id:'alien_lab', name:'異星研究院',era:4,pCap:0,  prod:{energy:10.0,knowledge:4.0},cost:{stone:80,energy:50,knowledge:70},
   terrain:['plains'],     desc:'異星科技 需帶回異星科技',special:'needAlien'},
  {id:'launch_pad',name:'發射台',    era:4,pCap:0,  prod:{},                      cost:{stone:200,energy:200,knowledge:150},
   terrain:['plains'],     desc:'⭐ 文明頂點，建造後啟動倒數',special:'win'},
];

// ── GAME STATE ──
const gs={
  era:0, eraChanged:false,
  res:{pop:0,food:20,wood:15,stone:0,energy:0,knowledge:0},
  caps:{food:150,wood:200,stone:300,energy:200,knowledge:600},
  tiles: Array(WORLD_TILES).fill(null), // null or {id, placedAt}
  builtTypes: new Set(),
  pop: 0, popCap: 5, popGrowthTimer:0,
  scroll: 0,  // camera X offset in pixels
  selectedBldg: null,
  notifications: [],
  winTimer: -1,
  won: false,
  paused: false,
  alienTech: 0,
  spaceData: null,
  gameTime: 0,
};

// ── LOAD SPACE GAME DATA ──
function loadSpaceData() {
  try {
    const raw = localStorage.getItem('earthData');
    if (!raw) return;
    const d = JSON.parse(raw);
    gs.spaceData = d;
    gs.alienTech = d.alienTech || 0;
    gs.res.stone  = Math.floor((d.ore||0) * 0.8);
    gs.res.knowledge = Math.floor((d.crystal||0) * 3);
    gs.res.energy = Math.floor((d.alienTech||0) * 5);
    gs.res.wood   = 15 + Math.floor((d.ore||0) * 0.3);
    gs.res.food   = 20;
  } catch(e){}
}

// ── CAMERA ──
let camX=0; // world X of left edge of game area
const CAM_MIN=0, worldPxW=WORLD_TILES*TILE_W;
function camMax(){return Math.max(0,worldPxW-(W-LP_W-RP_W));}
function worldToScreen(wx){return wx-camX+LP_W;}
function screenToTile(sx){return Math.floor((sx-LP_W+camX)/TILE_W);}

// ── TERRAIN Y (ground level at tile center) ──
function terrainY(tileX){
  const t=TERRAIN[tileX]||'sea';
  const mid=H-SB_H-TILE_H*0.5;
  if(t==='mountain') return mid-TILE_H*0.22;
  if(t==='coast') return mid+TILE_H*0.1;
  if(t==='sea') return mid+TILE_H*0.3;
  return mid;
}

// ── PANEL TOGGLE ──
function toggleLP(){
  const lp=document.getElementById('lp');
  const tog=document.getElementById('lptog');
  if(LP_W>0){LP_W=0;lp.style.display='none';tog.style.left='0';tog.textContent='▶';}
  else{LP_W=LP_W0;lp.style.display='block';tog.style.left=LP_W0+'px';tog.textContent='◀';}
}
function toggleRP(){
  const rp=document.getElementById('rp');
  const tog=document.getElementById('rptog');
  if(RP_W>0){RP_W=0;rp.style.display='none';tog.style.right='0';tog.textContent='◀';}
  else{RP_W=RP_W0;rp.style.display='block';tog.style.right=RP_W0+'px';tog.textContent='▶';}
}

// ── STARS for sky ──
const STARS=[];
for(let i=0;i<180;i++) STARS.push({x:Math.random()*4000,y:Math.random()*(H*0.55),b:0.3+Math.random()*0.7,s:Math.random()<0.15?2:1});

// ── DRAW SKY ──
function drawSky(t) {
  const dayFrac = 0.55+0.45*Math.sin(t*0.0001); // slow day/night
  const nightAlpha = 1-dayFrac;
  // sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H*0.65);
  const r1=Math.floor(10+dayFrac*60),g1=Math.floor(18+dayFrac*90),b1=Math.floor(35+dayFrac*120);
  const r2=Math.floor(2+dayFrac*30),g2=Math.floor(12+dayFrac*55),b2=Math.floor(8+dayFrac*30);
  grad.addColorStop(0,`rgb(${r1},${g1},${b1})`);
  grad.addColorStop(1,`rgb(${r2},${g2},${b2})`);
  ctx.fillStyle=grad;
  ctx.fillRect(LP_W,0,W-LP_W-RP_W,H);
  // stars (visible at night/dusk)
  for(const s of STARS){
    const alpha=nightAlpha*(0.6+0.4*Math.sin(t*0.001+s.x));
    if(alpha<0.05) continue;
    const sx=(s.x-camX*0.3)%(W-LP_W-RP_W)+LP_W;
    if(sx<LP_W||sx>W-RP_W) continue;
    ctx.fillStyle=`rgba(255,255,240,${alpha*s.b})`;
    ctx.fillRect(sx,s.y,s.s,s.s);
  }
  // far mountains silhouette
  ctx.fillStyle=`rgba(15,35,12,${0.5+dayFrac*0.3})`;
  for(let mx=0;mx<10;mx++){
    const bx=LP_W+((mx*380-camX*0.15)%(W-LP_W-RP_W+380));
    const bh=80+Math.sin(mx*2.3)*40;
    ctx.beginPath();ctx.moveTo(bx,H*0.6);
    ctx.lineTo(bx+40,H*0.6-bh);ctx.lineTo(bx+80,H*0.6);ctx.fill();
  }
  // sun or moon
  const sunX=LP_W+(W-LP_W-RP_W)*(0.3+0.4*Math.sin(t*0.00005));
  const sunY=H*0.15+Math.abs(Math.cos(t*0.00005))*H*0.15;
  if(dayFrac>0.5){
    ctx.shadowColor='#ffee88';ctx.shadowBlur=30*dayFrac;
    ctx.fillStyle=`rgba(255,230,100,${dayFrac})`;
    ctx.beginPath();ctx.arc(sunX,sunY,14*dayFrac,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle=`rgba(220,220,200,${nightAlpha*0.9})`;
    ctx.beginPath();ctx.arc(sunX,sunY,10,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;
}

// ── DRAW TERRAIN ──
function drawTerrain(t) {
  const gndY=H-SB_H;
  for(let i=0;i<WORLD_TILES;i++){
    const type=TERRAIN[i];
    const sx=worldToScreen(i*TILE_W);
    if(sx>W-RP_W+20||sx+TILE_W<LP_W-20) continue;
    const ty=terrainY(i);
    // ground fill per type
    let gColor;
    if(type==='mountain') gColor='#3a3a28';
    else if(type==='forest') gColor='#1a3018';
    else if(type==='plains') gColor='#253318';
    else if(type==='coast') gColor='#1e2a18';
    else gColor='#0a1428';
    // ground rect
    ctx.fillStyle=gColor;
    ctx.fillRect(sx,ty,TILE_W,gndY-ty+10);
    // surface line
    ctx.strokeStyle=type==='sea'?'#1a3a5a':type==='mountain'?'#5a5a3a':'#3a5a28';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx,ty);ctx.lineTo(sx+TILE_W,ty);ctx.stroke();
    // tile type decorations
    if(type==='sea'){
      const wave=Math.sin(t*0.002+i*0.8)*3;
      ctx.strokeStyle='rgba(60,140,200,0.4)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx+8,ty+wave+8);ctx.quadraticCurveTo(sx+TILE_W*0.5,ty+wave,sx+TILE_W-8,ty+wave+8);ctx.stroke();
    }
    if(type==='mountain'){
      // snow cap
      ctx.fillStyle='rgba(240,240,255,0.6)';
      ctx.beginPath();ctx.moveTo(sx+TILE_W*0.5,ty-22);ctx.lineTo(sx+TILE_W*0.65,ty-4);ctx.lineTo(sx+TILE_W*0.35,ty-4);ctx.closePath();ctx.fill();
    }
  }
  // ocean water
  ctx.fillStyle='rgba(15,40,80,0.85)';
  for(let i=0;i<WORLD_TILES;i++){
    if(TERRAIN[i]==='sea'){
      const sx=worldToScreen(i*TILE_W);
      if(sx>W-RP_W+20||sx+TILE_W<LP_W-20) continue;
      const ty=terrainY(i);
      ctx.fillRect(sx,ty+4,TILE_W,gndY-ty);
    }
  }
}

// ── DRAW NATURE (trees, rocks) ──
function drawNature(t) {
  for(let i=0;i<WORLD_TILES;i++){
    const type=TERRAIN[i];
    if(type==='sea') continue;
    const sx=worldToScreen(i*TILE_W);
    if(sx>W-RP_W+20||sx+TILE_W<LP_W-20) continue;
    const ty=terrainY(i);
    const hasBldg=gs.tiles[i]!==null;
    if(type==='forest'&&!hasBldg){
      // 2-3 trees per forest tile
      const seed=i*7;
      for(let tr=0;tr<3;tr++){
        const tx=sx+10+((seed*13+tr*29)%72);
        const h=28+((seed+tr*17)%18);
        ctx.fillStyle='#1a4a18';
        ctx.beginPath();ctx.moveTo(tx,ty-h);ctx.lineTo(tx-10,ty);ctx.lineTo(tx+10,ty);ctx.closePath();ctx.fill();
        ctx.fillStyle='#246622';
        ctx.beginPath();ctx.moveTo(tx,ty-h-6);ctx.lineTo(tx-7,ty-h*0.45);ctx.lineTo(tx+7,ty-h*0.45);ctx.closePath();ctx.fill();
        ctx.fillStyle='#4a3018';
        ctx.fillRect(tx-2,ty-4,4,8);
      }
    }
    if(type==='mountain'&&!hasBldg){
      // rocks
      ctx.fillStyle='#4a4a36';
      ctx.beginPath();ctx.ellipse(sx+20,ty-4,14,8,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5a5a45';
      ctx.beginPath();ctx.ellipse(sx+65,ty-6,18,10,0.2,0,Math.PI*2);ctx.fill();
    }
    if(type==='coast'&&!hasBldg){
      // sand
      ctx.fillStyle='rgba(200,180,100,0.25)';
      ctx.fillRect(sx,ty-2,TILE_W,6);
    }
  }
}

// ── DRAW ONE BUILDING ──
function drawBldgAt(id,sx,ty,t){
  const b=BLDGS.find(b=>b.id===id);
  if(!b) return;
  ctx.save();ctx.translate(sx+TILE_W/2,ty);
  const pulse=0.9+0.1*Math.sin(t*0.003);
  switch(id){
    case 'campfire':
      ctx.fillStyle='#442200';ctx.fillRect(-8,-10,16,10);
      ctx.fillStyle=`rgba(255,${100+Math.floor(60*Math.sin(t*0.01))},0,0.9)`;
      ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(-7,-10);ctx.lineTo(7,-10);ctx.closePath();ctx.fill();
      break;
    case 'gather':
      ctx.fillStyle='#3a2a14';
      ctx.beginPath();ctx.arc(0,-8,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6a4a24';
      ctx.fillRect(-6,-16,12,10);
      break;
    case 'farm':
      ctx.fillStyle='#1a4a14';ctx.fillRect(-30,-4,60,12);
      ctx.strokeStyle='#4a8a44';ctx.lineWidth=1;
      for(let r=0;r<5;r++){ctx.beginPath();ctx.moveTo(-25+r*12,-4);ctx.lineTo(-25+r*12,8);ctx.stroke();}
      break;
    case 'cabin':
      ctx.fillStyle='#5a3a1a';ctx.fillRect(-16,-18,32,18);
      ctx.fillStyle='#7a2a0a';
      ctx.beginPath();ctx.moveTo(-20,-18);ctx.lineTo(0,-32);ctx.lineTo(20,-18);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(200,150,80,0.4)';ctx.fillRect(-5,-14,10,8);
      break;
    case 'lumber':
      ctx.fillStyle='#4a2a0a';ctx.fillRect(-12,-16,24,16);
      ctx.fillStyle='#8a4a1a';ctx.fillRect(-20,-4,40,4);
      // log stack
      ctx.fillStyle='#7a5a2a';
      for(let l=0;l<3;l++){ctx.beginPath();ctx.ellipse(-8+l*8,-18,4,3,0,0,Math.PI*2);ctx.fill();}
      break;
    case 'fish':
      ctx.fillStyle='#2a4a5a';ctx.fillRect(-14,-14,28,14);
      ctx.fillStyle='#3a6a7a';
      ctx.beginPath();ctx.moveTo(-10,-14);ctx.lineTo(0,-24);ctx.lineTo(10,-14);ctx.closePath();ctx.fill();
      // fishing rod
      ctx.strokeStyle='#8a6a3a';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(14,-14);ctx.lineTo(22,-28);ctx.stroke();
      ctx.strokeStyle='rgba(150,200,255,0.6)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(22,-28);ctx.lineTo(26,-18);ctx.stroke();
      break;
    case 'quarry':
      ctx.fillStyle='#5a5a44';ctx.fillRect(-22,-8,44,8);
      ctx.fillStyle='#3a3a28';
      ctx.beginPath();ctx.moveTo(-22,-8);ctx.lineTo(-10,-26);ctx.lineTo(10,-26);ctx.lineTo(22,-8);ctx.fill();

// ── DRAW ALL BUILDINGS ON TERRAIN ──
let hoverTile=-1;
function drawBuildings(t){
  for(let i=0;i<WORLD_TILES;i++){
    const tile=gs.tiles[i];
    if(!tile) continue;
    const sx=worldToScreen(i*TILE_W);
    if(sx>W-RP_W+30||sx+TILE_W<LP_W-30) continue;
    const ty=terrainY(i);
    drawBldgAt(tile.id,sx,ty,t);
  }
  // hover highlight
  if(hoverTile>=0&&hoverTile<WORLD_TILES&&gs.selectedBldg){
    const sx=worldToScreen(hoverTile*TILE_W);
    const ty=terrainY(hoverTile);
    const canP=canBuildOnTile(gs.selectedBldg,hoverTile);
    ctx.strokeStyle=canP?'rgba(100,255,100,0.6)':'rgba(255,100,100,0.5)';
    ctx.lineWidth=2;
    ctx.setLineDash([5,5]);
    ctx.strokeRect(sx+1,ty-50,TILE_W-2,50);
    ctx.setLineDash([]);
    if(canP){
      ctx.globalAlpha=0.35;
      drawBldgAt(gs.selectedBldg,sx,ty,t);
      ctx.globalAlpha=1;
    }
  }
}

// ── NOTIFICATIONS (floating text) ──
function spawnNotif(text,wx,wy,color){
  const sx=worldToScreen(wx),sy=wy;
  gs.notifications.push({text,x:sx,y:sy,life:2,maxLife:2,color:color||'#88ffaa',vy:-30});
}
function drawNotifs(dt){
  for(let i=gs.notifications.length-1;i>=0;i--){
    const n=gs.notifications[i];
    n.y+=n.vy*dt;n.life-=dt;
    if(n.life<=0){gs.notifications.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=Math.min(1,n.life/n.maxLife*2);
    ctx.fillStyle=n.color;ctx.font='bold 13px Courier New';
    ctx.textAlign='center';ctx.fillText(n.text,n.x,n.y);
    ctx.restore();
  }
}

}

// ── GAME LOGIC ──
function canBuildOnTile(bldgId,tileX){
  if(tileX<0||tileX>=WORLD_TILES) return false;
  if(gs.tiles[tileX]!==null) return false;
  const b=BLDGS.find(b=>b.id===bldgId);
  if(!b) return false;
  if(b.era>gs.era) return false;
  if(!b.terrain.includes(TERRAIN[tileX])) return false;
  if(b.special==='needAlien'&&gs.alienTech<=0) return false;
  if(b.id==='launch_pad'&&gs.tiles.some(t=>t&&t.id==='launch_pad')) return false;
  for(const[res,amt] of Object.entries(b.cost)){if((gs.res[res]||0)<amt) return false;}
  return true;
}

function placeBuilding(bldgId,tileX){
  if(!canBuildOnTile(bldgId,tileX)) return false;
  const b=BLDGS.find(b=>b.id===bldgId);
  for(const[res,amt] of Object.entries(b.cost)) gs.res[res]-=amt;
  gs.tiles[tileX]={id:bldgId,placedAt:gs.gameTime};
  gs.builtTypes.add(bldgId);
  // pop cap
  if(b.pCap>0) gs.popCap+=b.pCap;
  // special
  if(b.special==='win'){gs.winTimer=30;gs.launchTile=tileX;setStatus('火箭發射倒數中！',true);}
  spawnNotif(`+${b.name}`,tileX*TILE_W+TILE_W/2,terrainY(tileX)-60,'#aaffaa');
  sfx('build');
  updateBuildPanel();
  updateRightPanel(bldgId);
  return true;
}

function calcProduction(){
  const prod={food:0,wood:0,stone:0,energy:0,knowledge:0};
  let popRate2x=false;
  for(const tile of gs.tiles){
    if(!tile) continue;
    const b=BLDGS.find(b=>b.id===tile.id);
    if(!b) continue;
    for(const[res,amt] of Object.entries(b.prod)) prod[res]=(prod[res]||0)+amt;
    if(b.special==='popRate2x') popRate2x=true;
  }
  prod._popRate2x=popRate2x;
  return prod;
}

function updateResources(dt){
  const prod=calcProduction();
  for(const key of ['food','wood','stone','energy','knowledge']){
    gs.res[key]=Math.min(gs.caps[key]||999,(gs.res[key]||0)+(prod[key]||0)*dt);
    if(gs.res[key]<0) gs.res[key]=0;
  }
  // food consumption by population
  const foodConsume=gs.res.pop*0.02*dt;
  gs.res.food=Math.max(0,gs.res.food-foodConsume);
  // win timer
  if(gs.winTimer>0){
    gs.winTimer-=dt;
    if(gs.winTimer<=0){gs.winTimer=0;gs.won=true;setStatus('🚀 文明重建完成！火箭升空！',true);sfx('win');}
  }
}

function updatePopulation(dt){
  if(gs.won) return;
  const prod=calcProduction();
  const popRate=prod._popRate2x?2:1;
  if(gs.res.pop<gs.popCap&&gs.res.food>2){
    const growRate=0.05*popRate*(gs.res.food/30)*dt;
    gs.res.pop=Math.min(gs.popCap,gs.res.pop+growRate);
  } else if(gs.res.food<=0&&gs.res.pop>1){
    gs.res.pop=Math.max(1,gs.res.pop-0.02*dt);
  }
  gs.res.pop=Math.max(0,gs.res.pop);
  const mile=Math.floor(gs.res.pop/10)*10;
  if(mile>_lastPopMile&&mile>0){_lastPopMile=mile;sfx('pop');}
}

function checkEraAdvance(){
  for(let e=gs.era+1;e<ERAS.length;e++){
    if(ERAS[e].unlockReq()){
      gs.era=e;
      spawnNotif(`★ 進入${ERAS[e].name}！`,worldPxW/2,H/2,'#ffee44');
      setStatus(`★ 文明進入：${ERAS[e].name}`,true);
      sfx('era');
      updateBuildPanel();
      break;
    }
  }
}

let _statusTimer=0;
function setStatus(msg,highlight){
  document.getElementById('smsg').textContent=msg;
  document.getElementById('smsg').style.color=highlight?'#88ffaa':'#3a6035';
  _statusTimer=4;
}

// ── HTML UI ──
function updateResourceBar(){
  const rb=document.getElementById('rb');
  const prod=calcProduction();
  const keys=['pop','food','wood','stone','energy','knowledge'];
  rb.innerHTML=keys.map(k=>{
    const v=k==='pop'?Math.floor(gs.res.pop):Math.floor(gs.res[k]||0);
    const cap=k==='pop'?gs.popCap:Math.floor(gs.caps[k]||999);
    const rate=k==='pop'?'':((prod[k]||0)>0?`+${(prod[k]).toFixed(1)}/s`:'');
    const color=RES_COLORS[k]||'#aaa';
    return `<div class="ri"><span class="ric">${RES_ICONS[k]}</span>
      <span class="rvl" style="color:${color}">${v}${cap<999?'/'+cap:''}</span>
      ${rate?`<span class="rrt">${rate}</span>`:''}
    </div>`;
  }).join('');
}

function updateBuildPanel(){
  const lp=document.getElementById('lp');
  const byEra={};
  for(const b of BLDGS){
    if(b.era>gs.era) continue;
    if(!byEra[b.era]) byEra[b.era]=[];
    byEra[b.era].push(b);
  }
  let html='';
  for(let e=0;e<=gs.era;e++){
    if(!byEra[e]) continue;
    html+=`<span class="cat">${ERAS[e].name}</span>`;
    for(const b of byEra[e]){
      const canAfford=Object.entries(b.cost).every(([r,v])=>(gs.res[r]||0)>=v);
      const costStr=Object.entries(b.cost).map(([r,v])=>`${RES_ICONS[r]}${v}`).join(' ');
      const sel=gs.selectedBldg===b.id?'sel':'';
      const dis=b.special==='needAlien'&&gs.alienTech<=0?'disabled':(!canAfford?'disabled':'');
      html+=`<button class="bb ${sel}" ${dis} data-id="${b.id}">
        ${b.name}
        <div class="bco">${costStr||'免費'}</div>
      </button>`;
    }
  }
  lp.innerHTML=html;
  lp.querySelectorAll('.bb').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id;
      gs.selectedBldg=gs.selectedBldg===id?null:id;
      sfx('select');
      updateBuildPanel();
      updateRightPanel(id);
      canvas.style.cursor=gs.selectedBldg?'cell':'crosshair';
    });
  });
}

function updateRightPanel(bldgId){
  const rpc=document.getElementById('rpc');
  const id=bldgId||gs.selectedBldg;
  if(!id){rpc.innerHTML='選擇左側建築來查看說明';return;}
  const b=BLDGS.find(b=>b.id===id);if(!b) return;
  const prodStr=Object.entries(b.prod).map(([r,v])=>`${RES_ICONS[r]} +${v}/s`).join('<br>');
  const costStr=Object.entries(b.cost).map(([r,v])=>{
    const have=Math.floor(gs.res[r]||0);
    const ok=have>=v;
    return `<span style="color:${ok?'#66aa66':'#aa4444'}">${RES_ICONS[r]} ${have}/${v}</span>`;
  }).join('  ');
  const terrain=b.terrain.join('、');
  rpc.innerHTML=`<div style="color:#88ffaa;font-weight:bold;margin-bottom:6px">${b.name}</div>
    <div style="color:#556655;margin-bottom:6px">${b.desc}</div>
    ${prodStr?`<div style="margin:6px 0">${prodStr}</div>`:''}
    ${b.pCap?`<div style="color:#88ccff">👥 人口 +${b.pCap}</div>`:''}
    <div style="margin-top:8px;color:#445544">地形：${terrain}</div>
    <div style="margin-top:6px">${costStr||'<span style="color:#66aa66">免費</span>'}</div>`;
}

// ── STORY INTRO ──
function showStory(){
  const sd=gs.spaceData;
  const hasCores=sd&&sd.warpCores>=5;
  const hasAlien=sd&&sd.alienTech>0;
  let intro=`領航員陳，你終於回來了。<br><br>`;
  if(hasCores){
    intro+=`帶著 <em>5 枚翹曲核心</em> 的技術，你穿越蟲洞返回地球。<br>`;
  } else if(sd){
    intro+=`帶著 <em>${sd.warpCores||0} 枚翹曲核心</em> 的珍貴資料，你回到了地球。<br>`;
  }
  intro+=`但地球已不是記憶中的樣子——長期的太空危機讓文明大幅衰退。<br><br>`;
  if(hasAlien){
    intro+=`幸運的是，你帶回了 <em>異星科技碎片 ×${sd.alienTech}</em>，這將幫助重建加速。<br>`;
  }
  if(sd&&sd.ore>0){
    intro+=`你從虛空帶回了礦石與晶體，化作 <strong>石材 ×${Math.floor(sd.ore*0.8)}</strong> 和 <strong>知識 ×${Math.floor(sd.crystal*3)}</strong>。<br>`;
  }
  intro+=`<br>現在，從最基礎開始——建立篝火，種下農地，重新點燃人類的火焰。`;
  document.getElementById('stb').innerHTML=intro;
  document.getElementById('sto').style.display='flex';
}

// ── INPUT ──
let mouseX=0,mouseY=0,isDragging=false,dragStartX=0,dragCamX=0;

canvas.addEventListener('mousemove',e=>{
  mouseX=e.clientX;mouseY=e.clientY;
  if(isDragging){
    const dx=e.clientX-dragStartX;
    camX=Math.max(0,Math.min(camMax(),dragCamX-dx));
  }
  if(mouseX>LP_W&&mouseX<W-RP_W&&mouseY>RB_H&&mouseY<H-SB_H){
    hoverTile=screenToTile(mouseX);
    if(hoverTile<0||hoverTile>=WORLD_TILES) hoverTile=-1;
  } else {
    hoverTile=-1;
  }
});

canvas.addEventListener('mousedown',e=>{
  if(e.button===2){gs.selectedBldg=null;updateBuildPanel();canvas.style.cursor='crosshair';return;}
  if(mouseX>LP_W&&mouseX<W-RP_W&&mouseY>RB_H&&mouseY<H-SB_H){
    if(gs.selectedBldg&&hoverTile>=0){
      const ok=placeBuilding(gs.selectedBldg,hoverTile);
      if(!ok){setStatus('無法在此建造');sfx('error');}
    } else if(!gs.selectedBldg&&hoverTile>=0&&gs.tiles[hoverTile]){
      // show info about existing building
      updateRightPanel(gs.tiles[hoverTile].id);
    }
  }
  isDragging=true;dragStartX=e.clientX;dragCamX=camX;
});
canvas.addEventListener('mouseup',()=>{isDragging=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// scroll wheel
canvas.addEventListener('wheel',e=>{
  camX=Math.max(0,Math.min(camMax(),camX+e.deltaY*0.8));
  e.preventDefault();
},{passive:false});

// keyboard
window.addEventListener('keydown',e=>{
  if(e.code==='ArrowRight'||e.code==='KeyD') camX=Math.min(camMax(),camX+80);
  if(e.code==='ArrowLeft'||e.code==='KeyA')  camX=Math.max(0,camX-80);
  if(e.code==='Escape'){gs.selectedBldg=null;updateBuildPanel();canvas.style.cursor='crosshair';}
  if(e.code==='KeyR'&&gs.won) window.location.href='../space-roguelike/index.html';
});

// ── TOUCH EVENTS ──
let touchStartX=0,touchStartY=0,touchCamX0=0,touchMoved=false;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;touchCamX0=camX;touchMoved=false;
  isDragging=true;dragStartX=t.clientX;dragCamX=camX;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  if(Math.abs(t.clientX-touchStartX)>8||Math.abs(t.clientY-touchStartY)>8) touchMoved=true;
  camX=Math.max(0,Math.min(camMax(),touchCamX0-(t.clientX-touchStartX)));
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  isDragging=false;
  if(!touchMoved){
    const cx=touchStartX,cy=touchStartY;
    mouseX=cx;mouseY=cy;
    if(cx>LP_W&&cx<W-RP_W&&cy>RB_H&&cy<H-SB_H){
      hoverTile=screenToTile(cx);
      if(hoverTile>=0&&hoverTile<WORLD_TILES){
        if(gs.selectedBldg){
          const ok=placeBuilding(gs.selectedBldg,hoverTile);
          if(!ok){setStatus('無法在此建造');sfx('error');}
        } else if(gs.tiles[hoverTile]){
          updateRightPanel(gs.tiles[hoverTile].id);
        }
      }
    }
  }
},{passive:false});

// ── MAIN UPDATE ──
let lastTime2=0,uiTimer=0,eraTimer=0,_lastPopMile=0;
function update(dt){
  if(gs.paused||document.getElementById('sto').style.display!=='none') return;
  gs.gameTime+=dt;
  updateResources(dt);
  updatePopulation(dt);
  uiTimer+=dt;
  if(uiTimer>0.35){uiTimer=0;updateResourceBar();updateBuildPanel();}
  eraTimer+=dt;
  if(eraTimer>1){eraTimer=0;checkEraAdvance();document.getElementById('sera').textContent=ERAS[gs.era].name;}
  _statusTimer-=dt;
  if(_statusTimer<=0&&_statusTimer>-1){
    _statusTimer=-999;
    document.getElementById('smsg').style.color='#3a6035';
  }
}

// ── MAIN LOOP ──
function loop(timestamp){
  const dt=Math.min((timestamp-lastTime2)/1000,0.05);
  lastTime2=timestamp;
  update(dt);
  renderAll(timestamp);
  requestAnimationFrame(loop);
}

// ── BOOT ──
loadSpaceData();
showStory();
if(window.innerWidth<768){toggleLP();toggleRP();}
requestAnimationFrame(loop);

// ── SFX ──
const _SFX = {};
function _preload(name, path, vol, maxMs) {
  const a = new Audio(path); a.volume = vol; a.preload = 'auto';
  _SFX[name] = { audio: a, maxMs: maxMs || null };
}
function sfx(name) {
  const s = _SFX[name]; if (!s) return;
  try {
    const a = s.audio.cloneNode(); a.volume = s.audio.volume;
    if (s.maxMs) setTimeout(() => { a.pause(); a.currentTime = 0; }, s.maxMs);
    a.play().catch(() => {});
  } catch(e) {}
}
const _BASE = '../../assets/sfx/';
_preload('build',  _BASE+'GameSFX1/Events/Retro Event UI 01.wav',                          0.45, 250);
_preload('era',    _BASE+'GameSFX0/Ascending/Retro Ascending Short 20.wav',                 0.55, 280);
_preload('win',    _BASE+'GameSFX2/Music/Success/Retro Success Melody 01 - sawtooth lead 1.wav', 0.5);
_preload('select', _BASE+'GameSFX1/Events/Retro Event UI 13.wav',                           0.3,  150);
_preload('error',  _BASE+'GameSFX1/Events/Negative/Retro Negative Short 07.wav',            0.4,  200);
_preload('pop',    _BASE+'GameSFX3/PowerUp/Retro PowerUP 09.wav',                           0.25, 180);
</script>
