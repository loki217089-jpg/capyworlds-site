.tab-btn.active{background:#222230;color:#c8a456;border-bottom:2px solid #c8a456}
.tab-content{flex:1;overflow-y:auto;padding:8px;display:none}
.tab-content.active{display:block}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;

.inv-item.rarity-legendary{border-color:#ff8800;box-shadow:0 0 6px rgba(255,136,0,0.3)}

function calcDerived(){
  const s=state.stats;
  let atk=s.str*2, def=s.vit*1.5, spd=1+s.agi*0.05, crit=s.agi*0.5;
  let hp=50+s.vit*10+s.str*3, mp=10+s.int*5;
  let matk=s.int*2;
  // Add equipment stats
  for(const slot of SLOTS){
    const item=state.equipment[slot];
    if(!item) continue;
    const ts=itemTotalStats(item);
    atk+=(ts.atk||0); def+=(ts.def||0); spd+=(ts.spd||0);
    crit+=(ts.crit||0); hp+=(ts.hp||0); mp+=(ts.mp||0);
    matk+=(ts.matk||0);
  }
  state.heroMaxHp=Math.floor(hp);
  state.heroMaxMp=Math.floor(mp);
  state.heroHp=Math.min(state.heroHp,state.heroMaxHp);
  state.heroMp=Math.min(state.heroMp,state.heroMaxMp);
  return {atk:Math.floor(atk),def:Math.floor(def),spd:Math.min(spd,3),
          crit:Math.min(crit,50),hp:Math.floor(hp),mp:Math.floor(mp),matk:Math.floor(matk)};
}

function expForLevel(lv){ return Math.floor(20*Math.pow(lv,1.8)); }
function statCost(lv){ return Math.floor(10*Math.pow(lv,1.5)); }

function itemTotalStats(item){
  const r={};
  for(const k of ['atk','def','spd','crit','hp','mp','matk']){
    r[k]=(item.base[k]||0)*(1+item.enhLv*0.1);
    if(item.prefix&&item.prefix.stat===k) r[k]+=(item.prefixVal||0);
    if(item.suffix&&item.suffix.stat===k) r[k]+=(item.suffixVal||0);
  }
  for(const k in r) r[k]=Math.floor(r[k]);
  return r;
}

function saveGame(){
  const d={...state,equipment:{},inventory:state.inventory.map(serItem)};
  for(const s of SLOTS) if(state.equipment[s]) d.equipment[s]=serItem(state.equipment[s]);
  localStorage.setItem('pixelIdleSave',JSON.stringify(d));
  state.lastOnline=Date.now();
}

function serItem(it){
  return {slot:it.slot,baseIdx:it.baseIdx,rarity:it.rarity,enhLv:it.enhLv,
    prefixIdx:it.prefixIdx,suffixIdx:it.suffixIdx,prefixVal:it.prefixVal,suffixVal:it.suffixVal};
}

function deserItem(d){
  const base=ITEM_BASES[d.slot][d.baseIdx];
  const item={slot:d.slot,baseIdx:d.baseIdx,base:base,rarity:d.rarity,enhLv:d.enhLv||0};
  if(d.prefixIdx!=null){item.prefix=AFFIXES.prefix[d.prefixIdx];item.prefixIdx=d.prefixIdx;item.prefixVal=d.prefixVal;}
  if(d.suffixIdx!=null){item.suffix=AFFIXES.suffix[d.suffixIdx];item.suffixIdx=d.suffixIdx;item.suffixVal=d.suffixVal;}
  return item;
}

function loadGame(){
  const raw=localStorage.getItem('pixelIdleSave');
  if(!raw) return false;
  try{
    const d=JSON.parse(raw);
    state.level=d.level||1; state.exp=d.exp||0; state.gold=d.gold||0; state.materials=d.materials||0;
    state.stats=d.stats||{str:1,agi:1,int:1,vit:1};
    state.currentZone=d.currentZone||0;
    state.bossDefeated=d.bossDefeated||[];
    state.maxZoneUnlocked=d.maxZoneUnlocked||0;
    state.heroHp=d.heroHp||100; state.heroMp=d.heroMp||20;
    state.lastOnline=d.lastOnline||Date.now();
    state.equipment={};
    for(const s of SLOTS) if(d.equipment&&d.equipment[s]) state.equipment[s]=deserItem(d.equipment[s]);
    state.inventory=(d.inventory||[]).map(deserItem);
    calcDerived();
    state.heroHp=Math.min(d.heroHp||state.heroMaxHp,state.heroMaxHp);
    return true;
  }catch(e){return false;}
}

// ===== CHUNK 3: Loot Generation & Combat =====
function generateItem(slot,zoneLvl){
  const bases=ITEM_BASES[slot];
  const baseIdx=Math.floor(Math.random()*bases.length);
  const base=bases[baseIdx];
  // Rarity roll
  const roll=Math.random();
  let rarity='common';
  if(roll<0.03) rarity='legendary';
  else if(roll<0.12) rarity='rare';
  else if(roll<0.35) rarity='magic';
  const item={slot,baseIdx,base,rarity,enhLv:0};
  const lvlMult=1+zoneLvl*0.15;
  if(rarity==='magic'||rarity==='rare'||rarity==='legendary'){
    const pi=Math.floor(Math.random()*AFFIXES.prefix.length);
    item.prefix=AFFIXES.prefix[pi]; item.prefixIdx=pi;
    item.prefixVal=Math.floor((item.prefix.min+Math.random()*(item.prefix.max-item.prefix.min))*lvlMult);
  }
  if(rarity==='rare'||rarity==='legendary'){
    const si=Math.floor(Math.random()*AFFIXES.suffix.length);
    item.suffix=AFFIXES.suffix[si]; item.suffixIdx=si;
    item.suffixVal=Math.floor((item.suffix.min+Math.random()*(item.suffix.max-item.suffix.min))*lvlMult);
  }
  if(rarity==='legendary'){
    item.prefixVal=Math.floor(item.prefixVal*1.5);
    item.suffixVal=Math.floor(item.suffixVal*1.5);
  }
  return item;
}

function itemDisplayName(item){
  let n='';
  if(item.prefix) n+=item.prefix.name[lang]+' ';
  n+=item.base.name[lang];
  if(item.suffix) n+=' '+item.suffix.name[lang];
  if(item.enhLv>0) n+=' +'+item.enhLv;
  return n;
}

function itemRarityColor(r){
  return r==='legendary'?'#ff8800':r==='rare'?'#ffcc00':r==='magic'?'#4488ff':'#ccc';
}

// Combat state
let currentMonster=null, monsterHp=0, monsterMaxHp=0;
let combatTimer=0, heroAttackCD=0;
let isBossFight=false;
const floatingTexts=[];
const particles=[];

function spawnMonster(){
  const zone=ZONES[state.currentZone];
  if(!zone) return;
  const mid=zone.monsters[Math.floor(Math.random()*zone.monsters.length)];
  const md=MONSTER_DATA[mid];
  const scale=1+state.currentZone*0.3;
  currentMonster={...md,id:mid};
  monsterMaxHp=Math.floor(md.hp*scale);
  monsterHp=monsterMaxHp;
  isBossFight=false;
}

function spawnBoss(){
  const zone=ZONES[state.currentZone];
  if(!zone||!zone.boss) return;
  const b=zone.boss;
  currentMonster={emoji:b.emoji,name:b.name,atk:b.atk,def:b.def,exp:b.exp,gold:b.gold,isBoss:true};
  monsterMaxHp=b.hp;
  monsterHp=b.hp;
  isBossFight=true;
}

function doCombat(dt){
  if(!currentMonster||paused) return;
  const derived=calcDerived();
  heroAttackCD-=dt;
  if(heroAttackCD<=0){
    heroAttackCD=1/derived.spd;
    // Hero attacks monster
    let dmg=Math.max(1,derived.atk-(currentMonster.def||0));
    let isCrit=Math.random()*100<derived.crit;
    if(isCrit) dmg=Math.floor(dmg*1.8);
    dmg+=Math.floor(derived.matk*0.5);
    monsterHp-=dmg;
    addFloatingText(GW*0.65,GH*0.38,isCrit?dmg+'!':'-'+dmg,isCrit?'#ffcc00':'#fff');
    addParticles(GW*0.65,GH*0.45,isCrit?8:4,isCrit?'#ffcc00':'#ff6644');
    if(monsterHp<=0){
      // Monster defeated
      const goldGain=currentMonster.gold+Math.floor(Math.random()*currentMonster.gold*0.5);
      const expGain=currentMonster.exp;
      state.gold+=goldGain;
      state.exp+=expGain;
      addFloatingText(GW*0.5,GH*0.25,'+'+goldGain+'g','#ffd700');
      addFloatingText(GW*0.5,GH*0.2,'+'+expGain+'xp','#88ff88');
      // Loot drop
      if(Math.random()<(isBossFight?0.8:0.15)){
        const slot=SLOTS[Math.floor(Math.random()*SLOTS.length)];
        const item=generateItem(slot,ZONES[state.currentZone].lvl);
        if(state.inventory.length<MAX_INV){
          state.inventory.push(item);
          addFloatingText(GW*0.5,GH*0.15,item.base.emoji,itemRarityColor(item.rarity));
        }
      }
      // Check level up
      while(state.exp>=expForLevel(state.level)){
        state.exp-=expForLevel(state.level);
        state.level++;
        state.heroHp=state.heroMaxHp;
        state.heroMp=state.heroMaxMp;
        addFloatingText(GW*0.5,GH*0.1,'LEVEL UP!','#ffd700');
        addParticles(GW*0.35,GH*0.45,20,'#ffd700');
      }
      // Boss check
      if(isBossFight){
        if(!state.bossDefeated.includes(state.currentZone)){
          state.bossDefeated.push(state.currentZone);
          if(state.currentZone+1<ZONES.length) state.maxZoneUnlocked=Math.max(state.maxZoneUnlocked,state.currentZone+1);
        }
        isBossFight=false;
      }
      // Spawn next
      combatTimer=0.8;
      currentMonster=null;
      return;
    }
  }
  // Monster attacks hero
  combatTimer-=dt;
  if(combatTimer<=0&&currentMonster){
    combatTimer=1.2;
    let mDmg=Math.max(1,(currentMonster.atk||3)-Math.floor(derived.def*0.5));
    state.heroHp-=mDmg;
    addFloatingText(GW*0.35,GH*0.38,'-'+mDmg,'#ff4444');
    if(state.heroHp<=0){
      // Hero dies - respawn with half hp, go back if possible
      state.heroHp=Math.floor(state.heroMaxHp*0.5);
      currentMonster=null;
      combatTimer=2;
      if(isBossFight) isBossFight=false;
    }
  }
}

function addFloatingText(x,y,text,color){
  floatingTexts.push({x,y,text,color,life:1.2,maxLife:1.2});
}

function addParticles(x,y,count,color){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*60,vy:-Math.random()*40-20,
      life:0.5+Math.random()*0.3,maxLife:0.8,color,size:2+Math.random()*2});
  }
}

// ===== CHUNK 4: Canvas Rendering =====
const HERO_COLORS={
  skin:'#f5c6a0',hair:'#8b4513',eye:'#333',
  bodyDefault:'#5566aa',legsDefault:'#4455aa',bootsDefault:'#664422'
};

function getEquipColor(slot){
  const item=state.equipment[slot];
  if(!item) return null;
  const rc=item.rarity;
  if(rc==='legendary') return '#ff8800';
  if(rc==='rare') return '#ddaa00';
  if(rc==='magic') return '#4488cc';
  return '#888888';
}

function drawPixelHero(cx,cy,scale,frame){
  const s=scale;
  ctx.save();
  ctx.translate(cx,cy);
  if(heroDir<0) ctx.scale(-1,1);
  // Walk bob
  const bob=Math.sin(frame*6)*2*s;
  const legPhase=Math.sin(frame*6);

  // Feet/Boots
  const feetCol=getEquipColor('feet')||HERO_COLORS.bootsDefault;
  ctx.fillStyle=feetCol;
  ctx.fillRect(-6*s,14*s+bob,4*s,4*s);
  ctx.fillRect(2*s,14*s-bob,4*s,4*s);

  // Legs
  const legsCol=getEquipColor('legs')||HERO_COLORS.legsDefault;
  ctx.fillStyle=legsCol;
  ctx.fillRect(-5*s,8*s+bob,4*s,7*s);
  ctx.fillRect(1*s,8*s-bob,4*s,7*s);

  // Waist
  const waistCol=getEquipColor('waist');
  if(waistCol){
    ctx.fillStyle=waistCol;
    ctx.fillRect(-6*s,7*s,12*s,2*s);
  }

  // Chest/Body
  const chestCol=getEquipColor('chest')||HERO_COLORS.bodyDefault;
  ctx.fillStyle=chestCol;
  ctx.fillRect(-6*s,-2*s,12*s,10*s);

  // Shoulder
  const shCol=getEquipColor('shoulder');
  if(shCol){
    ctx.fillStyle=shCol;
    ctx.fillRect(-9*s,-3*s,5*s,5*s);
    ctx.fillRect(4*s,-3*s,5*s,5*s);
  }

  // Neck
  const neckCol=getEquipColor('neck');
  ctx.fillStyle=HERO_COLORS.skin;
  ctx.fillRect(-3*s,-5*s,6*s,4*s);
  if(neckCol){
    ctx.fillStyle=neckCol;
    ctx.fillRect(-2*s,-3*s,4*s,2*s);
  }

  // Head
  ctx.fillStyle=HERO_COLORS.skin;
  ctx.fillRect(-5*s,-13*s,10*s,9*s);
  // Hair
  ctx.fillStyle=HERO_COLORS.hair;
  ctx.fillRect(-5*s,-14*s,10*s,3*s);
  ctx.fillRect(-6*s,-12*s,2*s,5*s);
  // Eye
  ctx.fillStyle=HERO_COLORS.eye;
  ctx.fillRect(1*s,-10*s,2*s,2*s);

  // Helmet
  const headCol=getEquipColor('head');
  if(headCol){
    ctx.fillStyle=headCol;
    ctx.fillRect(-6*s,-15*s,12*s,4*s);
    ctx.fillRect(-7*s,-13*s,2*s,3*s);
    ctx.fillRect(5*s,-13*s,2*s,3*s);
  }

  // Hands/Gloves
  const handCol=getEquipColor('hands')||HERO_COLORS.skin;
  ctx.fillStyle=handCol;
  ctx.fillRect(-8*s,3*s+Math.sin(frame*6+1)*s,3*s,4*s);
  ctx.fillRect(5*s,3*s-Math.sin(frame*6+1)*s,3*s,4*s);

  // Main Hand weapon
  const mh=state.equipment.mainHand;
  if(mh){
    ctx.fillStyle=getEquipColor('mainHand')||'#aaa';
    const wy=1*s+Math.sin(frame*6+1)*s;
    ctx.fillRect(7*s,wy-8*s,2*s,14*s);
    ctx.fillStyle='#ddd';
    ctx.fillRect(7*s,wy-10*s,2*s,3*s);
  }

  // Off Hand
  const oh=state.equipment.offHand;
  if(oh){
    const oCol=getEquipColor('offHand')||'#aaa';
    ctx.fillStyle=oCol;
    if(oh.base.sprite==='orb'){
      ctx.beginPath();
      ctx.arc(-9*s,4*s,3*s,0,Math.PI*2);
      ctx.fill();
    }else{
      ctx.fillRect(-12*s,-2*s,4*s,10*s);
    }
  }

  // Legendary glow
  for(const sl of SLOTS){
    if(state.equipment[sl]&&state.equipment[sl].rarity==='legendary'){
      ctx.globalAlpha=0.15+Math.sin(frame*3)*0.1;
      ctx.fillStyle='#ff8800';
      ctx.fillRect(-10*s,-16*s,20*s,34*s);
      ctx.globalAlpha=1;
      break;
    }
  }

  ctx.restore();
}

function drawBackground(dt){
  const zone=ZONES[state.currentZone]||ZONES[0];
  bgScrollX+=(heroDir*30*dt);
  // Sky
  ctx.fillStyle=zone.bg;
  ctx.fillRect(0,0,GW,GH);
  // Stars/particles in bg
  ctx.fillStyle='rgba(255,255,255,0.15)';
  for(let i=0;i<15;i++){
    const sx=((i*97+bgScrollX*0.1)%GW+GW)%GW;
    const sy=20+((i*53)%120);
    ctx.fillRect(sx,sy,1,1);
  }
  // Mountains
  ctx.fillStyle='rgba(0,0,0,0.2)';
  for(let i=0;i<3;i++){
    const mx=((i*200-bgScrollX*0.2)%700+700)%700-50;
    drawTriangle(mx,GH*0.55,120,60);
  }
  // Trees/objects
  ctx.fillStyle='rgba(0,0,0,0.15)';
  for(let i=0;i<6;i++){
    const tx=((i*110-bgScrollX*0.5)%600+600)%600-30;
    ctx.fillRect(tx+8,GH*0.52,4,20);
    ctx.beginPath();
    ctx.arc(tx+10,GH*0.5,12,0,Math.PI*2);
    ctx.fill();
  }
  // Ground
  ctx.fillStyle=zone.ground;
  ctx.fillRect(0,GH*0.7,GW,GH*0.3);
  // Ground detail
  ctx.fillStyle='rgba(0,0,0,0.1)';
  for(let i=0;i<20;i++){
    const gx=((i*50-bgScrollX)%GW+GW)%GW;
    ctx.fillRect(gx,GH*0.72,8,2);
  }
}

function drawTriangle(x,y,w,h){
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x+w/2,y-h);
  ctx.lineTo(x+w,y);
  ctx.closePath();
  ctx.fill();
}

function drawMonster(frame){
  if(!currentMonster) return;
  const mx=GW*0.68,my=GH*0.52;
  const bob=Math.sin(frame*4)*3;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(mx,GH*0.68,16,4,0,0,Math.PI*2);
  ctx.fill();
  // Monster emoji
  ctx.font='bold 28px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(currentMonster.emoji,mx,my+bob);
  // HP bar
  const barW=40,barH=4;
  const hpRatio=monsterHp/monsterMaxHp;
  ctx.fillStyle='#333';
  ctx.fillRect(mx-barW/2,my-28,barW,barH);
  ctx.fillStyle=hpRatio>0.5?'#44cc44':hpRatio>0.25?'#cccc44':'#cc4444';
  ctx.fillRect(mx-barW/2,my-28,barW*hpRatio,barH);
  // Name
  ctx.font='9px sans-serif';
  ctx.fillStyle='#ccc';
  ctx.fillText(currentMonster.name[lang]||currentMonster.name.en,mx,my-32);
  if(isBossFight){
    ctx.fillStyle='#ff4444';
    ctx.font='bold 8px sans-serif';
    ctx.fillText('BOSS',mx,my-40);
  }
}

function drawHUD(){
  const derived=calcDerived();
  ctx.textAlign='left';
  // HP bar
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(8,8,100,10);

  ctx.fillRect(8,8,100*(state.heroHp/state.heroMaxHp),10);
  ctx.font='bold 9px sans-serif';

  ctx.fillText(T().hp+' '+state.heroHp+'/'+state.heroMaxHp,10,16);

  ctx.fillRect(8,30,80*(state.exp/expNeeded),6);
  ctx.font='8px sans-serif';

  ctx.fillStyle='#aaa';
  ctx.font='9px sans-serif';
  const zn=ZONES[state.currentZone];
  ctx.fillText(zn.name[lang]||zn.name.en,GW-8,28);
  // Materials
  ctx.fillStyle='#88aaff';
  ctx.font='9px sans-serif';

function drawFloatingTexts(dt){
  ctx.textAlign='center';
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft=floatingTexts[i];
    ft.life-=dt;
    ft.y-=30*dt;
    if(ft.life<=0){floatingTexts.splice(i,1);continue;}
    ctx.globalAlpha=ft.life/ft.maxLife;
    ctx.font='bold 12px sans-serif';
    ctx.fillStyle=ft.color;
    ctx.fillText(ft.text,ft.x,ft.y);
  }
  ctx.globalAlpha=1;
}

function drawParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=80*dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

// ===== CHUNK 5: UI Panels =====
function buildTabs(){
  const tabs=[
    {id:'stats',icon:'📊',label:()=>T().stats},
    {id:'equip',icon:'👕',label:()=>T().equip},
    {id:'inv',icon:'🎒',label:()=>T().inv},
    {id:'map',icon:'🗺️',label:()=>T().map},
  ];
  const bar=document.getElementById('tab-bar');
  bar.innerHTML='';
  tabs.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===0?' active':'');
    btn.textContent=t.icon+' '+t.label();
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-'+t.id).classList.add('active');
      refreshPanel(t.id);
    });
    bar.appendChild(btn);
  });
}

function refreshPanel(id){
  if(id==='stats') renderStats();
  else if(id==='equip') renderEquip();
  else if(id==='inv') renderInventory();
  else if(id==='map') renderMap();
}

function renderStats(){
  const el=document.getElementById('tab-stats');
  const derived=calcDerived();
  const statList=[
    {key:'str',icon:'💪'},{key:'agi',icon:'🏃'},{key:'int',icon:'🧠'},{key:'vit',icon:'❤️'}
  ];
  let h='<div style="font-size:11px;color:#888;margin-bottom:6px">'+T().hp+': '+state.heroHp+'/'+state.heroMaxHp
    +' | '+T().atk+': '+derived.atk+' | '+T().def+': '+derived.def
    +' | '+T().crit+': '+derived.crit.toFixed(1)+'%</div>';
  statList.forEach(s=>{
    const lv=state.stats[s.key];
    const cost=statCost(lv);
    const canAfford=state.gold>=cost;
    h+=`<div class="stat-row">
      <span class="stat-name">${s.icon} ${T()[s.key]}</span>
      <span class="stat-val">${T().lvl}${lv}</span>
      <span style="font-size:10px;color:#888">${T()[s.key+'Desc']}</span>
      <button class="stat-btn" ${canAfford?'':'disabled'} data-stat="${s.key}">${T().upgrade} (${cost}g)</button>
    </div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.stat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const k=btn.dataset.stat;
      const cost=statCost(state.stats[k]);
      if(state.gold>=cost){
        state.gold-=cost;
        state.stats[k]++;
        calcDerived();
        renderStats();
        saveGame();
      }
    });
  });
}

function renderEquip(){
  const el=document.getElementById('tab-equip');
  const leftSlots=['head','neck','shoulder','chest','hands'];
  const rightSlots=['mainHand','offHand','waist','legs','feet'];
  let h='<div class="equip-grid">';
  h+='<div>';
  leftSlots.forEach(s=>{
    const item=state.equipment[s];
    h+=`<div class="equip-slot" data-slot="${s}">
      <div class="slot-label">${T()[s]}</div>
      ${item?`<div class="slot-item" style="color:${itemRarityColor(item.rarity)}">${item.base.emoji} ${itemDisplayName(item)}</div>`
        :`<div class="slot-item" style="color:#555">${T().empty}</div>`}
    </div>`;
  });
  h+='</div><div class="equip-doll">🧍</div><div>';
  rightSlots.forEach(s=>{
    const item=state.equipment[s];
    h+=`<div class="equip-slot" data-slot="${s}">
      <div class="slot-label">${T()[s]}</div>
      ${item?`<div class="slot-item" style="color:${itemRarityColor(item.rarity)}">${item.base.emoji} ${itemDisplayName(item)}</div>`
        :`<div class="slot-item" style="color:#555">${T().empty}</div>`}
    </div>`;
  });
  h+='</div></div>';
  el.innerHTML=h;
  el.querySelectorAll('.equip-slot').forEach(slot=>{
    slot.addEventListener('click',()=>{
      const s=slot.dataset.slot;
      if(state.equipment[s]){
        // Unequip
        if(state.inventory.length<MAX_INV){
          state.inventory.push(state.equipment[s]);
          delete state.equipment[s];
          calcDerived();
          renderEquip();
          saveGame();
          showNotif(T().unequipped);
        }else{ showNotif(T().bagFull); }
      }
    });
  });
}

function renderInventory(){
  const el=document.getElementById('tab-inv');
  let h=`<div style="font-size:11px;color:#888;margin-bottom:4px">🎒 ${state.inventory.length}/${MAX_INV} | ${T().materials}: ${state.materials}</div>`;
  if(state.inventory.length===0){
    h+='<div style="text-align:center;color:#555;padding:20px">Empty</div>';
  }
  state.inventory.forEach((item,i)=>{
    h+=`<div class="inv-item rarity-${item.rarity}" data-idx="${i}">
      <span style="font-size:16px">${item.base.emoji}</span>
      <span style="color:${itemRarityColor(item.rarity)};font-size:10px">${itemDisplayName(item)}</span>
    </div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.inv-item').forEach(div=>{
    div.addEventListener('click',(e)=>{
      const idx=parseInt(div.dataset.idx);
      showItemActions(idx,e);
    });
  });
}

function showItemActions(idx,e){
  const item=state.inventory[idx];
  if(!item) return;
  const tt=document.getElementById('tooltip');
  const stats=itemTotalStats(item);
  let h=`<div class="tt-rarity-${item.rarity}"><div class="tt-name">${item.base.emoji} ${itemDisplayName(item)}</div></div>`;
  h+=`<div class="tt-stat">${T()[item.rarity]}</div>`;
  for(const k of ['atk','def','spd','crit','hp','mp','matk']){
    if(stats[k]) h+=`<div class="tt-stat">${k.toUpperCase()}: +${stats[k]}</div>`;
  }
  if(item.prefix) h+=`<div class="tt-affix">${item.prefix.name[lang]}: +${item.prefixVal} ${item.prefix.stat}</div>`;
  if(item.suffix) h+=`<div class="tt-affix">${item.suffix.name[lang]}: +${item.suffixVal} ${item.suffix.stat}</div>`;
  h+=`<div style="margin-top:6px;display:flex;gap:4px">`;
  h+=`<button class="stat-btn" style="font-size:11px" id="tt-equip">${T().equip2}</button>`;
  h+=`<button class="stat-btn" style="font-size:11px;background:#aa4444" id="tt-salvage">${T().salvage}</button>`;
  h+=`</div>`;
  tt.innerHTML=h;
  tt.style.display='block';
  // Position
  const rect=tt.getBoundingClientRect();
  let tx=Math.min(e.clientX,window.innerWidth-rect.width-8);
  let ty=Math.min(e.clientY-rect.height-8,window.innerHeight-rect.height-8);
  if(ty<0) ty=e.clientY+8;
  tt.style.left=tx+'px';
  tt.style.top=ty+'px';
  document.getElementById('tt-equip').addEventListener('click',()=>{
    const old=state.equipment[item.slot];
    if(old) state.inventory.push(old);
    state.equipment[item.slot]=item;
    state.inventory.splice(idx,1);
    calcDerived();
    tt.style.display='none';
    renderInventory();
    renderEquip();
    saveGame();
    showNotif(T().equipped);
  });
  document.getElementById('tt-salvage').addEventListener('click',()=>{
    const matGain=item.rarity==='legendary'?5:item.rarity==='rare'?3:item.rarity==='magic'?2:1;
    state.materials+=matGain;
    state.inventory.splice(idx,1);
    tt.style.display='none';
    renderInventory();
    saveGame();
    showNotif(T().salvaged+' +'+matGain);
  });
  // Close on outside click
  setTimeout(()=>{
    const closer=()=>{tt.style.display='none';document.removeEventListener('click',closer);};
    document.addEventListener('click',closer);
  },50);
}

function renderMap(){
  const el=document.getElementById('tab-map');
  let h='';
  ZONES.forEach((z,i)=>{
    const unlocked=i<=state.maxZoneUnlocked;
    const active=i===state.currentZone;
    const defeated=state.bossDefeated.includes(i);
    h+=`<div class="zone-card${active?' active':''}" data-zone="${i}" style="${unlocked?'':'opacity:0.4;pointer-events:none'}">
      <div class="zone-emoji">${z.emoji}</div>
      <div class="zone-info">
        <div class="zone-name">${z.name[lang]||z.name.en}${defeated?' ✅':''}</div>
        <div class="zone-desc">${z.desc[lang]||z.desc.en}</div>
        <div class="zone-lvl">${T().lvl}${z.lvl}+ ${defeated?T().defeat:''}</div>
      </div>
    </div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.zone-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const zi=parseInt(card.dataset.zone);
      if(zi<=state.maxZoneUnlocked){
        state.currentZone=zi;
        currentMonster=null;
        combatTimer=0.5;
        renderMap();
        saveGame();
      }
    });
  });
}

// ===== CHUNK 6: Notifications, Tutorial, Audio, Main Loop, Init =====
let notifText='',notifTimer=0;
function showNotif(text){notifText=text;notifTimer=1.5;}

function drawNotif(dt){
  if(notifTimer<=0) return;
  notifTimer-=dt;
  ctx.globalAlpha=Math.min(1,notifTimer*2);
  ctx.textAlign='center';
  ctx.font='bold 13px sans-serif';
  ctx.fillStyle='#000';
  ctx.fillRect(GW/2-80,GH*0.7-10,160,20);
  ctx.fillStyle='#ffd700';
  ctx.fillText(notifText,GW/2,GH*0.7+3);
  ctx.globalAlpha=1;
}

// Tutorial
function showTutorial(){
  if(localStorage.getItem('pixelIdleTut')==='1') return;
  const ov=document.getElementById('tutorial-overlay');
  ov.style.display='flex';
  let step=0;
  function renderStep(){
    const steps=T().tutSteps;
    const s=steps[step];
    ov.innerHTML=`<div class="tut-box">
      <div style="font-size:18px;font-weight:bold;color:#c8a456;margin-bottom:8px">${T().tutTitle}</div>
      <div class="tut-step">
        <div class="tut-icon">${s.icon}</div>
        <div class="tut-title">${s.title}</div>
        <div class="tut-desc">${s.desc}</div>
      </div>
      <div style="color:#666;font-size:11px">${step+1}/${steps.length}</div>
      <div class="tut-btns">
        ${step>0?'<button class="tut-skip" id="tut-prev">←</button>':''}
        ${step<steps.length-1?`<button class="tut-btn" id="tut-next">→</button>`
          :`<button class="tut-btn" id="tut-done">${T().tutStart}</button>`}
        <button class="tut-skip" id="tut-skip">${T().tutSkip}</button>
      </div>
    </div>`;
    const next=document.getElementById('tut-next');
    const prev=document.getElementById('tut-prev');
    const done=document.getElementById('tut-done');
    const skip=document.getElementById('tut-skip');
    if(next) next.addEventListener('click',()=>{step++;renderStep();});
    if(prev) prev.addEventListener('click',()=>{step--;renderStep();});
    if(done) done.addEventListener('click',closeTut);
    if(skip) skip.addEventListener('click',closeTut);
  }
  function closeTut(){
    ov.style.display='none';
    localStorage.setItem('pixelIdleTut','1');
  }
  renderStep();
}

// Audio
const AUDIO_CTX=new (window.AudioContext||window.webkitAudioContext)();
const AUDIO_BUFS={};
let audioMuted=(localStorage.getItem('pixelIdleMuted')==='1');
let bgmSource=null,bgmGain=null,bgmLoaded=false;
const BGM_URL='../../assets/Fantasy RPG Music Pack Vol.3/Loops/ogg/Action 1 Loop.ogg';

function loadAudio(name,url){
  fetch(url).then(r=>r.arrayBuffer()).then(ab=>AUDIO_CTX.decodeAudioData(ab))
    .then(buf=>{AUDIO_BUFS[name]=buf;}).catch(()=>{});
}
function playAudio(name,vol=0.7,rate=1,maxMs=0){
  if(audioMuted) return;
  const buf=AUDIO_BUFS[name]; if(!buf) return;
  if(AUDIO_CTX.state==='suspended') AUDIO_CTX.resume();
  const src=AUDIO_CTX.createBufferSource();
  src.buffer=buf;src.playbackRate.value=rate;
  const gain=AUDIO_CTX.createGain();gain.gain.value=vol;
  src.connect(gain);gain.connect(AUDIO_CTX.destination);
  src.start(0,0,maxMs>0?maxMs/1000:buf.duration);
}
function startBGM(url){
  if(bgmLoaded||audioMuted) return; bgmLoaded=true;
  fetch(url).then(r=>r.arrayBuffer()).then(ab=>AUDIO_CTX.decodeAudioData(ab)).then(buf=>{
    if(AUDIO_CTX.state==='suspended') AUDIO_CTX.resume();
    bgmSource=AUDIO_CTX.createBufferSource();
    bgmSource.buffer=buf;bgmSource.loop=true;
    bgmGain=AUDIO_CTX.createGain();bgmGain.gain.value=0.18;
    bgmSource.connect(bgmGain);bgmGain.connect(AUDIO_CTX.destination);
    bgmSource.start();
  }).catch(()=>{});
}
function toggleMute(){
  audioMuted=!audioMuted;
  if(bgmGain) bgmGain.gain.value=audioMuted?0:0.18;
  document.getElementById('mute-btn').textContent=audioMuted?'🔇':'🔊';
  localStorage.setItem('pixelIdleMuted',audioMuted?'1':'0');
  if(!audioMuted&&!bgmLoaded) startBGM(BGM_URL);
}

// Load SFX
loadAudio('hit','../../assets/sfx/GameSFX2/Impact/Retro Impact Punch 07.wav');
loadAudio('levelup','../../assets/sfx/GameSFX3/PowerUp/Retro PowerUP 09.wav');
loadAudio('pickup','../../assets/sfx/400 Sounds Pack/Items/coin_collect.wav');

// Offline progress
function processOffline(){
  const now=Date.now();
  const elapsed=(now-state.lastOnline)/1000;
  if(elapsed<60) return;
  const maxOffline=3600*8; // max 8 hours
  const secs=Math.min(elapsed,maxOffline);
  const zone=ZONES[state.currentZone];
  const derived=calcDerived();
  const dps=Math.max(1,derived.atk*derived.spd*0.5);
  const avgMonsterHp=30*(1+state.currentZone*0.5);
  const killsPerSec=dps/avgMonsterHp;
  const totalKills=Math.floor(killsPerSec*secs);
  const avgGold=5*(1+state.currentZone*2);
  const avgExp=8*(1+state.currentZone*1.5);
  const goldGain=Math.floor(totalKills*avgGold*0.6);
  const expGain=Math.floor(totalKills*avgExp*0.6);
  const itemCount=Math.floor(totalKills*0.05);
  state.gold+=goldGain;
  state.exp+=expGain;
  // Generate some items
  for(let i=0;i<Math.min(itemCount,3);i++){
    if(state.inventory.length>=MAX_INV) break;
    const slot=SLOTS[Math.floor(Math.random()*SLOTS.length)];
    state.inventory.push(generateItem(slot,zone.lvl));
  }
  while(state.exp>=expForLevel(state.level)){
    state.exp-=expForLevel(state.level);
    state.level++;
  }
  calcDerived();
  state.heroHp=state.heroMaxHp;
  // Show offline report
  if(goldGain>0||expGain>0){
    const mins=Math.floor(secs/60);
    showNotif(`${T().offlineTitle} ${mins}m → +${goldGain}g +${expGain}xp`);
  }
}

// Resize
function resizeCanvas(){
  const area=document.getElementById('game-area');
  const aw=area.clientWidth,ah=area.clientHeight;
  const scale=Math.min(aw/GW,ah/GH);
  canvas.style.width=Math.min(GW*scale,aw)+'px';
  canvas.style.height=Math.min(GH*scale,ah)+'px';
}
let resizeTimeout;
window.addEventListener('resize',()=>{clearTimeout(resizeTimeout);resizeTimeout=setTimeout(resizeCanvas,100);});

// Language
function applyLang(){
  document.getElementById('lang-btn').textContent=lang==='en'?'繁中':'EN';
  document.getElementById('back-link').textContent=T().back;
  buildTabs();
  renderStats();
}

// Controls
document.getElementById('lang-btn').addEventListener('click',()=>{
  lang=lang==='en'?'zh':'en';
  localStorage.setItem('pixelIdleLang',lang);
  applyLang();
});
document.getElementById('pause-btn').addEventListener('click',()=>{
  paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
});
document.getElementById('mute-btn').addEventListener('click',toggleMute);
document.getElementById('dir-left').addEventListener('click',()=>{heroDir=-1;});
document.getElementById('dir-right').addEventListener('click',()=>{heroDir=1;});

// Boss trigger on direction change
document.getElementById('dir-right').addEventListener('click',()=>{
  const zone=ZONES[state.currentZone];
  if(zone&&zone.boss&&!state.bossDefeated.includes(state.currentZone)&&!isBossFight){
    if(Math.random()<0.3){
      spawnBoss();
      showNotif(T().bossWarn);
    }
  }
});

// Main loop
let lastTime=0,animFrame=0;
function gameLoop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000,0.1);
  lastTime=timestamp;
  animFrame+=dt;

  if(!paused){
    // Combat
    if(!currentMonster&&combatTimer>0){
      combatTimer-=dt;
      if(combatTimer<=0) spawnMonster();
    }
    doCombat(dt);
    // Regen
    state.heroHp=Math.min(state.heroHp+dt*2,state.heroMaxHp);
    state.heroMp=Math.min(state.heroMp+dt*0.5,state.heroMaxMp);
    gameTime+=dt;
    // Auto save every 30s
    if(gameTime-lastSave>30){lastSave=gameTime;saveGame();}
  }

  // Draw
  drawBackground(paused?0:dt);
  drawPixelHero(GW*0.35,GH*0.55,2.5,paused?0:animFrame);
  drawMonster(paused?0:animFrame);
  drawHUD();
  drawFloatingTexts(dt);
  drawParticles(dt);
  drawNotif(dt);

  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,GW,GH);
    ctx.textAlign='center';
    ctx.font='bold 24px sans-serif';
    ctx.fillStyle='#ffd700';
    ctx.fillText(T().paused,GW/2,GH/2);
  }

  requestAnimationFrame(gameLoop);
}

// Init
function init(){
  const loaded=loadGame();
  calcDerived();
  if(!loaded){
    state.heroHp=state.heroMaxHp;
    state.heroMp=state.heroMaxMp;
  }else{
    processOffline();
  }
  resizeCanvas();
  applyLang();
  if(audioMuted) document.getElementById('mute-btn').textContent='🔇';
  const startOnce=()=>{startBGM(BGM_URL);document.removeEventListener('click',startOnce);document.removeEventListener('touchend',startOnce);};
  document.addEventListener('click',startOnce);document.addEventListener('touchend',startOnce);
  showTutorial();
  spawnMonster();
  requestAnimationFrame(gameLoop);
}
init();
</script>
