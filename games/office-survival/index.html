<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>社畜日常 Office Survival - CapyWorlds</title>
<style>
:root{--bg:#1a1520;--bg2:#241e2c;--accent:#ffd060;--accent2:#ff6b9d;--text:#f0e8f8;--text2:#a090b0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.top-bar{position:relative;z-index:200;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg2);border-bottom:1px solid #3a3048}
.top-bar a{color:var(--accent);text-decoration:none;font-size:14px}
.btn-group{display:flex;gap:6px}
.btn-group button{background:none;border:1px solid #3a3048;color:var(--text);padding:4px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.game-area{flex:1;overflow:hidden;min-height:0;position:relative;display:flex;align-items:center;justify-content:center}
canvas{touch-action:none;max-width:100%;max-height:100%}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../" id="back-btn">← 返回</a>
  <div class="btn-group">
    <button id="lang-btn">繁中/EN</button>
    <button id="mute-btn">🔊</button>
  </div>
</div>
<div class="game-area">
  <canvas id="game"></canvas>
</div>

<script>
// ── i18n ──
const i18n = {

    g1:'水豚當老闆',g1d:'在批公文和泡溫泉之間求生存',
    g2:'開會存活戰',g2d:'撐過無聊會議不睡著',
    g3:'排隊模擬器',g3d:'體驗台灣排隊文化的極限',
    start:'開始',back:'← 返回選單',
    // Game 1
    stress:'壓力',chill:'悠閒',stamina:'體力',
    sign:'批公文',soak:'泡溫泉',
    g1over_fired:'被董事會開除了！\n悠閒值太高...',
    g1over_burnout:'過勞倒下了！\n壓力值爆表...',
    g1over_exhaust:'累到睡著了！\n體力耗盡...',
    g1score:'撐了 {0} 秒',
    docs:'公文',hotspring:'溫泉',
    employee:'員工來了！',approve:'批准',reject:'駁回',
    // Game 2
    awake:'清醒度',suspect:'懷疑值',
    coffee:'☕咖啡',pinch:'✋掐腿',snack:'🍬零食',doodle:'✏️塗鴉',
    g2over_sleep:'你睡著了！\n被主管拍桌叫醒...',

    meetingMin:'會議時間',
    // Game 3
    patience:'耐心',position:'位置',
    g3event_cut:'大媽插隊了！',g3event_rain:'突然下雨了！',
    g3event_phone:'手機快沒電了！',g3event_slow:'前面的人在聊天不動！',
    g3event_sale:'限量快賣完了！',
    endure:'忍耐',confront:'嗆回去',umbrella:'撐傘',shelter:'躲騎樓',
    charge:'找行動電源',wait:'乾等',rush:'往前擠',stay:'乖乖等',
    g3over_rage:'你氣到離開了！\n耐心耗盡...',
    g3over_kicked:'被保全請走了！\n太激動了...',
    g3win:'排到了！！！',g3score:'等了 {0} 秒',
    queueFor:'排隊目標',
    tapToStart:'點擊開始',retry:'再來一次',
    gameover:'遊戲結束',
  },
  en: {
    title:'Office Survival',subtitle:'Choose your suffering',
    g1:'Capybara CEO',g1d:'Balance paperwork and hot springs',
    g2:'Meeting Survivor',g2d:'Stay awake in a boring meeting',
    g3:'Queue Simulator',g3d:'Experience extreme queuing culture',
    start:'Start',back:'← Back to Menu',
    stress:'Stress',chill:'Chill',stamina:'Stamina',
    sign:'Sign docs',soak:'Hot spring',
    g1over_fired:'Fired by the board!\nToo much chilling...',
    g1over_burnout:'Burnout!\nStress overload...',
    g1over_exhaust:'Fell asleep!\nNo stamina left...',
    g1score:'Survived {0}s',
    docs:'Docs',hotspring:'Hot Spring',
    employee:'Employee incoming!',approve:'Approve',reject:'Reject',
    coffee:'☕Coffee',pinch:'✋Pinch',snack:'🍬Snack',doodle:'✏️Doodle',
    g2over_sleep:'You fell asleep!\nBoss slams the table...',
    g2over_caught:'Boss caught you slacking!',
    g2boss:'Boss asks YOU a question!',
    g2answer:'Answer!',g2right:'Nailed it!',g2wrong:'Wrong... suspicion +30',
    meetingMin:'Meeting time',
    awake:'Awake',suspect:'Suspicion',
    patience:'Patience',position:'Position',
    g3event_cut:'Someone cuts in line!',g3event_rain:'Sudden rain!',
    g3event_phone:'Phone battery dying!',g3event_slow:'Person ahead won\'t move!',
    g3event_sale:'Almost sold out!',
    endure:'Endure',confront:'Confront',umbrella:'Umbrella',shelter:'Find cover',
    charge:'Power bank',wait:'Just wait',rush:'Push forward',stay:'Stay put',
    g3over_rage:'You rage quit!\nNo patience left...',
    g3over_kicked:'Security kicked you out!',
    g3win:'You made it!!!',g3score:'Waited {0}s',
    queueFor:'Queuing for',
    tapToStart:'Tap to start',retry:'Try again',
    gameover:'Game Over',
  }
};
let lang = localStorage.getItem('officeLang')||'zh';
function t(k){return i18n[lang][k]||k}

// ── Canvas setup ──
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 400, GH = 700;
canvas.width = GW; canvas.height = GH;

function resizeCanvas(){
  const area = document.querySelector('.game-area');
  const aw = area.clientWidth, ah = area.clientHeight;
  const scale = Math.min(aw/GW, ah/GH);
  const w = Math.min(GW*scale, aw), h = Math.min(GH*scale, ah);
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Audio ──
const AUDIO_CTX = new (window.AudioContext||window.webkitAudioContext)();
let audioMuted = localStorage.getItem('officeMuted')==='1';
if(audioMuted) document.getElementById('mute-btn').textContent='🔇';

function beep(freq=440,dur=0.08,vol=0.3){
  if(audioMuted)return;
  if(AUDIO_CTX.state==='suspended')AUDIO_CTX.resume();
  const o=AUDIO_CTX.createOscillator(),g=AUDIO_CTX.createGain();
  o.frequency.value=freq;o.type='square';
  g.gain.value=vol;g.gain.linearRampToValueAtTime(0,AUDIO_CTX.currentTime+dur);
  o.connect(g);g.connect(AUDIO_CTX.destination);
  o.start();o.stop(AUDIO_CTX.currentTime+dur);
}
function toggleMute(){
  audioMuted=!audioMuted;
  document.getElementById('mute-btn').textContent=audioMuted?'🔇':'🔊';
  localStorage.setItem('officeMuted',audioMuted?'1':'0');
}
document.getElementById('mute-btn').addEventListener('click',toggleMute);
document.getElementById('mute-btn').addEventListener('touchend',function(e){e.preventDefault();toggleMute();});

// ── Lang toggle ──
document.getElementById('lang-btn').addEventListener('click',()=>{
  lang=lang==='zh'?'en':'zh';
  localStorage.setItem('officeLang',lang);
  if(gameState==='menu') drawMenu();
});

// ── Touch/Click helpers ──
function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-r.left)/r.width*GW, y:(cy-r.top)/r.height*GH};
}
let buttons=[];
function addBtn(x,y,w,h,label,cb,color='#ffd060'){
  buttons.push({x,y,w,h,label,cb,color});
}
function drawButtons(){
  buttons.forEach(b=>{
    // rounded rect with arcTo
    const r=8;
    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.moveTo(b.x+r,b.y);
    ctx.arcTo(b.x+b.w,b.y,b.x+b.w,b.y+b.h,r);
    ctx.arcTo(b.x+b.w,b.y+b.h,b.x,b.y+b.h,r);
    ctx.arcTo(b.x,b.y+b.h,b.x,b.y,r);
    ctx.arcTo(b.x,b.y,b.x+b.w,b.y,r);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#1a1520';
    ctx.font='bold 15px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.label,b.x+b.w/2,b.y+b.h/2,b.w-10);
  });
}
function handleClick(e){
  e.preventDefault();
  const p=getCanvasPos(e);
  for(const b of buttons){
    if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
      beep(600,0.06);
      b.cb();
      return;
    }
  }
}
canvas.addEventListener('click',handleClick);
canvas.addEventListener('touchend',function(e){e.preventDefault();handleClick(e);});

// ── Game state ──
let gameState='menu'; // menu, game1, game2, game3
let animFrame=null;
let gameData={};

// ── Draw helpers ──
function drawBar(x,y,w,h,val,max,color,label){
  ctx.fillStyle='#2a2030';
  ctx.beginPath();ctx.moveTo(x+4,y);ctx.arcTo(x+w,y,x+w,y+h,4);ctx.arcTo(x+w,y+h,x,y+h,4);ctx.arcTo(x,y+h,x,y,4);ctx.arcTo(x,y,x+w,y,4);ctx.closePath();ctx.fill();
  const fw=Math.max(0,Math.min(1,val/max))*w;
  ctx.fillStyle=color;
  if(fw>0){ctx.beginPath();ctx.moveTo(x+4,y);ctx.arcTo(x+fw,y,x+fw,y+h,4);ctx.arcTo(x+fw,y+h,x,y+h,4);ctx.arcTo(x,y+h,x,y,4);ctx.arcTo(x,y,x+fw,y,4);ctx.closePath();ctx.fill();}
  ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(label+': '+Math.round(val),x+6,y+h/2);
}

// ── MENU ──
function drawMenu(){
  buttons=[];
  ctx.fillStyle=var_bg();ctx.fillRect(0,0,GW,GH);
  // Title
  ctx.fillStyle='#ffd060';ctx.font='bold 32px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('title'),GW/2,80);
  ctx.fillStyle='#a090b0';ctx.font='16px sans-serif';
  ctx.fillText(t('subtitle'),GW/2,115);

  // Capybara emoji
  ctx.font='60px sans-serif';
  ctx.fillText('🦫',GW/2,190);

  // Game cards
  const cards=[
    {emoji:'🦫',key:'g1',color:'#ffd060',y:250},
    {emoji:'💤',key:'g2',color:'#60d0ff',y:390},
    {emoji:'🧍',key:'g3',color:'#ff6b9d',y:530},
  ];
  cards.forEach(c=>{
    ctx.fillStyle=c.color+'22';
    ctx.beginPath();const bx=30,by=c.y,bw=GW-60,bh=110,r=12;
    ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);ctx.closePath();ctx.fill();
    ctx.strokeStyle=c.color+'66';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='36px sans-serif';ctx.textAlign='left';
    ctx.fillText(c.emoji,50,c.y+45);
    ctx.fillStyle=c.color;ctx.font='bold 20px sans-serif';
    ctx.fillText(t(c.key),100,c.y+40);
    ctx.fillStyle='#a090b0';ctx.font='13px sans-serif';
    ctx.fillText(t(c.key+'d'),100,c.y+65,240);
    addBtn(GW-140,c.y+70,100,30,t('start'),()=>startGame(c.key),c.color);
  });
  drawButtons();
}
function var_bg(){return '#1a1520';}

function startGame(key){
  gameData={startTime:Date.now()};
  if(key==='g1') startGame1();
  else if(key==='g2') startGame2();
  else if(key==='g3') startGame3();
}

</script>
<script>
// ══════════════════════════════════════
// GAME 1: 水豚當老闆 Capybara CEO
// ══════════════════════════════════════
function startGame1(){
  gameState='game1';
  const d=gameData;
  d.stress=30; d.chill=30; d.stamina=80;
  d.scene='office'; // office or spring
  d.eventTimer=0; d.eventActive=false; d.eventType=null;
  d.capyY=0; d.capyBob=0;
  d.particles=[];
  d.elapsed=0;
  d.difficulty=1;
  d.msg=''; d.msgTimer=0;
  if(animFrame) cancelAnimationFrame(animFrame);
  d.lastTime=Date.now();
  loopGame1();
}

function loopGame1(){
  const d=gameData;
  const now=Date.now();
  const dt=(now-d.lastTime)/1000;
  d.lastTime=now;
  d.elapsed+=dt;
  d.difficulty=1+d.elapsed/60;

  // Passive changes
  if(d.scene==='office'){
    d.stress+=8*d.difficulty*dt;
    d.chill-=3*dt;
    d.stamina-=2*dt;
  } else {
    d.stress-=12*dt;
    d.chill+=10*d.difficulty*dt;
    d.stamina+=5*dt;
  }
  d.stress=Math.max(0,Math.min(100,d.stress));
  d.chill=Math.max(0,Math.min(100,d.chill));
  d.stamina=Math.max(0,Math.min(100,d.stamina));

  // Random employee event
  d.eventTimer+=dt;
  if(!d.eventActive && d.eventTimer>4+Math.random()*4){
    d.eventTimer=0;
    d.eventActive=true;
    d.eventType='employee';
    beep(800,0.1);
  }
  if(d.msgTimer>0) d.msgTimer-=dt;

  // Check game over
  let overMsg=null;
  if(d.chill>=100) overMsg=t('g1over_fired');
  else if(d.stress>=100) overMsg=t('g1over_burnout');
  else if(d.stamina<=0) overMsg=t('g1over_exhaust');

  // Draw
  buttons=[];
  ctx.fillStyle=d.scene==='office'?'#1e1a28':'#1a2820';
  ctx.fillRect(0,0,GW,GH);

  // Scene art
  d.capyBob+=dt*2;
  const bobY=Math.sin(d.capyBob)*4;
  if(d.scene==='office'){
    // Desk
    ctx.fillStyle='#3a3048';ctx.fillRect(100,280,200,20);
    ctx.fillStyle='#2a2038';ctx.fillRect(120,300,160,60);
    // Paper stacks
    for(let i=0;i<3;i++){ctx.fillStyle='#e8e0d0';ctx.fillRect(130+i*50,260-i*5,40,20+i*5);}
    // Capybara at desk
    ctx.font='50px sans-serif';ctx.textAlign='center';
    ctx.fillText('🦫',200,260+bobY);
    // Thought bubble
    if(d.stress>60){ctx.font='20px sans-serif';ctx.fillText('😰',260,210+bobY);}
    ctx.font='16px sans-serif';ctx.fillText('💼',160,220);
  } else {
    // Hot spring
    ctx.fillStyle='#2a4848';ctx.fillRect(80,300,240,100);
    ctx.fillStyle='#3a6868';ctx.fillRect(90,310,220,80);
    // Steam
    for(let i=0;i<5;i++){
      const sx=120+i*40,sy=280-Math.sin(d.capyBob+i)*15;
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='18px sans-serif';
      ctx.fillText('♨',sx,sy);
    }
    // Capybara in spring
    ctx.font='50px sans-serif';ctx.textAlign='center';
    ctx.fillText('🦫',200,330+bobY);
    ctx.font='20px sans-serif';ctx.fillText('😌',200,290+bobY);
  }

  // Particles
  d.particles=d.particles.filter(p=>{
    p.y-=40*dt;p.life-=dt;p.x+=Math.sin(p.y/10)*0.5;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font='16px sans-serif';
    ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1;
    return true;
  });

  // HUD bars
  drawBar(20,20,170,22,d.stress,100,'#ff4466',t('stress'));
  drawBar(210,20,170,22,d.chill,100,'#66bbff',t('chill'));
  drawBar(115,50,170,22,d.stamina,100,'#66ff88',t('stamina'));

  // Time
  ctx.fillStyle='#a090b0';ctx.font='13px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('g1score').replace('{0}',Math.floor(d.elapsed)),GW/2,90);

  // Message
  if(d.msgTimer>0){
    ctx.fillStyle='#ffd060';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.msg,GW/2,130);
  }

  // Event popup
  if(d.eventActive){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,420,GW,120);
    ctx.fillStyle='#ffd060';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
    ctx.fillText(t('employee')+' 📄',GW/2,450);
    ctx.font='13px sans-serif';ctx.fillStyle='#ccc';
    ctx.fillText(lang==='zh'?'批准降壓力+10，駁回加壓力+15但省體力':'Approve:-10 stress, Reject:+15 stress but save stamina',GW/2,475);
    addBtn(80,490,110,35,t('approve'),()=>{
      d.eventActive=false;d.stress-=10;d.stamina-=5;
      d.msg=lang==='zh'?'✅ 已批准':'✅ Approved';d.msgTimer=1.5;
      d.particles.push({x:200,y:400,text:'✅',color:'#66ff88',life:1});
      beep(500,0.1);
    },'#66ff88');
    addBtn(210,490,110,35,t('reject'),()=>{
      d.eventActive=false;d.stress+=15;
      d.msg=lang==='zh'?'❌ 已駁回':'❌ Rejected';d.msgTimer=1.5;
      d.particles.push({x:200,y:400,text:'❌',color:'#ff6666',life:1});
      beep(300,0.1);
    },'#ff6666');
  }

  // Action buttons
  if(!d.eventActive && !overMsg){
    if(d.scene==='office'){
      addBtn(GW/2-130,GH-100,120,45,t('soak')+' ♨',()=>{
        d.scene='spring';beep(400,0.15,0.2);
        d.particles.push({x:200,y:350,text:'♨',color:'#88ddff',life:1.5});
      },'#60d0ff');
      addBtn(GW/2+10,GH-100,120,45,t('sign')+' ✍',()=>{
        d.stress-=8;d.stamina-=5;
        d.msg=lang==='zh'?'📝 簽了一份公文':'📝 Signed a document';d.msgTimer=1;
        d.particles.push({x:200,y:250,text:'📝',color:'#ffd060',life:1});
        beep(600,0.05);
      },'#ffd060');
    } else {
      addBtn(GW/2-130,GH-100,120,45,t('sign')+' 💼',()=>{
        d.scene='office';beep(500,0.1);
      },'#ffd060');
      addBtn(GW/2+10,GH-100,120,45,t('soak')+' 😌',()=>{
        d.chill+=5;d.stamina+=3;
        d.msg=lang==='zh'?'啊～好舒服～':'Ahhh~ so relaxing~';d.msgTimer=1;
        d.particles.push({x:200,y:300,text:'💆',color:'#88ddff',life:1});
        beep(300,0.15,0.15);
      },'#60d0ff');
    }
  }

  // Back button
  addBtn(10,GH-40,100,30,t('back'),()=>{gameState='menu';cancelAnimationFrame(animFrame);drawMenu();},'#555');

  drawButtons();

  if(overMsg){
    drawGameOver(overMsg,t('g1score').replace('{0}',Math.floor(d.elapsed)));
    return;
  }
  animFrame=requestAnimationFrame(loopGame1);
}
</script>
<script>
// ══════════════════════════════════════
// GAME 2: 開會存活戰 Meeting Survivor
// ══════════════════════════════════════
function startGame2(){
  gameState='game2';
  const d=gameData;
  d.awake=80; d.suspect=0; d.elapsed=0;
  d.difficulty=1;
  d.bossEvent=false; d.bossTimer=0;
  d.cooldowns={coffee:0,pinch:0,snack:0,doodle:0};
  d.eyeOpen=1; d.headTilt=0;
  d.particles=[];
  d.msg=''; d.msgTimer=0;
  d.zzz=[]; // floating Z's
  if(animFrame) cancelAnimationFrame(animFrame);
  d.lastTime=Date.now();
  loopGame2();
}

function loopGame2(){
  const d=gameData;
  const now=Date.now();
  const dt=(now-d.lastTime)/1000;
  d.lastTime=now;
  d.elapsed+=dt;
  d.difficulty=1+d.elapsed/30;

  // Passive drain
  d.awake-=4*d.difficulty*dt;
  if(d.suspect>0) d.suspect-=1*dt;
  d.awake=Math.max(0,Math.min(100,d.awake));
  d.suspect=Math.max(0,Math.min(100,d.suspect));

  // Cooldowns
  for(const k in d.cooldowns) if(d.cooldowns[k]>0) d.cooldowns[k]-=dt;

  // Random boss quiz
  d.bossTimer+=dt;
  if(!d.bossEvent && d.bossTimer>15+Math.random()*15){
    d.bossTimer=0;
    d.bossEvent=true;
    d.bossAnswer=null;
    beep(900,0.15);
  }

  // Floating Z's when sleepy
  if(d.awake<40 && Math.random()<0.03){
    d.zzz.push({x:180+Math.random()*40, y:280, life:2});
  }

  if(d.msgTimer>0) d.msgTimer-=dt;

  // Game over check
  let overMsg=null;
  if(d.awake<=0) overMsg=t('g2over_sleep');
  else if(d.suspect>=100) overMsg=t('g2over_caught');

  // Draw
  buttons=[];
  ctx.fillStyle='#1a1828';ctx.fillRect(0,0,GW,GH);

  // Meeting room
  ctx.fillStyle='#2a2838';ctx.fillRect(40,200,320,180); // table
  ctx.fillStyle='#3a3848';ctx.fillRect(50,210,300,160);
  // Whiteboard
  ctx.fillStyle='#ddd';ctx.fillRect(120,120,160,70);
  ctx.fillStyle='#333';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('Q3 KPI Review',200,155);
  ctx.fillText('█████ ████ ███',200,175);

  // Boss at top
  ctx.font='35px sans-serif';ctx.textAlign='center';
  ctx.fillText('👔',200,115);

  // Colleagues
  ctx.font='25px sans-serif';
  ctx.fillText('👩‍💼',80,250);ctx.fillText('👨‍💻',320,250);
  ctx.fillText('🧑‍💼',80,340);ctx.fillText('👩‍💻',320,340);

  // Player capybara
  const sleepLevel=1-d.awake/100;
  d.headTilt=Math.sin(d.elapsed*0.5)*sleepLevel*15;
  ctx.save();
  ctx.translate(200,320);
  ctx.rotate(d.headTilt*Math.PI/180);
  ctx.font='45px sans-serif';ctx.textAlign='center';
  ctx.fillText('🦫',0,0);
  if(d.awake<30){ctx.font='18px sans-serif';ctx.fillText('😴',25,-30);}
  else if(d.awake<60){ctx.font='18px sans-serif';ctx.fillText('😪',25,-30);}
  ctx.restore();

  // Floating Z's
  d.zzz=d.zzz.filter(z=>{
    z.y-=20*dt;z.life-=dt;
    if(z.life<=0)return false;
    ctx.globalAlpha=z.life/2;ctx.fillStyle='#aaa';ctx.font='16px sans-serif';
    ctx.fillText('Z',z.x,z.y);ctx.globalAlpha=1;
    return true;
  });

  // Particles
  d.particles=d.particles.filter(p=>{
    p.y-=30*dt;p.life-=dt;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font='20px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1;
    return true;
  });

  // HUD
  drawBar(20,20,170,22,d.awake,100,'#66ddff',t('awake'));
  drawBar(210,20,170,22,d.suspect,100,'#ff6666',t('suspect'));
  ctx.fillStyle='#a090b0';ctx.font='13px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('meetingMin')+': '+Math.floor(d.elapsed)+'s',GW/2,60);

  // Message
  if(d.msgTimer>0){
    ctx.fillStyle='#ffd060';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.msg,GW/2,85);
  }

  // Boss event
  if(d.bossEvent && !overMsg){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,400,GW,140);
    ctx.fillStyle='#ff6b6b';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
    ctx.fillText(t('g2boss')+' 😱',GW/2,430);
    addBtn(GW/2-60,450,120,40,t('g2answer'),()=>{
      const success=d.awake>30 && Math.random()<(d.awake/100);
      if(success){
        d.msg=t('g2right');d.suspect-=10;d.awake+=10;
        d.particles.push({x:200,y:380,text:'🎉',color:'#ffd060',life:1.5});
        beep(600,0.1);
      } else {
        d.msg=t('g2wrong');d.suspect+=30;
        d.particles.push({x:200,y:380,text:'💀',color:'#ff4444',life:1.5});
        beep(200,0.2);
      }
      d.msgTimer=2;d.bossEvent=false;
    },'#ff6b9d');
  }

  // Action buttons (bottom)
  if(!d.bossEvent && !overMsg){
    const acts=[
      {key:'coffee',label:t('coffee'),aw:20,sus:5,cd:6,color:'#8B4513'},
      {key:'pinch',label:t('pinch'),aw:12,sus:2,cd:3,color:'#ff6b6b'},
      {key:'snack',label:t('snack'),aw:8,sus:15,cd:8,color:'#ffaa44'},
      {key:'doodle',label:t('doodle'),aw:5,sus:8,cd:4,color:'#66bbff'},
    ];
    const bw=85,gap=6,startX=(GW-acts.length*(bw+gap)+gap)/2;
    acts.forEach((a,i)=>{
      const bx=startX+i*(bw+gap);
      const onCd=d.cooldowns[a.key]>0;
      addBtn(bx,GH-90,bw,50,a.label,()=>{
        if(onCd)return;
        d.awake=Math.min(100,d.awake+a.aw);
        d.suspect=Math.min(100,d.suspect+a.sus);
        d.cooldowns[a.key]=a.cd;
        d.particles.push({x:200,y:300,text:a.label.slice(0,2),color:a.color,life:1});
        beep(500,0.06);
      },onCd?'#333':a.color);
      if(onCd){
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,GH-90,bw,50);
        ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';
        ctx.fillText(Math.ceil(d.cooldowns[a.key])+'s',bx+bw/2,GH-62);
      }
    });
  }

  addBtn(10,GH-40,100,30,t('back'),()=>{gameState='menu';cancelAnimationFrame(animFrame);drawMenu();},'#555');
  drawButtons();

  if(overMsg){
    drawGameOver(overMsg,t('g1score').replace('{0}',Math.floor(d.elapsed)));
    return;
  }
  animFrame=requestAnimationFrame(loopGame2);
}
</script>
<script>
// ══════════════════════════════════════
// GAME 3: 排隊模擬器 Queue Simulator
// ══════════════════════════════════════
const QUEUE_TARGETS_ZH=['鮮奶茶限定版','好市多加油','演唱會門票','iPhone 99','百貨週年慶','拉麵名店','黑色星期五'];
const QUEUE_TARGETS_EN=['Limited Milk Tea','Costco Gas','Concert Tickets','iPhone 99','Department Sale','Famous Ramen','Black Friday'];

function startGame3(){
  gameState='game3';
  const d=gameData;
  d.patience=80; d.position=20+Math.floor(Math.random()*10);
  d.elapsed=0; d.difficulty=1;
  d.eventActive=false; d.eventType=null; d.eventTimer=0;
  d.particles=[];
  d.msg=''; d.msgTimer=0;
  d.aggro=0; // aggressiveness score
  d.targetIdx=Math.floor(Math.random()*QUEUE_TARGETS_ZH.length);
  d.queuePeople=[];
  for(let i=0;i<d.position;i++){
    d.queuePeople.push({emoji:['🧑','👩','👴','👧','🧔','👨‍🦳','👩‍🦰'][Math.floor(Math.random()*7)],wobble:Math.random()*6});
  }
  d.moveTimer=0;
  if(animFrame) cancelAnimationFrame(animFrame);
  d.lastTime=Date.now();
  loopGame3();
}

function loopGame3(){
  const d=gameData;
  const now=Date.now();
  const dt=(now-d.lastTime)/1000;
  d.lastTime=now;
  d.elapsed+=dt;
  d.difficulty=1+d.elapsed/40;

  // Passive patience drain
  d.patience-=2*d.difficulty*dt;
  d.patience=Math.max(0,Math.min(100,d.patience));

  // Queue moves forward slowly
  d.moveTimer+=dt;
  if(d.moveTimer>3+Math.random()*3 && d.position>0){
    d.moveTimer=0;
    d.position--;
    if(d.queuePeople.length>0) d.queuePeople.shift();
    d.patience=Math.min(100,d.patience+3);
    d.particles.push({x:200,y:400,text:'→',color:'#66ff88',life:1});
  }

  // Random events
  d.eventTimer+=dt;
  if(!d.eventActive && d.eventTimer>5+Math.random()*6){
    d.eventTimer=0;
    d.eventActive=true;
    const events=['cut','rain','phone','slow','sale'];
    d.eventType=events[Math.floor(Math.random()*events.length)];
    beep(700,0.12);
  }
  if(d.msgTimer>0) d.msgTimer-=dt;

  // Game over
  let overMsg=null;
  if(d.patience<=0) overMsg=t('g3over_rage');
  else if(d.aggro>=100) overMsg=t('g3over_kicked');
  else if(d.position<=0){overMsg=t('g3win');d.won=true;}

  // Draw
  buttons=[];
  ctx.fillStyle='#181e28';ctx.fillRect(0,0,GW,GH);

  // Queue target
  const tgt=lang==='zh'?QUEUE_TARGETS_ZH[d.targetIdx]:QUEUE_TARGETS_EN[d.targetIdx];
  ctx.fillStyle='#ffd060';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('queueFor')+': '+tgt,GW/2,80);

  // Draw queue
  ctx.fillStyle='#2a2838';ctx.fillRect(60,100,280,30); // store front
  ctx.fillStyle='#ffd060';ctx.font='14px sans-serif';ctx.textAlign='center';
  ctx.fillText('🏪',200,120);

  // People in queue - vertical line
  const qStartY=150, qSpacing=22;
  d.queuePeople.forEach((p,i)=>{
    p.wobble+=dt;
    const wx=Math.sin(p.wobble)*3;
    const py=qStartY+i*qSpacing;
    if(py<500){
      ctx.font='18px sans-serif';ctx.textAlign='center';
      ctx.fillText(p.emoji,200+wx,py);
    }
  });
  // Player at end
  const playerY=qStartY+d.queuePeople.length*qSpacing;
  if(playerY<520){
    ctx.font='30px sans-serif';ctx.textAlign='center';
    ctx.fillText('🦫',200,playerY+5);
    ctx.font='12px sans-serif';ctx.fillStyle='#ffd060';
    ctx.fillText('← YOU',245,playerY+5);
  }

  // Particles
  d.particles=d.particles.filter(p=>{
    p.y-=25*dt;p.life-=dt;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font='18px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1;
    return true;
  });

  // HUD
  drawBar(20,20,170,22,d.patience,100,'#66ddff',t('patience'));
  drawBar(210,20,170,22,d.position,30,'#ffaa44',t('position')+' #');
  ctx.fillStyle='#a090b0';ctx.font='13px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('g3score').replace('{0}',Math.floor(d.elapsed)),GW/2,60);

  if(d.msgTimer>0){
    ctx.fillStyle='#ffd060';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.msg,GW/2,540);
  }

  // Event popup
  if(d.eventActive && !overMsg){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,555,GW,145);
    const evtKey='g3event_'+d.eventType;
    ctx.fillStyle='#ff6b9d';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText(t(evtKey),GW/2,578);

    const choices=getQueueChoices(d.eventType);
    const bw=140;
    addBtn(GW/2-bw-10,595,bw,35,choices[0].label,()=>{
      applyQueueChoice(choices[0]);d.eventActive=false;
    },choices[0].color);
    addBtn(GW/2+10,595,bw,35,choices[1].label,()=>{
      applyQueueChoice(choices[1]);d.eventActive=false;
    },choices[1].color);
  }

  addBtn(10,GH-40,100,30,t('back'),()=>{gameState='menu';cancelAnimationFrame(animFrame);drawMenu();},'#555');
  drawButtons();

  if(overMsg){
    drawGameOver(overMsg,t('g3score').replace('{0}',Math.floor(d.elapsed)),d.won);
    return;
  }
  animFrame=requestAnimationFrame(loopGame3);
}

function getQueueChoices(type){
  switch(type){
    case 'cut': return [
      {label:t('endure'),patience:-15,aggro:0,color:'#66bbff'},
      {label:t('confront'),patience:5,aggro:25,pos:-1,color:'#ff4444'}
    ];
    case 'rain': return [
      {label:t('umbrella'),patience:-5,aggro:0,color:'#66bbff'},
      {label:t('shelter'),patience:-20,aggro:0,pos:3,color:'#ffaa44'}
    ];
    case 'phone': return [
      {label:t('charge'),patience:5,aggro:0,color:'#66ff88'},
      {label:t('wait'),patience:-12,aggro:0,color:'#888'}
    ];
    case 'slow': return [
      {label:t('rush'),patience:5,aggro:20,pos:-2,color:'#ff6b9d'},
      {label:t('stay'),patience:-10,aggro:0,color:'#888'}
    ];
    case 'sale': return [
      {label:t('rush'),patience:10,aggro:30,pos:-3,color:'#ff4444'},
      {label:t('stay'),patience:-15,aggro:0,color:'#888'}
    ];
    default: return [
      {label:t('endure'),patience:-10,aggro:0,color:'#888'},
      {label:t('confront'),patience:5,aggro:20,color:'#ff4444'}
    ];
  }
}

function applyQueueChoice(c){
  const d=gameData;
  d.patience=Math.max(0,Math.min(100,d.patience+(c.patience||0)));
  d.aggro=Math.max(0,Math.min(100,(d.aggro||0)+(c.aggro||0)));
  if(c.pos){
    d.position=Math.max(0,d.position+c.pos);
    if(c.pos<0){for(let i=0;i<Math.abs(c.pos)&&d.queuePeople.length;i++)d.queuePeople.shift();}
    else{for(let i=0;i<c.pos;i++)d.queuePeople.unshift({emoji:'🧑',wobble:Math.random()*6});}
  }
  d.msg=c.label;d.msgTimer=1.5;
  beep(c.aggro>10?300:500,0.08);
  d.particles.push({x:200,y:500,text:c.aggro>10?'😤':'😌',color:c.color,life:1.2});
}
</script>
<script>
// ══════════════════════════════════════
// Game Over + Init
// ══════════════════════════════════════
function drawGameOver(msg, scoreText, isWin){
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,GW,GH);

  ctx.fillStyle=isWin?'#66ff88':'#ff6b9d';
  ctx.font='bold 28px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('gameover'),GW/2,250);

  ctx.fillStyle='#fff';ctx.font='18px sans-serif';
  const lines=msg.split('\n');
  lines.forEach((line,i)=>{
    ctx.fillText(line,GW/2,300+i*28);
  });

  ctx.fillStyle='#ffd060';ctx.font='bold 20px sans-serif';
  ctx.fillText(scoreText,GW/2,380);

  // Big emoji
  ctx.font='60px sans-serif';
  ctx.fillText(isWin?'🎉':'💀',GW/2,460);

  addBtn(GW/2-70,500,140,45,t('retry'),()=>{
    startGame(gameState.replace('game','g'));
  },'#ffd060');
  addBtn(GW/2-70,560,140,40,t('back'),()=>{
    gameState='menu';drawMenu();
  },'#555');
  drawButtons();
}

// ── Init ──
drawMenu();
</script>
