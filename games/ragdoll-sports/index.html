<script>
// ===== CONSTANTS =====
const GW = 800, GH = 450;
const GROUND_Y = GH - 50;
const GRAVITY = 0.45;
const DAMPING = 0.985;
const BALL_R = 12;
const BALL_BOUNCE = 0.65;
const BALL_FRICTION = 0.985;
const KICK_FORCE = 14;
const KICK_COOLDOWN = 300; // ms
const JUMP_FORCE = 9;
const MOVE_FORCE = 0.7;
const MUSCLE_STRENGTH = 0.12;
const STUN_DURATION = 1200; // ms
const MATCH_TIME = 90; // seconds
const WIN_SCORE = 5;
const GOAL_W = 12, GOAL_H = 100;
const GOAL_Y = GROUND_Y - GOAL_H;
const CONSTRAINT_ITERS = 4;
const MAX_PARTICLES = 30;
const COLORS = {

  p2: { body: '#ff4444', head: '#ff6666', outline: '#aa2222' },
  ball: '#fff',
  field: '#2d8a4e',

  sky1: '#87CEEB',
  sky2: '#1a1a4e',
  goal: '#ffd700',

};
const SKINS = [
  { id: 'blue', body: '#4488ff', head: '#5599ff', outline: '#2255aa', cost: 0, name: 'Blue' },
  { id: 'green', body: '#44bb44', head: '#66dd66', outline: '#228822', cost: 100, name: 'Green' },
  { id: 'purple', body: '#aa44ff', head: '#cc66ff', outline: '#7722aa', cost: 200, name: 'Purple' },
  { id: 'gold', body: '#ffd700', head: '#ffec80', outline: '#b8960f', cost: 500, name: 'Gold' },
  { id: 'rainbow', body: '#ff6b6b', head: '#ffd93d', outline: '#c44569', cost: 1000, name: 'Rainbow' },
];

// ===== i18n =====
const SAVE_KEY = 'ragdollSports';
let lang = localStorage.getItem(SAVE_KEY + 'Lang') || 'en';
const i18n = {
  en: {
    title: 'Ragdoll Sports', subtitle: 'Physics Soccer Showdown',

    easy: 'Easy', normal: 'Normal', hard: 'Hard',

  },

    play: '⚽ 開始比賽', back: '← 返回',
    easy: '簡單', normal: '普通', hard: '困難',
    goal: '進球！', win: '你贏了！', lose: '你輸了', draw: '平手！',
    score: '分數', time: '時間', coins: '金幣',
    playAgain: '再來一場', menu: '選單', shop: '🛒 商店',
    kickBtn: '⚡', jumpBtn: '↑',
    tut1Title: '移動', tut1Desc: 'A/D 或方向鍵左右移動',
    tut2Title: '跳躍', tut2Desc: 'W 或方向鍵上跳躍',
    tut3Title: '踢球', tut3Desc: '空白鍵踢球',
    tut4Title: '得分！', tut4Desc: '把球踢進對手球門，先得 5 分獲勝！',
    tutOk: '了解！',
    skinUnlocked: '已解鎖！', skinBuy: '購買', skinEquip: '裝備', skinEquipped: '已裝備',
    paused: '暫停', resume: '繼續',
    reward: '金幣獲得',
  }
};
function t(key) { return (i18n[lang] || i18n.en)[key] || key; }

// ===== SAVE DATA =====
let save = { wins: 0, losses: 0, coins: 0, skin: 'blue', unlocked: ['blue'], tutSeen: false, streak: 0 };
function loadSave() {
  try { const d = JSON.parse(localStorage.getItem(SAVE_KEY)); if (d) save = { ...save, ...d }; } catch(e) {}
}
function writeSave() { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
loadSave();

// ===== CANVAS SETUP =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = GW; canvas.height = GH;
const gameArea = document.getElementById('game-area');

function resizeCanvas() {
  const aw = gameArea.clientWidth, ah = gameArea.clientHeight;
  const scale = Math.min(aw / GW, ah / GH);
  const cw = Math.min(GW * scale, aw), ch = Math.min(GH * scale, ah);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resizeCanvas, 100); });
resizeCanvas();

// ===== AUDIO =====
const AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();
const AUDIO_BUFS = {};
let audioMuted = localStorage.getItem(SAVE_KEY + 'Muted') === '1';
let bgmSource = null, bgmGain = null, bgmLoaded = false;

function loadAudio(name, url) {
  fetch(url).then(r => r.arrayBuffer()).then(ab => AUDIO_CTX.decodeAudioData(ab))
    .then(buf => { AUDIO_BUFS[name] = buf; }).catch(() => {});
}
function playAudio(name, vol = 0.7, rate = 1, maxMs = 0) {
  if (audioMuted) return;
  const buf = AUDIO_BUFS[name]; if (!buf) return;
  if (AUDIO_CTX.state === 'suspended') AUDIO_CTX.resume();
  const src = AUDIO_CTX.createBufferSource();
  src.buffer = buf; src.playbackRate.value = rate;
  const gain = AUDIO_CTX.createGain(); gain.gain.value = vol;
  src.connect(gain); gain.connect(AUDIO_CTX.destination);
  src.start(0, 0, maxMs > 0 ? maxMs / 1000 : buf.duration);
}
function startBGM(url) {
  if (bgmLoaded || audioMuted) return; bgmLoaded = true;
  fetch(url).then(r => r.arrayBuffer()).then(ab => AUDIO_CTX.decodeAudioData(ab)).then(buf => {
    if (AUDIO_CTX.state === 'suspended') AUDIO_CTX.resume();
    bgmSource = AUDIO_CTX.createBufferSource();
    bgmSource.buffer = buf; bgmSource.loop = true;
    bgmGain = AUDIO_CTX.createGain(); bgmGain.gain.value = 0.18;
    bgmSource.connect(bgmGain); bgmGain.connect(AUDIO_CTX.destination);
    bgmSource.start();
  }).catch(() => {});
}
function toggleMute() {
  audioMuted = !audioMuted;
  if (bgmGain) bgmGain.gain.value = audioMuted ? 0 : 0.18;
  document.getElementById('mute-btn').textContent = audioMuted ? '🔇' : '🔊';
  localStorage.setItem(SAVE_KEY + 'Muted', audioMuted ? '1' : '0');
  if (!audioMuted && !bgmLoaded) startBGM(BGM_URL);
}
const BGM_URL = '../../assets/Medieval Vol. 2/ogg/Medieval Vol. 2 3.ogg';
loadAudio('kick', '../../assets/sfx/GameSFX2/Impact/Retro Impact Punch 07.wav');
loadAudio('goal', '../../assets/sfx/400 Sounds Pack/Musical Effects/brass_level_complete.wav');
loadAudio('hit', '../../assets/sfx/GameSFX2/Impact/Retro Impact Metal 03.wav');
loadAudio('post', '../../assets/sfx/GameSFX2/Impact/Retro Impact Metal 01.wav');
loadAudio('powerup', '../../assets/sfx/GameSFX3/PowerUp/Retro PowerUP 09.wav');
if (audioMuted) document.getElementById('mute-btn').textContent = '🔇';

// ===== GAME STATE =====
let gameState = 'menu'; // menu | playing | paused | goalScored | matchEnd | tutorial | shop
let score = [0, 0];
let matchTimer = MATCH_TIME;
let goalFlashTimer = 0;
let slowMoTimer = 0;
let goalText = '';
let difficulty = 1;
let particles = [];
let shakeX = 0, shakeY = 0;
let lastKickTime = 0;

// ===== VERLET PHYSICS =====
class Point {
  constructor(x, y, pinned = false) {
    this.x = x; this.y = y;
    this.px = x; this.py = y;
    this.pinned = pinned;
  }
  update(grav) {
    if (this.pinned) return;
    const vx = (this.x - this.px) * DAMPING;
    const vy = (this.y - this.py) * DAMPING;
    this.px = this.x; this.py = this.y;
    this.x += vx; this.y += vy + grav;
  }
  applyForce(fx, fy) { this.x += fx; this.y += fy; }
  getVelX() { return this.x - this.px; }
  getVelY() { return this.y - this.py; }
}

class Constraint {
  constructor(a, b, len) {
    this.a = a; this.b = b;
    this.len = len || Math.hypot(a.x - b.x, a.y - b.y);
  }
  solve() {
    const dx = this.b.x - this.a.x, dy = this.b.y - this.a.y;
    const dist = Math.hypot(dx, dy) || 0.01;
    const diff = (this.len - dist) / dist * 0.5;
    const ox = dx * diff, oy = dy * diff;
    if (!this.a.pinned) { this.a.x -= ox; this.a.y -= oy; }
    if (!this.b.pinned) { this.b.x += ox; this.b.y += oy; }
  }
}

// ===== RAGDOLL =====
class Ragdoll {
  constructor(x, facing, colors) {
    this.facing = facing; // 1=right, -1=left
    this.colors = colors;
    this.stunTimer = 0;
    this.onGround = false;
    this.walkPhase = 0;
    // Create points: head(0), shoulder(1), hip(2), lKnee(3), lFoot(4), rKnee(5), rFoot(6)
    const h = GROUND_Y;
    this.pts = [
      new Point(x, h - 70),       // 0 head
      new Point(x, h - 55),       // 1 shoulder
      new Point(x, h - 30),       // 2 hip
      new Point(x - 6, h - 16),   // 3 left knee
      new Point(x - 6, h),        // 4 left foot
      new Point(x + 6, h - 16),   // 5 right knee
      new Point(x + 6, h),        // 6 right foot
    ];
    this.constraints = [
      new Constraint(this.pts[0], this.pts[1], 15),  // head-shoulder
      new Constraint(this.pts[1], this.pts[2], 25),  // shoulder-hip
      new Constraint(this.pts[2], this.pts[3], 16),  // hip-lKnee
      new Constraint(this.pts[3], this.pts[4], 16),  // lKnee-lFoot
      new Constraint(this.pts[2], this.pts[5], 16),  // hip-rKnee
      new Constraint(this.pts[5], this.pts[6], 16),  // rKnee-rFoot
      // Structural
      new Constraint(this.pts[0], this.pts[2], 40),  // head-hip (prevent collapse)
      new Constraint(this.pts[4], this.pts[6], 12),  // feet spread
    ];
  }

  get x() { return this.pts[2].x; }
  get y() { return this.pts[2].y; }
  get head() { return this.pts[0]; }
  get hip() { return this.pts[2]; }
  get lFoot() { return this.pts[4]; }
  get rFoot() { return this.pts[6]; }

  get isStunned() { return this.stunTimer > 0; }

  stun() {
    this.stunTimer = STUN_DURATION;
  }

  update(dt) {
    // Update stun
    if (this.stunTimer > 0) this.stunTimer -= dt;

    // Physics update
    for (const p of this.pts) p.update(GRAVITY);

    // Constraint solving
    for (let i = 0; i < CONSTRAINT_ITERS; i++) {
      for (const c of this.constraints) c.solve();
      this.groundCollide();
      this.wallCollide();
    }

    // Muscle system - try to stay upright when not stunned
    if (!this.isStunned) {
      this.applyMuscles(dt);
    }

    // Ground check
    this.onGround = this.pts[4].y >= GROUND_Y - 2 || this.pts[6].y >= GROUND_Y - 2;
  }

  applyMuscles(dt) {
    const str = MUSCLE_STRENGTH;
    const hip = this.pts[2];
    const shoulder = this.pts[1];
    const head = this.pts[0];

    // Try to keep torso upright: shoulder above hip
    const uprightDx = hip.x - shoulder.x;
    shoulder.x += uprightDx * str * 0.5;
    head.x += uprightDx * str * 0.3;

    // Keep head above shoulder
    if (head.y > shoulder.y - 8) {
      head.y -= str * 4;
    }

    // Keep shoulder above hip
    if (shoulder.y > hip.y - 15) {
      shoulder.y -= str * 3;
    }

    // Walking: alternate feet
    if (this.onGround) {
      const lFoot = this.pts[4], rFoot = this.pts[6];
      const lKnee = this.pts[3], rKnee = this.pts[5];

      // Keep feet near ground
      if (lFoot.y < GROUND_Y - 4) lFoot.y += str * 8;
      if (rFoot.y < GROUND_Y - 4) rFoot.y += str * 8;

      // Keep knees bent slightly
      const targetKneeY = hip.y + 10;
      lKnee.y += (targetKneeY - lKnee.y) * str * 0.3;
      rKnee.y += (targetKneeY - rKnee.y) * str * 0.3;
    }
  }

  groundCollide() {
    for (const p of this.pts) {
      if (p.y > GROUND_Y) {
        p.y = GROUND_Y;
        p.py = p.y + (p.y - p.py) * 0.3; // bounce damping
      }
      // Ceiling
      if (p.y < 10) { p.y = 10; p.py = 10; }
    }
  }

  wallCollide() {
    for (const p of this.pts) {
      if (p.x < 20) { p.x = 20; p.px = 20; }
      if (p.x > GW - 20) { p.x = GW - 20; p.px = GW - 20; }
    }
  }

  move(dir) {
    if (this.isStunned) return;
    const hip = this.pts[2];
    hip.x += dir * MOVE_FORCE;
    this.facing = dir > 0 ? 1 : -1;
    this.walkPhase += 0.15;
  }

  jump() {
    if (this.isStunned || !this.onGround) return;
    for (const p of this.pts) {
      p.py = p.y + JUMP_FORCE;
    }
  }

  kick(ball) {
    if (this.isStunned) return false;
    const now = performance.now();
    if (now - lastKickTime < KICK_COOLDOWN) return false;

    // Check if any foot is near ball
    const lDist = Math.hypot(this.lFoot.x - ball.x, this.lFoot.y - ball.y);
    const rDist = Math.hypot(this.rFoot.x - ball.x, this.rFoot.y - ball.y);
    const minDist = Math.min(lDist, rDist);

    if (minDist < BALL_R + 22) {
      const foot = lDist < rDist ? this.lFoot : this.rFoot;
      const dx = ball.x - foot.x, dy = ball.y - foot.y;
      const dist = Math.hypot(dx, dy) || 1;
      const nx = dx / dist, ny = dy / dist;
      // Add foot velocity + kick force
      const fvx = foot.getVelX(), fvy = foot.getVelY();
      ball.applyForce(nx * KICK_FORCE + fvx * 0.5, ny * KICK_FORCE * 0.7 + fvy * 0.3 - 3);
      lastKickTime = now;
      return true;
    }
    return false;
  }

  reset(x) {
    const h = GROUND_Y;
    const positions = [
      [x, h - 70], [x, h - 55], [x, h - 30],
      [x - 6, h - 16], [x - 6, h],
      [x + 6, h - 16], [x + 6, h]
    ];
    for (let i = 0; i < this.pts.length; i++) {
      this.pts[i].x = this.pts[i].px = positions[i][0];
      this.pts[i].y = this.pts[i].py = positions[i][1];
    }
    this.stunTimer = 0;
    this.walkPhase = 0;
  }
}

// ===== BALL =====
class Ball {
  constructor(x, y) {
    this.pt = new Point(x, y);
    this.r = BALL_R;
    this.trail = [];
  }
  get x() { return this.pt.x; }
  get y() { return this.pt.y; }
  applyForce(fx, fy) { this.pt.applyForce(fx, fy); }
  update() {
    this.pt.update(GRAVITY * 0.8);
    // Ground
    if (this.pt.y > GROUND_Y - this.r) {
      this.pt.y = GROUND_Y - this.r;
      const vy = this.pt.y - this.pt.py;
      this.pt.py = this.pt.y - vy * BALL_BOUNCE;
      this.pt.px += (this.pt.x - this.pt.px) * (1 - BALL_FRICTION);
    }
    // Ceiling
    if (this.pt.y < this.r + 10) {
      this.pt.y = this.r + 10;
      this.pt.py = this.pt.y + Math.abs(this.pt.y - this.pt.py) * 0.5;
    }
    // Walls (but not goal openings)
    const inLeftGoal = this.pt.y > GOAL_Y && this.pt.x < GOAL_W + 5;
    const inRightGoal = this.pt.y > GOAL_Y && this.pt.x > GW - GOAL_W - 5;
    if (!inLeftGoal && this.pt.x < this.r + 5) {
      this.pt.x = this.r + 5;
      this.pt.px = this.pt.x + Math.abs(this.pt.x - this.pt.px) * 0.5;
    }
    if (!inRightGoal && this.pt.x > GW - this.r - 5) {
      this.pt.x = GW - this.r - 5;
      this.pt.px = this.pt.x - Math.abs(this.pt.x - this.pt.px) * 0.5;
    }
    this.goalPostCollide();
    // Trail
    const speed = Math.hypot(this.pt.getVelX(), this.pt.getVelY());
    if (speed > 3) {
      this.trail.push({ x: this.pt.x, y: this.pt.y, a: Math.min(speed / 12, 1) });
      if (this.trail.length > 8) this.trail.shift();
    } else if (this.trail.length > 0) { this.trail.shift(); }
    // Ragdoll body collision
    if (typeof player1 !== 'undefined') this.bodyCollide(player1);
    if (typeof player2 !== 'undefined') this.bodyCollide(player2);
  }
  goalPostCollide() {
    // Crossbar collision
    const crossbars = [
      { x1: 0, x2: GOAL_W + 5, y: GOAL_Y },
      { x1: GW - GOAL_W - 5, x2: GW, y: GOAL_Y }
    ];
    for (const bar of crossbars) {
      if (this.pt.x + this.r > bar.x1 && this.pt.x - this.r < bar.x2 &&
          Math.abs(this.pt.y - bar.y) < this.r + 4) {
        if (this.pt.y < bar.y) {
          this.pt.y = bar.y - this.r - 4;
          this.pt.py = this.pt.y + Math.abs(this.pt.y - this.pt.py) * 0.4;
        } else {
          this.pt.y = bar.y + this.r + 4;
          this.pt.py = this.pt.y - Math.abs(this.pt.y - this.pt.py) * 0.4;
        }
        playAudio('post', 0.5, 1, 200);
      }
    }
    // Goal post vertical bars
    const posts = [
      { x: GOAL_W + 5, yMin: GOAL_Y, yMax: GROUND_Y },
      { x: GW - GOAL_W - 5, yMin: GOAL_Y, yMax: GROUND_Y }
    ];
    for (const post of posts) {
      if (this.pt.y > post.yMin && this.pt.y < post.yMax &&
          Math.abs(this.pt.x - post.x) < this.r + 3) {
        if (this.pt.x < post.x) {
          this.pt.x = post.x - this.r - 3;
          this.pt.px = this.pt.x + Math.abs(this.pt.x - this.pt.px) * 0.4;
        } else {
          this.pt.x = post.x + this.r + 3;
          this.pt.px = this.pt.x - Math.abs(this.pt.x - this.pt.px) * 0.4;
        }
        playAudio('post', 0.4, 1.2, 200);
      }
    }
  }
  bodyCollide(ragdoll) {
    for (const p of ragdoll.pts) {
      const dx = this.pt.x - p.x, dy = this.pt.y - p.y;
      const dist = Math.hypot(dx, dy);
      const minDist = this.r + 8;
      if (dist < minDist && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        this.pt.x += nx * overlap * 0.6;
        this.pt.y += ny * overlap * 0.6;
        p.x -= nx * overlap * 0.4;
        p.y -= ny * overlap * 0.4;
        const speed = Math.hypot(this.pt.getVelX(), this.pt.getVelY());
        if (speed > 6) {
          ragdoll.stun();
          spawnParticles(p.x, p.y, 5, '#ffff00');
          playAudio('hit', 0.4, 1, 200);
        }
      }
    }
  }
  reset(x, y) {
    this.pt.x = this.pt.px = x;
    this.pt.y = this.pt.py = y;
    this.trail = [];
  }
}

// ===== PARTICLES =====
function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      life: 1, color, size: 2 + Math.random() * 3 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= dt / 800;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ===== AI =====
const AI_PROFILES = [
  { react: 500, accuracy: 0.4, jumpChance: 0.008 },
  { react: 250, accuracy: 0.7, jumpChance: 0.025 },
  { react: 100, accuracy: 0.9, jumpChance: 0.05 },
];
let aiTimer = 0, aiTarget = { x: 0, y: 0 }, aiKickTimer = 0;

function updateAI(dt) {
  const prof = AI_PROFILES[difficulty] || AI_PROFILES[1];
  const ai = player2;
  aiTimer += dt;
  if (aiTimer > prof.react) {
    aiTimer = 0;
    const bx = ball.x;
    // AI is player2 (right side), defends right goal, attacks left
    if (bx > GW * 0.35) {
      aiTarget.x = bx - 20;
    } else if (bx < GW * 0.25) {
      aiTarget.x = GW - 120;
    } else {
      aiTarget.x = bx + 15;
    }
    aiTarget.x += (Math.random() - 0.5) * (1 - prof.accuracy) * 80;
  }
  const dx = aiTarget.x - ai.x;
  if (Math.abs(dx) > 8) ai.move(dx > 0 ? 1 : -1);
  if (Math.random() < prof.jumpChance && ball.y < GROUND_Y - 50) ai.jump();
  aiKickTimer += dt;
  if (Math.hypot(ai.x - ball.x, ai.y - ball.y) < 50 && aiKickTimer > 350) {
    if (ai.kick(ball)) { aiKickTimer = 0; playAudio('kick', 0.5, 0.9 + Math.random() * 0.2, 200); }
  }
}

// ===== GAME OBJECTS =====
let player1, player2, ball;
function initGame() {
  const skin = SKINS.find(s => s.id === save.skin) || SKINS[0];
  player1 = new Ragdoll(200, 1, { body: skin.body, head: skin.head, outline: skin.outline });
  player2 = new Ragdoll(GW - 200, -1, COLORS.p2);
  ball = new Ball(GW / 2, GROUND_Y - 100);
  score = [0, 0]; matchTimer = MATCH_TIME;
  goalFlashTimer = 0; slowMoTimer = 0; particles = [];
  difficulty = parseInt(document.getElementById('difficulty-select').value) || 1;
}

// ===== GOAL DETECTION =====
function checkGoal() {
  // Left goal (player2 scores): ball enters x < GOAL_W, y > GOAL_Y
  if (ball.x < GOAL_W && ball.y > GOAL_Y && ball.y < GROUND_Y) {
    score[1]++;
    onGoal(1);
    return true;
  }
  // Right goal (player1 scores): ball enters x > GW - GOAL_W, y > GOAL_Y
  if (ball.x > GW - GOAL_W && ball.y > GOAL_Y && ball.y < GROUND_Y) {
    score[0]++;
    onGoal(0);
    return true;
  }
  return false;
}

function onGoal(scorer) {
  goalFlashTimer = 300;
  slowMoTimer = 1000;
  goalText = t('goal');
  spawnParticles(ball.x, ball.y, 15, '#ffd700');
  spawnParticles(ball.x, ball.y, 10, scorer === 0 ? '#4488ff' : '#ff4444');
  playAudio('goal', 0.8);
  shakeX = 6; shakeY = 4;
  // Check win
  if (score[0] >= WIN_SCORE || score[1] >= WIN_SCORE) {
    setTimeout(() => endMatch(), 1500);
  } else {
    setTimeout(() => resetAfterGoal(), 1500);
  }
  gameState = 'goalScored';
}

function resetAfterGoal() {
  player1.reset(200);
  player2.reset(GW - 200);
  ball.reset(GW / 2, GROUND_Y - 100);
  gameState = 'playing';
}

function endMatch() {
  gameState = 'matchEnd';
  const won = score[0] > score[1];
  const draw = score[0] === score[1];
  let coins = 0;
  if (won) { coins = 30 + score[0] * 5; save.wins++; save.streak++; }
  else if (draw) { coins = 15; save.streak = 0; }
  else { coins = 10; save.losses++; save.streak = 0; }
  // Dynamic difficulty
  if (save.streak >= 3 && difficulty < 2) difficulty = Math.min(difficulty + 1, 2);
  save.coins += coins;
  writeSave();
  showEndScreen(won, draw, coins);
}

// ===== RENDERING =====
function drawField() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, COLORS.sky1);
  grad.addColorStop(1, COLORS.sky2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GROUND_Y);

  // Ground
  ctx.fillStyle = COLORS.field;
  ctx.fillRect(0, GROUND_Y, GW, GH - GROUND_Y);
  // Darker stripes
  ctx.fillStyle = COLORS.fieldDark;
  for (let x = 0; x < GW; x += 80) {
    if ((x / 80) % 2 === 0) ctx.fillRect(x, GROUND_Y, 40, GH - GROUND_Y);
  }

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 6]);
  ctx.beginPath(); ctx.moveTo(GW / 2, GROUND_Y); ctx.lineTo(GW / 2, GH); ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.beginPath(); ctx.arc(GW / 2, GROUND_Y + 25, 40, 0, Math.PI * 2);
  ctx.stroke();

  // Goals
  drawGoal(0, GOAL_Y); // Left
  drawGoal(GW - GOAL_W - 5, GOAL_Y); // Right
}

function drawGoal(x, y) {
  // Net
  ctx.fillStyle = COLORS.goalNet;
  ctx.fillRect(x, y, GOAL_W + 5, GROUND_Y - y);
  // Posts
  ctx.strokeStyle = COLORS.goal;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x + (x === 0 ? GOAL_W + 5 : 0), y);
  ctx.lineTo(x + (x === 0 ? GOAL_W + 5 : 0), GROUND_Y);
  ctx.stroke();
  // Crossbar
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + GOAL_W + 5, y);
  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawRagdoll(rd) {
  const pts = rd.pts;
  const c = rd.colors;
  ctx.lineCap = 'round';

  // Legs
  ctx.strokeStyle = c.outline || '#333';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(pts[2].x, pts[2].y); ctx.lineTo(pts[3].x, pts[3].y); ctx.lineTo(pts[4].x, pts[4].y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pts[2].x, pts[2].y); ctx.lineTo(pts[5].x, pts[5].y); ctx.lineTo(pts[6].x, pts[6].y); ctx.stroke();

  // Body
  ctx.strokeStyle = c.body;
  ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(pts[2].x, pts[2].y); ctx.lineTo(pts[1].x, pts[1].y); ctx.stroke();

  // Arms (procedural - based on shoulder position)
  const armAngle = Math.sin(rd.walkPhase) * 0.4;
  const armLen = 20;
  const lax = pts[1].x + Math.cos(Math.PI * 0.6 + armAngle) * armLen;
  const lay = pts[1].y + Math.sin(Math.PI * 0.6 + armAngle) * armLen;
  const rax = pts[1].x + Math.cos(Math.PI * 0.4 - armAngle) * armLen;
  const ray = pts[1].y + Math.sin(Math.PI * 0.4 - armAngle) * armLen;
  ctx.strokeStyle = c.outline || '#333';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(pts[1].x, pts[1].y); ctx.lineTo(lax, lay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pts[1].x, pts[1].y); ctx.lineTo(rax, ray); ctx.stroke();

  // Head
  ctx.fillStyle = c.head;
  ctx.strokeStyle = c.outline || '#333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(pts[0].x, pts[0].y, 10, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // Eyes
  const eyeDir = rd.facing;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(pts[0].x + eyeDir * 3 - 2, pts[0].y - 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(pts[0].x + eyeDir * 3 + 3, pts[0].y - 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(pts[0].x + eyeDir * 3 - 2 + eyeDir, pts[0].y - 2, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(pts[0].x + eyeDir * 3 + 3 + eyeDir, pts[0].y - 2, 1.5, 0, Math.PI * 2); ctx.fill();

  // Stun stars
  if (rd.isStunned) {
    const t2 = performance.now() / 200;
    for (let i = 0; i < 3; i++) {
      const a = t2 + i * 2.1;
      const sx = pts[0].x + Math.cos(a) * 16;
      const sy = pts[0].y - 14 + Math.sin(a) * 8;
      ctx.fillStyle = '#ffd700';
      ctx.font = '10px sans-serif';
      ctx.fillText('★', sx - 4, sy + 4);
    }
  }

  // Feet (shoes)
  ctx.fillStyle = c.outline || '#333';
  ctx.beginPath(); ctx.arc(pts[4].x, pts[4].y, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(pts[6].x, pts[6].y, 4, 0, Math.PI * 2); ctx.fill();
}

function drawBall() {
  // Trail
  for (let i = 0; i < ball.trail.length; i++) {
    const t2 = ball.trail[i];
    ctx.globalAlpha = t2.a * (i / ball.trail.length) * 0.4;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(t2.x, t2.y, ball.r * 0.7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Ball
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Pentagon pattern
  ctx.fillStyle = '#333';
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    const px = ball.x + Math.cos(a) * ball.r * 0.5;
    const py = ball.y + Math.sin(a) * ball.r * 0.5;
    ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Score
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(GW / 2 - 80, 8, 160, 36);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW / 2 - 80, 8, 160, 36);

  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4488ff';
  ctx.fillText(score[0], GW / 2 - 30, 33);
  ctx.fillStyle = '#888';
  ctx.fillText('-', GW / 2, 33);
  ctx.fillStyle = '#ff4444';
  ctx.fillText(score[1], GW / 2 + 30, 33);

  // Timer
  const mins = Math.floor(matchTimer / 60);
  const secs = Math.floor(matchTimer % 60);
  ctx.font = '14px sans-serif';
  ctx.fillStyle = matchTimer < 15 ? '#ff4444' : '#ddd';
  ctx.fillText(`${mins}:${secs.toString().padStart(2, '0')}`, GW / 2, 56);
  ctx.textAlign = 'left';
}

function drawGoalText() {
  if (goalFlashTimer <= 0) return;
  const prog = goalFlashTimer / 300;
  // Flash
  if (prog > 0.7) {
    ctx.fillStyle = `rgba(255,255,255,${(prog - 0.7) / 0.3 * 0.5})`;
    ctx.fillRect(0, 0, GW, GH);
  }
  // GOAL text
  ctx.save();
  ctx.textAlign = 'center';
  const scale = 1 + (1 - prog) * 0.3;
  ctx.font = `bold ${Math.round(56 * scale)}px sans-serif`;
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ff8800';
  ctx.shadowBlur = 20;
  ctx.globalAlpha = Math.min(prog * 3, 1);
  ctx.fillText(goalText, GW / 2, GH / 2 - 20);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function showTutorial() {
  if (save.tutSeen) return;
  const ga = document.getElementById('game-area');
  let step = 0;
  const steps = [
    { icon: '⬅️➡️', title: t('tut1Title'), desc: t('tut1Desc') },
    { icon: '⬆️', title: t('tut2Title'), desc: t('tut2Desc') },
    { icon: '⚡', title: t('tut3Title'), desc: t('tut3Desc') },
    { icon: '⚽', title: t('tut4Title'), desc: t('tut4Desc') },
  ];
  function renderStep() {
    let ov = document.getElementById('tutorial-overlay');
    if (ov) ov.remove();
    if (step >= steps.length) {
      save.tutSeen = true; writeSave();
      return;
    }
    ov = document.createElement('div');
    ov.id = 'tutorial-overlay'; ov.className = 'overlay';
    const s = steps[step];
    ov.innerHTML = `
      <div class="tutorial-step">
        <div class="icon">${s.icon}</div>
        <div class="title">${s.title}</div>
        <div class="desc">${s.desc}</div>
      </div>
      <div style="color:#888;font-size:12px;margin-top:8px">${step + 1} / ${steps.length}</div>
      <button class="menu-btn" style="margin-top:12px">${step < steps.length - 1 ? '→' : t('tutOk')}</button>
    `;
    ov.querySelector('button').addEventListener('click', () => { step++; renderStep(); });
    ga.appendChild(ov);
  }

function togglePause() {

    ov.id = 'pause-overlay'; ov.className = 'overlay';
    ov.innerHTML = `
      <h1>${t('paused')}</h1>
      <button class="menu-btn" onclick="document.getElementById('pause-overlay').remove();gameState='playing'">${t('resume')}</button>
      <button class="menu-btn secondary" onclick="document.getElementById('pause-overlay').remove();gameState='menu'">${t('menu')}</button>

  }
}

// ===== MAIN LOOP =====
let lastTime = 0;
function gameLoop(now) {
  requestAnimationFrame(gameLoop);
  let dt = now - lastTime;
  lastTime = now;
  if (dt > 50) dt = 16;

  // Slow motion
  let physDt = dt;
  if (slowMoTimer > 0) { physDt = dt * 0.3; slowMoTimer -= dt; }

  if (gameState === 'playing') {
    // Player input
    let moveDir = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) moveDir = -1;
    if (keys['ArrowRight'] || keys['KeyD']) moveDir = 1;
    if (touchJoystick.active && Math.abs(touchJoystick.dx) > 10) {
      moveDir = touchJoystick.dx > 0 ? 1 : -1;
    }
    if (moveDir !== 0) player1.move(moveDir);

    if (keys['ArrowUp'] || keys['KeyW'] || touchJumping) player1.jump();
    if (keys['Space'] || touchKicking) {
      if (player1.kick(ball)) {
        playAudio('kick', 0.6, 0.9 + Math.random() * 0.2, 200);
        shakeX = 2; shakeY = 1;
      }
    }

    // Update physics
    player1.update(physDt);
    player2.update(physDt);
    ball.update();
    updateAI(physDt);
    updateParticles(physDt);

    // Timer
    matchTimer -= dt / 1000;
    if (matchTimer <= 0) { matchTimer = 0; endMatch(); }

    // Goal check
    if (gameState === 'playing') checkGoal();

    // Screen shake decay
    shakeX *= 0.85; shakeY *= 0.85;
    if (Math.abs(shakeX) < 0.1) shakeX = 0;
    if (Math.abs(shakeY) < 0.1) shakeY = 0;

    // Goal flash decay
    if (goalFlashTimer > 0) goalFlashTimer -= dt;
  }

  if (gameState === 'goalScored') {
    player1.update(physDt);
    player2.update(physDt);
    ball.update();
    updateParticles(physDt);
    if (goalFlashTimer > 0) goalFlashTimer -= dt;
    if (slowMoTimer > 0) slowMoTimer -= dt;
    shakeX *= 0.85; shakeY *= 0.85;
  }

  // ===== DRAW =====
  ctx.save();
  ctx.translate(
    (Math.random() - 0.5) * shakeX * 2,
    (Math.random() - 0.5) * shakeY * 2
  );
  ctx.clearRect(-10, -10, GW + 20, GH + 20);
  drawField();
  if (player1) drawRagdoll(player1);
  if (player2) drawRagdoll(player2);
  if (ball) drawBall();
  drawParticles();
  if (gameState === 'playing' || gameState === 'goalScored') drawHUD();
  drawGoalText();
  ctx.restore();

  // Menu screen
  if (gameState === 'menu') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.font = 'bold 42px sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 15;
    ctx.fillText('⚽ ' + t('title'), GW / 2, GH / 2 - 40);
    ctx.shadowBlur = 0;
    ctx.font = '18px sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText(t('subtitle'), GW / 2, GH / 2);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText(`🏆 ${save.wins}W  💰 ${save.coins}`, GW / 2, GH / 2 + 30);
    ctx.textAlign = 'left';
  }
}

// ===== INIT =====
applyLang();
const startOnce = () => {
  startBGM(BGM_URL);
  document.removeEventListener('click', startOnce);
  document.removeEventListener('touchend', startOnce);
};
document.addEventListener('click', startOnce);
document.addEventListener('touchend', startOnce);
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
