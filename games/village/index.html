<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>水豚小村 · 你的歸宿</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0a08;--panel:#1a1410;--panel2:#211810;--panel3:#2a1e12;
  --border:#4a3520;--border2:#3a2818;
  --gold:#f0c040;--gold2:#ffd97d;--gold3:#c8a030;
  --text:#e8ddd0;--text2:#b09870;--text3:#806850;--text4:#5a4030;
  --red:#e74c3c;--green:#40c870;--blue:#4a90e0;--purple:#9060e0;
  --spring-c:#e890c0;--summer-c:#70d040;--autumn-c:#f09030;--winter-c:#80b0e8;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;min-height:100vh;overflow-x:hidden}

/* ───── INTRO ───── */
#intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 30%,#1e1408 0%,#0a0806 100%)}
.intro-capy{font-size:5.5rem;margin-bottom:16px;animation:float 3.5s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(240,192,64,.35))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.intro-title{font-size:2.6rem;font-weight:900;color:var(--gold);letter-spacing:4px;text-shadow:0 0 40px rgba(240,192,64,.3);margin-bottom:6px}
.intro-sub{font-size:.85rem;color:var(--text3);letter-spacing:2px;margin-bottom:10px}
.intro-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto 20px}
.intro-story{font-size:.8rem;color:var(--text3);line-height:2;max-width:300px;margin-bottom:28px;font-style:italic}
.intro-form{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:320px}
.intro-form label{display:block;font-size:.68rem;color:var(--text3);margin-bottom:5px;letter-spacing:1.5px;text-transform:uppercase}
.intro-form input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:.88rem;font-family:inherit;margin-bottom:14px;outline:none;transition:border-color .2s}
.intro-form input:focus{border-color:var(--gold)}
.intro-form input::placeholder{color:var(--text4)}
.btn-start{width:100%;background:linear-gradient(135deg,#f0c040 0%,#c08020 100%);border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:800;color:#1a1005;cursor:pointer;letter-spacing:2px;font-family:inherit;transition:transform .1s,box-shadow .2s;margin-top:4px}
.btn-start:hover{box-shadow:0 0 24px rgba(240,192,64,.4);transform:scale(1.02)}
.btn-start:active{transform:scale(.97)}

/* ───── GAME LAYOUT ───── */
#game{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;position:relative}

/* Header */
.g-header{background:var(--panel);border-bottom:1px solid var(--border2);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;gap:8px}
.g-hdr-left{min-width:0}
.village-nm{font-size:.88rem;font-weight:800;color:var(--gold);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-nm{font-size:.62rem;color:var(--text3);margin-top:1px}
.g-hdr-right{text-align:right;flex-shrink:0}
.season-chip{font-size:.62rem;font-weight:700;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:2px}
.day-txt{font-size:.65rem;color:var(--text2)}

/* Resources */
.res-bar{display:flex;gap:0;border-bottom:1px solid var(--border2);overflow:hidden}
.res-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 4px;gap:1px;border-right:1px solid var(--border2);background:var(--panel2)}
.res-item:last-child{border-right:none}
.res-ic{font-size:.9rem}
.res-val{font-size:.72rem;font-weight:800;color:var(--text)}
.res-lbl{font-size:.52rem;color:var(--text3)}

/* ───── MAP ───── */
#map-wrap{position:relative;width:100%;background:var(--panel);border-bottom:2px solid var(--border);overflow:hidden}
#map-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 70%,rgba(0,0,0,.3) 100%);pointer-events:none}
#sky{position:absolute;top:0;left:0;right:0;height:35%;transition:background 4s ease}
#ground{position:absolute;bottom:0;left:0;right:0;height:55%;border-radius:60% 60% 0 0 / 30% 30% 0 0;transition:background 3s ease}
#map-items{position:absolute;inset:0}

.bldg{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;z-index:5;transition:transform .2s}
.bldg:hover{transform:translate(-50%,-50%) scale(1.12)}
.bldg:active{transform:translate(-50%,-50%) scale(.95)}
.bldg-ic{display:block;filter:drop-shadow(0 3px 8px rgba(0,0,0,.6));line-height:1}
.bldg-lbl{font-size:.5rem;color:rgba(255,255,255,.65);white-space:nowrap;margin-top:1px;text-shadow:0 1px 4px #000}

.vlgr-dot{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;z-index:6;transition:left 1.2s cubic-bezier(.4,0,.2,1),top 1.2s cubic-bezier(.4,0,.2,1)}
.vlgr-dot:hover .vd-ic{transform:scale(1.2)}
.vd-ic{display:block;transition:transform .2s;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));line-height:1}
.vd-nm{font-size:.5rem;white-space:nowrap;margin-top:1px;text-shadow:0 1px 4px #000;font-weight:700}
.vd-bubble{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.6rem;background:rgba(26,20,16,.9);border:1px solid var(--border);border-radius:8px;padding:3px 7px;margin-bottom:4px;pointer-events:none;opacity:0;animation:bubble-show 3s ease-out forwards}
@keyframes bubble-show{0%{opacity:0;transform:translateX(-50%) translateY(4px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-6px)}}

/* ───── LOG ───── */
#log-section{background:var(--panel);border-bottom:1px solid var(--border2);padding:8px 13px;max-height:130px;overflow-y:auto}
.log-hdr{font-size:.6rem;color:var(--text4);letter-spacing:1.5px;margin-bottom:5px}
.log-line{font-size:.72rem;color:var(--text2);padding:2px 0;line-height:1.5;display:flex;gap:6px;border-bottom:1px solid rgba(255,255,255,.03)}
.log-line:last-child{border-bottom:none}
.log-line.special{color:var(--gold)}
.log-line.event{color:#90e878}
.log-time{font-size:.6rem;color:var(--text4);flex-shrink:0;margin-top:1px}

/* ───── VILLAGER BAR ───── */
#vlgr-section{background:var(--panel2);border-bottom:1px solid var(--border2);padding:8px 13px}
.vlgr-sec-hdr{font-size:.6rem;color:var(--text4);letter-spacing:1.5px;margin-bottom:7px}
.vlgr-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px}
.vlgr-card{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:7px 6px;text-align:center;cursor:pointer;flex-shrink:0;width:68px;transition:border-color .2s,transform .15s}
.vlgr-card:hover{border-color:rgba(240,192,64,.35);transform:translateY(-3px)}
.vlgr-card:active{transform:scale(.94)}
.vc-ic{font-size:1.5rem;display:block;margin-bottom:2px}
.vc-nm{font-size:.58rem;color:var(--text2);font-weight:700}
.vc-rel{font-size:.52rem;margin-top:2px}
.vc-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:3px;overflow:hidden}
.vc-fill{height:100%;border-radius:2px;transition:width .6s}

/* ───── TABS ───── */
#tabs{display:flex;background:var(--panel);border-bottom:2px solid var(--border2)}
.tab-btn{flex:1;padding:9px 4px;font-size:.68rem;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s;letter-spacing:.5px}
.tab-btn.act{color:var(--gold);border-bottom-color:var(--gold)}
#tab-body{flex:1;overflow-y:auto;background:var(--panel);padding:13px;min-height:180px}

/* ───── HOME TAB ───── */
.card{background:var(--panel2);border:1px solid var(--border2);border-radius:12px;padding:13px;margin-bottom:10px}
.card-title{font-size:.72rem;color:var(--gold);font-weight:700;margin-bottom:9px;letter-spacing:.5px}
.comfort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.comfort-lbl{font-size:.7rem;color:var(--text2)}
.comfort-val{font-size:.7rem;color:var(--gold);font-weight:700}
.comfort-bar{height:7px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.comfort-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold3),#ff8040);transition:width .7s}
.home-placed{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.placed-item{font-size:1.3rem;padding:5px;background:rgba(255,255,255,.04);border-radius:7px;border:1px solid rgba(255,255,255,.08);cursor:default;title:attr(data-name)}
.furn-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.furn-btn{background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:7px 9px;font-size:.7rem;color:var(--text2);cursor:pointer;font-family:inherit;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:5px}
.furn-btn:hover{border-color:rgba(240,192,64,.3);background:rgba(240,192,64,.05);color:var(--text)}
.furn-cost{font-size:.62rem;color:var(--text3)}

/* ───── DIARY TAB ───── */
.diary-hdr{font-size:.62rem;color:var(--text4);letter-spacing:1.5px;margin-bottom:10px}
.diary-entry{border-left:2px solid var(--border);padding:7px 11px;margin-bottom:8px}
.diary-entry.milestone{border-left-color:var(--gold)}
.diary-dt{font-size:.6rem;color:var(--text4);margin-bottom:3px}
.diary-txt{font-size:.75rem;color:var(--text2);line-height:1.7}

/* ───── VILLAGE TAB ───── */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.72rem}
.stat-row:last-child{border-bottom:none}
.stat-lbl{color:var(--text2)}
.stat-val{color:var(--text);font-weight:700}
.vlgr-rel-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.vlgr-rel-row:last-child{border-bottom:none}
.vrr-ic{font-size:1.4rem;flex-shrink:0}
.vrr-info{flex:1}
.vrr-name{font-size:.75rem;font-weight:700}
.vrr-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:3px;overflow:hidden}
.vrr-fill{height:100%;border-radius:2px;transition:width .6s}
.vrr-pts{font-size:.62rem;color:var(--text3);flex-shrink:0}

/* ───── MODAL ───── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center}
#modal.open{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:82vh;overflow-y:auto}
.modal-vlgr-hdr{display:flex;align-items:center;gap:12px;padding-bottom:13px;border-bottom:1px solid var(--border2);margin-bottom:14px}
.mvh-ic{font-size:2.8rem;flex-shrink:0}
.mvh-name{font-size:1rem;font-weight:800}
.mvh-job{font-size:.7rem;color:var(--text2);margin-top:1px}
.mvh-rel{font-size:.63rem;padding:2px 8px;border-radius:10px;border:1px solid;display:inline-block;margin-top:4px}
.dialogue-box{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:11px;padding:13px;font-size:.82rem;line-height:1.8;color:var(--text);margin-bottom:12px;min-height:58px;transition:opacity .3s}
.modal-actions{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.modal-btn{background:var(--panel2);border:1px solid var(--border2);border-radius:9px;padding:10px 13px;font-size:.78rem;color:var(--text);cursor:pointer;font-family:inherit;text-align:left;transition:border-color .15s,background .15s;line-height:1.3}
.modal-btn:hover{border-color:rgba(240,192,64,.35);background:rgba(240,192,64,.04);color:var(--text)}
.modal-btn.gold{color:var(--gold);border-color:rgba(240,192,64,.28)}
.modal-close{width:100%;background:none;border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:9px;font-size:.78rem;color:var(--text3);cursor:pointer;font-family:inherit;margin-top:2px;transition:color .2s}
.modal-close:hover{color:var(--text)}

/* ───── FESTIVAL OVERLAY ───── */
#festival{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;text-align:center;padding:24px}
#festival.open{display:flex}
.fest-box{max-width:300px}
.fest-ic{font-size:4.5rem;margin-bottom:14px;animation:float 2s ease-in-out infinite;display:block}
.fest-title{font-size:1.5rem;font-weight:900;color:var(--gold);letter-spacing:3px;margin-bottom:10px}
.fest-text{font-size:.82rem;color:var(--text);line-height:1.9;margin-bottom:22px}
.fest-btn{background:linear-gradient(135deg,#f0c040,#c08020);border:none;border-radius:10px;padding:12px 30px;font-size:.9rem;font-weight:800;color:#1a1005;cursor:pointer;letter-spacing:2px;font-family:inherit;transition:transform .1s}
.fest-btn:active{transform:scale(.96)}

/* ───── NOTIFICATION ───── */
#notif{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-4px);background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:7px 16px;font-size:.75rem;color:var(--text);z-index:300;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ───── SCROLLBAR ───── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- ═══════════════════ INTRO ═══════════════════ -->
<div id="intro">
  <div class="intro-capy">🦫</div>
  <div class="intro-title">水豚小村</div>
  <div class="intro-sub">找到屬於你的地方</div>
  <div class="intro-divider"></div>
  <div class="intro-story">
    有一個小村子，幾隻溫柔的水豚住在那裡。<br>
    他們圍著廣場大樹，等待著某個人的到來。<br>
    也許，那個人就是你。
  </div>
  <div class="intro-form">
    <label>你的名字</label>
    <input id="inp-name" type="text" placeholder="旅人" maxlength="8">
    <label>村子的名字</label>
    <input id="inp-village" type="text" placeholder="水豚小村" maxlength="10">
    <button class="btn-start" onclick="startGame()">🏡 踏上旅途</button>
  </div>
</div>

<!-- ═══════════════════ GAME ═══════════════════ -->
<div id="game">

  <!-- Header -->
  <div class="g-header">
    <div class="g-hdr-left">
      <div class="village-nm" id="hdr-village">村名</div>
      <div class="player-nm" id="hdr-player">居民：旅人</div>
    </div>
    <div class="g-hdr-right">
      <div id="season-chip" class="season-chip">🌸 春</div>
      <div class="day-txt" id="hdr-day">第1天</div>
    </div>
  </div>

  <!-- Resources -->
  <div class="res-bar">
    <div class="res-item"><span class="res-ic">🍎</span><span class="res-val" id="r-food">30</span><span class="res-lbl">食物</span></div>
    <div class="res-item"><span class="res-ic">🪵</span><span class="res-val" id="r-wood">20</span><span class="res-lbl">木材</span></div>
    <div class="res-item"><span class="res-ic">💛</span><span class="res-val" id="r-happy">50</span><span class="res-lbl">幸福</span></div>
    <div class="res-item"><span class="res-ic">🤝</span><span class="res-val" id="r-bond">0</span><span class="res-lbl">友誼</span></div>
  </div>

  <!-- Map -->
  <div id="map-wrap">
    <div id="sky"></div>
    <div id="ground"></div>
    <div id="map-items"></div>
  </div>

  <!-- Activity Log -->
  <div id="log-section">
    <div class="log-hdr">📜 村子動態</div>
    <div id="log-list"></div>
  </div>

  <!-- Villager Bar -->
  <div id="vlgr-section">
    <div class="vlgr-sec-hdr">🦫 村民</div>
    <div class="vlgr-row" id="vlgr-row"></div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab-btn act" onclick="switchTab('home')">🏠 你的家</button>
    <button class="tab-btn" onclick="switchTab('diary')">📔 日記</button>
    <button class="tab-btn" onclick="switchTab('village')">🌳 村子</button>
  </div>
  <div id="tab-body"></div>

</div>

<!-- ═══════════════════ MODAL ═══════════════════ -->
<div id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="modal-body"></div>
  </div>
</div>

<!-- ═══════════════════ FESTIVAL ═══════════════════ -->
<div id="festival">
  <div class="fest-box">
    <div id="fest-body"></div>
    <button class="fest-btn" onclick="closeFest()">✨ 繼續</button>
  </div>
</div>

<!-- Notification -->
<div id="notif"></div>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════

const VLGR_DATA = [
  {
    id:'aju', name:'阿橘', ic:'🦫', color:'#e8a040', job:'農夫', personality:'開朗熱情',
    dialogues:[

  {

    dialogues:[
      '歡迎！要不要嚐嚐剛出爐的麵包？',
      '我覺得用心做的食物是有溫度的。',
      '你最近好嗎？我有點擔心你。',
      '小村子有小村子的好，大家都認識你。',
      '今天我烤了一個特別大的麵包，因為想到你。',
    ],
    friendDialogue:[
      '[NAME]！你來得正好，我烤了你最喜歡的口味！',
      '偶爾我會想，要是你沒來這個村子不知道會怎樣。',
      '你知道嗎，每次你進來，麵包坊都變得暖和多了。',

let G = {};

function newState(playerName, villageName) {
  return {
    playerName, villageName,
    day:1, hour:6, seasonDay:0, seasonIdx:0, year:1,
    food:30, wood:20, happiness:50,
    villagers: VLGR_DATA.map(v => ({id:v.id, friendship:0, x:25+Math.random()*50, y:38+Math.random()*28, lastTalkDay:-1})),
    home: {comfort:0, items:[]},
    diary: [],
    log: [],
    flags: {},
    visitCount: 0,
    lastVisit: Date.now(),
    _ok: true,
  };
}

function save() { try { localStorage.setItem('capyvillage', JSON.stringify(G)); } catch(e){} }
function loadSave() { try { const d=localStorage.getItem('capyvillage'); return d?JSON.parse(d):null; } catch(e){ return null; } }

function sub(text) {
  return text.replace(/\[NAME\]/g, G.playerName).replace(/\[VILLAGE\]/g, G.villageName);
}

function vd(id) { return VLGR_DATA.find(v=>v.id===id); }
function vs(id) { return G.villagers.find(v=>v.id===id); }
function totalBond() { return G.villagers.reduce((a,v)=>a+v.friendship,0); }

function relInfo(f) {
  if (f>=100) return {label:'家人',   color:'#ff8040', tier:'family'};
  if (f>= 70) return {label:'摯友',   color:'#f0c040', tier:'best'};
  if (f>= 45) return {label:'好友',   color:'#b060e8', tier:'good'};
  if (f>= 20) return {label:'朋友',   color:'#4a9eff', tier:'friend'};
  if (f>=  5) return {label:'鄰居',   color:'#50c870', tier:'neighbor'};
  return            {label:'陌生人', color:'#888',    tier:'stranger'};
}

function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

function addLog(text, type='') {
  G.log.unshift({text, type, time: TIME_NAMES[G.hour], day:G.day});
  if (G.log.length > 35) G.log.pop();
  renderLog();
}

function addDiary(text, milestone=false) {
  G.diary.unshift({text, day:G.day, season:SEASONS[G.seasonIdx], milestone});
}

function startGame() {
  const pn = document.getElementById('inp-name').value.trim() || '旅人';
  const vn = document.getElementById('inp-village').value.trim() || '水豚小村';
  const saved = loadSave();

  if (saved && saved._ok && saved.playerName === pn) {
    G = saved;
    G.visitCount = (G.visitCount||0) + 1;
    const away = Math.floor((Date.now() - (G.lastVisit||Date.now())) / 60000);
    G.lastVisit = Date.now();
    save();
    showGame();
    if (away >= 30) setTimeout(() => showWelcomeBack(away), 600);
    else addLog(`🌟 ${G.playerName}回到了${G.villageName}。`, 'special');
  } else {
    G = newState(pn, vn);
    G.visitCount = 1;
    G.lastVisit = Date.now();
    save();
    showGame();
    setTimeout(showFirstWelcome, 500);
  }
}

function showGame() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('game').style.flexDirection = 'column';
  initUI();
  startTick();
}

function showFirstWelcome() {
  showFest('🏡', `歡迎來到${G.villageName}！`,
    `${G.playerName}，你終於來了。\n\n這個村子已經等你很久了。\n\n村民們很期待認識你——\n去打個招呼吧。`);
  addDiary(`${G.playerName}抵達了${G.villageName}。一切都是新的開始。`, true);
  addLog(`✨ ${G.playerName}抵達了${G.villageName}！村民們興奮地等待著。`, 'special');
}

function showWelcomeBack(min) {
  const awayTxt = min<60 ? `${min}分鐘` : min<1440 ? `${Math.floor(min/60)}小時` : `${Math.floor(min/1440)}天`;
  showFest('🌟', '你回來了！',
    `${G.playerName}，你離開了${awayTxt}。\n\n阿橘一直往路口張望，\n豆豆問了好幾次你什麼時候回來。\n\n歡迎回家。`);
  addLog(`🌟 ${G.playerName}回到村子了！大家都很高興！`, 'special');
  addDiary(`離開了一段時間，回來了。村子還在，大家都在。`, true);
}

function startTick() {
  clearInterval(_tick);
  _tick = setInterval(tick, 2000); // 2s = 1 game hour
}

function tick() {
  G.hour = (G.hour + 1) % 24;

  // Move villagers randomly
  if (Math.random() < 0.25) {
    const vi = Math.floor(Math.random() * G.villagers.length);
    const v = G.villagers[vi];
    v.x = Math.max(8, Math.min(92, v.x + (Math.random()-.5)*18));
    v.y = Math.max(32, Math.min(72, v.y + (Math.random()-.5)*12));
  }

  // Resource drip (every 3 hours)
  if (G.hour % 3 === 0) {
    G.food    = Math.min(999, G.food + 2);
    G.wood    = Math.min(999, G.wood + 1);
    G.happiness = Math.min(100, G.happiness + 0.3);
  }

  if (G.hour === 0) newDay();
  if (G.hour % 5 === 0) randomEvent();

  renderMap();
  renderHeader();
  renderResources();
  save();
}

function newDay() {
  G.day++;
  G.seasonDay++;
  G.food = Math.min(999, G.food + 6);
  G.wood = Math.min(999, G.wood + 4);
  G.happiness = Math.min(100, G.happiness + 2);

  if (G.seasonDay >= 7) {
    G.seasonDay = 0;
    G.seasonIdx = (G.seasonIdx + 1) % 4;
    if (G.seasonIdx === 0) G.year++;
    newSeason();
  }

  // Day milestones
  if (G.day === 7 && !G.flags.week1) {
    G.flags.week1 = true;
    setTimeout(() => {
      showFest('🎉', '一週了！',
        `${G.playerName}，你在${G.villageName}住滿一週了！\n\n大家在廣場大樹下\n為你舉辦了一個小派對。\n\n你不再只是過客——\n你是這個村子的一份子。`);
      addDiary('在村子住滿了第一週。這裡開始有家的感覺。', true);
    }, 1000);
  }
  if (G.day === 30 && !G.flags.month1) {
    G.flags.month1 = true;
    setTimeout(() => {
      showFest('🌟', '一個月了！',
        `第30天了，${G.playerName}。\n\n你已經深深地嵌入\n這個村子的每一天了。\n\n老榕說，扎根需要時間，\n而你的根已經很深了。`);
      addDiary('在村子住了整整一個月。這裡已經是我的家了。', true);
    }, 1000);
  }

  // Daily flavor
  const flavors = [
    `第${G.day}天，${G.villageName}的清晨平靜而美好。`,
    `清晨的薄霧散去，又是新的一天。`,
    `阿橘說今天土壤很肥沃，是個好兆頭。`,
    `豆豆一早就出門探險，說要找新奇的東西。`,
    `老榕說，這個村子每天都在成長。`,
    `毛球特別早起，說要做一個特別的麵包。`,
    `小藍說魚塘今天的水格外清澈。`,
  ];
  addLog(flavors[Math.floor(Math.random()*flavors.length)], 'event');
}

function newSeason() {
  const s = SEASONS[G.seasonIdx];
  addLog(`🌀 季節交替——${s}到來了。`, 'special');
  addDiary(`${s}了。村子換了一副面孔，依然美麗。`);
  const msgs = [
    ['🌸','春天來了！', `${G.villageName}的春天，花朵都開了。\n毛球說要烤春天口味的麵包。\n阿橘說田裡可以播新種子了。\n\n新的開始。`],
    ['☀️','盛夏節！', `夏天的太陽很熱烈。\n豆豆拉著你去魚塘玩水。\n今晚廣場大樹下有螢火蟲！`],
    ['🍂','豐收秋！', `秋天的顏色讓人心暖。\n阿橘說今年豐收，要辦豐收宴。\n老榕說，這一年，你讓村子更完整了。`],
    ['❄️','冬日暖爐！', `冬天來了，大家更常聚在一起。\n毛球的麵包坊成了最受歡迎的地方。\n小藍的魚塘結了薄冰——\n他說這是最美的冬天。`],
  ];
  const [ic, title, text] = msgs[G.seasonIdx];
  setTimeout(() => showFest(ic, title, text), 800);
}

  const events = [

function initUI() {
  document.getElementById('hdr-village').textContent = G.villageName;
  document.getElementById('hdr-player').textContent = `居民：${G.playerName}`;

  // Set map height (responsive)
  const mw = document.getElementById('map-wrap');
  const w = Math.min(window.innerWidth, 480);
  mw.style.height = Math.round(w * 0.62) + 'px';

  renderHeader();
  renderResources();
  renderMap();
  renderLog();
  renderVlgrRow();
  renderTab();
}

function renderHeader() {
  const col = SEASON_COL[G.seasonIdx];
  const chip = document.getElementById('season-chip');
  chip.textContent = SEASONS[G.seasonIdx];
  chip.style.background = col+'20';
  chip.style.color = col;
  chip.style.border = `1px solid ${col}44`;

  document.getElementById('hdr-day').textContent = `第${G.day}天 ${TIME_NAMES[G.hour]}`;

  // Sky color
  const sk = SKY_COLORS[SEASON_CLS[G.seasonIdx]];
  const hi = Math.floor(G.hour / 2);
  document.getElementById('sky').style.background = sk[hi] || sk[0];
  document.getElementById('ground').style.background = GROUND_COLORS[SEASON_CLS[G.seasonIdx]];
}

function renderResources() {
  document.getElementById('r-food').textContent    = Math.floor(G.food);
  document.getElementById('r-wood').textContent    = Math.floor(G.wood);
  document.getElementById('r-happy').textContent   = Math.floor(G.happiness);
  document.getElementById('r-bond').textContent    = Math.floor(totalBond());
}

function renderMap() {
  let h = '';
  // Buildings
  BLDG_DATA.forEach(b => {
    h += `<div class="bldg" style="left:${b.x}%;top:${b.y}%" onclick="showBuilding('${b.id}')">
      <span class="bldg-ic" style="font-size:${b.size}">${b.ic}</span>
      <div class="bldg-lbl">${b.name}</div>
    </div>`;
  });
  // Villagers
  G.villagers.forEach((v, i) => {
    const d = VLGR_DATA[i];
    const rel = relInfo(v.friendship);
    h += `<div class="vlgr-dot" style="left:${v.x}%;top:${v.y}%" onclick="openVlgrModal('${d.id}')">
      <span class="vd-ic" style="font-size:1.55rem">${d.ic}</span>
      <div class="vd-nm" style="color:${rel.color}">${d.name}</div>
    </div>`;
  });
  document.getElementById('map-items').innerHTML = h;
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!el) return;
  el.innerHTML = G.log.slice(0,10).map(e =>
    `<div class="log-line ${e.type}"><span class="log-time">${e.time}</span>${e.text}</div>`
  ).join('');
}

function renderVlgrRow() {
  document.getElementById('vlgr-row').innerHTML = VLGR_DATA.map((d, i) => {
    const v = G.villagers[i];
    const r = relInfo(v.friendship);
    return `<div class="vlgr-card" onclick="openVlgrModal('${d.id}')">
      <span class="vc-ic">${d.ic}</span>
      <div class="vc-nm">${d.name}</div>
      <div class="vc-rel" style="color:${r.color}">${r.label}</div>
      <div class="vc-bar"><div class="vc-fill" style="width:${v.friendship}%;background:${r.color}"></div></div>
    </div>`;
  }).join('');
}

function switchTab(tab) {
  _tab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('act', ['home','diary','village'][i] === tab);
  });
  renderTab();
}

function renderTab() {
  const el = document.getElementById('tab-body');
  if (_tab === 'home')    el.innerHTML = buildHomeTab();
  else if (_tab === 'diary')   el.innerHTML = buildDiaryTab();
  else el.innerHTML = buildVillageTab();
}

function buildHomeTab() {
  const h = G.home;
  const pct = Math.min(100, h.comfort);
  const feel = pct<20?'空蕩蕩':pct<50?'有點溫馨':pct<80?'很舒適':'完美的家';
  let s = `<div class="card">
    <div class="card-title">🏠 ${G.playerName}的小屋</div>
    <div class="comfort-row">
      <span class="comfort-lbl">舒適度</span>
      <span class="comfort-val">${Math.floor(pct)}/100 · ${feel}</span>
    </div>
    <div class="comfort-bar"><div class="comfort-fill" style="width:${pct}%"></div></div>
    <div style="font-size:.62rem;color:var(--text3);margin-top:5px">讓這裡成為你最想回來的地方</div>`;

  if (h.items.length) {
    s += `<div class="home-placed" style="margin-top:10px">`;
    h.items.forEach(id => {
      const f = FURNITURE.find(x=>x.id===id);
      if (f) s += `<div class="placed-item" title="${f.name}">${f.ic}</div>`;
    });
    s += `</div>`;
  }
  s += `</div>`;

  const unowned = FURNITURE.filter(f => !h.items.includes(f.id));
  if (unowned.length) {
    s += `<div class="card"><div class="card-title">添置家具 <span style="font-size:.62rem;color:var(--text3)">（消耗木材）</span></div>
      <div class="furn-grid">`;
    unowned.forEach(f => {
      s += `<button class="furn-btn" onclick="buyFurniture('${f.id}')">
        ${f.ic} ${f.name} <span class="furn-cost">🪵${f.cost}</span>
      </button>`;
    });
    s += `</div></div>`;
  } else {
    s += `<div class="card"><div style="font-size:.75rem;color:var(--gold);text-align:center;padding:6px">✨ 你的家已經完美了！</div></div>`;
  }
  return s;
}

function buildDiaryTab() {
  if (!G.diary.length)
    return `<div style="color:var(--text3);font-size:.75rem;text-align:center;padding:24px">日記還是空的。<br>去體驗村子的生活吧！</div>`;
  return `<div class="diary-hdr">📔 ${G.playerName}的村子日記</div>` +
    G.diary.map(e => `<div class="diary-entry${e.milestone?' milestone':''}">
      <div class="diary-dt">${e.season} · 第${e.day}天</div>
      <div class="diary-txt">${e.text}</div>
    </div>`).join('');
}

function buildVillageTab() {
  const bond = totalBond();
  let s = `<div class="card">
    <div class="card-title">🌳 ${G.villageName} 概覽</div>
    <div class="stat-row"><span class="stat-lbl">📅 時間</span><span class="stat-val">第${G.day}天 · ${SEASONS[G.seasonIdx]} · 第${G.year}年</span></div>
    <div class="stat-row"><span class="stat-lbl">💛 村子幸福度</span><span class="stat-val">${Math.floor(G.happiness)}/100</span></div>
    <div class="stat-row"><span class="stat-lbl">🤝 總友誼值</span><span class="stat-val">${Math.floor(bond)} / ${VLGR_DATA.length*100}</span></div>
    <div class="stat-row"><span class="stat-lbl">🏠 小屋舒適度</span><span class="stat-val">${Math.floor(Math.min(100,G.home.comfort))}/100</span></div>
    <div class="stat-row"><span class="stat-lbl">📔 日記頁數</span><span class="stat-val">${G.diary.length} 頁</span></div>
  </div>`;

  s += `<div class="card"><div class="card-title">🦫 村民關係</div>`;
  VLGR_DATA.forEach((d,i) => {
    const v = G.villagers[i];
    const r = relInfo(v.friendship);
    s += `<div class="vlgr-rel-row" onclick="openVlgrModal('${d.id}')">
      <span class="vrr-ic">${d.ic}</span>
      <div class="vrr-info">
        <div class="vrr-name">${d.name} <span style="font-size:.62rem;color:${r.color}">${r.label}</span></div>
        <div class="vrr-bar"><div class="vrr-fill" style="width:${v.friendship}%;background:${r.color}"></div></div>
      </div>
      <span class="vrr-pts">${Math.floor(v.friendship)}/100</span>
    </div>`;
  });
  s += `</div>`;
  return s;
}

// ══════════════════════════════════════════════
//  HOME FURNITURE
// ══════════════════════════════════════════════

function buyFurniture(id) {
  const f = FURNITURE.find(x=>x.id===id);
  if (!f) return;
  if (G.wood < f.cost) { notify(`🪵 木材不足！需要 ${f.cost} 木材`); return; }
  G.wood -= f.cost;
  G.home.items.push(id);
  G.home.comfort += f.comfort;
  addLog(`🏠 小屋添置了 ${f.ic}${f.name}，舒適度提升了！`, 'event');
  addDiary(`為小屋添置了${f.name}。這裡越來越有家的感覺了。`);
  notify(`✨ 添置了 ${f.ic}${f.name}！舒適+${f.comfort}`);
  renderResources();
  renderTab();
  save();
}

// ══════════════════════════════════════════════
//  BUILDING CLICK
// ══════════════════════════════════════════════

function showBuilding(id) {
  const b = BLDG_DATA.find(x=>x.id===id);
  if (!b) return;
  let extra = '';
  if (id === 'home') {
    extra = `<div style="font-size:.75rem;color:var(--text2);background:rgba(255,255,255,.03);border-radius:9px;padding:11px;margin-bottom:12px;line-height:1.9">
      這是你在${G.villageName}的家。<br>
      舒適度：${Math.floor(Math.min(100,G.home.comfort))}/100<br>
      家具：${G.home.items.length} 件<br>
      <span style="color:var(--gold)">這裡永遠為你開著燈。</span>
    </div>`;
  }
  document.getElementById('modal-body').innerHTML = `
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:3.5rem;margin-bottom:8px">${b.ic}</div>
      <div style="font-size:1rem;font-weight:800;color:var(--gold)">${b.name}</div>
      <div style="font-size:.75rem;color:var(--text2);margin-top:5px">${b.desc}</div>
    </div>
    ${extra}
    <button class="modal-close" onclick="closeModal()">關閉</button>
  `;
  document.getElementById('modal').classList.add('open');
}

// ══════════════════════════════════════════════
//  VILLAGER INTERACTION
// ══════════════════════════════════════════════

function openVlgrModal(id) {
  const d = vd(id);
  const v = vs(id);
  const r = relInfo(v.friendship);

  let pool;
  if (r.tier==='family') pool = [...d.familyDialogue, ...d.friendDialogue];
  else if (r.tier==='best'||r.tier==='good') pool = [...d.friendDialogue, ...d.dialogues];
  else pool = d.dialogues;
  const line = sub(pool[Math.floor(Math.random()*pool.length)]);

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-vlgr-hdr">
      <span class="mvh-ic">${d.ic}</span>
      <div>
        <div class="mvh-name" style="color:${r.color}">${d.name}</div>
        <div class="mvh-job">${d.job} · ${d.personality}</div>
        <span class="mvh-rel" style="color:${r.color};border-color:${r.color}44">${r.label} (${Math.floor(v.friendship)}/100)</span>
      </div>
    </div>
    <div class="dialogue-box" id="dlg-box">"${line}"</div>
    <div class="modal-actions">
      <button class="modal-btn gold" onclick="talkMore('${id}')">💬 繼續聊聊</button>
      <button class="modal-btn" onclick="askVillage('${id}')">🌳 聊聊村子</button>
      <button class="modal-btn" onclick="showGiftMenu('${id}')">🎁 送個禮物</button>
    </div>
    <button class="modal-close" onclick="closeModal()">離開</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function talkMore(id) {
  const d = vd(id);
  const v = vs(id);
  const sameDay = v.lastTalkDay === G.day;
  const gain = sameDay ? 1 : 3;
  const prev = relInfo(v.friendship).tier;
  v.friendship = Math.min(100, v.friendship + gain);
  v.lastTalkDay = G.day;
  const curr = relInfo(v.friendship);

  if (prev !== curr.tier) onRelUp(id, curr);

  const pool = [...d.dialogues, ...(v.friendship>=20?d.friendDialogue:[])];
  const line = sub(pool[Math.floor(Math.random()*pool.length)]);
  swapDialogue(line);

  if (!sameDay) addLog(`${G.playerName}跟${d.name}聊了聊天。`);
  renderVlgrRow();
  renderResources();
  if (_tab==='village') renderTab();
  save();
}

function askVillage(id) {
  const d = vd(id);
  const v = vs(id);
  const line = sub(d.villageTalks[Math.floor(Math.random()*d.villageTalks.length)]);
  v.friendship = Math.min(100, v.friendship + 1);
  swapDialogue(line);
  renderVlgrRow();
  save();
}

function swapDialogue(text) {
  const el = document.getElementById('dlg-box');
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = text; el.style.opacity = '1'; }, 220);
}

function showGiftMenu(id) {
  const d = vd(id);
  const r = relInfo(vs(id).friendship);
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-vlgr-hdr">
      <span class="mvh-ic">${d.ic}</span>
      <div>
        <div class="mvh-name" style="color:${r.color}">${d.name}</div>
        <div class="mvh-job">選擇要送的禮物</div>
      </div>
    </div>
    <div class="modal-actions">
      ${GIFTS.map(g=>`<button class="modal-btn" onclick="giveGift('${id}','${g.id}')">
        ${g.ic} ${g.name} ${g.cost?`<span style="color:var(--text3)">消耗 ${g.cost} 幸福</span>`:'<span style="color:var(--gold)">免費</span>'}
      </button>`).join('')}
    </div>
    <button class="modal-close" onclick="openVlgrModal('${id}')">← 返回</button>
  `;
}

function giveGift(vlId, giftId) {
  const d = vd(vlId);
  const v = vs(vlId);
  const g = GIFTS.find(x=>x.id===giftId);
  if (!g) return;
  if (g.cost && G.happiness < g.cost) { notify('💛 幸福感不足！'); return; }
  if (g.cost) G.happiness = Math.max(0, G.happiness - g.cost);

  const prev = relInfo(v.friendship).tier;
  v.friendship = Math.min(100, v.friendship + 8);
  const curr = relInfo(v.friendship);
  if (prev !== curr.tier) onRelUp(vlId, curr);

  const resp = sub(d.giftResp);
  addLog(`${G.playerName}送了${g.ic}${g.name}給${d.name}。`, 'event');
  addDiary(`送了${g.name}給${d.name}。他/她看起來非常開心。`);

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-vlgr-hdr">
      <span class="mvh-ic">${d.ic}</span>
      <div>
        <div class="mvh-name">${d.name}</div>
        <div class="mvh-job">收到了 ${g.ic} ${g.name}</div>
      </div>
    </div>
    <div class="dialogue-box">"${resp}"</div>
    <div style="font-size:.72rem;color:var(--gold);text-align:center;padding:3px 0 8px">友誼 +8 💛</div>
    <button class="modal-close" onclick="openVlgrModal('${vlId}')">← 繼續對話</button>
    <button class="modal-close" onclick="closeModal()" style="margin-top:5px">關閉</button>
  `;
  renderVlgrRow();
  renderResources();
  if (_tab==='village') renderTab();
  save();
}

function onRelUp(id, rel) {
  const d = vd(id);
  addLog(`✨ 與${d.name}的關係升級為「${rel.label}」！`, 'special');
  addDiary(`與${d.name}成為了${rel.label}。這份情誼很珍貴。`, true);
  notify(`✨ 與${d.name}成為了${rel.label}！`);
  if (rel.tier === 'family') {
    const line = sub(d.familyDialogue[0]);
    setTimeout(() => showFest('❤️', `你和${d.name}成為了家人！`,
      `${d.name}說：\n\n"${line}"\n\n在${G.villageName}，\n你不再是外來者了。`), 400);
  }
}

// ══════════════════════════════════════════════
//  FESTIVAL & MODAL
// ══════════════════════════════════════════════

function showFest(ic, title, text) {
  document.getElementById('fest-body').innerHTML = `
    <span class="fest-ic">${ic}</span>
    <div class="fest-title">${title}</div>
    <div class="fest-text">${text.replace(/\n/g,'<br>')}</div>
  `;
  document.getElementById('festival').classList.add('open');
}

function closeFest() {
  document.getElementById('festival').classList.remove('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ══════════════════════════════════════════════
//  ENTRY
// ══════════════════════════════════════════════

window.addEventListener('load', () => {
  const saved = loadSave();
  if (saved && saved._ok) {
    document.getElementById('inp-name').value    = saved.playerName  || '';
    document.getElementById('inp-village').value = saved.villageName || '';
  }
});
</script>
</body>
</html>
