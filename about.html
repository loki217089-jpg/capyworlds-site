<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6193561251326215"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - CapyWorlds</title>
  <style>
    :root {
      --bg: #13100c; --bg-hero: #2d1e0e; --bg2: #1e1812;
      --border: #3d3020; --accent: #c8a456; --accent-rgb: 200,164,86;
      --text: #e8ddd0; --text2: #b09880; --text3: #7a6a58;
      --h1: #ffffff;
    }
    [data-theme="light"] {
      --bg: #f5f0e8; --bg-hero: #e0d0a8; --bg2: #ffffff;
      --border: #d4c4a0; --accent: #9a6e1e; --accent-rgb: 154,110,30;
      --text: #2a1e0e; --text2: #7a5a40; --text3: #6a5a48;
      --h1: #1a0e06;
    }
    [data-theme="pink"] {
      --bg: #1a0810; --bg-hero: #3d0a22; --bg2: #260a18;
      --border: #6a2050; --accent: #e060a8; --accent-rgb: 224,96,168;
      --text: #f8d8ec; --text2: #d890b8; --text3: #a05880;
      --h1: #fff0f8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.3s, color 0.3s;
    }

    .page-header {
      width: 100%;
      text-align: center;
      padding: 48px 24px 36px;
      background: radial-gradient(ellipse at 50% -10%, var(--bg-hero) 0%, var(--bg) 68%);
      position: relative;
    }
    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 40%, var(--accent) 60%, transparent);
    }

    .capy-art {
      width: 160px;
      height: 150px;
      display: block;
      margin: 0 auto 22px;
      filter: drop-shadow(0 6px 20px rgba(var(--accent-rgb),0.18));
    }

    .page-header h1 {
      font-size: 36px;
      font-weight: 900;
      color: var(--h1);
      letter-spacing: 3px;
    }
    .page-header h1 .accent { color: var(--accent); }

    .content {
      max-width: 600px;
      width: 100%;
      padding: 48px 24px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 28px;
    }

    .card p {
      font-size: 16px;
      color: var(--text2);
      line-height: 1.8;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 36px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    .theme-switcher {
      position: fixed; top: 14px; right: 14px; z-index: 200;
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
      padding: 6px 10px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .theme-switcher-label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; margin-right: 2px; user-select: none; }
    .theme-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; outline: none; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active { border-color: var(--text); box-shadow: 0 0 0 1px var(--bg2); transform: scale(1.1); }
    .theme-dot[data-t="dark"]  { background: radial-gradient(circle at 35% 35%, #c8a456, #5a3c10); }
    .theme-dot[data-t="light"] { background: radial-gradient(circle at 35% 35%, #f5f0d8, #c8b480); }
    .theme-dot[data-t="pink"]  { background: radial-gradient(circle at 35% 35%, #f880c0, #8a1858); }
  </style>
</head>
<body>

  <div class="theme-switcher">
    <span class="theme-switcher-label">主題</span>
    <button class="theme-dot" data-t="dark"  title="深色" onclick="setTheme('dark')"></button>
    <button class="theme-dot" data-t="light" title="明亮" onclick="setTheme('light')"></button>
    <button class="theme-dot" data-t="pink"  title="粉色" onclick="setTheme('pink')"></button>
  </div>

  <header class="page-header">
    <!-- Capybara waving SVG -->
    <svg class="capy-art" viewBox="0 0 160 150" xmlns="http://www.w3.org/2000/svg">
      <!-- Ground -->
      <ellipse cx="80" cy="144" rx="68" ry="11" fill="#2d4a1e" opacity="0.4"/>
      <!-- Body -->
      <ellipse cx="72" cy="116" rx="48" ry="30" fill="#b8955a"/>
      <!-- Right arm raised waving -->
      <path d="M106 98 Q128 78 132 56" stroke="#b8955a" stroke-width="12" fill="none" stroke-linecap="round"/>
      <!-- Waving paw -->
      <ellipse cx="132" cy="52" rx="11" ry="11" fill="#c09a62"/>
      <!-- Paw fingers spread -->
      <path d="M124 46 L120 40 M129 44 L127 37 M134 44 L134 37 M139 46 L141 40" stroke="#8a6a40" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Left arm resting -->
      <path d="M38 108 Q32 124 44 132" stroke="#b8955a" stroke-width="11" fill="none" stroke-linecap="round"/>
      <!-- Head -->
      <ellipse cx="76" cy="72" rx="40" ry="37" fill="#c09a62"/>
      <!-- Snout -->
      <ellipse cx="76" cy="86" rx="24" ry="17" fill="#d4aa78"/>
      <!-- Ears -->
      <ellipse cx="47" cy="44" rx="13" ry="15" fill="#b8955a"/>
      <ellipse cx="105" cy="44" rx="13" ry="15" fill="#b8955a"/>
      <ellipse cx="47" cy="44" rx="9" ry="11" fill="#d0a874"/>
      <ellipse cx="105" cy="44" rx="9" ry="11" fill="#d0a874"/>
      <!-- Eyes (happy, squinting) -->
      <path d="M63 65 Q68 60 74 65" stroke="#1a0e06" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M80 65 Q86 60 91 65" stroke="#1a0e06" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Nostrils -->
      <ellipse cx="69" cy="87" rx="3.5" ry="2.5" fill="#7a5035"/>
      <ellipse cx="83" cy="87" rx="3.5" ry="2.5" fill="#7a5035"/>
      <!-- Big smile -->
      <path d="M 60 96 Q 76 110 92 96" stroke="#7a5035" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Cheek blush -->
      <ellipse cx="57" cy="76" rx="8" ry="5" fill="#e07070" opacity="0.2"/>
      <ellipse cx="95" cy="76" rx="8" ry="5" fill="#e07070" opacity="0.2"/>
      <!-- Sparkles -->
      <text x="140" y="78" font-size="14" opacity="0.55">✦</text>
      <text x="8"  y="88" font-size="10" opacity="0.4">✦</text>
    </svg>

    <h1>🦫 <span class="accent">About</span></h1>
  </header>

  <main class="content">
    <div class="card">
      <p>這是我的個人創作小宇宙。<br><br>
      喜歡做遊戲、寫作、以及各種奇奇怪怪的創意專案。<br>
      希望 CapyWorlds 能成為一個讓人放鬆、有趣的地方，就像卡皮巴拉一樣慢慢享受人生 🦫
      </p>
    </div>
    <a class="back-link" href="/">← 回到首頁 &nbsp; Back Home</a>
  </main>

<script>
(function() {
  const saved = localStorage.getItem('capyTheme') || 'dark';
  function setTheme(t) {
    if (t === 'dark') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('capyTheme', t);
    document.querySelectorAll('.theme-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.t === t);
    });
  }
  window.setTheme = setTheme;
  setTheme(saved);
})();
</script>
</body>
</html>
