<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6193561251326215"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - CapyWorlds</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #13100c;
      color: #e8ddd0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-header {
      width: 100%;
      text-align: center;
      padding: 48px 24px 36px;
      background: radial-gradient(ellipse at 50% -10%, #2d1e0e 0%, #13100c 68%);
      position: relative;
    }
    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8a456 40%, #c8a456 60%, transparent);
    }

    .capy-art {
      width: 160px;
      height: 150px;
      display: block;
      margin: 0 auto 22px;
      filter: drop-shadow(0 6px 20px rgba(200,164,86,0.18));
    }

    .page-header h1 {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 3px;
    }
    .page-header h1 .accent { color: #c8a456; }

    .content {
      max-width: 600px;
      width: 100%;
      padding: 48px 24px;
    }

    .card {
      background: #1e1812;
      border: 1px solid #3d3020;
      border-radius: 18px;
      padding: 32px 28px;
    }

    .card p {
      font-size: 16px;
      color: #b09880;
      line-height: 1.8;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 36px;
      color: #c8a456;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }
  </style>
</head>
<body>

  <header class="page-header">
    <!-- Capybara waving SVG -->
    <svg class="capy-art" viewBox="0 0 160 150" xmlns="http://www.w3.org/2000/svg">
      <!-- Ground -->
      <ellipse cx="80" cy="144" rx="68" ry="11" fill="#2d4a1e" opacity="0.4"/>
      <!-- Body -->
      <ellipse cx="72" cy="116" rx="48" ry="30" fill="#b8955a"/>
      <!-- Right arm raised waving -->
      <path d="M106 98 Q128 78 132 56" stroke="#b8955a" stroke-width="12" fill="none" stroke-linecap="round"/>
      <!-- Waving paw -->
      <ellipse cx="132" cy="52" rx="11" ry="11" fill="#c09a62"/>
      <!-- Paw fingers spread -->
      <path d="M124 46 L120 40 M129 44 L127 37 M134 44 L134 37 M139 46 L141 40" stroke="#8a6a40" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Left arm resting -->
      <path d="M38 108 Q32 124 44 132" stroke="#b8955a" stroke-width="11" fill="none" stroke-linecap="round"/>
      <!-- Head -->
      <ellipse cx="76" cy="72" rx="40" ry="37" fill="#c09a62"/>
      <!-- Snout -->
      <ellipse cx="76" cy="86" rx="24" ry="17" fill="#d4aa78"/>
      <!-- Ears -->
      <ellipse cx="47" cy="44" rx="13" ry="15" fill="#b8955a"/>
      <ellipse cx="105" cy="44" rx="13" ry="15" fill="#b8955a"/>
      <ellipse cx="47" cy="44" rx="9" ry="11" fill="#d0a874"/>
      <ellipse cx="105" cy="44" rx="9" ry="11" fill="#d0a874"/>
      <!-- Eyes (happy, squinting) -->
      <path d="M63 65 Q68 60 74 65" stroke="#1a0e06" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M80 65 Q86 60 91 65" stroke="#1a0e06" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Nostrils -->
      <ellipse cx="69" cy="87" rx="3.5" ry="2.5" fill="#7a5035"/>
      <ellipse cx="83" cy="87" rx="3.5" ry="2.5" fill="#7a5035"/>
      <!-- Big smile -->
      <path d="M 60 96 Q 76 110 92 96" stroke="#7a5035" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Cheek blush -->
      <ellipse cx="57" cy="76" rx="8" ry="5" fill="#e07070" opacity="0.2"/>
      <ellipse cx="95" cy="76" rx="8" ry="5" fill="#e07070" opacity="0.2"/>
      <!-- Sparkles -->
      <text x="140" y="78" font-size="14" opacity="0.55">✦</text>
      <text x="8"  y="88" font-size="10" opacity="0.4">✦</text>
    </svg>

    <h1>🦫 <span class="accent">About</span></h1>
  </header>

  <main class="content">
    <div class="card">
      <p>這是我的個人創作小宇宙。<br><br>
      喜歡做遊戲、寫作、以及各種奇奇怪怪的創意專案。<br>
      希望 CapyWorlds 能成為一個讓人放鬆、有趣的地方，就像卡皮巴拉一樣慢慢享受人生 🦫
      </p>
    </div>
    <a class="back-link" href="/">← 回到首頁 &nbsp; Back Home</a>
  </main>

</body>
</html>
