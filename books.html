<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6193561251326215"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books - CapyWorlds</title>
  <style>
    :root {
      --bg: #13100c; --bg-hero: #2d1e0e; --bg2: #1e1812;
      --border: #3d3020; --accent: #c8a456; --accent-rgb: 200,164,86;
      --text: #e8ddd0; --text2: #907a60; --text3: #7a6a58; --text5: #604830;
      --h1: #ffffff;
    }
    [data-theme="light"] {
      --bg: #f5f0e8; --bg-hero: #e0d0a8; --bg2: #ffffff;
      --border: #d4c4a0; --accent: #9a6e1e; --accent-rgb: 154,110,30;
      --text: #2a1e0e; --text2: #7a6a50; --text3: #6a5a48; --text5: #4a3828;
      --h1: #1a0e06;
    }
    [data-theme="pink"] {
      --bg: #1a0810; --bg-hero: #3d0a22; --bg2: #260a18;
      --border: #6a2050; --accent: #e060a8; --accent-rgb: 224,96,168;
      --text: #f8d8ec; --text2: #c06898; --text3: #a05880; --text5: #e8b8d4;
      --h1: #fff0f8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.3s, color 0.3s;
    }

    .page-header {
      width: 100%;
      text-align: center;
      padding: 48px 24px 36px;
      background: radial-gradient(ellipse at 50% -10%, var(--bg-hero) 0%, var(--bg) 68%);
      position: relative;
    }
    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 40%, var(--accent) 60%, transparent);
    }

    .capy-art {
      width: 168px;
      height: 154px;
      display: block;
      margin: 0 auto 22px;
      filter: drop-shadow(0 6px 20px rgba(var(--accent-rgb),0.18));
    }

    .page-header h1 {
      font-size: 36px;
      font-weight: 900;
      color: var(--h1);
      letter-spacing: 3px;
    }
    .page-header h1 .accent { color: var(--accent); }

    .content {
      max-width: 600px;
      width: 100%;
      padding: 48px 24px;
    }

    .placeholder-card {
      background: var(--bg2);
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 40px 28px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .placeholder-card .pl-icon { font-size: 36px; opacity: 0.5; }
    .placeholder-card .pl-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text3);
    }
    .placeholder-card .pl-desc {
      font-size: 13px;
      color: var(--text5);
      line-height: 1.7;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 36px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    .theme-switcher {
      position: fixed; top: 14px; right: 14px; z-index: 200;
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
      padding: 6px 10px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .theme-switcher-label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; margin-right: 2px; user-select: none; }
    .theme-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; outline: none; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active { border-color: var(--text); box-shadow: 0 0 0 1px var(--bg2); transform: scale(1.1); }
    .theme-dot[data-t="dark"]  { background: radial-gradient(circle at 35% 35%, #c8a456, #5a3c10); }
    .theme-dot[data-t="light"] { background: radial-gradient(circle at 35% 35%, #f5f0d8, #c8b480); }
    .theme-dot[data-t="pink"]  { background: radial-gradient(circle at 35% 35%, #f880c0, #8a1858); }
  </style>
</head>
<body>

  <div class="theme-switcher">
    <span class="theme-switcher-label">主題</span>
    <button class="theme-dot" data-t="dark"  title="深色" onclick="setTheme('dark')"></button>
    <button class="theme-dot" data-t="light" title="明亮" onclick="setTheme('light')"></button>
    <button class="theme-dot" data-t="pink"  title="粉色" onclick="setTheme('pink')"></button>
  </div>

  <header class="page-header">
    <!-- Capybara reading a book SVG -->
    <svg class="capy-art" viewBox="0 0 168 154" xmlns="http://www.w3.org/2000/svg">
      <!-- Ground -->
      <ellipse cx="84" cy="148" rx="72" ry="11" fill="#2d4a1e" opacity="0.4"/>
      <!-- Body (sitting upright) -->
      <ellipse cx="84" cy="118" rx="52" ry="30" fill="#b8955a"/>
      <!-- Open book held up in arms -->
      <!-- Left page -->
      <path d="M40 86 Q62 80 84 84 L84 128 Q62 124 40 128 Z" fill="#f5e8c8"/>
      <!-- Right page -->
      <path d="M84 84 Q106 80 128 86 L128 128 Q106 124 84 128 Z" fill="#ede0b8"/>
      <!-- Book spine -->
      <rect x="82" y="84" width="4" height="44" rx="2" fill="#8a7050"/>
      <!-- Lines left page -->
      <line x1="47" y1="94"  x2="79" y2="91"  stroke="#c0a878" stroke-width="1"/>
      <line x1="47" y1="100" x2="79" y2="97"  stroke="#c0a878" stroke-width="1"/>
      <line x1="47" y1="106" x2="79" y2="103" stroke="#c0a878" stroke-width="1"/>
      <line x1="47" y1="112" x2="79" y2="109" stroke="#c0a878" stroke-width="1"/>
      <!-- Lines right page -->
      <line x1="89" y1="91"  x2="121" y2="94"  stroke="#c0a878" stroke-width="1"/>
      <line x1="89" y1="97"  x2="121" y2="100" stroke="#c0a878" stroke-width="1"/>
      <line x1="89" y1="103" x2="121" y2="106" stroke="#c0a878" stroke-width="1"/>
      <line x1="89" y1="109" x2="121" y2="112" stroke="#c0a878" stroke-width="1"/>
      <!-- Left arm holding book -->
      <path d="M40 108 Q35 100 40 88" stroke="#b8955a" stroke-width="11" fill="none" stroke-linecap="round"/>
      <!-- Right arm holding book -->
      <path d="M128 108 Q133 100 128 88" stroke="#b8955a" stroke-width="11" fill="none" stroke-linecap="round"/>
      <!-- Head (looking down at book) -->
      <ellipse cx="84" cy="66" rx="40" ry="37" fill="#c09a62"/>
      <!-- Snout -->
      <ellipse cx="84" cy="80" rx="24" ry="17" fill="#d4aa78"/>
      <!-- Ears -->
      <ellipse cx="54" cy="38" rx="13" ry="15" fill="#b8955a"/>
      <ellipse cx="114" cy="38" rx="13" ry="15" fill="#b8955a"/>
      <ellipse cx="54" cy="38" rx="9" ry="11" fill="#d0a874"/>
      <ellipse cx="114" cy="38" rx="9" ry="11" fill="#d0a874"/>
      <!-- Eyes (reading, slightly narrowed) -->
      <ellipse cx="72" cy="60" rx="7.5" ry="6" fill="#1a0e06"/>
      <ellipse cx="96" cy="60" rx="7.5" ry="6" fill="#1a0e06"/>
      <circle cx="69" cy="57" r="2.5" fill="white"/>
      <circle cx="93" cy="57" r="2.5" fill="white"/>
      <!-- Reading glasses hint -->
      <path d="M62 60 Q72 56 82 60" stroke="#8a7050" stroke-width="1.5" fill="none"/>
      <path d="M86 60 Q96 56 106 60" stroke="#8a7050" stroke-width="1.5" fill="none"/>
      <line x1="82" y1="60" x2="86" y2="60" stroke="#8a7050" stroke-width="1.5"/>
      <!-- Nostrils -->
      <ellipse cx="77" cy="81" rx="3.5" ry="2.5" fill="#7a5035"/>
      <ellipse cx="91" cy="81" rx="3.5" ry="2.5" fill="#7a5035"/>
      <!-- Content smile -->
      <path d="M 70 89 Q 84 99 98 89" stroke="#7a5035" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Small sparkles -->
      <text x="140" y="54" font-size="12" opacity="0.5">✦</text>
      <text x="22"  y="62" font-size="10" opacity="0.4">✦</text>
      <text x="146" y="42" font-size="8"  opacity="0.3">✧</text>
    </svg>

    <h1>📚 <span class="accent">Books</span></h1>
  </header>

  <main class="content">
    <div class="placeholder-card">
      <div class="pl-icon">📖</div>
      <div class="pl-title">書寫計劃整理中…</div>
      <div class="pl-desc">
        各種書寫、故事與創作計劃<br>
        卡皮巴拉正在認真閱讀，稍後奉上好內容 🦫
      </div>
    </div>
    <a class="back-link" href="/">← 回到首頁 &nbsp; Back Home</a>
  </main>

<script>
(function() {
  const saved = localStorage.getItem('capyTheme') || 'dark';
  function setTheme(t) {
    if (t === 'dark') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('capyTheme', t);
    document.querySelectorAll('.theme-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.t === t);
    });
  }
  window.setTheme = setTheme;
  setTheme(saved);
})();
</script>
</body>
</html>
