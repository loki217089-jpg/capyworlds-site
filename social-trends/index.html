<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社群趨勢雷達 | Social Trends Radar</title>
<style>
:root {
  --bg:#13100c;--bg2:#1e1812;--bg3:#171210;--border:#3d3020;--border2:#2a1e14;
  --accent:#c8a456;--accent-rgb:200,164,86;--text:#e8ddd0;--text2:#907a60;
  --text3:#7a6a58;--h1:#ffffff;--cancel-bg:#2a1e14;
  --card-shadow:0 2px 12px rgba(0,0,0,0.4);
  --dcard:#006aa6;--threads:#000;--yt:#f00;--yahoo:#720e9e;--ptt:#c8a456;
  --google:#4285f4;--x:#1d9bf0;--ig:#e1306c;
}
[data-theme="light"]{
  --bg:#f5f0e8;--bg2:#ffffff;--bg3:#f0ebe0;--border:#d4c4a0;--border2:#e0d4b8;
  --accent:#9a6e1e;--accent-rgb:154,110,30;--text:#2a1e0e;--text2:#7a6a50;
  --text3:#6a5a48;--h1:#1a0e06;--cancel-bg:#e0d8c8;--threads:#333;
  --card-shadow:0 2px 12px rgba(0,0,0,0.1);
}
[data-theme="pink"]{
  --bg:#1a0810;--bg2:#260a18;--bg3:#1a0810;--border:#6a2050;--border2:#4a1038;
  --accent:#e060a8;--accent-rgb:224,96,168;--text:#f8d8ec;--text2:#c06898;
  --text3:#a05880;--h1:#fff0f8;--cancel-bg:#3a1028;--threads:#e060a8;
  --card-shadow:0 2px 12px rgba(224,96,168,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.header-left a.back{color:var(--text2);font-size:14px}
.header h1{font-size:20px;color:var(--h1);display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:8px}
.header-right button{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.header-right button:hover{border-color:var(--accent);color:var(--accent)}
.header-right button.active{background:rgba(var(--accent-rgb),0.15);border-color:var(--accent);color:var(--accent)}

/* Refresh bar */
.refresh-bar{background:var(--bg2);border-bottom:1px solid var(--border2);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2)}
.refresh-bar .timer{display:flex;align-items:center;gap:6px}
.refresh-bar .timer span{color:var(--accent);font-weight:bold}
.refresh-bar button{background:var(--accent);color:#000;border:none;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.refresh-bar button:hover{opacity:0.85}

/* Main layout */
.main{max-width:1400px;margin:0 auto;padding:16px}

/* Platform tabs */
.platform-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding:0 4px}
.ptab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.ptab:hover{border-color:var(--accent)}
.ptab.active{background:rgba(var(--accent-rgb),0.15);border-color:var(--accent);color:var(--accent);font-weight:600}
.ptab .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Analysis section tabs */
.analysis-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;background:var(--bg2);padding:6px;border-radius:10px;border:1px solid var(--border)}
.atab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s}
.atab:hover{color:var(--text)}
.atab.active{background:rgba(var(--accent-rgb),0.2);color:var(--accent);font-weight:600}

/* Grid */
.trends-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:20px}
@media(max-width:740px){.trends-grid{grid-template-columns:1fr}}

/* Card */
.trend-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.trend-card:hover{transform:translateY(-2px);box-shadow:var(--card-shadow)}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2)}
.card-head .platform-badge{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px}
.card-head .platform-badge .icon{font-size:18px}
.card-head .trend-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px}
.card-body{padding:12px 14px}
.trend-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(var(--accent-rgb),0.08)}
.trend-item:last-child{border-bottom:none}
.trend-rank{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.trend-rank.top3{background:rgba(var(--accent-rgb),0.25);color:var(--accent)}
.trend-rank.normal{background:var(--bg3);color:var(--text3)}
.trend-info{flex:1;min-width:0}
.trend-title{font-size:13px;font-weight:600;color:var(--h1);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trend-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap}
.trend-heat{font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap;flex-shrink:0}

/* Analysis panels */
.analysis-panel{display:none}
.analysis-panel.active{display:block}

/* Keyword cloud */
.keyword-cloud{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:20px;min-height:200px}
.kw-tag{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);cursor:default;transition:all .2s;white-space:nowrap}
.kw-tag:hover{border-color:var(--accent);background:rgba(var(--accent-rgb),0.1)}

/* Cross platform table */
.cross-table{width:100%;border-collapse:collapse;font-size:13px}
.cross-table th{text-align:left;padding:10px 12px;background:var(--bg3);color:var(--accent);border-bottom:2px solid var(--border);font-size:12px;position:sticky;top:0}
.cross-table td{padding:8px 12px;border-bottom:1px solid var(--border2)}
.cross-table tr:hover td{background:rgba(var(--accent-rgb),0.05)}
.platform-dots{display:flex;gap:4px}
.platform-dots .pd{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;opacity:0.3}
.platform-dots .pd.on{opacity:1}

/* Category chart */
.category-bars{padding:10px 0}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cat-label{width:80px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.cat-bar-bg{flex:1;height:24px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative}
.cat-bar{height:100%;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff}
.cat-pct{font-size:11px;color:var(--text3);width:40px;text-align:right;flex-shrink:0}

/* Sentiment */
.sentiment-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.sentiment-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px}
.sentiment-card .s-platform{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sentiment-bars{display:flex;height:20px;border-radius:6px;overflow:hidden;margin-bottom:8px}
.sentiment-bars .sb{transition:width .6s}
.sentiment-legend{display:flex;gap:12px;font-size:11px;color:var(--text2)}
.sentiment-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
.legend-pos::before{background:#4ade80}
.legend-neu::before{background:#60a5fa}
.legend-neg::before{background:#f87171}

/* Timeline */
.timeline-canvas-wrap{width:100%;height:300px;position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.timeline-canvas-wrap canvas{width:100%;height:100%}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text3)}
.loading .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Engagement ranking */
.engage-list{list-style:none}
.engage-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2)}
.engage-item:last-child{border-bottom:none}
.engage-rank{font-size:18px;font-weight:800;color:var(--accent);width:30px;text-align:center}
.engage-info{flex:1;min-width:0}
.engage-title{font-size:13px;font-weight:600;color:var(--h1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.engage-sub{font-size:11px;color:var(--text3);margin-top:2px}
.engage-stat{text-align:right;flex-shrink:0}
.engage-num{font-size:16px;font-weight:700;color:var(--accent)}
.engage-label{font-size:10px;color:var(--text3)}

/* Footer */
.page-footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border2);margin-top:20px}

/* Privacy */
.privacy-link{position:fixed;bottom:4px;left:8px;z-index:9999;opacity:0.4;font-size:10px}
.privacy-link a{color:#888;text-decoration:none}

@media(max-width:600px){
  .header h1{font-size:16px}
  .header-right button{padding:4px 8px;font-size:11px}
  .trends-grid{grid-template-columns:1fr}
  .sentiment-grid{grid-template-columns:1fr}
  .cross-table{font-size:11px}
  .cross-table th,.cross-table td{padding:6px 8px}
}
</style>
</head>
<body>

<div class="header">

<div class="privacy-link"><a href="/privacy.html" target="_blank" style="color:#888;text-decoration:none">Privacy Policy</a></div>

<script>
/* ── i18n ── */
const I18N = {
  'zh-TW': {
    title:'社群趨勢雷達', nextRefresh:'下次更新', refreshNow:'立即更新',
    tabTrending:'🔥 即時熱門', tabKeywords:'☁️ 關鍵字雲', tabCross:'🔀 跨平台比較',

  },

    tabCategories:'📊 Categories', tabSentiment:'😊 Sentiment', tabTimeline:'📈 Timeline',
    tabEngage:'🏆 Engagement', thTopic:'Topic', thPlatforms:'Platforms', thHeat:'Heat',
    thCategory:'Category', footer:'Sources: Public trend pages · 6hr snapshots · Reference only',
    allPlatforms:'All', engagement:'engagement', views:'views', comments:'comments',
    positive:'Positive', neutral:'Neutral', negative:'Negative', loading:'Loading...',
    cat_entertainment:'Entertainment', cat_politics:'Politics', cat_tech:'Tech', cat_sports:'Sports',
    cat_finance:'Finance', cat_life:'Lifestyle', cat_international:'World', cat_games:'Games',

  }
};
let lang = localStorage.getItem('trendLang') || 'zh-TW';
function t(k){ return (I18N[lang]||I18N['zh-TW'])[k] || k; }
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(I18N[lang][k]) el.textContent = I18N[lang][k];
  });
  document.getElementById('lang-btn').textContent = lang==='zh-TW'?'EN':'繁中';
}
function toggleLang(){
  lang = lang==='zh-TW'?'en':'zh-TW';
  localStorage.setItem('trendLang', lang);
  applyI18n(); renderAll();
}

/* ── Theme ── */
const themes = ['dark','light','pink'];
const themeIcons = {dark:'🌙',light:'☀️',pink:'🌸'};
let themeIdx = themes.indexOf(localStorage.getItem('theme')||'dark');
if(themeIdx<0) themeIdx=0;
function applyTheme(){
  const th = themes[themeIdx];
  if(th==='dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', th);
  document.getElementById('theme-btn').textContent = themeIcons[th];
  localStorage.setItem('theme', th);
}
function cycleTheme(){ themeIdx=(themeIdx+1)%3; applyTheme(); if(typeof drawTimeline==='function') drawTimeline(); }
applyTheme();

/* ── Platforms config ── */
const PLATFORMS = [

  {id:'dcard', name:{zh:'Dcard',en:'Dcard'},   icon:'💬', color:'#006aa6', url:'https://www.dcard.tw/f'},

let activePlatform = 'all';

/* ── Categories ── */
const CATS = ['entertainment','politics','tech','sports','finance','life','international','games','food','education','health','other'];

/* ── Demo data generator ── */

  ];
  const topicsEn = [
    {t:'TSMC Earnings Beat Expectations',c:'finance'},{t:'Apple WWDC 2026 Recap',c:'tech'},
    {t:'CPBL Championship Highlights',c:'sports'},{t:'Netflix "Dark Tide" Goes Viral',c:'entertainment'},
    {t:'Central Bank Rate Decision',c:'finance'},{t:'Record High Temperatures',c:'life'},
    {t:'Budget Battle in Legislature',c:'politics'},{t:'Japan Nuclear Water Update',c:'international'},
    {t:'Switch 2 Pre-orders Sold Out',c:'games'},{t:'Michelin New List Revealed',c:'food'},
    {t:'AI Transforming Education',c:'education'},{t:'Low Birth Rate Policy Debate',c:'politics'},
    {t:'Hidden Calories in Bubble Tea',c:'health'},{t:'Three-Body S3 Trailer Drops',c:'entertainment'},
    {t:'Bitcoin Hits New ATH',c:'finance'},{t:'Rail Schedule Changes Guide',c:'life'},
    {t:'LoL Worlds: Taiwan Teams',c:'games'},{t:'Jensen Huang Visits Taiwan',c:'tech'},
    {t:'Typhoon Live Tracker',c:'life'},{t:'Olympic Qualifier Roster',c:'sports'},
    {t:'OpenAI Launches GPT-5',c:'tech'},{t:'Yen Drops to New Low',c:'finance'},
    {t:'Din Tai Fung Price Hike Debate',c:'food'},{t:'Youth "Lying Flat" Trend',c:'life'},
    {t:'C-Drama "Blossoms" Returns',c:'entertainment'},{t:'New COVID Variant Alert',c:'health'},
    {t:'Tesla Robotaxi Goes Live',c:'tech'},{t:'Ohtani Breaks Record',c:'sports'},
    {t:'LINE AI Translation Feature',c:'tech'},{t:'Scam Tactics Exposed',c:'life'},
  ];

  const pids = PLATFORMS.filter(p=>p.id!=='all').map(p=>p.id);
  const data = {};
  pids.forEach(pid=>{
    const count = randInt(8,12);
    const items = [];
    const usedIdx = new Set();
    for(let i=0;i<count;i++){
      let idx; do{ idx=randInt(0,topicsZh.length-1); }while(usedIdx.has(idx)&&usedIdx.size<topicsZh.length);
      usedIdx.add(idx);
      const topic = lang==='zh-TW'?topicsZh[idx]:topicsEn[idx];
      items.push({
        title: topic.t,
        category: topic.c,
        heat: randInt(1000,99999),
        comments: randInt(50,8000),
        views: randInt(10000,5000000),
        sentiment: {pos:randInt(20,70), neu:randInt(10,40), neg:randInt(5,35)},
        time: new Date(now.getTime() - randInt(0,21600000)).toISOString()
      });
    }
    items.sort((a,b)=>b.heat-a.heat);
    data[pid] = items;
  });
  return data;
}

let trendData = {};
let lastRefresh = null;

/* ── Countdown ── */
let countdownInterval = null;
function startCountdown(){
  if(countdownInterval) clearInterval(countdownInterval);
  const next = new Date();
  const h = next.getHours();
  const nextSlot = Math.ceil((h+1)/6)*6;
  next.setHours(nextSlot,0,0,0);
  if(next<=new Date()) next.setTime(next.getTime()+6*3600000);
  countdownInterval = setInterval(()=>{
    const diff = next - new Date();
    if(diff<=0){ refreshAll(); return; }
    const hh=Math.floor(diff/3600000), mm=Math.floor((diff%3600000)/60000), ss=Math.floor((diff%60000)/1000);
    document.getElementById('countdown').textContent =
      String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  },1000);
}

/* ── Render platform tabs ── */
function renderPlatformTabs(){
  const c = document.getElementById('platform-tabs');
  c.innerHTML = PLATFORMS.map(p=>{
    const nm = lang==='zh-TW'?p.name.zh:p.name.en;
    const active = activePlatform===p.id?'active':'';
    return `<div class="ptab ${active}" onclick="selectPlatform('${p.id}')">
      <span class="dot" style="background:${p.color}"></span>${p.icon} ${nm}</div>`;
  }).join('');
}
function selectPlatform(id){ activePlatform=id; renderPlatformTabs(); renderAll(); }

/* ── Analysis tab switching ── */
document.getElementById('analysis-tabs').addEventListener('click',e=>{
  const tab = e.target.closest('.atab');
  if(!tab) return;
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.analysis-panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  const panel = document.getElementById('panel-'+tab.dataset.panel);
  if(panel) panel.classList.add('active');
  if(tab.dataset.panel==='timeline') drawTimeline();
});

/* ── Format number ── */
function fmtNum(n){
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=10000) return (n/10000).toFixed(1)+(lang==='zh-TW'?'萬':'0K');
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

/* ── Get filtered data ── */
function getFiltered(){
  if(activePlatform==='all') return trendData;
  const r = {}; r[activePlatform]=trendData[activePlatform]; return r;
}

/* ── Render trending grid ── */
function renderTrending(){
  const grid = document.getElementById('trends-grid');
  const filtered = getFiltered();
  if(!Object.keys(filtered).length){ grid.innerHTML=`<div class="loading">${t('noData')}</div>`; return; }
  grid.innerHTML = Object.entries(filtered).map(([pid,items])=>{
    if(!items) return '';
    const p = PLATFORMS.find(x=>x.id===pid);
    const nm = lang==='zh-TW'?p.name.zh:p.name.en;
    return `<div class="trend-card">
      <div class="card-head">
        <div class="platform-badge"><span class="icon">${p.icon}</span>${nm}
          ${p.url?`<a href="${p.url}" target="_blank" style="font-size:11px;color:var(--text3);margin-left:4px">↗</a>`:''}</div>
        <span class="trend-count">${items.length} ${t('trending')}</span>
      </div>
      <div class="card-body">${items.slice(0,10).map((it,i)=>`
        <div class="trend-item">
          <div class="trend-rank ${i<3?'top3':'normal'}">${i+1}</div>
          <div class="trend-info">
            <div class="trend-title">${it.title}</div>
            <div class="trend-meta">
              <span>${t('cat_'+it.category)}</span>
              <span>💬 ${fmtNum(it.comments)}</span>
              <span>👁 ${fmtNum(it.views)}</span>
            </div>
          </div>
          <div class="trend-heat">🔥 ${fmtNum(it.heat)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

/* ── Render keyword cloud ── */
function renderKeywords(){
  const cloud = document.getElementById('keyword-cloud');
  const all = [];
  const filtered = getFiltered();
  Object.values(filtered).forEach(items=>{
    if(!items) return;
    items.forEach(it=>{
      const words = it.title.replace(/[^\u4e00-\u9fff\w\s]/g,' ').split(/\s+/).filter(w=>w.length>=2);
      words.forEach(w=>all.push({word:w,heat:it.heat}));
    });
  });
  const freq = {};
  all.forEach(({word,heat})=>{ freq[word]=(freq[word]||0)+heat; });
  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,40);
  if(!sorted.length){ cloud.innerHTML=`<div class="loading">${t('noData')}</div>`; return; }
  const maxH = sorted[0][1], minH = sorted[sorted.length-1][1];
  cloud.innerHTML = sorted.map(([w,h])=>{
    const ratio = maxH>minH?(h-minH)/(maxH-minH):0.5;
    const size = 12+ratio*24;
    const op = 0.5+ratio*0.5;
    return `<span class="kw-tag" style="font-size:${size}px;opacity:${op};color:${ratio>0.6?'var(--accent)':'var(--text)'}">${w}</span>`;
  }).join('');
}

/* ── Render cross-platform ── */
function renderCross(){
  const tbody = document.getElementById('cross-tbody');
  const topicMap = {};
  Object.entries(trendData).forEach(([pid,items])=>{
    if(!items) return;
    items.forEach(it=>{
      const key = it.title;
      if(!topicMap[key]) topicMap[key]={title:it.title,platforms:new Set(),heat:0,category:it.category};
      topicMap[key].platforms.add(pid);
      topicMap[key].heat += it.heat;
    });
  });
  const sorted = Object.values(topicMap).sort((a,b)=>b.platforms.size-a.platforms.size||b.heat-a.heat).slice(0,20);
  if(!sorted.length){ tbody.innerHTML=`<tr><td colspan="4" style="text-align:center">${t('noData')}</td></tr>`; return; }
  const pids = PLATFORMS.filter(p=>p.id!=='all');
  tbody.innerHTML = sorted.map(item=>{
    const dots = pids.map(p=>{
      const on = item.platforms.has(p.id);
      return `<span class="pd ${on?'on':''}" style="background:${on?p.color:'var(--bg3)'}" title="${lang==='zh-TW'?p.name.zh:p.name.en}">${p.icon}</span>`;
    }).join('');
    return `<tr>
      <td style="font-weight:600;color:var(--h1);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.title}</td>
      <td><div class="platform-dots">${dots}</div></td>
      <td style="color:var(--accent);font-weight:700">🔥 ${fmtNum(item.heat)}</td>
      <td><span style="color:${CAT_COLORS[item.category]||'#888'}">${t('cat_'+item.category)}</span></td>
    </tr>`;
  }).join('');
}

/* ── Render categories ── */
function renderCategories(){
  const container = document.getElementById('category-bars');
  const counts = {};
  const filtered = getFiltered();
  Object.values(filtered).forEach(items=>{
    if(!items) return;
    items.forEach(it=>{ counts[it.category]=(counts[it.category]||0)+it.heat; });
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const maxVal = sorted.length?sorted[0][1]:1;
  if(!sorted.length){ container.innerHTML=`<div class="loading">${t('noData')}</div>`; return; }
  container.innerHTML = sorted.map(([cat,val])=>{
    const pct = Math.round(val/maxVal*100);
    return `<div class="cat-row">
      <div class="cat-label">${t('cat_'+cat)}</div>
      <div class="cat-bar-bg"><div class="cat-bar" style="width:${pct}%;background:${CAT_COLORS[cat]||'#888'}">${pct>15?fmtNum(val):''}</div></div>
      <div class="cat-pct">${pct}%</div>
    </div>`;
  }).join('');
}

/* ── Render sentiment ── */
function renderSentiment(){
  const grid = document.getElementById('sentiment-grid');
  const filtered = getFiltered();
  if(!Object.keys(filtered).length){ grid.innerHTML=`<div class="loading">${t('noData')}</div>`; return; }
  grid.innerHTML = Object.entries(filtered).map(([pid,items])=>{
    if(!items||!items.length) return '';
    const p = PLATFORMS.find(x=>x.id===pid);
    const nm = lang==='zh-TW'?p.name.zh:p.name.en;
    let tp=0,tn=0,tne=0;
    items.forEach(it=>{
      const s=it.sentiment; const tot=s.pos+s.neu+s.neg;
      tp+=s.pos/tot; tn+=s.neu/tot; tne+=s.neg/tot;
    });
    const total=tp+tn+tne;
    const pp=Math.round(tp/total*100), pn=Math.round(tn/total*100), pne=100-pp-pn;
    return `<div class="sentiment-card">
      <div class="s-platform">${p.icon} ${nm}</div>
      <div class="sentiment-bars">
        <div class="sb" style="width:${pp}%;background:#4ade80"></div>
        <div class="sb" style="width:${pn}%;background:#60a5fa"></div>
        <div class="sb" style="width:${pne}%;background:#f87171"></div>
      </div>
      <div class="sentiment-legend">
        <span class="legend-pos">${t('positive')} ${pp}%</span>
        <span class="legend-neu">${t('neutral')} ${pn}%</span>
        <span class="legend-neg">${t('negative')} ${pne}%</span>
      </div>
    </div>`;
  }).join('');
}

/* ── Draw timeline (canvas) ── */
function drawTimeline(){
  const wrap = document.querySelector('.timeline-canvas-wrap');
  const canvas = document.getElementById('timeline-canvas');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  canvas.width = W * (window.devicePixelRatio||1);
  canvas.height = H * (window.devicePixelRatio||1);
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);

  const isDark = !document.documentElement.getAttribute('data-theme') || document.documentElement.getAttribute('data-theme')==='pink';
  const gridColor = isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  const textColor = isDark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';

  ctx.clearRect(0,0,W,H);
  const pad = {top:30,right:20,bottom:40,left:50};
  const gW = W-pad.left-pad.right, gH = H-pad.top-pad.bottom;

  // Time axis: last 24h in 6h slots
  const now = Date.now();
  const slots = ['-24h','-18h','-12h','-6h',t('title').includes('雷達')?'現在':'Now'];
  ctx.font = '11px sans-serif'; ctx.fillStyle = textColor; ctx.textAlign='center';
  slots.forEach((label,i)=>{
    const x = pad.left + (i/(slots.length-1))*gW;
    ctx.fillText(label, x, H-pad.bottom+20);
    ctx.strokeStyle=gridColor; ctx.beginPath(); ctx.moveTo(x,pad.top); ctx.lineTo(x,H-pad.bottom); ctx.stroke();
  });

  // Y axis
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){
    const y = pad.top + (i/4)*gH;
    ctx.fillStyle=textColor; ctx.fillText(fmtNum((4-i)*25000), pad.left-8, y);
    ctx.strokeStyle=gridColor; ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
  }

  // Lines per platform
  const filtered = getFiltered();
  const pids = Object.keys(filtered);
  pids.forEach((pid,pi)=>{
    const p = PLATFORMS.find(x=>x.id===pid);
    if(!p) return;
    const items = filtered[pid];
    if(!items||!items.length) return;
    const points = [];
    for(let si=0;si<slots.length;si++){
      const slotTime = now - (4-si)*6*3600000;
      let heat = 0;
      items.forEach(it=>{
        const itTime = new Date(it.time).getTime();
        heat += it.heat * Math.max(0, 1 - Math.abs(itTime-slotTime)/(12*3600000));
      });
      points.push({x: pad.left+(si/(slots.length-1))*gW, y: pad.top+gH-Math.min(heat/100000,1)*gH});
    }
    ctx.strokeStyle = p.color; ctx.lineWidth=2; ctx.lineJoin='round';
    ctx.beginPath(); points.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y)); ctx.stroke();
    // Dot at last point
    const last=points[points.length-1];
    ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(last.x,last.y,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=p.color; ctx.font='11px sans-serif'; ctx.textAlign='left';
    ctx.fillText(lang==='zh-TW'?p.name.zh:p.name.en, last.x+8, last.y+3);
  });
}

/* ── Render engagement ── */
function renderEngagement(){
  const list = document.getElementById('engage-list');
  const all = [];
  const filtered = getFiltered();
  Object.entries(filtered).forEach(([pid,items])=>{
    if(!items) return;
    items.forEach(it=>all.push({...it,platform:pid}));
  });
  all.sort((a,b)=>(b.views+b.comments*100)-(a.views+a.comments*100));
  const top = all.slice(0,20);
  if(!top.length){ list.innerHTML=`<li class="loading">${t('noData')}</li>`; return; }
  list.innerHTML = top.map((it,i)=>{
    const p = PLATFORMS.find(x=>x.id===it.platform);
    return `<li class="engage-item">
      <div class="engage-rank">${i+1}</div>
      <div class="engage-info">
        <div class="engage-title">${p?p.icon:''} ${it.title}</div>
        <div class="engage-sub">${t('cat_'+it.category)} · ${lang==='zh-TW'?p.name.zh:p.name.en} · 💬${fmtNum(it.comments)}</div>
      </div>
      <div class="engage-stat">
        <div class="engage-num">${fmtNum(it.views)}</div>
        <div class="engage-label">${t('views')}</div>
      </div>
    </li>`;
  }).join('');
}

/* ── Render all ── */
function renderAll(){
  renderPlatformTabs();
  renderTrending();
  renderKeywords();
  renderCross();
  renderCategories();
  renderSentiment();
  renderEngagement();
  if(document.getElementById('panel-timeline').classList.contains('active')) drawTimeline();
}

/* ── Refresh ── */
function refreshAll(){
  trendData = generateDemoData();
  lastRefresh = new Date();
  localStorage.setItem('trendData', JSON.stringify(trendData));
  localStorage.setItem('trendRefresh', lastRefresh.toISOString());
  renderAll();
  startCountdown();
}

/* ── Init ── */
function init(){
  // Load cached data
  const cached = localStorage.getItem('trendData');
  const cachedTime = localStorage.getItem('trendRefresh');
  if(cached && cachedTime){
    const elapsed = Date.now() - new Date(cachedTime).getTime();
    if(elapsed < 6*3600000){
      trendData = JSON.parse(cached);
      lastRefresh = new Date(cachedTime);
    } else {
      trendData = generateDemoData();
      lastRefresh = new Date();
      localStorage.setItem('trendData', JSON.stringify(trendData));
      localStorage.setItem('trendRefresh', lastRefresh.toISOString());
    }
  } else {
    trendData = generateDemoData();
    lastRefresh = new Date();
    localStorage.setItem('trendData', JSON.stringify(trendData));
    localStorage.setItem('trendRefresh', lastRefresh.toISOString());
  }
  applyI18n();
  renderAll();
  startCountdown();
  window.addEventListener('resize', ()=>{
    if(document.getElementById('panel-timeline').classList.contains('active')) drawTimeline();
  });
}
init();
